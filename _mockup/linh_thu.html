<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Linh Thú</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  body{ background:#0b0e16; color:#e2e8f0; font-family:system-ui,sans-serif; }
  .fserif{ font-family:'Lora',serif; }
  .panel{ background:#0f1521; border:1px solid #1e293b; }
  .gold-text{ background:linear-gradient(90deg,#fde68a,#f59e0b); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#64748b; }
</style>
</head>
<body class="p-4">
<div class="max-w-[1100px] mx-auto space-y-3">

  <!-- HEADER -->
  <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 36%,rgba(11,14,22,.5) 66%,rgba(11,14,22,.2) 100%)"></div>
    <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(52,211,153,.15), transparent 66%)"></div>
    <div class="relative w-full p-5 md:p-6">
      <div class="text-[28px] gold-text leading-none fserif">Linh Thú</div>
      <div class="text-[13px] text-slate-300/90 leading-snug mt-2 max-w-xl fserif">Thu phục yêu thú thành bạn đồng hành — ấp trứng, dưỡng nuôi, dắt theo để mạnh thêm; sai khiến cả bầy đi săn lùng kỳ trân.</div>
    </div>
  </div>

  <!-- 4 TRẠNG THÁI (idle engine) -->
  <div class="panel rounded-lg px-3 pt-2.5">
    <div class="flex gap-5 text-sm border-b border-slate-800">
      <button onclick="setSt('cho')"  data-st="cho"  class="stbtn pb-2.5 -mb-px border-b-2 font-semibold">Chờ Lệnh</button>
      <button onclick="setSt('san')"  data-st="san"  class="stbtn pb-2.5 -mb-px border-b-2 font-semibold flex items-center gap-1.5">Săn Mồi <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-700/60 text-slate-400">P2</span></button>
      <button onclick="setSt('chien')" data-st="chien" class="stbtn pb-2.5 -mb-px border-b-2 font-semibold flex items-center gap-1.5">Xuất Chiến <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-700/60 text-slate-400">P2</span></button>
      <button onclick="setSt('duong')" data-st="duong" class="stbtn pb-2.5 -mb-px border-b-2 font-semibold flex items-center gap-1.5">Dưỡng Sức <span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-700/60 text-slate-400">P2</span></button>
    </div>
  </div>

  <div class="grid lg:grid-cols-[1fr_320px] gap-3 items-start">
    <!-- TRÁI: roster + ấp trứng -->
    <div class="space-y-3">
      <!-- Roster -->
      <div class="panel rounded-xl p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="text-jade font-bold fserif">Linh Thú Của Ta <span class="text-slate-500 text-[12px] font-normal">· 4/6 ô</span></div>
          <span class="text-[11px] text-slate-500">Ngự Thú Lv 8 · mở 6 ô</span>
        </div>
        <div id="roster" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
      </div>
      <!-- Ấp trứng -->
      <div class="panel rounded-xl p-4">
        <div class="lbl mb-2.5 text-slate-400">Ấp Trứng — nở Linh Thú (trứng rơi từ Yêu Vương)</div>
        <div id="eggs" class="space-y-2"></div>
      </div>
    </div>

    <!-- PHẢI: linh thú đang theo -->
    <div class="panel rounded-xl p-4 lg:sticky lg:top-0">
      <div class="lbl mb-2 text-slate-400">Đang Dắt Theo</div>
      <div id="equipped"></div>
    </div>
  </div>
</div>

<script>
const QC = { phamPham:'#cbd5e1', tinhPham:'#34d399', tuyetPham:'#fb7185', thanPham:'#fb923c', coBan:'#a78bfa' };
const QN = { phamPham:'Phàm', tinhPham:'Linh', tuyetPham:'Tuyệt', thanPham:'Thần', coBan:'Cô Bản' };
const PETS = [
  { id:'p1', base:'bachHo',   name:'Bạch Hổ',    he:'Kim', q:'thanPham', lv:24, eq:true,  art:'yvBachHo',   stam:78, stats:{Công:142,Thủ:60,'Sinh Lực':820} },
  { id:'p2', base:'hoaLan',   name:'Hỏa Lân',    he:'Hỏa', q:'tinhPham', lv:18, eq:false, art:'yvHoaLan',   stam:40, stats:{Công:96,'Bạo Kích':'6%','Sinh Lực':410} },
  { id:'p3', base:'huyenQuy', name:'Huyền Quy',  he:'Thủy',q:'tinhPham', lv:15, eq:false, art:'yvHuyenQuy', stam:95, stats:{Thủ:120,'Sinh Lực':900,'Né':'4%'} },
  { id:'p4', base:'loiBang',  name:'Lôi Bằng',   he:'Lôi', q:'phamPham', lv:9,  eq:false, art:'yvLoiBang',  stam:12, stats:{Công:48,'Tốc':22} },
];
const EGGS = [
  { id:'e1', name:'Băng Phượng Noãn · Thần Phẩm', q:'thanPham', qty:1, art:'yvBangPhuong' },
  { id:'e2', name:'Độc Giao Noãn · Linh Phẩm',    q:'tinhPham', qty:2, art:'yvDocGiao' },
  { id:'e3', name:'Hồ Yêu Noãn · Phàm Phẩm',      q:'phamPham', qty:3, art:'yvHoYeu' },
];
const petImg = (art) => `<img src="../images/items/${art}.png" class="w-full h-full object-cover" onerror="this.style.opacity=0">`;
function petCard(p){
  const c = QC[p.q];
  const statline = Object.entries(p.stats).map(([k,v])=>`<span class="text-[10px] text-slate-400">${k} <b class="text-slate-200">+${v}</b></span>`).join(' · ');
  return `<div class="rounded-xl overflow-hidden border ${p.eq?'ring-1':''}" style="border-color:${c}55;${p.eq?'box-shadow:0 0 0 1px '+c+'88 inset':''};background:linear-gradient(160deg,${c}10,#0c111b)">
    <div class="relative aspect-square overflow-hidden bg-ink3">${petImg(p.art)}
      <span class="absolute top-1.5 left-1.5 text-[9px] px-1.5 py-0.5 rounded font-bold" style="color:${c};background:${c}20;border:1px solid ${c}66">${QN[p.q]}</span>
      <span class="absolute top-1.5 right-1.5 text-[9px] px-1.5 py-0.5 rounded bg-black/55 text-slate-200">Lv ${p.lv}</span>
      ${p.eq?`<span class="absolute bottom-0 inset-x-0 text-center text-[10px] py-0.5 bg-jade/85 text-ink font-bold">✓ Đang theo</span>`:''}
    </div>
    <div class="p-2">
      <div class="flex items-center gap-1.5"><span class="text-[13px] font-bold fserif" style="color:${c}">${p.name}</span><span class="text-[9px] text-slate-500">${p.he}</span></div>
      <div class="mt-1 leading-snug">${statline}</div>
      <div class="flex items-center gap-1.5 mt-1.5"><span class="lbl">Thể Lực</span><div class="flex-1 h-1.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full" style="width:${p.stam}%;background:${p.stam<25?'#fb7185':'#34d399'}"></div></div><span class="text-[9px] text-slate-500">${p.stam}%</span></div>
      <button class="w-full mt-2 py-1 text-[11px] rounded font-semibold ${p.eq?'bg-slate-800 text-slate-400':'bg-jade/85 hover:bg-jade text-ink'}">${p.eq?'Thu về':'Dắt theo'}</button>
    </div>
  </div>`;
}
function eggRow(e){
  const c = QC[e.q];
  return `<div class="flex items-center gap-3 p-2.5 rounded bg-ink3/50 border border-slate-800">
    <div class="w-11 h-11 rounded bg-ink overflow-hidden shrink-0" style="box-shadow:inset 0 0 0 1px ${c}55">${petImg(e.art)}</div>
    <div class="flex-1 min-w-0"><div class="text-[13px] font-medium" style="color:${c}">${e.name}</div><div class="text-[10px] text-slate-500">×${e.qty} · ấp ra Linh Thú cùng dòng</div></div>
    <button class="px-3.5 py-1.5 text-[12px] rounded bg-amber-600/85 hover:bg-amber-500 text-ink font-semibold shrink-0">🥚 Ấp</button>
  </div>`;
}
function renderEquipped(){
  const p = PETS.find(x=>x.eq);
  const c = QC[p.q];
  document.getElementById('equipped').innerHTML = `
    <div class="rounded-xl overflow-hidden border" style="border-color:${c}66">
      <div class="relative aspect-[4/3] bg-ink3 overflow-hidden">${petImg(p.art)}
        <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink to-transparent pt-8 pb-2 px-3">
          <div class="text-base font-bold fserif" style="color:${c}">${p.name}</div>
          <div class="text-[10px] text-slate-400">${p.he} · ${QN[p.q]} Phẩm · Lv ${p.lv}</div>
        </div>
      </div>
    </div>
    <div class="text-[11px] text-jade mt-3 mb-1.5 font-medium">Cộng vào nhân vật:</div>
    <div class="space-y-1">${Object.entries(p.stats).map(([k,v])=>`<div class="flex items-center justify-between text-[12px] px-2.5 py-1.5 rounded bg-jade/10 border border-jade/25"><span class="text-slate-300">${k}</span><span class="text-jade font-bold">+${v}</span></div>`).join('')}</div>
    <button class="w-full mt-3 py-2 rounded-lg text-[12px] font-semibold bg-ink3 border border-slate-700 hover:border-rose-500 text-slate-300">Thu về</button>`;
}
function render(){
  document.getElementById('roster').innerHTML = PETS.map(petCard).join('') + `<button class="rounded-xl border border-dashed border-slate-700 flex flex-col items-center justify-center text-slate-600 text-[12px] aspect-[3/4] hover:border-slate-500">+ Ô trống<br><span class="text-[10px]">nâng Ngự Thú</span></button>`+`<button class="rounded-xl border border-dashed border-slate-800 text-slate-700 text-[12px] aspect-[3/4] flex items-center justify-center">🔒 Lv12</button>`;
  document.getElementById('eggs').innerHTML = EGGS.map(eggRow).join('');
  renderEquipped();
}
function setSt(s){ document.querySelectorAll('.stbtn').forEach(b=>{ const on=b.dataset.st===s; b.className='stbtn pb-2.5 -mb-px border-b-2 font-semibold '+(on?'border-jade text-jade':'border-transparent text-slate-500 hover:text-slate-300')+(b.dataset.st!=='cho'?' flex items-center gap-1.5':''); }); }
render(); setSt('cho');
</script>
</body>
</html>
