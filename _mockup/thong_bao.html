<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Thông Báo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;700&display=swap" rel="stylesheet">
<style>
  body{ background:#0b0e16; color:#e2e8f0; font-family:system-ui,sans-serif; }
  .fserif{ font-family:'Lora',serif; }
  .panel{ background:#0f1521; border:1px solid #1e293b; }
  .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:#64748b; }
</style>
</head>
<body class="p-6">
<div class="max-w-3xl mx-auto">

  <!-- ===== TOP BAR giả ===== -->
  <div class="panel rounded-lg flex items-center gap-4 px-4 h-14 mb-2 relative">
    <span class="gold-text fserif text-xl" style="background:linear-gradient(90deg,#fde68a,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700">Tiêu Dao Lục</span>
    <span class="text-sm text-slate-500">— Nhàn rỗi —</span>
    <div class="ml-auto flex items-center gap-3 text-sm">
      <span class="flex items-center gap-1">🔴 <b class="text-rose-300">3.200</b></span>
      <span class="flex items-center gap-1">🟡 <b class="text-gold">128.500</b></span>
      <!-- CHUÔNG -->
      <button onclick="togglePanel()" class="relative w-9 h-9 rounded-lg flex items-center justify-center hover:bg-ink3 transition" title="Thông báo">
        <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5 text-slate-300"><path d="M18 8A6 6 0 1 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span id="badge" class="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">5</span>
      </button>
    </div>

    <!-- ===== BẢNG THÔNG BÁO (dropdown dưới chuông) ===== -->
    <div id="panel" class="hidden absolute right-2 top-[52px] w-[380px] panel rounded-xl shadow-2xl z-50 overflow-hidden" style="box-shadow:0 18px 50px -12px rgba(0,0,0,.7)">
      <!-- Header -->
      <div class="flex items-center justify-between px-3.5 py-3 border-b border-slate-800">
        <div class="fserif font-bold text-slate-100">Thông Báo</div>
        <button onclick="markAll()" class="text-[11px] text-jade hover:text-jade/80">Đánh dấu đã đọc</button>
      </div>
      <!-- Dropdown lọc type -->
      <div class="px-3.5 py-2.5 border-b border-slate-800/70 flex items-center gap-2">
        <span class="lbl">Phân loại</span>
        <div class="relative flex-1">
          <select id="filter" onchange="render()" class="w-full appearance-none bg-ink3 border border-slate-700 rounded-lg pl-3 pr-8 py-1.5 text-[12.5px] text-slate-200 focus:border-jade outline-none cursor-pointer">
            <option value="all">Tất cả</option>
            <option value="thuThap">Thu Thập</option>
            <option value="yeuVuong">Yêu Vương</option>
            <option value="biCanh">Bí Cảnh</option>
            <option value="khac">Khác</option>
            <option value="sanGD">Sàn Giao Dịch</option>
          </select>
          <svg viewBox="0 0 24 24" class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 pointer-events-none" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <!-- List -->
      <div id="list" class="max-h-[360px] overflow-y-auto"></div>
      <!-- Footer -->
      <div class="px-3.5 py-2 border-t border-slate-800 text-center">
        <button onclick="clearAll()" class="text-[11px] text-slate-500 hover:text-rose-400">Xoá tất cả</button>
      </div>
    </div>
  </div>

  <p class="text-slate-500 text-sm mt-6">↑ Bấm chuông để mở bảng thông báo. Dropdown "Phân loại" lọc theo từng type.</p>
  <p class="text-slate-600 text-xs mt-2">5 type: Thu Thập (skill) · Yêu Vương (loot) · Bí Cảnh · Khác (level-up...) · Sàn Giao Dịch (thiết kế sẵn, chưa online).</p>
</div>

<script>
const TYPE = {
  thuThap:  { label:'Thu Thập',      col:'#34d399', ic:'🌿' },
  yeuVuong: { label:'Yêu Vương',     col:'#fb7185', ic:'🐲' },
  biCanh:   { label:'Bí Cảnh',       col:'#a78bfa', ic:'🏛️' },
  khac:     { label:'Khác',          col:'#fbbf24', ic:'✦' },
  sanGD:    { label:'Sàn Giao Dịch', col:'#22d3ee', ic:'⚖️' },
};
let NOTIFS = [
  { type:'thuThap',  title:'Thu thập hoàn tất',     body:'Đốn Củi · +240 Tùng Mộc · +960 EXP (vắng mặt 3g12p)', ago:'2 phút', read:false },
  { type:'yeuVuong', title:'Hạ Bạch Ngạch Hổ Vương', body:'Nhận: Tinh Thể Yêu Vương ×1 · Trứng Bạch Hổ ×2 · 1,2 vạn Bạc · 8.500 EXP', ago:'18 phút', read:false },
  { type:'biCanh',   title:'Vượt Thanh Vân Cốc ×5', body:'Nhận: Đồ Phổ 〈Huyền Thiết Phủ〉 · 3.420 Bạc · Cơ Duyên +12%', ago:'34 phút', read:false },
  { type:'khac',     title:'Lên cấp kỹ năng',        body:'Câu Cá đạt Lv 32 — mở vùng câu Thủy Tinh Động', ago:'1 giờ', read:false },
  { type:'thuThap',  title:'Thu thập hoàn tất',     body:'Đào Khoáng · +180 Thiết Khoáng · +720 EXP', ago:'2 giờ', read:false },
  { type:'sanGD',    title:'Lệnh bán đã khớp',       body:'Đã bán Hàn Thiết Đĩnh ×5 @ 95 Bạc — (Sàn chưa mở, hiển thị mẫu)', ago:'—', read:true },
  { type:'khac',     title:'Bái sư thành công',      body:'Đã học nghề Luyện Đan từ NPC Âu Dã Tử', ago:'hôm qua', read:true },
];
const fmtBadge = () => { const n = NOTIFS.filter(x=>!x.read).length; const b=document.getElementById('badge'); b.textContent=n; b.style.display = n>0?'flex':'none'; };
function row(n){
  const t = TYPE[n.type];
  return `<button onclick="openNotif(this)" class="w-full text-left flex gap-3 px-3.5 py-3 border-b border-slate-800/60 hover:bg-ink3/50 transition ${n.read?'opacity-60':''}">
    <div class="w-9 h-9 rounded-lg shrink-0 flex items-center justify-center text-lg" style="background:${t.col}1f;border:1px solid ${t.col}55">${t.ic}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2">
        <span class="text-[10px] px-1.5 py-0.5 rounded shrink-0" style="color:${t.col};background:${t.col}14;border:1px solid ${t.col}44">${t.label}</span>
        <span class="text-[13px] font-semibold text-slate-100 truncate">${n.title}</span>
      </div>
      <div class="text-[11.5px] text-slate-400 leading-snug mt-0.5">${n.body}</div>
      <div class="text-[10px] text-slate-600 mt-1">${n.ago==='—'?'':n.ago+' trước'}</div>
    </div>
    ${n.read?'':`<span class="w-2 h-2 rounded-full shrink-0 mt-1.5" style="background:${t.col}"></span>`}
  </button>`;
}
function render(){
  const f = document.getElementById('filter').value;
  const items = NOTIFS.filter(n=> f==='all' || n.type===f);
  document.getElementById('list').innerHTML = items.length
    ? items.map(row).join('')
    : `<div class="px-4 py-10 text-center text-slate-600 text-[12px]">Chưa có thông báo${f==='all'?'':' loại này'}.</div>`;
  fmtBadge();
}
function togglePanel(){ document.getElementById('panel').classList.toggle('hidden'); }
function markAll(){ NOTIFS.forEach(n=>n.read=true); render(); }
function clearAll(){ NOTIFS=[]; render(); }
function openNotif(){ /* mark read on click - demo */ }
render();
</script>
</body>
</html>
