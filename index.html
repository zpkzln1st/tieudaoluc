                        <span class="text-[13.5px] font-semibold text-slate-100" x-text="n.title"></span>
                      </div>
                      <div class="text-[12px] text-slate-400 leading-snug mt-1" x-text="n.body"></div>
                      <div class="text-[10.5px] text-slate-600 mt-1.5" x-text="$store.game.notifAgo(n.ts)"></div>
                    </div>
                    <template x-if="!n.read"><span class="w-2 h-2 rounded-full shrink-0 mt-2" :style="'background:'+t.col"></span></template>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: TÀNG KINH CÁC (nguồn skill — Học/Mua võ học) ===== -->
      <template x-if="$store.game.view==='tangkinhcac'">
        <div class="space-y-3" x-data="{ hf:'all', onlyLocked:false, hfList:[['all','Tất cả'],['hoa','Hỏa'],['thuy','Thủy'],['moc','Mộc'],['kim','Kim'],['tho','Thổ'],['vatly','Vật lý'],['buff','Trợ']] }">

          <!-- Header -->
          <div class="panel rounded-lg p-4">
            <div class="flex items-start gap-3">
              <div class="w-14 h-14 rounded-lg bg-ink3 border border-amber-500/30 flex items-center justify-center shrink-0 overflow-hidden" x-html="$store.game.ico('tangkinhcac','📖')"></div>
              <div class="flex-1 min-w-0">
                <div class="text-jade font-bold text-lg" style="font-family:'Lora',serif">Tàng Kinh Các</div>
                <div class="text-[12px] text-slate-400 mt-0.5 leading-snug">Lĩnh hội võ học từ các <b class="text-slate-300">Môn Phái</b> (trả <span class="inline-flex w-3.5 h-3.5 align-text-bottom" x-html="$store.game.ico('bac','🟡')"></span> <span class="text-gold">Bạc</span>), hoặc thỉnh <b class="text-amber-300">bí phổ tuyệt học</b> bậc Cao (trả <span class="inline-flex w-3.5 h-3.5 align-text-bottom" x-html="$store.game.ico('nguyenBao','🔷')"></span> <span class="text-cyan">Nguyên Bảo</span>). Học rồi mới lắp được ở <b class="text-slate-300">Bài Võ</b>.</div>
              </div>
              <div class="text-right text-sm shrink-0 space-y-1">
                <div class="flex items-center justify-end gap-1 text-gold font-bold"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt($store.game.state.currencies.bac)"></span></div>
                <div class="flex items-center justify-end gap-1 text-cyan font-bold"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('nguyenBao','🔷')"></span><span x-text="$store.game.fmt($store.game.state.currencies.nguyenBao)"></span></div>
              </div>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <div class="flex-1 h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-jade transition-all" :style="`width:${$store.game.tangKinhTotalCount?Math.round($store.game.tangKinhOwnedCount/$store.game.tangKinhTotalCount*100):0}%`"></div></div>
              <span class="text-[11px] text-slate-400 shrink-0">Đã thông <b class="text-jade" x-text="$store.game.tangKinhOwnedCount"></b>/<span x-text="$store.game.tangKinhTotalCount"></span> võ học</span>
            </div>
          </div>

          <!-- Lọc -->
          <div class="panel rounded-lg p-2.5 flex items-center gap-1.5 flex-wrap">
            <template x-for="f in hfList" :key="f[0]"><button @click="hf=f[0]" class="px-2.5 py-1 rounded text-xs border transition" :class="hf===f[0]?'border-jade text-jade bg-jade/10':'border-slate-700 text-slate-400 hover:border-slate-500'" x-text="f[1]"></button></template>
            <div class="w-px self-stretch bg-slate-700/80 mx-1"></div>
            <button @click="onlyLocked=!onlyLocked" class="px-2.5 py-1 rounded text-xs border transition" :class="onlyLocked?'border-amber-400 text-amber-300 bg-amber-500/10':'border-slate-700 text-slate-400 hover:border-slate-500'" x-text="onlyLocked?'✓ Chỉ chưa học':'Chỉ chưa học'"></button>
          </div>

          <!-- Mục theo Môn Phái -->
          <template x-for="sec in $store.game.tangKinhSections.filter(s=> hf==='all' || s.he===hf)" :key="sec.he">
            <section class="panel rounded-lg p-3" x-show="sec.items.some(it=> !onlyLocked || !$store.game.itemOwned(it))">
              <!-- header môn phái (chữ Hán thư pháp + crest art tuỳ chọn) -->
              <div class="flex items-center gap-3 mb-3 pb-2.5 border-b border-slate-800">
                <div class="relative w-12 h-12 rounded-lg overflow-hidden flex items-center justify-center shrink-0 bg-gradient-to-br border" :class="$store.game.NGU_HANH[sec.he].grad+' '+$store.game.NGU_HANH[sec.he].ring">
                  <span class="text-[26px] leading-none font-bold opacity-90" style="font-family:'Lora',serif" :class="$store.game.heInfo(sec.he).text" x-text="sec.monPhai.han || (sec.he==='vatly'?'武':'符')"></span>
                  <img :src="'images/monphai/'+sec.he+'.png'" class="absolute inset-0 w-full h-full object-cover" onerror="this.remove()">
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-baseline gap-1.5"><span class="font-bold text-[15px]" style="font-family:'Lora',serif" :class="$store.game.heInfo(sec.he).text" x-text="sec.monPhai.name"></span><span class="text-slate-600 text-sm" x-text="sec.monPhai.han"></span></div>
                  <div class="text-[11px] text-slate-500 leading-snug truncate" x-text="sec.monPhai.desc"></div>
                </div>
                <span class="text-[10px] px-1.5 py-0.5 rounded shrink-0" :class="$store.game.NGU_HANH[sec.he].badge" x-text="$store.game.heName(sec.he)"></span>
              </div>
              <!-- thẻ võ học -->
              <div class="grid gap-2.5" style="grid-template-columns:repeat(auto-fill,minmax(168px,1fr))">
                <template x-for="it in sec.items.filter(it=> !onlyLocked || !$store.game.itemOwned(it))" :key="it.kind+'_'+it.id">
                  <div class="rounded-lg border-2 overflow-hidden flex flex-col bg-ink3/40 transition" :class="$store.game.itemMeta(it).borderCls+' '+$store.game.itemMeta(it).ringCls+' '+($store.game.itemOwned(it)?$store.game.itemMeta(it).glowCls:'opacity-90 saturate-[.7]')">
                    <!-- art -->
                    <div class="relative w-full" style="aspect-ratio:1">
                      <div class="absolute inset-0 bg-gradient-to-br" :class="$store.game.NGU_HANH[sec.he].grad"></div>
                      <!-- placeholder: chữ Hán thư pháp (đè bằng art nếu có) -->
                      <span class="absolute inset-0 flex items-center justify-center opacity-[.13] select-none" style="font-family:'Lora',serif;font-size:5.2rem;line-height:1" :class="$store.game.heInfo(sec.he).text" x-text="$store.game.itemMeta(it).han"></span>
                      <img :src="$store.game.itemImg(it)" class="absolute inset-0 w-full h-full object-cover" :class="$store.game.itemOwned(it)?'':'grayscale opacity-50'" onerror="this.remove()">
                      <div x-show="!$store.game.itemOwned(it)" class="absolute inset-0 bg-ink/55"></div>
                      <!-- badge phẩm chất / loại (góc phải) -->
                      <span class="absolute top-1.5 right-1.5 text-[9px] px-1.5 py-0.5 rounded shadow" :class="$store.game.itemMeta(it).badgeCls" x-text="$store.game.itemMeta(it).badgeText"></span>
                      <!-- chỉ đánh dấu khi CHƯA sở hữu (ổ khoá); thẻ đã học để art đủ màu nói thay -->
                      <template x-if="!$store.game.itemOwned(it)"><span class="absolute top-1.5 left-1.5 w-5 h-5 flex items-center justify-center rounded bg-ink/75 text-slate-200" x-html="$store.game.svg('lock','w-3.5 h-3.5')"></span></template>
                    </div>
                    <!-- info -->
                    <div class="p-2 flex flex-col flex-1" :class="$store.game.itemOwned(it)?'':'bg-ink/25'">
                      <div class="font-semibold text-[12.5px] leading-tight truncate" :class="$store.game.heInfo(sec.he).text" x-text="it.obj.name"></div>
                      <div class="text-[9.5px] font-medium mb-1" :class="$store.game.itemMeta(it).metaText" x-text="$store.game.itemMeta(it).metaLine"></div>
                      <div class="text-[10.5px] text-slate-400 leading-snug mb-2 flex-1" x-text="$store.game.itemDesc(it)"></div>
                      <!-- nút Học/Mua / Đã sở hữu -->
                      <template x-if="$store.game.itemOwned(it)">
                        <div class="w-full py-1.5 rounded text-center text-[11px] font-bold bg-jade/15 border border-jade/40 text-jade">✓ Đã sở hữu</div>
                      </template>
                      <template x-if="!$store.game.itemOwned(it)">
                        <button @click="$store.game.learnItem(it)" :disabled="!$store.game.canAffordCost($store.game.itemCost(it))" class="w-full py-1.5 rounded text-[11px] font-bold transition border flex items-center justify-center gap-1.5" :class="!$store.game.canAffordCost($store.game.itemCost(it))?'bg-slate-800/60 border-slate-700 text-slate-500 cursor-not-allowed':($store.game.skillSource($store.game.itemCost(it))==='mua'?'bg-cyan/20 border-cyan/60 text-cyan hover:bg-cyan/30':'bg-amber-500/20 border-amber-400/60 text-amber-200 hover:bg-amber-500/30')">
                          <span x-text="$store.game.skillSource($store.game.itemCost(it))==='mua'?'Mua':'Học'"></span>
                          <span class="w-4 h-4 inline-flex items-center justify-center" x-html="$store.game.costIcon($store.game.itemCost(it))"></span>
                          <span x-text="$store.game.costAmt($store.game.itemCost(it))"></span>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </section>
          </template>
        </div>
      </template>

      <!-- ===== VIEW: INVENTORY ===== -->
      <template x-if="$store.game.view==='inventory'">
        <section class="panel rounded-lg p-4">
          <div class="lbl mb-3">Hành Lý</div>
          <template x-if="$store.game.inventoryByType.length === 0">
            <div class="text-sm text-slate-600 py-6 text-center">Túi trống. Hãy đi thu thập!</div>
          </template>
          <template x-for="grp in $store.game.inventoryByType" :key="grp.type">
            <div class="mb-4">
              <div class="text-xs text-jade mb-2" x-text="grp.label"></div>
              <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(92px,1fr))">
                <template x-for="it in grp.items" :key="it.id">
                  <button @click="$store.game.openItemModal(it.id)" class="group flex flex-col items-center gap-1 text-center" :title="it.name+' — bấm xem chi tiết'">
                    <div class="relative w-full aspect-square rounded flex items-center justify-center ring-1 transition group-hover:ring-2 group-hover:brightness-110" :class="$store.game.QUALITY[it.quality].bg + ' ' + $store.game.QUALITY[it.quality].ring">
                      <span class="absolute inset-0 rounded overflow-hidden flex items-center justify-center text-3xl" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.55))" x-html="$store.game.ico(it.id, it.icon)"></span>
                      <span class="absolute bottom-0.5 right-1 text-[10px] font-bold text-slate-200" x-text="$store.game.fmt(it.qty)"></span>
                    </div>
                    <span class="text-[10px] leading-tight line-clamp-2 w-full min-h-[24px] opacity-80 group-hover:opacity-100" :class="$store.game.QUALITY[it.quality].text" x-text="it.name"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </section>
      </template>

      <!-- ===== POPUP: Chi tiết vật phẩm (bấm item ở Hành Lý) ===== -->
      <template x-if="$store.game.itemModal && $store.game.itemModalObj">
        <div class="fixed inset-0 z-[55] flex items-center justify-center p-4" style="background:rgba(2,6,12,.74)" @click.self="$store.game.closeItemModal()">
          <div class="panel rounded-xl border-2 w-full max-w-sm overflow-hidden" :class="$store.game.QUALITY[$store.game.itemModalObj.quality].border" @click.stop x-data="{ get m(){ return $store.game.itemModalObj } }">
            <template x-if="m">
              <div>
                <!-- Banner art -->
                <div class="relative h-44 flex items-center justify-center bg-gradient-to-br" :class="$store.game.QUALITY[m.quality].grad">
                  <div class="absolute inset-0 bg-gradient-to-t from-ink to-transparent opacity-40"></div>
                  <button @click="$store.game.closeItemModal()" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-ink/70 border border-slate-600 hover:border-rose-500 text-slate-300 hover:text-rose-400 z-10">✕</button>
                  <div class="relative w-28 h-28 rounded-xl border-2 flex items-center justify-center bg-ink/40 cursor-zoom-in hover:ring-2 hover:ring-amber-300/50 transition" :class="$store.game.QUALITY[m.quality].border" style="box-shadow:0 0 24px rgba(0,0,0,.45)" @click="$store.game.openLightbox(m.id, m.icon, m.name)" title="Bấm để phóng to">
                    <span class="w-24 h-24 flex items-center justify-center text-5xl" style="filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))" x-html="$store.game.ico(m.id, m.icon)"></span>
                  </div>
                </div>
                <!-- Info -->
                <div class="p-4">
                  <div class="flex items-center gap-2 flex-wrap mb-1.5">
                    <span class="text-lg font-bold" style="font-family:'Lora',serif" :class="$store.game.QUALITY[m.quality].text" x-text="m.name"></span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wide font-bold border bg-ink/40" :class="$store.game.QUALITY[m.quality].text+' '+$store.game.QUALITY[m.quality].border" x-text="$store.game.QUALITY[m.quality].name"></span>
                  </div>
                  <div class="text-[11px] text-slate-500 mb-2.5">Loại: <span class="text-slate-300" x-text="$store.game.itemTypeLabel(m.type)"></span></div>
                  <div class="text-[12px] text-slate-300 leading-snug mb-3" x-text="$store.game.itemDescOf(m.id)"></div>
                  <!-- Trang bị: slot + chỉ số -->
                  <template x-if="m.equip">
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/60 px-3 py-2 mb-3">
                      <div class="text-[10px] uppercase tracking-wide text-slate-500 mb-1">Trang bị · <span class="text-slate-300" x-text="$store.game.equipSlotLabel(m.equip.slot)"></span></div>
                      <template x-if="m.equip.reqLevel > 1">
                        <div class="text-[11px] mb-1.5" :class="$store.game.canEquip(m.id)?'text-slate-400':'text-rose-400'">⚔ Yêu cầu mang: <b x-text="$store.game.equipReqText(m.id)"></b><span x-show="!$store.game.canEquip(m.id)" x-text="' (bạn: Lv '+$store.game.equipCurLevel(m.id)+')'"></span></div>
                      </template>
                      <div class="flex flex-wrap gap-1.5">
                        <template x-for="(v,k) in (m.equip.stats||{})" :key="k"><span class="text-[11px] px-1.5 py-0.5 rounded bg-jade/10 text-jade border border-jade/30" x-text="$store.game.statLabel(k)+' +'+v"></span></template>
                        <template x-if="!Object.keys(m.equip.stats||{}).length"><span class="text-[11px] text-slate-500">Không tăng chỉ số.</span></template>
                      </div>
                    </div>
                  </template>
                  <!-- Đồ Phổ: Lĩnh Ngộ -> mở rèn ở Rèn Đúc -->
                  <template x-if="m.type==='doPho'">
                    <div class="rounded-lg bg-ink3/50 border px-3 py-2.5 mb-3" :class="$store.game.QUALITY[m.quality].border">
                      <div class="text-[11.5px] text-slate-300 mb-1.5 leading-snug">Lĩnh ngộ để rèn <b :class="$store.game.QUALITY[m.quality].text" x-text="($store.game.ITEMS[m.gearId]||{}).name"></b> tại <b class="text-jade">Rèn Đúc</b> — <b class="text-amber-300">mỗi lượt lĩnh ngộ chỉ rèn được 1 món</b>, rèn xong phải lĩnh ngộ cuộn khác.</div>
                      <div class="text-[11px] text-slate-400 mb-2">Lượt rèn hiện có: <b class="text-emerald-300" x-text="$store.game.doPhoChargeOf(m.id)"></b></div>
                      <button @click="$store.game.learnDoPho(m.id)" :disabled="(m.qty||0)<1" class="w-full py-2 rounded-lg text-[12px] font-bold bg-amber-600/85 hover:bg-amber-500 text-ink transition disabled:opacity-40 disabled:cursor-not-allowed">📜 Lĩnh Ngộ (+1 lượt rèn)</button>
                    </div>
                  </template>
                  <!-- Số lượng + giá -->
                  <div class="grid grid-cols-2 gap-2 mb-3">
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/50 px-3 py-2"><div class="text-[9px] uppercase tracking-wide text-slate-500">Số lượng</div><div class="text-base font-bold text-slate-100" x-text="$store.game.fmt(m.qty)"></div></div>
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/50 px-3 py-2"><div class="text-[9px] uppercase tracking-wide text-slate-500">Giá bán / cái</div><div class="text-base font-bold text-gold flex items-center gap-1"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt(m.value||0)"></span></div></div>
                  </div>
                  <!-- Bán nhanh -->
                  <template x-if="(m.value||0) > 0">
                    <div class="flex gap-2">
                      <button @click="$store.game.sellFromModal(1)" class="flex-1 py-2 rounded-lg text-[12px] font-bold bg-ink3 border border-slate-700 hover:border-gold text-slate-200 transition">Bán 1</button>
                      <button @click="$store.game.sellFromModal(m.qty)" class="flex-1 py-2 rounded-lg text-[12px] font-bold bg-gold/80 hover:bg-gold text-ink transition" x-text="'Bán hết (+'+$store.game.fmt((m.value||0)*m.qty)+' Bạc)'"></button>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: MAP (bản đồ hành trình kiểu xianxia) ===== -->
      <template x-if="$store.game.view==='map'">
        <div class="space-y-3">
          <!-- Banner Khinh Công — NẰM RIÊNG, ngoài khung bản đồ (không thể che landmark) -->
          <template x-if="$store.game.isTraveling">
            <div class="panel rounded-lg px-4 py-3 flex items-center gap-3">
              <span class="text-sm text-jade whitespace-nowrap shrink-0">Khinh Công → <b x-text="$store.game.travelToObj ? $store.game.travelToObj.name : ''"></b></span>
              <div class="flex-1 min-w-0 h-2.5 rounded-full bg-slate-700 overflow-hidden"><div class="h-full bg-jade transition-all" :style="`width:${$store.game.travelProgressPct}%`"></div></div>
              <span class="text-sm text-slate-300 font-mono whitespace-nowrap shrink-0" x-text="'còn ' + $store.game.fmtTime($store.game.travelRemainSec)"></span>
              <button @click="$store.game.cancelTravel()" class="shrink-0 text-sm px-4 py-1.5 rounded-lg bg-ink3 border border-slate-700 text-slate-300 hover:text-rose-400 hover:border-rose-500">Huỷ</button>
            </div>
          </template>
          <section class="panel rounded-xl p-2 sm:p-3">
          <!-- Khung viền vàng -->
          <div class="rounded-xl p-[2px] bg-gradient-to-br from-amber-600/50 via-amber-200/20 to-amber-700/50 shadow-[0_0_30px_rgba(0,0,0,0.45)]">
            <div class="relative w-full rounded-[10px]"
                 style="aspect-ratio:3/2; min-height:640px; background-color:#0a0e16;
                   background-image:url('images/ui/worldmap.png'),
                     radial-gradient(ellipse at 30% 28%, rgba(45,212,191,0.10), transparent 55%),
                     radial-gradient(ellipse at 78% 72%, rgba(99,102,241,0.12), transparent 55%);
                   background-size:cover; background-position:center; background-repeat:no-repeat;">

              <!-- Header -->
              <div class="absolute top-0 inset-x-0 h-11 flex items-center px-4 rounded-t-[10px] bg-gradient-to-b from-black/70 to-transparent z-30">
                <span class="text-amber-200/40">❖</span>
                <span class="ml-2 text-base font-semibold tracking-[0.25em] text-amber-100/90" style="font-family:serif">BẢN ĐỒ</span>
                <span class="ml-auto text-[11px] text-slate-400">Chiến Lv <span class="text-amber-200" x-text="$store.game.combatLevel"></span></span>
              </div>


              <!-- Đường linh khí (cong, chấm sáng, chảy) -->
              <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                <template x-for="(s,i) in $store.game.mapSegments" :key="i">
                  <path :d="s.d" fill="none" stroke-linecap="round" vector-effect="non-scaling-stroke"
                    stroke-width="1.6" stroke-dasharray="0.1 3.2"
                    :stroke="s.reached ? 'rgba(165,243,252,0.95)' : 'rgba(148,163,184,0.38)'"
                    :style="s.reached ? 'filter:drop-shadow(0 0 2.5px rgba(103,232,249,0.9))' : ''">
                    <animate attributeName="stroke-dashoffset" from="0" to="-6.6" dur="1.6s" repeatCount="indefinite"/>
                  </path>
                </template>
              </svg>

              <!-- Panel Tầng Cảnh Giới -->
              <aside class="absolute left-2 top-12 w-28 sm:w-32 rounded-lg bg-black/45 backdrop-blur-sm border border-amber-500/20 p-2 z-30">
                <div class="text-[11px] font-semibold tracking-wider text-amber-100/80 text-center mb-2" style="font-family:serif">TẦNG CẢNH GIỚI</div>
                <div class="space-y-1">
                  <template x-for="t in $store.game.REALM_TIERS" :key="t.id">
                    <div class="flex flex-col items-center text-center py-1.5 rounded-md transition"
                         :class="$store.game.isCurrentTier(t) ? 'bg-white/10 ring-1 ring-amber-300/50' : 'opacity-75'">
                      <div class="w-8 h-8 flex items-center justify-center text-xl" x-html="$store.game.ico(t.id, t.icon)"></div>
                      <div class="text-xs font-semibold mt-0.5" :class="t.text" x-text="t.name"></div>
                      <div class="text-[9px] text-slate-400" x-text="t.range"></div>
                    </div>
                  </template>
                </div>
              </aside>

              <!-- Landmark: đảo neo đúng tâm toạ độ, tên + Lv treo chính giữa dưới đảo -->
              <template x-for="loc in $store.game.LOCATIONS" :key="loc.id">
                <div class="absolute -translate-x-1/2 -translate-y-1/2 group z-10"
                     :style="`left:${loc.mapX}%; top:${loc.mapY}%`">
                  <!-- Đảo (chính giữa điểm neo) -->
                  <div class="relative w-24 h-24 lg:w-[7.5rem] lg:h-[7.5rem] cursor-pointer" @click="$store.game.openLocation(loc.id)">
                    <div class="w-full h-full flex items-center justify-center text-5xl transition-transform duration-200 group-hover:scale-110 drop-shadow-[0_8px_12px_rgba(0,0,0,0.7)]"
                      :class="$store.game.locUnlocked(loc) ? '' : 'grayscale opacity-45'"
                      x-html="$store.game.ico(loc.id, loc.icon)"></div>
                    <template x-if="!$store.game.locUnlocked(loc)">
                      <span class="absolute inset-0 flex items-center justify-center text-2xl opacity-90 pointer-events-none">🔒</span>
                    </template>
                    <template x-if="$store.game.isCurrentLocation(loc)">
                      <span class="absolute inset-2 rounded-full ring-2 ring-jade/70 animate-pulse pointer-events-none"></span>
                    </template>
                    <template x-if="$store.game.isTraveling && $store.game.travelToId===loc.id">
                      <span class="absolute inset-2 rounded-full ring-2 ring-amber-300/80 animate-pulse pointer-events-none"></span>
                    </template>

                    <!-- Tên + Lv: căn chính giữa ngay dưới đảo -->
                    <div class="absolute top-full left-1/2 -translate-x-1/2 mt-0.5 flex flex-col items-center pointer-events-none">
                      <div class="relative px-3 py-0.5 rounded bg-gradient-to-b from-[#1b2740] to-[#0e1626] border border-amber-400/40 shadow-md">
                        <span class="text-[11px] font-semibold tracking-wide whitespace-nowrap"
                          :class="$store.game.locUnlocked(loc) ? 'text-amber-50' : 'text-slate-400'"
                          style="font-family:serif" x-text="loc.name"></span>
                        <span class="absolute -left-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45 bg-amber-300/90 border border-amber-100/50"></span>
                        <span class="absolute -right-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45 bg-amber-300/90 border border-amber-100/50"></span>
                      </div>
                      <div class="mt-1 text-[9px] font-bold px-2 py-0.5 rounded bg-black/70 border whitespace-nowrap"
                        :class="$store.game.locTier(loc).text + ' ' + $store.game.locTier(loc).border"
                        x-text="'Lv '+loc.reqLevel"></div>
                    </div>

                    <!-- Hover info (trên đảo) -->
                    <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-1 w-44 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-40">
                      <div class="bg-black/90 backdrop-blur border border-amber-400/30 rounded-lg p-2 text-center shadow-xl">
                        <div class="text-xs font-semibold text-amber-50" x-text="loc.name"></div>
                        <div class="text-[10px] text-slate-400 mt-0.5 leading-snug" x-text="loc.desc"></div>
                        <div class="text-[10px] mt-1" :class="$store.game.locUnlocked(loc) ? 'text-emerald-300' : 'text-rose-300'"
                          x-text="$store.game.locUnlocked(loc) ? '✓ Đã thông' : ('🔒 Cần Chiến Lv '+loc.reqLevel)"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Chú thích đáy -->
              <div class="absolute bottom-0 inset-x-0 h-10 flex items-center justify-center gap-3 sm:gap-5 px-3 rounded-b-[10px] bg-gradient-to-t from-black/75 to-transparent text-[10px] sm:text-[11px] text-slate-300 z-30">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_6px_2px_rgba(52,211,153,0.55)]"></span>Đã mở</span>
                <span class="flex items-center gap-1 text-slate-400">🔒 Chưa đạt cấp</span>
                <span class="hidden md:flex items-center gap-2 text-slate-500"><span class="text-amber-300/40">◆</span>Di chuyển vào địa điểm để xem thông tin chi tiết<span class="text-amber-300/40">◆</span></span>
              </div>

            </div>
          </div>
        </section>
        </div>
      </template>

      <!-- ===== VIEW: YÊU VƯƠNG (World Boss) — VÂY SÁT THEO LƯỢT, master-detail ===== -->
      <template x-if="$store.game.view==='worldboss'">
        <div class="space-y-3" x-data="{ get g(){ return $store.game },
             TH:{ bachHo:{c:'#e2e8f0',g:'226,232,240',d:'#475569'}, huyenQuy:{c:'#2dd4bf',g:'45,212,191',d:'#134e4a'}, huyetLang:{c:'#fb7185',g:'244,63,94',d:'#7f1d2e'}, cuHung:{c:'#fb923c',g:'251,146,60',d:'#7c2d12'}, docGiao:{c:'#34d399',g:'16,185,129',d:'#0c5345'}, loiBang:{c:'#818cf8',g:'129,140,248',d:'#312e81'}, hoaLan:{c:'#fbbf24',g:'245,158,11',d:'#7a4310'}, hoYeu:{c:'#e879f9',g:'232,121,249',d:'#701a75'}, bangPhuong:{c:'#5cb8f0',g:'56,189,248',d:'#0c4a6e'}, thienMa:{c:'#a78bfa',g:'139,92,246',d:'#4c1d95'} },
             SEAL:{ bachHo:'白虎', huyenQuy:'玄龜', huyetLang:'血狼', cuHung:'巨熊', docGiao:'毒蛟', loiBang:'雷鵬', hoaLan:'火麟', hoYeu:'狐媚', bangPhuong:'冰凰', thienMa:'天魔' },
             th(b){ return this.TH[b.wb.eggBase]||this.TH.huyetLang }, seal(b){ return this.SEAL[b.wb.eggBase]||'妖王' } }">

          <!-- ===== Header ===== -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <!-- Banner art nền (gen tay → images/ui/yv_banner.png); thiếu file -> ẩn, dùng nền CSS fallback -->
            <img src="images/ui/yv_banner.png" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="this.style.display='none'">
            <!-- Lớp phủ TỐI trái→phải: giữ tiêu đề + mô tả luôn đọc rõ trên art -->
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 34%,rgba(11,14,22,.55) 64%,rgba(11,14,22,.22) 100%)"></div>
            <!-- Glow đỏ tinh tế bên phải (giữ chất Yêu Vương) -->
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(244,63,94,.18), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6">
              <div class="text-[28px] gold-text leading-none fserif">Vây Sát Yêu Vương</div>
              <div class="text-[13px] text-slate-300 leading-snug mt-2 max-w-2xl">Hạ Yêu Vương để đoạt <b class="text-amber-300">Tinh Thể Yêu Vương</b> — xúc tác cường hóa <b class="text-amber-300">+10 trở lên</b>, cùng <b class="text-slate-200">Trứng Linh Thú</b>, Hồn Thạch, Ngân Lượng &amp; EXP. Mỗi Yêu Vương <b class="text-slate-200">hồi sinh theo thời gian</b>; vào <b class="text-jade">hàng đợi</b> để tự vây sát khi giáng thế, hoặc <b class="text-jade">tham chiến trực tiếp xem từng lượt</b>.</div>
            </div>
          </div>

          <!-- ===== Master-detail ===== -->
          <div class="grid lg:grid-cols-[248px_1fr] gap-3 items-start">

            <!-- RAIL: danh sách 5 Yêu Vương -->
            <div class="space-y-2">
              <template x-for="b in g.yeuVuongList" :key="b.id">
                <button @click="g.selectBoss(b.id)" class="w-full text-left rounded-lg p-2 flex items-center gap-2.5 border transition" :style="b.id===g.bossSel ? 'border-color:'+th(b).c+'aa;background:linear-gradient(135deg,'+th(b).d+'33,transparent)' : 'border-color:#1e293b;background:#0f1521'">
                  <div class="w-11 h-11 rounded-lg overflow-hidden shrink-0 flex items-center justify-center" :class="g.bossLocked(b.id)?'grayscale opacity-60':''" :style="'background:radial-gradient(circle,'+th(b).d+'55,#05070d);border:1px solid '+th(b).c+'55'" x-html="g.ico(b.id,b.icon)"></div>
                  <div class="min-w-0 flex-1">
                    <div class="text-[12.5px] font-semibold truncate" :style="'color:'+(b.id===g.bossSel?th(b).c:'#cbd5e1')" x-text="b.name"></div>
                    <div class="flex items-center gap-1.5 text-[10px]">
                      <span class="text-slate-600" x-text="'Lv'+b.reqLevel"></span>
                      <span :style="'color:'+(g.bossStateOf(b.id)==='alive'?'#34d399':g.bossStateOf(b.id)==='fighting'?'#fbbf24':g.bossStateOf(b.id)==='locked'?'#475569':'#94a3b8')" x-text="'● '+(g.bossStateOf(b.id)==='alive'?'Đang sống':g.bossStateOf(b.id)==='fighting'?'Giao chiến':g.bossStateOf(b.id)==='locked'?'Chưa đủ cấp':g.bossCdLive(b.id))"></span>
                    </div>
                  </div>
                  <span class="text-base fserif shrink-0" :style="'color:'+th(b).c+'66'" x-text="seal(b)"></span>
                </button>
              </template>
            </div>

            <!-- DETAIL: trang Yêu Vương đang chọn -->
            <div x-data="{ get b(){ return g.bossSelObj } }">

              <!-- Hero band -->
              <div class="relative rounded-xl overflow-hidden mb-3" :style="'border:1px solid '+th(b).c+'55;background:linear-gradient(135deg,'+th(b).d+'33,#0a0e16 64%);box-shadow:0 0 30px -12px rgba('+th(b).g+',.7)'">
                <div class="absolute left-0 top-0 bottom-0 w-1/2 pointer-events-none" :style="'background:radial-gradient(ellipse at 16% 45%, rgba('+th(b).g+',.20), transparent 66%)'"></div>
                <div class="relative flex gap-4 p-4">
                  <div class="shrink-0 relative">
                    <div class="absolute -left-1.5 top-2 z-10 w-6 rounded-md flex flex-col items-center py-1.5 gap-0.5" :style="'background:linear-gradient(180deg,'+th(b).d+',#0a0e16);border:1px solid '+th(b).c+'66'">
                      <template x-for="ch in seal(b).split('')" :key="ch"><span class="text-[12px] leading-none" :style="'color:'+th(b).c" x-text="ch"></span></template>
                    </div>
                    <div class="w-32 h-32 rounded-xl overflow-hidden flex items-center justify-center" :class="g.bossLocked(b.id)?'grayscale opacity-60':''" :style="'background:radial-gradient(circle,'+th(b).d+'66,#05070d);border:2px solid '+th(b).c+'66;font-size:52px'" x-html="g.ico(b.id,b.icon)"></div>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-2xl fserif" :style="'color:'+th(b).c" x-text="b.name"></span>
                      <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-300" x-text="'Lv '+b.reqLevel"></span>
                      <template x-if="!g.bossLocked(b.id)"><span class="text-[10px] px-1.5 py-0.5 rounded" :style="'background:rgba('+th(b).g+',.15);border:1px solid '+th(b).c+'55'"><span class="text-slate-400">Ngũ Hành: </span><span :class="g.heInfo(g.bossHe(b.id)).text" x-text="g.heName(g.bossHe(b.id))"></span></span></template>
                    </div>
                    <div class="text-[11px] text-slate-500 mt-0.5" x-text="b.id==='yvThienMa'?'Boss Tối Thượng · Ma Giới Chí Tôn':b.affinity"></div>
                    <div class="text-[11.5px] text-slate-400 italic mt-1.5 leading-snug" x-text="'“'+b.lore+'”'"></div>
                    <div class="grid grid-cols-4 gap-1.5 mt-2.5 max-w-md">
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Khí Huyết</div><div class="text-[13px] font-bold mt-0.5 text-rose-300" x-text="g.fmt(b.hp)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Công</div><div class="text-[13px] font-bold mt-0.5 text-amber-300" x-text="g.fmt(b.atk)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Thủ</div><div class="text-[13px] font-bold mt-0.5 text-sky-300" x-text="g.fmt(b.def)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Tốc</div><div class="text-[13px] font-bold mt-0.5 text-emerald-300" x-text="b.spd"></div></div>
                    </div>
                    <div class="text-[11px] text-slate-500 mt-2">Tuyệt kỹ: <b :style="'color:'+th(b).c" x-text="b.skill.name"></b> · Hồi sinh sau khi bị hạ: <b class="text-slate-300" x-text="b.wb.cdHours+' giờ'"></b></div>
                  </div>
                </div>
              </div>

              <!-- Combat/chiến báo FULL-WIDTH (rộng rãi); Bảo Vật + Lịch Sử xuống hàng 2 cột bên dưới -->
              <div class="space-y-3">

                <!-- Combat / trạng thái (full-width) -->
                <div class="space-y-3">

                  <!-- Trận LIVE -->
                  <template x-if="g.bossFight && g.bossFight.id===b.id">
                    <div class="panel rounded-xl p-4" :style="'border-color:'+th(b).c+'66'">
                      <div class="flex items-center justify-between mb-2">
                        <span class="text-[12px] fserif inline-flex items-center gap-1.5" :style="'color:'+th(b).c"><span x-html="g.svg('sword','w-4 h-4')"></span><span x-text="g.bossFight.done ? (g.bossFight.win?'Vây Sát Thành Công':(g.bossFight.timeout?'Bất Phân Thắng Bại':'Vây Sát Thất Bại')) : ('Đang Vây Sát · Lượt '+g.bossFight.turn)"></span></span>
                        <template x-if="g.bossFight.done"><button @click="g.closeBossFight()" class="text-[11px] text-slate-400 hover:text-slate-200 border border-slate-700 rounded px-2 py-0.5">Đóng</button></template>
                        <template x-if="!g.bossFight.done"><span class="text-[10px] text-slate-500">mỗi 3 giây một đòn</span></template>
                      </div>
                      <div class="mb-1.5">
                        <div class="flex justify-between text-[10px] mb-0.5"><span :style="'color:'+th(b).c" x-text="b.name"></span><span class="text-slate-500">Khí Huyết</span></div>
                        <div class="relative h-[18px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                          <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossFightBHpPct+'%;background:linear-gradient(90deg,'+th(b).c+','+th(b).d+');transition:width .55s cubic-bezier(.4,0,.2,1)'"></div>
                          <span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white" style="text-shadow:0 1px 2px rgba(0,0,0,.9)" x-text="g.fmt(g.bossFight.bHp)+' / '+g.fmt(g.bossFight.bMax)"></span>
                        </div>
                      </div>
                      <div class="mb-3">
                        <div class="flex justify-between text-[10px] mb-0.5"><span class="text-jade">Ngươi · 逍</span><span class="text-slate-500">Sinh Lực</span></div>
                        <div class="relative h-[18px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                          <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossFightPHpPct+'%;background:linear-gradient(90deg,#14b8a6,#0d7c70);transition:width .55s cubic-bezier(.4,0,.2,1)'"></div>
                          <span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white" style="text-shadow:0 1px 2px rgba(0,0,0,.9)" x-text="g.fmt(g.bossFight.pHp)+' / '+g.fmt(g.bossFight.pMax)"></span>
                        </div>
                      </div>
                      <div class="lbl mb-1">Chiến Báo</div>
                      <div class="rounded-lg bg-black/40 border border-slate-800 p-2.5 h-44 overflow-y-auto text-[12px] leading-snug space-y-0.5">
                        <template x-for="(ln,i) in g.bossFight.log" :key="i"><div :class="ln.c" x-html="ln.h"></div></template>
                      </div>
                      <template x-if="g.bossFight.done && g.bossFight.win && g.bossFight.reward">
                        <div class="mt-3 rounded-lg p-3" style="background:linear-gradient(135deg,rgba(245,185,66,.12),transparent);border:1px solid rgba(245,185,66,.4)">
                          <div class="text-[11px] text-amber-300 font-semibold mb-2">🎉 Chiến Lợi Phẩm</div>
                          <div class="flex items-center gap-2 flex-wrap text-[11px]">
                            <template x-for="(qty,id) in g.bossFight.reward.items" :key="id">
                              <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-lg bg-black/40 border border-slate-700"><span class="w-4 h-4 inline-flex items-center justify-center" x-html="g.ico(id,(g.ITEMS[id]||{}).icon)"></span><span :class="(g.itemQuality(id)||{}).text||'text-slate-200'" x-text="(g.ITEMS[id]||{}).name"></span><span class="text-slate-400" x-text="'×'+qty"></span></span>
                            </template>
                            <span class="px-2 py-1 rounded bg-black/40 border border-rose-500/40 text-rose-200" x-text="g.fmt(g.bossFight.reward.honThach)+' Hồn Thạch'"></span>
                            <span class="px-2 py-1 rounded bg-black/40 border border-amber-400/40 text-gold" x-text="g.fmt(g.bossFight.reward.bac)+' Bạc'"></span>
                            <span class="px-2 py-1 rounded bg-black/40 border border-emerald-500/40 text-emerald-200" x-text="'+'+g.fmt(g.bossFight.reward.exp)+' EXP'"></span>
                          </div>
                        </div>
                      </template>
                      <template x-if="g.bossFight.done && !g.bossFight.win">
                        <div class="mt-3 space-y-2">
                          <div class="text-[11px] text-center text-slate-400"><span x-text="g.bossFight.timeout ? 'Giằng co bất phân thắng bại —' : 'Ngươi gục ngã —'"></span> <b :style="'color:'+th(b).c" x-text="b.name"></b> chỉ còn <b class="text-rose-300" x-text="Math.round(g.bossFight.bHp/Math.max(1,g.bossFight.bMax)*100)+'%'"></b> khí huyết (giữ nguyên cho lần sau). <span class="text-amber-300" x-text="g.bossFight.timeout ? 'Vây sát tiếp để kết liễu!' : 'Dưỡng thương rồi quay lại kết liễu!'"></span></div>
                          <template x-if="g.isBossHealing()">
                            <div class="w-full py-2.5 rounded-lg bg-black/40 border border-slate-700 text-center text-slate-400 text-[13px] inline-flex items-center justify-center gap-1.5 flex-wrap"><span x-html="g.svg('heart','w-4 h-4')"></span>Đang dưỡng thương <b class="text-slate-200 font-mono" x-text="g.bossHealText()"></b><span class="text-slate-600 text-[10px]">· vật phẩm hồi phục sẽ cập nhật</span></div>
                          </template>
                          <template x-if="!g.isBossHealing()">
                            <button @click="g.closeBossFight(); g.startBossFight(b.id)" class="w-full py-2.5 rounded-lg font-bold text-sm text-white transition hover:brightness-110" style="background:linear-gradient(180deg,#e11d48,#9f1239)"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('sword','w-4 h-4')"></span>Thử lại — Kết liễu</span></button>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- KHÔNG đánh: trạng thái + hành động -->
                  <template x-if="!(g.bossFight && g.bossFight.id===b.id)">
                    <div class="space-y-3">
                      <!-- alive -->
                      <template x-if="g.bossStateOf(b.id)==='alive'">
                        <div class="panel rounded-xl p-4 text-center min-h-[168px] flex flex-col justify-center" :style="'border-color:'+th(b).c+'55'">
                          <div class="text-[12px] mb-3" :style="'color:'+th(b).c" x-text="g.bossHurt(b.id) ? '⚔ Yêu Vương đã trọng thương!' : '⚔ Yêu Vương đã giáng thế!'"></div>
                          <template x-if="g.bossHurt(b.id)">
                            <div class="mb-3">
                              <div class="flex justify-between text-[10px] mb-0.5"><span :style="'color:'+th(b).c" x-text="b.name"></span><span class="text-slate-500">Khí Huyết còn lại</span></div>
                              <div class="relative h-[14px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                                <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossHpPct(b.id)+'%;background:linear-gradient(90deg,'+th(b).c+','+th(b).d+')'"></div>
                                <span class="absolute inset-0 flex items-center justify-center text-[9px] font-bold text-white" style="text-shadow:0 1px 2px rgba(0,0,0,.9)" x-text="Math.round(g.bossHpPct(b.id))+'%'"></span>
                              </div>
                            </div>
                          </template>
                          <template x-if="g.isBossHealing()">
                            <div class="w-full py-3 rounded-lg bg-black/40 border border-slate-700 text-center text-slate-400 text-[13px] inline-flex items-center justify-center gap-1.5"><span x-html="g.svg('heart','w-4 h-4')"></span>Đang dưỡng thương <b class="text-slate-200 font-mono" x-text="g.bossHealText()"></b></div>
                          </template>
                          <template x-if="!g.isBossHealing()">
                            <button @click="g.startBossFight(b.id)" class="w-full py-3 rounded-lg font-bold text-white text-sm transition hover:brightness-110" style="background:linear-gradient(180deg,#e11d48,#9f1239);box-shadow:0 4px 18px -5px rgba(225,29,72,.7)"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('sword','w-4 h-4')"></span><span x-text="g.bossHurt(b.id)?'Kết Liễu — Vây Sát':'Tham Chiến — Vây Sát'"></span></span></button>
                          </template>
                        </div>
                      </template>
                      <!-- reviving -->
                      <template x-if="g.bossStateOf(b.id)==='reviving'">
                        <div class="panel rounded-xl p-4 min-h-[168px] flex flex-col justify-center" :style="'border-color:'+th(b).c+'40'">
                          <div class="flex items-center gap-3 mb-3">
                            <div class="w-14 h-14 rounded-full flex items-center justify-center shrink-0" :style="'border:2px solid '+th(b).c+'55;box-shadow:inset 0 0 16px rgba('+th(b).g+',.3),0 0 18px -6px rgba('+th(b).g+',.6)'"><span class="text-[11px] fserif" :style="'color:'+th(b).c" x-text="seal(b)"></span></div>
                            <div><div class="lbl">Đang hồi sinh — giáng thế sau</div><div class="text-xl font-bold text-slate-100 font-mono" x-text="g.bossCdLive(b.id)"></div></div>
                          </div>
                          <template x-if="g.bossQueued(b.id)">
                            <button @click="g.toggleBossQueue(b.id)" class="w-full py-3 rounded-lg text-center text-sm font-semibold transition hover:brightness-110" :style="'background:rgba('+th(b).g+',.12);border:1px solid '+th(b).c+'55;color:'+th(b).c">✓ Đã vào hàng đợi <span class="text-slate-500 text-[11px] font-normal">· bấm để rời</span></button>
                          </template>
                          <template x-if="!g.bossQueued(b.id)">
                            <button @click="g.toggleBossQueue(b.id)" class="w-full py-3 rounded-lg font-bold text-sm transition hover:brightness-110" :style="'background:linear-gradient(180deg,rgba('+th(b).g+',.85),rgba('+th(b).g+',.5));color:#0a0e16'"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('clock','w-4 h-4')"></span>Vào Hàng Đợi</span></button>
                          </template>
                        </div>
                      </template>
                      <!-- locked -->
                      <template x-if="g.bossStateOf(b.id)==='locked'">
                        <div class="panel rounded-xl p-5 text-center text-slate-500 min-h-[168px] flex flex-col justify-center">
                          <div class="w-10 h-10 mx-auto mb-2 text-slate-600" x-html="g.svg('lock','w-10 h-10')"></div>
                          <div class="text-sm">Cần đạt <b class="text-slate-300" x-text="'Chiến Đấu Lv '+b.reqLevel"></b> để khiêu chiến Yêu Vương này.</div>
                          <div class="text-[11px] mt-1">Hiện tại: Lv <span x-text="g.combatLevel"></span></div>
                        </div>
                      </template>
                    </div>
                  </template>

                </div>

                <!-- Bảo Vật + Lịch Sử: 2 cột bên dưới combat -->
                <div class="grid lg:grid-cols-[1.35fr_1fr] gap-3 items-start">

                  <!-- Bảo Vật -->
                  <div class="panel rounded-xl p-3.5">
                    <div class="flex items-center gap-2 mb-2.5"><span class="lbl">Bảo Vật · Drop khi hạ gục</span></div>
                    <div class="grid grid-cols-4 gap-2.5">
                      <!-- Tinh Thể -->
                      <div class="relative aspect-square rounded-lg bg-black/50 border border-amber-500/45 flex flex-col items-center justify-center gap-1 cursor-zoom-in" style="box-shadow:inset 0 0 12px rgba(245,158,11,.18)" @click="g.openLightbox('tinhTheYeuVuong','🔮','Tinh Thể Yêu Vương')">
                        <span class="absolute -top-1 -right-1 text-[9px] font-bold px-1 rounded bg-amber-500 text-ink" x-text="'×'+b.wb.tinhThe"></span>
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('tinhTheYeuVuong','🔮')"></span>
                        <span class="text-[15px] font-bold leading-none text-amber-300">10%</span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Tinh Thể</span>
                      </div>
                      <!-- Trứng × 3 phẩm (viền + màu % theo PHẨM CHẤT: Phàm=Lương/blue, Linh=Tinh/emerald, Thần=Tuyệt/rose) -->
                      <template x-for="t in [{s:'pham',l:'Phàm',ch:'5%'},{s:'linh',l:'Linh',ch:'1%'},{s:'than',l:'Thần',ch:'0.02%'}]" :key="t.s">
                        <div class="aspect-square rounded-lg bg-black/50 border flex flex-col items-center justify-center gap-1 cursor-zoom-in" :class="g.itemQuality('egg_'+b.wb.eggBase+'_'+t.s).border" @click="g.openLightbox('egg_'+b.wb.eggBase+'_'+t.s,'🥚','Trứng '+t.l+' Phẩm')">
                          <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('egg_'+b.wb.eggBase+'_'+t.s,'🥚')"></span>
                          <span class="text-[15px] font-bold leading-none" :class="g.itemQuality('egg_'+b.wb.eggBase+'_'+t.s).text" x-text="t.ch"></span>
                          <span class="text-[9px] uppercase tracking-wider leading-none text-slate-500" x-text="t.l"></span>
                        </div>
                      </template>
                      <!-- Hồn Thạch -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-rose-600/40 flex flex-col items-center justify-center gap-1 cursor-zoom-in" @click="g.openLightbox('honThach','🔴','Hồn Thạch')">
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('honThach','🔴')"></span>
                        <span class="text-[15px] font-bold leading-none text-rose-300" x-text="g.fmt(b.wb.honThach)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Hồn Thạch</span>
                      </div>
                      <!-- Bạc -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-amber-400/40 flex flex-col items-center justify-center gap-1 cursor-zoom-in" @click="g.openLightbox('bac','🟡','Ngân Lượng')">
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('bac','🟡')"></span>
                        <span class="text-[15px] font-bold leading-none text-gold" x-text="g.fmt(b.wb.bac)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Bạc</span>
                      </div>
                      <!-- EXP -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-emerald-500/30 flex flex-col items-center justify-center gap-1">
                        <span class="w-12 h-12 inline-flex items-center justify-center"><img src="images/ui/exp.png" class="w-12 h-12 object-contain" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'✦',style:'color:#6ee7b7;font-size:22px'}))"></span>
                        <span class="text-[15px] font-bold leading-none text-emerald-300" x-text="g.fmt(b.exp)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">EXP</span>
                      </div>
                    </div>
                  </div>

                  <!-- Lịch Sử · Giang Hồ Bảng -->
                  <div class="panel rounded-xl p-3.5">
                    <div class="flex items-center gap-2 mb-1.5"><span class="lbl">Lịch Sử · Giang Hồ Bảng</span><span class="text-[10px] text-slate-500 ml-auto">Đạo hữu cùng săn: <b class="text-jade" x-text="40+(b.reqLevel%37)"></b></span></div>
                    <div class="max-h-80 overflow-y-auto pr-1">
                      <template x-for="r in g.bossLog(b.id)" :key="r.uid">
                        <div class="flex items-start gap-2 py-1.5" :class="r.rare?'px-2 -mx-1 rounded-md':''" :style="r.rare?'background:linear-gradient(90deg,rgba(245,185,66,.10),transparent)':''">
                          <span class="w-1.5 h-1.5 rounded-full mt-1.5 shrink-0" :style="'background:'+(r.win?(r.rare?'#fcd34d':'#34d399'):'#fb7185')"></span>
                          <div class="text-[11.5px] leading-snug text-slate-400"><b :class="r.me?'text-jade':'text-slate-300'" x-text="r.me?'Ngươi':r.who"></b> <span class="text-slate-600" x-text="'· '+r.ago"></span><br><span x-html="r.txt"></span></div>
                        </div>
                      </template>
                      <template x-if="!g.bossLog(b.id).length"><div class="text-[11px] text-slate-600 text-center py-4">Chưa có chiến tích nào với Yêu Vương này.</div></template>
                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: BÍ CẢNH (Dungeon idle) ===== -->
      <template x-if="$store.game.view==='dungeon'">
        <div class="space-y-3" x-data="{ get g(){ return $store.game } }">

          <!-- Header -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <img src="images/ui/dungeon_banner.png" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="this.style.display='none'">
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.86) 40%,rgba(11,14,22,.5) 100%)"></div>
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(45,212,191,.16), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6">
              <div class="text-[28px] gold-text leading-none fserif">Bí Cảnh Tầm Bảo</div>
              <div class="text-[13px] text-slate-300 leading-snug mt-2 max-w-2xl">Treo khám phá <b class="text-amber-300">9 bí cảnh</b> để đoạt <b class="text-amber-300">Đồ Phổ</b> rèn trang bị bậc cao, cùng liệu hiếm, đá cường hóa, Hồn Thạch &amp; EXP. <b class="text-slate-200">Rời màn vẫn chạy</b> — chiến lợi phẩm tự dồn về.</div>
            </div>
          </div>

          <!-- Master-detail -->
          <div class="grid lg:grid-cols-[248px_1fr] gap-3 items-start">

            <!-- RAIL: 9 phó bản -->
            <div class="space-y-2">
              <template x-for="d in g.dungeonList" :key="d.id">
                <button @click="g.selectDungeon(d.id)" class="relative w-full h-[60px] rounded-lg overflow-hidden border text-left transition group" :style="d.id===g.dungeonSel ? 'border-color:'+d.color+'cc;box-shadow:0 0 16px -5px '+d.color+'cc' : 'border-color:#1e293b'">
                  <img :src="'images/dungeons/'+d.id+'.webp'" alt="" class="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-105" :class="g.dungeonLocked(d.id)?'grayscale opacity-30':(d.id===g.dungeonSel?'opacity-70':'opacity-45 group-hover:opacity-65')" onerror="this.style.display='none'">
                  <div class="absolute inset-0" style="background:linear-gradient(90deg,#0a0e16 2%,rgba(10,14,22,.74) 48%,rgba(10,14,22,.22) 100%)"></div>
                  <div class="relative h-full flex items-center gap-2 px-2.5">
                    <div class="min-w-0 flex-1">
                      <div class="text-[13px] font-semibold truncate fserif" :style="'color:'+(d.id===g.dungeonSel?d.color:'#e8edf4')" x-text="d.name"></div>
                      <div class="flex items-center gap-1.5 text-[10px] mt-0.5">
                        <span class="text-slate-300/80" x-text="'Lv'+d.reqLevel"></span>
                        <span class="text-slate-600">·</span>
                        <template x-if="g.dungeonLocked(d.id)"><span class="text-slate-400">Chưa đủ cấp</span></template>
                        <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunningHere(d.id)"><span class="text-amber-300" x-text="'⏳ còn '+g.fmtTime(g.dungeonTimeLeft())"></span></template>
                        <template x-if="!g.dungeonLocked(d.id) && !g.dungeonRunningHere(d.id)"><span class="text-emerald-400">● Sẵn sàng</span></template>
                      </div>
                    </div>
                    <span class="text-[26px] fserif shrink-0 leading-none drop-shadow" :style="'color:'+d.color+(d.id===g.dungeonSel?'':'aa')" x-text="d.seal"></span>
                  </div>
                </button>
              </template>
            </div>

            <!-- DETAIL: phó bản đang chọn -->
            <div x-data="{ get d(){ return g.dungeonSelObj } }">
              <template x-if="d">
                <div class="space-y-3">

                  <!-- Hero band -->
                  <div class="relative rounded-xl overflow-hidden" style="min-height:150px" :style="'border:1px solid '+d.color+'55;box-shadow:0 0 30px -12px '+d.color+'aa;background:linear-gradient(135deg,'+d.color+'22,#0a0e16 70%)'">
                    <img :src="'images/dungeons/'+d.id+'.webp'" alt="" class="absolute inset-0 w-full h-full object-cover" :class="g.dungeonLocked(d.id)?'grayscale opacity-40':'opacity-80'" onerror="this.style.display='none'">
                    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0a0e16 0%,rgba(10,14,22,.66) 52%,transparent 100%)"></div>
                    <div class="relative p-4">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-2xl fserif" :style="'color:'+d.color" x-text="d.name"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-300" x-text="'Lv '+d.reqLevel"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-400" x-text="d.realm"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded" :style="'background:'+d.color+'22;border:1px solid '+d.color+'55;color:'+d.color" x-text="'⚠ '+d.hazardName"></span>
                      </div>
                      <div class="text-[11.5px] text-slate-300 italic mt-2 leading-snug max-w-xl" x-text="'“'+d.lore+'”'"></div>
                      <div class="flex items-center gap-1.5 mt-3 flex-wrap">
                        <span class="text-[10px] text-slate-500" x-text="(d.tangs||[]).length + ' tầng:'"></span>
                        <template x-for="(t,i) in (d.tangs||[])" :key="i">
                          <span class="text-[10px] px-2 py-0.5 rounded-full bg-black/40 border border-slate-700 text-slate-400"><b :style="'color:'+d.color" x-text="(i+1)+'·'"></b> <span x-text="t==='hazard' ? d.hazardName : g.tangLabel(t)"></span></span>
                        </template>
                      </div>
                    </div>
                  </div>

                  <!-- Vào phó bản -->
                  <div class="panel rounded-xl p-3.5">
                    <!-- locked -->
                    <template x-if="g.dungeonLocked(d.id)">
                      <div class="text-center text-slate-500 py-2">
                        <div class="w-9 h-9 mx-auto mb-2 text-slate-600" x-html="g.svg('lock','w-9 h-9')"></div>
                        <div class="text-sm">Cần <b class="text-slate-300" x-text="'Chiến Đấu Lv '+d.reqLevel"></b> để tiến vào.</div>
                        <div class="text-[11px] mt-1">Hiện tại: Lv <span x-text="g.combatLevel"></span></div>
                      </div>
                    </template>
                    <!-- đang chạy phó bản NÀY -->
                    <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunningHere(d.id)">
                      <div>
                        <div class="flex items-center justify-between mb-1.5"><span class="text-[12px] fserif" :style="'color:'+d.color" x-text="'Đang khám phá · '+(g.dungeonRunMode==='treo'?'Treo Luyện':'Chạy Nhanh')"></span><span class="text-[12px] font-mono text-slate-300" x-text="'còn '+g.fmtTime(g.dungeonTimeLeft())"></span></div>
                        <div class="h-3 rounded-full bg-slate-800 overflow-hidden border border-black/50"><div class="h-full rounded-full transition-all" :style="'width:'+g.dungeonRunPct+'%;background:linear-gradient(90deg,'+d.color+','+d.color+'88)'"></div></div>
                        <div class="text-[10px] text-slate-500 mt-2 text-center">Chiến lợi phẩm tự dồn về khi hoàn tất — có thể rời màn.</div>
                      </div>
                    </template>
                    <!-- đang chạy phó bản KHÁC -->
                    <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunning && !g.dungeonRunningHere(d.id)">
                      <div class="text-center text-slate-400 py-2 text-[12px]">Đang có chuyến Bí Cảnh khác (<b class="text-slate-300" x-text="(g.DUNGEON_BY_ID[g.dungeonRunId]||{}).name"></b>). Chờ hoàn tất rồi mới vào phó bản mới.</div>
                    </template>
                    <!-- rảnh: chọn chế độ -->
                    <template x-if="!g.dungeonLocked(d.id) && !g.dungeonRunning">
                      <div>
                        <div class="flex items-center justify-between mb-2.5">
                          <span class="lbl">Chọn chế độ thâm nhập</span>
                          <span class="text-[11px] text-slate-400 inline-flex items-center gap-2">Phí:
                            <span class="inline-flex items-center gap-1 text-gold"><span class="w-3.5 h-3.5 inline-flex" x-html="g.ico('bac','🟡')"></span><b x-text="g.fmt(d.cost.bac||0)"></b></span>
                            <template x-if="d.cost.honThach"><span class="inline-flex items-center gap-1 text-rose-300"><span class="w-3.5 h-3.5 inline-flex" x-html="g.ico('honThach','🔴')"></span><b x-text="g.fmt(d.cost.honThach)"></b></span></template>
                          </span>
                        </div>
                        <div class="grid grid-cols-2 gap-2.5">
                          <button @click="g.startDungeonRun(d.id,'nhanh')" :disabled="!g.canAffordDungeon(d.id)" class="rounded-lg px-3 py-2 border text-left transition hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed" :style="'border-color:'+d.color+'55;background:linear-gradient(135deg,'+d.color+'18,transparent)'">
                            <div class="flex items-center justify-between gap-1 leading-none">
                              <span class="text-[13px] font-bold inline-flex items-center gap-1.5" :style="'color:'+d.color"><span class="w-3.5 h-3.5 inline-flex" x-html="g.svg('zap','w-3.5 h-3.5')"></span>Chạy Nhanh</span>
                              <span class="inline-flex gap-0.5 text-[11px] leading-none shrink-0" :style="'color:'+d.color" title="Mức thưởng"><span>◆</span><span class="opacity-20">◆</span><span class="opacity-20">◆</span></span>
                            </div>
                            <div class="text-[11px] text-slate-400 font-mono mt-1.5 leading-none" x-text="g.fmtTime(g.dungeonDurSec(d.id,'nhanh'))"></div>
                          </button>
                          <button @click="g.startDungeonRun(d.id,'treo')" :disabled="!g.canAffordDungeon(d.id)" class="rounded-lg px-3 py-2 border text-left transition hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed" :style="'border-color:'+d.color+'aa;background:linear-gradient(135deg,'+d.color+'2e,transparent)'">
                            <div class="flex items-center justify-between gap-1 leading-none">
                              <span class="text-[13px] font-bold inline-flex items-center gap-1.5" :style="'color:'+d.color"><span class="w-3.5 h-3.5 inline-flex" x-html="g.svg('clock','w-3.5 h-3.5')"></span>Treo Luyện</span>
                              <span class="inline-flex gap-0.5 text-[11px] leading-none shrink-0" :style="'color:'+d.color" title="Mức thưởng"><span>◆</span><span>◆</span><span>◆</span></span>
                            </div>
                            <div class="text-[11px] text-slate-400 font-mono mt-1.5 leading-none" x-text="g.fmtTime(g.dungeonDurSec(d.id,'treo'))"></div>
                          </button>
                        </div>
                        <template x-if="!g.canAffordDungeon(d.id)"><div class="text-[10px] text-rose-400 mt-2 text-center">Không đủ phí vào.</div></template>
                      </div>
                    </template>
                  </div>

                  <!-- Bảo Vật + Lịch Sử -->
                  <div class="grid lg:grid-cols-[1.4fr_1fr] gap-3 items-start">
                    <!-- Bảo Vật -->
                    <div class="panel rounded-xl p-3.5">
                      <div class="flex items-center gap-2 mb-2.5"><span class="lbl">Bảo Vật · Chiến lợi phẩm</span></div>
                      <div class="grid grid-cols-4 gap-2.5">
                        <template x-if="d.loot.doPho">
                          <div @click="g.openDungeonPool(d.id)" class="relative aspect-square rounded-lg bg-black/50 border border-amber-500/45 flex flex-col items-center justify-center gap-0.5 cursor-pointer hover:border-amber-400 transition" style="box-shadow:inset 0 0 12px rgba(245,158,11,.18)" title="Bấm xem danh mục Đồ Phổ">
                            <span class="w-10 h-10 inline-flex items-center justify-center"><img src="images/items/dopho.png" class="w-full h-full object-contain" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'📜',style:'font-size:20px'}))"></span>
                            <span class="text-[13px] font-bold leading-none text-amber-300" x-text="g.pctText(d.loot.doPhoChance)"></span>
                            <span class="text-[8px] tracking-wide text-amber-300/80 leading-tight text-center px-0.5" x-text="'Đồ Phổ Bậc '+d.loot.doPho.bac.join('/')"></span>
                            <span class="text-[7.5px] text-slate-500 leading-none">bấm xem ▸</span>
                          </div>
                        </template>
                        <template x-for="lid in d.loot.lieu.slice(0,3)" :key="lid">
                          <div class="aspect-square rounded-lg bg-black/50 border flex flex-col items-center justify-center gap-0.5 cursor-zoom-in" :class="g.itemQuality(lid).border" @click="g.openLightbox(lid,(g.ITEMS[lid]||{}).icon,(g.ITEMS[lid]||{}).name)">
                            <span class="w-11 h-11 inline-flex items-center justify-center" x-html="g.ico(lid,(g.ITEMS[lid]||{}).icon)"></span>
                            <span class="text-[8.5px] leading-none truncate w-full text-center px-0.5" :class="g.itemQuality(lid).text" x-text="(g.ITEMS[lid]||{}).name"></span>
                          </div>
