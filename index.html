            <template x-if="!$store.game.isCurrentLocation($store.game.modalLocation) && $store.game.locUnlocked($store.game.modalLocation)">
              <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                  <button @click="$store.game.teleportTo($store.game.modalLocation.id)" :disabled="!$store.game.canAffordTele($store.game.modalLocation)"
                    class="px-4 py-3.5 rounded-xl transition flex flex-col items-center gap-1 border"
                    :class="$store.game.canAffordTele($store.game.modalLocation) ? 'bg-amber-500/10 border-amber-500/40 hover:bg-amber-500/20 hover:border-amber-400/60' : 'bg-slate-800/40 border-slate-700 opacity-60 cursor-not-allowed'">
                    <span class="text-base font-bold flex items-center gap-1.5" :class="$store.game.canAffordTele($store.game.modalLocation) ? 'text-amber-200' : 'text-slate-500'">✨ Truyền Tống</span>
                    <span class="flex items-center gap-1.5 text-sm font-bold" :class="$store.game.canAffordTele($store.game.modalLocation) ? 'text-amber-100' : 'text-rose-400'"><span class="w-5 h-5 inline-flex items-center justify-center" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt($store.game.teleCost($store.game.modalLocation))"></span></span>
                    <span class="text-[11px] text-slate-500">Tới ngay tức thì</span>
                  </button>
                  <button @click="$store.game.startKhinhCong($store.game.modalLocation.id)"
                    class="px-4 py-3.5 rounded-xl transition flex flex-col items-center gap-1 bg-jade/10 border border-jade/40 hover:bg-jade/20 hover:border-jade/60">
                    <span class="text-base font-bold text-jade flex items-center gap-1.5">🏃 Khinh Công</span>
                    <span class="text-sm font-bold text-emerald-100" x-text="'~' + $store.game.walkLabel($store.game.modalLocation)"></span>
                    <span class="text-[11px] text-slate-500">Miễn phí, tốn thời gian</span>
                  </button>
                </div>
                <div class="text-xs text-slate-500 text-center leading-relaxed">Càng xa càng tốn — Truyền Tống tính theo <b class="text-amber-300/80">Tổng Lv × khoảng cách</b>.</div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal hành động (mở khi bấm 1 hành động) ===== -->
  <template x-if="$store.game.actionModal">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" @click="$store.game.closeAction()">
      <div class="panel rounded-xl p-5 w-80 max-w-full" @click.stop>
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs text-slate-500" x-text="$store.game.modalSkill.name"></span>
          <button @click="$store.game.closeAction()" class="text-slate-500 hover:text-rose-400">✕</button>
        </div>
        <div class="text-center">
          <button type="button" title="Bấm để phóng to"
            @click="$store.game.openLightbox($store.game.modalAction.itemId || $store.game.modalSkill.id, $store.game.modalAction.itemId ? $store.game.ITEMS[$store.game.modalAction.itemId].icon : $store.game.modalSkill.icon, $store.game.modalAction.name)"
            class="w-28 h-28 mx-auto rounded-lg bg-ink3 flex items-center justify-center text-5xl cursor-zoom-in ring-1 ring-transparent hover:ring-jade/40 transition"
            x-html="$store.game.ico($store.game.modalAction.itemId || $store.game.modalSkill.id, $store.game.modalAction.itemId ? $store.game.ITEMS[$store.game.modalAction.itemId].icon : $store.game.modalSkill.icon)"></button>
          <div class="font-bold mt-2" x-text="$store.game.modalAction.name"></div>
          <div class="flex flex-wrap justify-center gap-1.5 mt-2 text-[11px]">
            <span class="px-2 py-0.5 rounded bg-ink3" x-text="'Lv ' + $store.game.modalAction.reqLevel"></span>
            <span class="px-2 py-0.5 rounded bg-ink3" x-text="$store.game.modalAction.time + ' giây'"></span>
            <span class="px-2 py-0.5 rounded bg-ink3 text-jade" x-text="'+' + $store.game.modalAction.xp + ' EXP'"></span>
          </div>
        </div>
        <!-- ===== Linh Thạch (buff per-skill) ===== -->
        <div class="mt-3" x-data="{ pick:false }">
          <div class="lbl mb-1 flex items-center justify-between">
            <span>Linh Thạch</span>
            <span class="text-[10px] text-slate-500 font-normal normal-case tracking-normal" x-show="$store.game.mHasLTFamily">Tiêu hao 1 viên / phiên</span>
          </div>

          <!-- Kỹ năng này chưa có Linh Thạch -->
          <template x-if="!$store.game.mHasLTFamily">
            <div class="px-3 py-2 rounded bg-ink3 border border-slate-700 text-xs text-slate-600 text-center">Chưa có Linh Thạch cho kỹ năng này</div>
          </template>

          <template x-if="$store.game.mHasLTFamily">
            <div>
              <!-- Đã lắp -->
              <template x-if="$store.game.mLinhThach">
                <div class="flex items-center gap-2.5 px-2.5 py-2 rounded bg-ink3 border border-jade/30">
                  <div class="w-9 h-9 rounded bg-ink flex items-center justify-center text-xl shrink-0"
                    x-html="$store.game.ico($store.game.mLinhThach.itemId, $store.game.ITEMS[$store.game.mLinhThach.itemId].icon)"></div>
                  <div class="flex-1 min-w-0">
                    <div class="text-xs font-medium text-slate-200 truncate" x-text="$store.game.ITEMS[$store.game.mLinhThach.itemId].name"></div>
                    <div class="text-[10px] text-jade leading-tight" x-text="$store.game.linhThachEffectText($store.game.mLinhThach)"></div>
                    <div class="text-[10px] leading-tight"
                      :class="$store.game.linhThachOwned($store.game.mLinhThach.itemId) > 0 ? 'text-slate-500' : 'text-rose-400'"
                      x-text="$store.game.linhThachOwned($store.game.mLinhThach.itemId) > 0 ? ('Còn ' + $store.game.linhThachOwned($store.game.mLinhThach.itemId) + ' viên') : 'Đã hết — sẽ không kích hoạt'"></div>
                  </div>
                  <button @click="$store.game.clearLinhThach($store.game.mSkillId)" title="Tháo Linh Thạch"
                    class="text-slate-500 hover:text-rose-400 text-sm shrink-0">✕</button>
                </div>
              </template>

              <!-- Chưa lắp -->
              <template x-if="!$store.game.mLinhThach">
                <button @click="pick=!pick"
                  class="w-full px-3 py-2 rounded bg-ink3 border border-dashed border-slate-600 text-sm text-slate-400 hover:border-jade/50 hover:text-jade transition">
                  ＋ Lắp Linh Thạch
                </button>
              </template>

              <!-- Picker: chọn từ túi đồ -->
              <div x-show="pick" x-cloak class="mt-1.5 space-y-1">
                <template x-for="opt in $store.game.mLTOptions" :key="opt.itemId">
                  <button @click="if(opt.owned>0){ $store.game.assignLinhThach($store.game.mSkillId, opt.itemId); pick=false }"
                    :disabled="opt.owned<=0"
                    class="w-full flex items-center gap-2 px-2.5 py-1.5 rounded border text-left transition"
                    :class="opt.owned>0 ? 'bg-ink border-slate-700 hover:border-jade/50' : 'bg-ink/40 border-slate-800 opacity-50 cursor-not-allowed'">
                    <span class="w-7 h-7 rounded bg-ink3 flex items-center justify-center text-base shrink-0" x-html="$store.game.ico(opt.itemId, $store.game.ITEMS[opt.itemId].icon)"></span>
                    <span class="flex-1 min-w-0">
                      <span class="block text-xs text-slate-200 truncate" x-text="$store.game.ITEMS[opt.itemId].name"></span>
                      <span class="block text-[10px] text-jade leading-tight" x-text="$store.game.linhThachEffectText(opt)"></span>
                    </span>
                    <span class="text-[10px] shrink-0" :class="opt.owned>0?'text-slate-400':'text-rose-400'" x-text="'×'+opt.owned"></span>
                  </button>
                </template>
                <div class="text-[10px] text-slate-600 px-1 pt-0.5">Linh Thạch luyện ở <b class="text-slate-500">Luyện Đan</b>.</div>
              </div>
            </div>
          </template>
        </div>
        <template x-if="$store.game.modalAction.inputs">
          <div class="mt-3">
            <div class="lbl mb-1">Nguyên Liệu</div>
            <div class="flex flex-wrap gap-1.5">
              <template x-for="inp in $store.game.actionInputs($store.game.modalAction)" :key="inp.itemId">
                <span class="text-[11px] px-2 py-1 rounded flex items-center gap-1" :class="inp.ok ? 'bg-ink text-slate-300' : 'bg-rose-900/40 text-rose-300'">
                  <span class="w-4 h-4 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(inp.itemId, $store.game.ITEMS[inp.itemId].icon)"></span><span x-text="$store.game.ITEMS[inp.itemId].name + ' ' + inp.have + '/' + inp.need"></span>
                </span>
              </template>
            </div>
          </div>
        </template>
        <div class="mt-3 text-xs text-slate-400">Có thể thực hiện <b class="text-slate-200" x-text="$store.game.maxTimes($store.game.modalAction)"></b> lần.</div>
        <div class="flex gap-2 mt-4">
          <button class="flex-1 py-2 rounded bg-ink3 border border-slate-700 text-sm text-slate-400">Xem</button>
          <button @click="$store.game.startFromModal()"
            :disabled="!$store.game.canStart($store.game.actionModal.skillId, $store.game.modalAction)"
            class="flex-1 py-2 rounded font-medium text-sm transition"
            :class="$store.game.canStart($store.game.actionModal.skillId, $store.game.modalAction) ? 'bg-jade/80 hover:bg-jade text-ink' : 'bg-slate-800 text-slate-600 cursor-not-allowed'">
            <span x-text="$store.game.startLabel($store.game.actionModal.skillId, $store.game.modalAction)"></span>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Trang Bị (kiểu IdleMMO) ===== -->
  <template x-if="$store.game.equipModal">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeEquip()">
      <div class="panel rounded-xl w-[31rem] max-w-full border border-jade/25 overflow-hidden flex flex-col max-h-[88vh]" @click.stop
           x-data="{ get g(){ return $store.game }, get slot(){ return $store.game.equipModal.slot } }">
        <!-- Header -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800 bg-ink2/60 shrink-0">
          <span class="flex items-center gap-2 text-sm font-semibold text-slate-100">
            <span class="text-jade" x-html="g.svg('shield','w-4 h-4')"></span>
            Trang Bị · <span class="text-jade" x-text="g.slotName(slot)"></span>
          </span>
          <button @click="g.closeEquip()" class="text-slate-500 hover:text-rose-400" aria-label="Đóng">✕</button>
        </div>

        <div class="p-4 overflow-auto">
          <!-- ĐANG MẶC -->
          <template x-if="g.equippedItem(slot)">
            <div class="mb-3" x-data="{ get g(){ return $store.game }, get slot(){ return $store.game.equipModal.slot }, get id(){ return this.g.state.equipment[this.slot] }, get it(){ return this.g.equippedItem(this.slot) } }">
              <div class="flex items-center gap-1.5 mb-1.5"><span class="inline-block w-1.5 h-1.5 bg-jade rotate-45"></span><span class="text-[10px] uppercase tracking-wider text-jade font-medium">Đang mặc</span></div>
              <div class="flex items-center gap-3 p-2.5 rounded-lg bg-ink2/70 border" :class="g.itemQuality(id).border">
                <div class="shrink-0 flex flex-col items-center">
                  <div class="w-14 h-14 rounded-lg border overflow-hidden bg-gradient-to-br flex items-center justify-center" :class="g.itemQuality(id).border + ' ' + g.itemQuality(id).grad"><span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(id, it.icon)"></span></div>
                  <div class="flex gap-px mt-1"><template x-for="s in g.qualityRank(id)" :key="s"><span class="text-[8px] leading-none text-amber-400">★</span></template></div>
                </div>
                <div class="w-28 shrink-0 min-w-0">
                  <div class="flex items-center gap-1.5"><span class="text-[13px] font-medium text-slate-100 truncate" x-text="it.name"></span><template x-if="g.itemPlus(id)>0"><span class="text-[10px] font-bold text-amber-300 shrink-0" x-text="'+'+g.itemPlus(id)"></span></template><template x-if="g.gearHe(id)"><span class="text-[8px] px-1 rounded shrink-0" :class="g.gearHe(id).info.badge" x-text="g.gearHe(id).info.han"></span></template></div>
                  <span class="inline-block mt-1 text-[9px] px-1.5 py-0.5 rounded border" :class="g.itemQuality(id).bg+' '+g.itemQuality(id).text+' '+g.itemQuality(id).border" x-text="g.qualityName(id) + (it.equip.itemLv ? ' · Lv'+it.equip.itemLv : '')"></span>
                </div>
                <div class="flex-1 min-w-0 space-y-1">
                  <template x-for="c in g.gearCompare(id)" :key="c.key">
                    <div class="flex items-center justify-between gap-3 text-[11px]"><span class="inline-flex items-center gap-1.5 text-slate-400"><span class="text-slate-500" x-html="g.svg(g.gearStatIcon(c.key),'w-3.5 h-3.5')"></span><span x-text="c.label"></span></span><span class="text-slate-100 font-medium tabular-nums" x-text="'+'+c.next"></span></div>
                  </template>
                  <template x-if="g.toolEffText(id)"><div class="flex items-center gap-1.5 text-[11px] text-emerald-300"><span class="text-emerald-400/80" x-html="g.svg('zap','w-3.5 h-3.5')"></span><span x-text="g.toolEffText(id)"></span></div></template>
                </div>
                <div class="shrink-0 flex flex-col gap-1.5">
                  <button @click="g.openEnhance(slot)" class="px-3 py-1.5 text-[11px] rounded-lg bg-amber-500/85 hover:bg-amber-400 text-ink font-medium inline-flex items-center justify-center gap-1"><span x-html="g.svg('zap','w-3 h-3')"></span>Cường Hóa</button>
                  <button @click="g.doUnequip(slot)" class="px-3 py-1.5 text-[11px] rounded-lg bg-rose-900/50 hover:bg-rose-800 text-rose-200">Tháo</button>
                </div>
              </div>
            </div>
          </template>

          <!-- ĐỀ CỬ CHO BẠN -->
          <template x-if="g.recommendedForSlot(slot)">
            <div class="mb-3" x-data="{ get g(){ return $store.game }, get slot(){ return $store.game.equipModal.slot }, get rec(){ return this.g.recommendedForSlot(this.slot) } }">
              <div class="flex items-center gap-1.5 mb-1.5"><span class="inline-block w-1.5 h-1.5 bg-amber-400 rotate-45"></span><span class="text-[10px] uppercase tracking-wider text-amber-300 font-medium">Đề cử cho bạn</span></div>
              <div class="relative rounded-lg border-2 border-amber-500/55 bg-amber-950/15 p-2.5 shadow-[0_0_16px_rgba(245,158,11,0.16)]">
                <span class="absolute top-0 left-0 text-[8px] px-2 py-0.5 rounded-br-lg rounded-tl-md bg-amber-500 text-ink font-bold">Đề cử</span>
                <div class="flex items-center gap-3 mt-1.5">
                  <div class="shrink-0 flex flex-col items-center">
                    <div class="w-14 h-14 rounded-lg border overflow-hidden bg-gradient-to-br flex items-center justify-center" :class="g.itemQuality(rec.id).border + ' ' + g.itemQuality(rec.id).grad"><span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(rec.id, rec.icon)"></span></div>
                    <div class="flex gap-px mt-1"><template x-for="s in g.qualityRank(rec.id)" :key="s"><span class="text-[8px] leading-none text-amber-400">★</span></template></div>
                  </div>
                  <div class="w-28 shrink-0 min-w-0">
                    <div class="flex items-center gap-1"><span class="text-[13px] font-medium text-slate-100 truncate" x-text="rec.name"></span><template x-if="g.gearHe(rec.id)"><span class="text-[8px] px-1 rounded shrink-0" :class="g.gearHe(rec.id).info.badge" x-text="g.gearHe(rec.id).info.han"></span></template></div>
                    <span class="inline-block mt-1 text-[9px] px-1.5 py-0.5 rounded border" :class="g.itemQuality(rec.id).bg+' '+g.itemQuality(rec.id).text+' '+g.itemQuality(rec.id).border" x-text="g.qualityName(rec.id) + (rec.equip.itemLv ? ' · Lv'+rec.equip.itemLv : '')"></span>
                    <template x-if="g.equipReqOf(rec.id)>1"><span class="inline-block mt-1 ml-1 text-[9px] px-1.5 py-0.5 rounded border" :class="g.canEquip(rec.id)?'border-slate-600 text-slate-400':'border-rose-500/60 text-rose-300'" x-text="'⚔ Cần Lv'+g.equipReqOf(rec.id)"></span></template>
                  </div>
                  <div class="flex-1 min-w-0 space-y-1">
                    <template x-for="c in g.gearCompare(rec.id)" :key="c.key">
                      <div class="flex items-center justify-between gap-3 text-[11px]"><span class="inline-flex items-center gap-1.5 text-slate-400"><span class="text-slate-500" x-html="g.svg(g.gearStatIcon(c.key),'w-3.5 h-3.5')"></span><span x-text="c.label"></span></span><span class="tabular-nums"><span class="text-slate-100 font-medium" x-text="'+'+c.next"></span><span x-show="c.delta!==0" :class="c.delta>0?'text-emerald-400':'text-rose-400'" x-text="' '+(c.delta>0?'▲':'▼')+'('+(c.delta>0?'+':'')+c.delta+')'"></span></span></div>
                    </template>
                  </div>
                  <button @click="g.doEquip(rec.id); g.closeEquip()" :disabled="!g.canEquip(rec.id)" class="shrink-0 inline-flex items-center gap-1.5 px-3 py-2 text-[11px] rounded-lg bg-emerald-600/80 hover:bg-emerald-600 text-white font-medium disabled:opacity-40 disabled:cursor-not-allowed"><span x-html="g.svg('zap','w-3.5 h-3.5')"></span><span x-text="g.canEquip(rec.id)?'Trang Bị Nhanh':('Cần Lv '+g.equipReqOf(rec.id))"></span></button>
                </div>
              </div>
            </div>
          </template>

          <!-- KHÁC -->
          <template x-if="g.othersForSlot(slot).length">
            <div class="flex items-center gap-2 my-2.5">
              <div class="h-px flex-1 bg-slate-800"></div>
              <span class="text-[10px] text-slate-500 tracking-wider">KHÁC</span>
              <div class="h-px flex-1 bg-slate-800"></div>
            </div>
          </template>
          <template x-if="g.equippableForSlot(slot).length===0">
            <div class="text-sm text-slate-600 py-3 text-center">Không có trang bị phù hợp trong túi.</div>
          </template>
          <div class="space-y-2">
            <template x-for="it in g.othersForSlot(slot)" :key="it.id">
              <div class="flex items-center gap-3 p-2 rounded-lg bg-ink3/40 border border-slate-800">
                <div class="shrink-0 flex flex-col items-center">
                  <div class="relative w-12 h-12 rounded-lg border overflow-hidden bg-gradient-to-br flex items-center justify-center" :class="g.itemQuality(it.id).border + ' ' + g.itemQuality(it.id).grad"><span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(it.id, it.icon)"></span><template x-if="it.qty>1"><span class="absolute top-0 right-0 text-[8px] text-slate-200 bg-ink/80 rounded-bl px-0.5" x-text="'×'+g.fmt(it.qty)"></span></template></div>
                  <div class="flex gap-px mt-1"><template x-for="s in g.qualityRank(it.id)" :key="s"><span class="text-[7px] leading-none text-amber-400">★</span></template></div>
                </div>
                <div class="w-28 shrink-0 min-w-0">
                  <div class="flex items-center gap-1"><span class="text-[13px] font-medium text-slate-100 truncate" x-text="it.name"></span><template x-if="g.gearHe(it.id)"><span class="text-[8px] px-1 rounded shrink-0" :class="g.gearHe(it.id).info.badge" x-text="g.gearHe(it.id).info.han"></span></template></div>
                  <span class="inline-block mt-1 text-[9px] px-1.5 py-0.5 rounded border" :class="g.itemQuality(it.id).bg+' '+g.itemQuality(it.id).text+' '+g.itemQuality(it.id).border" x-text="g.qualityName(it.id)"></span>
                  <template x-if="g.equipReqOf(it.id)>1"><span class="inline-block mt-1 ml-1 text-[9px] px-1.5 py-0.5 rounded border" :class="g.canEquip(it.id)?'border-slate-600 text-slate-400':'border-rose-500/60 text-rose-300'" x-text="'⚔ Cần Lv'+g.equipReqOf(it.id)"></span></template>
                </div>
                <div class="flex-1 min-w-0 space-y-1">
                  <template x-for="c in g.gearCompare(it.id)" :key="c.key">
                    <div class="flex items-center justify-between gap-3 text-[11px]"><span class="inline-flex items-center gap-1.5 text-slate-400"><span class="text-slate-500" x-html="g.svg(g.gearStatIcon(c.key),'w-3.5 h-3.5')"></span><span x-text="c.label"></span></span><span class="tabular-nums font-medium" :class="c.delta>0?'text-emerald-400':(c.delta<0?'text-rose-400':'text-slate-400')" x-text="c.delta>0?('+'+c.delta):(c.delta<0?(''+c.delta):'—')"></span></div>
                  </template>
                  <template x-if="g.toolEffText(it.id)"><div class="flex items-center gap-1.5 text-[11px] text-emerald-300"><span class="text-emerald-400/80" x-html="g.svg('zap','w-3.5 h-3.5')"></span><span x-text="g.toolEffText(it.id)"></span></div></template>
                </div>
                <button @click="g.doEquip(it.id); g.closeEquip()" :disabled="!g.canEquip(it.id)" class="shrink-0 px-3.5 py-2 text-[11px] rounded-lg bg-ink2 border border-slate-700 hover:border-jade/50 text-slate-200 disabled:opacity-40 disabled:cursor-not-allowed" x-text="g.canEquip(it.id)?'Trang Bị':('Cần Lv '+g.equipReqOf(it.id))"></button>
              </div>
            </template>
          </div>
        </div>

        <!-- Footer: legend + filter -->
        <div class="px-4 py-2.5 border-t border-slate-800 bg-ink2/40 shrink-0 flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-x-2 gap-y-1 flex-wrap">
            <span class="text-[9px] text-slate-600">Phẩm chất</span>
            <template x-for="key in g.QUALITY_KEYS" :key="key">
              <span class="inline-flex items-center gap-1 text-[9px]" :class="g.QUALITY[key].text"><span class="w-1.5 h-1.5 rounded-full bg-current"></span><span x-text="g.QUALITY[key].name"></span></span>
            </template>
          </div>
          <label class="flex items-center gap-1.5 text-[10px] text-slate-400 cursor-pointer shrink-0">Chỉ hiển thị tốt hơn<input type="checkbox" x-model="$store.game.equipFilterBetter" class="accent-emerald-500 w-3.5 h-3.5"></label>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Popup CHI TIẾT Tâm Pháp khởi tu (xem võ học hệ trước khi chọn) ===== -->
  <template x-if="$store.game.tpDetail">
    <div class="fixed inset-0 z-[60] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.closeTpDetail()">
      <div class="panel rounded-xl w-[30rem] max-w-full border-2 overflow-hidden flex flex-col max-h-[88vh]" @click.stop
           x-data="{ get g(){ return $store.game }, get tp(){ return $store.game.tpDetailObj }, get he(){ return ($store.game.tpDetailObj||{}).he } }" :class="g.heInfo(he).ring">
        <!-- header art -->
        <div class="relative shrink-0 h-56 bg-gradient-to-br overflow-hidden" :class="g.NGU_HANH[he].grad">
          <span class="absolute inset-0 flex items-center justify-center opacity-20 select-none" style="font-family:'Lora',serif;font-size:9rem;line-height:1" :class="g.heInfo(he).text" x-text="g.NGU_HANH[he].han"></span>
          <img :src="'images/tamphap/'+tp.id+'.png'" class="absolute inset-0 w-full h-full object-cover object-top" onerror="this.remove()">
          <div class="absolute inset-0 bg-gradient-to-t from-ink via-ink/40 to-transparent"></div>
          <span class="absolute top-2 left-2 text-[10px] px-2 py-0.5 rounded" :class="g.NGU_HANH[he].badge" x-text="'Hệ ' + g.heName(he)"></span>
          <button @click="g.closeTpDetail()" class="absolute top-2 right-2 w-6 h-6 rounded-full bg-ink/70 text-slate-300 hover:text-rose-400 flex items-center justify-center" aria-label="Đóng">✕</button>
          <div class="absolute bottom-2 left-3 right-3 text-lg font-bold" style="font-family:'Lora',serif" :class="g.heInfo(he).text" x-text="tp.name"></div>
        </div>
        <!-- body -->
        <div class="p-4 overflow-auto space-y-3.5">
          <div>
            <div class="lbl mb-1.5">Nội Công</div>
            <div class="text-[12px] text-jade leading-relaxed" x-text="tp.desc"></div>
            <div class="text-[11px] text-slate-400 italic leading-relaxed mt-1.5" x-text="tp.lore"></div>
          </div>
          <div class="rounded-lg bg-ink3/50 border border-slate-800 p-2.5">
            <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">Lối đánh</div>
            <div class="text-[12px] text-slate-300" x-text="tp.short"></div>
          </div>
          <div>
            <div class="lbl mb-2" x-text="'Chiêu Thức Hệ ' + g.heName(he) + ' · sẽ học sau'"></div>
            <div class="space-y-2">
              <template x-for="c in g.heChieu(he)" :key="c.id">
                <div class="flex gap-2.5 rounded-lg bg-ink2/60 border border-slate-800 p-2.5">
                  <div class="w-12 h-12 shrink-0 rounded-md overflow-hidden flex items-center justify-center" :class="g.tierStyle(c.tier).border + ' border bg-ink'">
                    <img :src="'images/chieu/'+c.id+'.png'" class="w-full h-full object-cover" alt="" onerror="this.remove()">
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-0.5">
                      <span class="text-[9px] px-1.5 py-0.5 rounded font-medium shrink-0" :class="g.tierStyle(c.tier).badge" x-text="g.tierStyle(c.tier).label"></span>
                      <span class="text-[13px] font-medium truncate" :class="g.heInfo(he).text" x-text="c.name"></span>
                      <span class="text-[10px] text-slate-500 ml-auto shrink-0" x-text="'ST ×'+c.mult+' · '+c.nl+' NL'"></span>
                    </div>
                    <div class="text-[11px] text-slate-400 leading-snug" x-text="c.short"></div>
                    <div class="flex flex-wrap gap-1 mt-1.5">
                      <template x-for="tag in g.chieuTags(c)" :key="tag"><span class="text-[9px] px-1.5 py-0.5 rounded bg-ink text-slate-300" x-text="tag"></span></template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div>
            <div class="lbl mb-2" x-text="'Bị Động Hệ ' + g.heName(he)"></div>
            <div class="space-y-2">
              <template x-for="p in g.heBiDong(he)" :key="p.id">
                <div class="flex gap-2.5 rounded-lg bg-ink2/60 border border-slate-800 p-2.5">
                  <div class="w-12 h-12 shrink-0 rounded-md overflow-hidden flex items-center justify-center border border-violet-500/40 bg-ink">
                    <img :src="'images/bidong/'+p.id+'.png'" class="w-full h-full object-cover" alt="" onerror="this.remove()">
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="text-[13px] font-medium text-violet-300" x-text="p.name"></div>
                    <div class="text-[11px] text-slate-400 leading-snug mt-0.5" x-text="p.desc"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="rounded-lg bg-ink3/40 border border-slate-800 p-2.5">
            <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">Học tại</div>
            <div class="text-[12px]" :class="g.heInfo(he).text" x-text="g.monPhaiOf(he).name"></div>
            <div class="text-[11px] text-slate-400 leading-snug mt-0.5" x-text="g.monPhaiOf(he).desc"></div>
          </div>
          <div class="text-[10px] text-slate-600 leading-snug">Khởi đầu nhận sẵn nội công + 1 chiêu Sơ + 1 Bị Động cùng hệ. Phần còn lại học/mua sau ở Tàng Kinh Các.</div>
        </div>
        <!-- footer -->
        <div class="p-3 border-t border-slate-800 bg-ink2/50 shrink-0">
          <button @click="g.pickTpFromDetail()" class="w-full py-2.5 rounded-lg font-bold text-sm transition" :class="g.draftTamPhapOn(tp.id) ? 'bg-jade/20 text-jade border border-jade/40' : 'bg-jade text-ink hover:bg-jade/90'" x-text="g.draftTamPhapOn(tp.id) ? '✓ Đã chọn nội công này' : 'Chọn nội công này'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Cường Hóa (Lò Cường Hóa) ===== -->
  <template x-if="$store.game.enhanceModal">
    <div class="fixed inset-0 z-[55] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.closeEnhance()">
      <div class="panel rounded-2xl w-[600px] max-w-[95vw] border border-amber-500/30 overflow-hidden shadow-2xl" @click.stop
           x-data="{ get g(){ return $store.game }, get id(){ return $store.game.enhanceId() } }">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-slate-800 bg-ink2/60">
          <span class="flex items-center gap-2 text-base font-semibold text-slate-100"><span class="text-amber-400" x-html="g.svg('zap','w-5 h-5')"></span>Lò Cường Hóa</span>
          <button @click="g.closeEnhance()" class="text-slate-500 hover:text-rose-400 text-lg" aria-label="Đóng">✕</button>
        </div>
        <template x-if="!id"><div class="p-10 text-center text-slate-500">Slot này chưa có trang bị.</div></template>
        <template x-if="id">
          <div class="p-5" x-data="{ get g(){ return $store.game }, get id(){ return $store.game.enhanceId() }, get info(){ return $store.game.enhanceInfo($store.game.enhanceId()) } }">
            <!-- Hero: item (ô VUÔNG + vòng trận pháp) + định danh + tiến cấp -->
            <div class="flex items-center gap-5 mb-5">
              <div class="relative w-[110px] h-[110px] shrink-0 flex items-center justify-center">
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full pointer-events-none text-amber-300" fill="none" stroke="currentColor" style="filter:drop-shadow(0 0 2.5px rgba(245,185,66,.55))">
                  <rect x="5" y="5" width="90" height="90" rx="15" stroke-width="0.6" opacity=".22"/>
                  <rect x="5" y="5" width="90" height="90" rx="15" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.4 6" opacity=".95">
                    <animate attributeName="stroke-dashoffset" from="0" to="6.4" dur="1.2s" repeatCount="indefinite"/>
                  </rect>
                </svg>
                <div class="relative w-[82px] h-[82px] rounded-lg border-2 bg-gradient-to-br overflow-hidden flex items-center justify-center cursor-zoom-in hover:ring-2 hover:ring-amber-300/50 transition" :class="g.itemQuality(id).border+' '+g.itemQuality(id).grad" @click="g.openLightbox(id, g.ITEMS[id].icon, g.ITEMS[id].name)" title="Bấm để phóng to">
                  <span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(id, g.ITEMS[id].icon)"></span>
                  <template x-if="g.itemPlus(id)>0"><span class="absolute bottom-0 right-0 text-[11px] font-bold text-amber-300 bg-ink/85 px-1.5 rounded-tl" x-text="'+'+g.itemPlus(id)"></span></template>
                </div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-lg font-semibold truncate" :class="g.itemQuality(id).text" x-text="g.ITEMS[id].name + (g.itemPlus(id)>0 ? ' +'+g.itemPlus(id) : '')"></div>
                <span class="inline-block mt-1.5 text-[11px] px-2 py-0.5 rounded border" :class="g.itemQuality(id).bg+' '+g.itemQuality(id).text+' '+g.itemQuality(id).border" x-text="g.qualityName(id) + (g.ITEMS[id].equip && g.ITEMS[id].equip.itemLv ? ' · Lv'+g.ITEMS[id].equip.itemLv : '')"></span>
                <template x-if="!g.enhanceMaxed(id)">
                  <div class="flex items-center gap-3 mt-3">
                    <span class="text-[26px] font-bold leading-none text-slate-400" x-text="'+'+g.itemPlus(id)"></span>
                    <span class="text-amber-400" x-html="g.svg('chevR','w-6 h-6')"></span>
                    <span class="text-[40px] font-extrabold leading-none text-amber-300" x-text="'+'+(g.itemPlus(id)+1)"></span>
                  </div>
                </template>
                <template x-if="g.enhanceMaxed(id)">
                  <div class="mt-3 text-amber-300 font-semibold" x-text="'Đã đạt cường hóa tối đa (+'+g.MAX_PLUS+')'"></div>
                </template>
              </div>
            </div>

            <!-- Thông báo kết quả (ngoài guard maxed → cú chốt +15 vẫn báo) -->
            <template x-if="g.enhanceMsg && g.enhanceMsg.ok"><div class="text-center text-emerald-400 font-medium mb-3" x-text="'✓ Thành công! Đạt +'+g.enhanceMsg.plus"></div></template>
            <template x-if="g.enhanceMsg && !g.enhanceMsg.ok"><div class="text-center text-rose-400 font-medium mb-3">✗ Thất bại, nguyên liệu tiêu hao.</div></template>

            <template x-if="!g.enhanceMaxed(id)">
              <div>
                <!-- 2 cột: Chỉ số tăng | Nguyên liệu -->
                <div class="grid grid-cols-2 gap-3.5 mb-4">
                  <div class="rounded-xl bg-ink3/50 border border-slate-800 p-4">
                    <div class="text-[11px] uppercase tracking-wider text-amber-300/70 mb-2.5 font-medium">Chỉ số tăng</div>
                    <div class="space-y-2.5">
                      <template x-for="p in g.enhancePreview(id)" :key="p.key">
                        <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-400"><span class="text-slate-500" x-html="g.svg(p.icon,'w-4 h-4')"></span><span x-text="p.label"></span></span><span class="tabular-nums"><span class="text-slate-400" x-text="p.cur"></span><span class="text-slate-600 mx-1">→</span><span class="text-emerald-400 font-semibold" x-text="p.next"></span><span class="text-emerald-500/70 text-[11px] ml-1" x-text="'+'+(p.next-p.cur)"></span></span></div>
                      </template>
                      <template x-if="!g.enhancePreview(id).length"><div class="text-[12px] text-slate-500 italic py-1">Trang bị này không có chỉ số nền để cường hóa.</div></template>
                    </div>
                  </div>
                  <div class="rounded-xl bg-ink3/50 border border-slate-800 p-4">
                    <div class="text-[11px] uppercase tracking-wider text-amber-300/70 mb-2.5 font-medium">Nguyên liệu</div>
                    <div class="space-y-2.5">
                      <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox(info.stoneId, (g.ITEMS[info.stoneId]||{}).icon, info.stoneName)" title="Bấm để phóng to" x-html="g.ico(info.stoneId, (g.ITEMS[info.stoneId]||{}).icon)"></span><span class="truncate font-medium" :class="g.itemQuality(info.stoneId).text" x-text="info.stoneName"></span></span><span class="tabular-nums shrink-0" :class="info.stoneOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.stoneHave)+' / '+info.stoneQty"></span></div>
                      <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox('honThach','💠','Hồn Thạch')" title="Bấm để phóng to" x-html="g.ico('honThach','💠')"></span><span class="truncate font-medium text-rose-300">Hồn Thạch</span></span><span class="tabular-nums shrink-0" :class="info.honOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.honHave)+' / '+g.fmt(info.honThach)"></span></div>
                      <template x-if="info.crystalQty>0"><div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox(info.crystalId, (g.ITEMS[info.crystalId]||{}).icon, info.crystalName)" title="Bấm để phóng to" x-html="g.ico(info.crystalId, (g.ITEMS[info.crystalId]||{}).icon)"></span><span class="truncate font-medium" :class="g.itemQuality(info.crystalId).text" x-text="info.crystalName"></span></span><span class="tabular-nums shrink-0" :class="info.crystalOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.crystalHave)+' / '+info.crystalQty"></span></div></template>
                    </div>
                  </div>
                </div>

                <!-- Tỉ lệ thành công (thanh) -->
                <div class="rounded-xl bg-ink3/40 border border-slate-800 px-4 py-3.5 mb-4">
                  <div class="flex items-center justify-between mb-2"><span class="text-[13px] text-slate-300">Tỉ lệ thành công</span><span class="text-lg font-bold" :class="info.ratePct>=80?'text-emerald-400':(info.ratePct>=50?'text-amber-300':'text-rose-400')" x-text="info.ratePct+'%'"></span></div>
                  <div class="h-2.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full rounded-full" :class="info.ratePct>=80?'bg-emerald-500':(info.ratePct>=50?'bg-amber-500':'bg-rose-500')" :style="'width:'+info.ratePct+'%'"></div></div>
                  <div class="text-[11px] text-slate-500 mt-2 text-center">Thất bại mất nguyên liệu nhưng <span class="text-slate-400">KHÔNG tụt cấp</span>.</div>
                </div>

                <button @click="g.doEnhance()" :disabled="!g.enhanceCan(id)" class="w-full py-3 rounded-xl font-semibold text-base transition inline-flex items-center justify-center gap-2" :class="g.enhanceCan(id) ? 'bg-amber-500 hover:bg-amber-400 text-ink' : 'bg-slate-800 text-slate-600 cursor-not-allowed'"><span x-html="g.svg('zap','w-5 h-5')"></span>Cường Hóa</button>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- (Modal kết quả Vây Sát cũ ĐÃ GỠ — cơ chế theo lượt hiện kết quả + chiến lợi phẩm ngay trong panel combat ở view worldboss) -->

  <!-- (Báo cáo nhàn rỗi đã gộp vào "Vùng thông báo" giữa-dưới ở cuối file — đồng bộ 1 vị trí) -->

  <!-- ===== Modal sửa Tiểu Sử (≤250 ký tự) ===== -->
  <template x-if="$store.game.bioModal">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeBioEdit()">
      <div class="panel rounded-2xl w-[30rem] max-w-[94vw] overflow-hidden shadow-2xl" @click.stop>
        <div class="px-6 pt-5 pb-3 border-b border-slate-800 flex items-center justify-between">
          <div class="text-lg font-bold flex items-center gap-2 fserif"><span class="text-jade" x-html="$store.game.svg('scroll','w-5 h-5')"></span>Tiểu Sử</div>
          <button @click="$store.game.closeBioEdit()" class="w-8 h-8 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
        </div>
        <div class="px-6 py-5">
          <textarea x-model="$store.game.bioDraft" maxlength="250" rows="5" placeholder="Viết đôi dòng về nhân vật của ngươi…" class="w-full rounded-lg bg-ink3 border border-slate-700 focus:border-jade outline-none p-3 text-sm text-slate-200 resize-none leading-snug"></textarea>
          <div class="flex items-center justify-between mt-2">
            <span class="text-[11px] text-slate-500">Tối đa 250 ký tự</span>
            <span class="text-[11px] tabular-nums" :class="($store.game.bioDraft||'').length>=250?'text-amber-300':'text-slate-400'" x-text="(($store.game.bioDraft||'').length)+' / 250'"></span>
          </div>
          <div class="flex gap-2 mt-4">
            <button @click="$store.game.closeBioEdit()" class="flex-1 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-slate-500 text-slate-300 transition">Huỷ</button>
            <button @click="$store.game.saveBio()" class="flex-1 py-2 rounded-lg bg-jade/85 hover:bg-jade text-ink font-medium transition">Lưu</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal xác nhận Reset (thay confirm() trình duyệt) ===== -->
  <template x-if="$store.game.confirmReset">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.confirmReset=false">
      <div class="panel rounded-xl p-6 w-80 max-w-full text-center shadow-2xl border border-rose-500/40" @click.stop>
        <div class="text-3xl mb-2">⚠️</div>
        <div class="font-bold text-lg text-rose-300">Xoá Tiến Trình?</div>
        <div class="text-sm text-slate-400 mt-2 leading-snug">Toàn bộ nhân vật, cấp độ, vật phẩm sẽ bị xoá và chơi lại từ đầu (đặt lại tên & giới tính). Không thể hoàn tác.</div>
        <div class="flex gap-2 mt-5">
          <button @click="$store.game.confirmReset=false" class="flex-1 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-slate-500 text-slate-300 transition">Huỷ</button>
          <button @click="$store.game.doReset()" class="flex-1 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-white font-medium transition">Xoá &amp; Chơi lại</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Vùng thông báo — mọi thông báo về CÙNG vị trí giữa-dưới; canh giữa bằng flex (không transform) nên chỉ mờ dần, không trượt ngang ===== -->
  <div class="fixed bottom-6 inset-x-0 z-[80] flex flex-col items-center gap-2 px-4 pointer-events-none">
    <!-- Báo cáo nhàn rỗi (hiện khi vừa mở game, có nút Đóng) -->
    <template x-if="$store.game && $store.game.offlineReport">
      <div class="pointer-events-auto panel rounded-lg p-4 max-w-xs shadow-xl border border-jade/40">
        <div class="font-semibold text-jade mb-1">Khi bạn vắng mặt…</div>
        <div class="text-sm text-slate-300">Thu được <b x-text="'+' + $store.game.offlineReport.cycles"></b>
          <span x-text="$store.game.offlineReport.itemId ? $store.game.ITEMS[$store.game.offlineReport.itemId].name : 'EXP'"></span>
          (<span x-text="'+' + $store.game.offlineReport.xp + ' EXP'"></span>).
        </div>
        <button @click="$store.game.dismissOffline()" class="mt-2 text-xs text-slate-400 hover:text-jade">Đóng</button>
      </div>
    </template>
    <!-- Thông báo nhanh (tự ẩn sau 2.5s) -->
    <div x-show="$store.game.toast" x-transition.opacity x-cloak
         class="px-5 py-3 rounded-xl bg-black/90 border border-jade/40 text-sm text-slate-100 shadow-2xl"
         x-text="$store.game.toast"></div>
  </div>

  <!-- ===== Modal Cài Đặt ===== -->
  <template x-if="$store.game.settingsModal">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeSettings()">
      <div class="panel rounded-2xl w-[26rem] max-w-[94vw] overflow-hidden shadow-2xl" @click.stop>
        <div class="px-6 pt-5 pb-4 border-b border-slate-800 flex items-center justify-between">
          <div class="text-lg font-bold flex items-center gap-2" style="font-family:'Lora',serif"><span>⚙️</span> Cài Đặt</div>
          <button @click="$store.game.closeSettings()" class="w-8 h-8 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
        </div>
        <div class="px-6 py-5 space-y-5">
          <!-- Nhân vật -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Nhân Vật</div>
            <div class="flex items-center justify-between text-sm"><span class="text-slate-400">Danh hiệu</span><span class="font-medium" x-text="$store.game.state.player.name"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Giới tính</span><span class="font-medium" x-text="$store.game.genderLabel"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Tổng cấp</span><span class="font-medium text-jade" x-text="$store.game.totalLevel"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Giới hạn nhàn rỗi</span><span class="font-medium" x-text="($store.game.state.settings?.idleCapHours || 8) + ' giờ'"></span></div>
          </div>
          <!-- Lưu trữ -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Lưu Trữ</div>
            <div class="grid grid-cols-2 gap-2">
              <button @click="$store.game.devExport()" class="px-3 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-jade text-sm text-slate-200 transition">⬇ Xuất bản lưu</button>
              <label class="px-3 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-jade text-sm text-slate-200 cursor-pointer text-center transition">⬆ Nhập bản lưu
                <input type="file" accept="application/json" class="hidden" @change="$store.game.devImport($event)">
              </label>
            </div>
            <div class="text-[11px] text-slate-500 mt-1.5">Xuất file .json để sao lưu hoặc chuyển sang máy khác.</div>
          </div>
          <!-- Nguy hiểm -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Khu Vực Nguy Hiểm</div>
            <button @click="$store.game.closeSettings(); $store.game.resetGame()" class="w-full px-3 py-2.5 rounded-lg bg-rose-900/30 border border-rose-700/50 text-rose-300 hover:bg-rose-900/50 text-sm transition">Khôi phục gốc — xoá toàn bộ tiến trình</button>
          </div>
          <div class="text-[10px] text-slate-600 text-center pt-1">Phím <b class="text-slate-500">F9</b>: bảng Dev/Admin (offline).</div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Lightbox: xem ảnh phóng to (bấm icon trong modal) ===== -->
  <template x-if="$store.game.lightbox">
    <div class="fixed inset-0 z-[80] flex flex-col items-center justify-center bg-black/85 backdrop-blur-sm p-6 cursor-zoom-out" @click="$store.game.closeLightbox()">
      <div class="w-[70vmin] h-[70vmin] max-w-[520px] max-h-[520px] flex items-center justify-center" style="font-size:160px" x-html="$store.game.ico($store.game.lightbox.id, $store.game.lightbox.emoji)"></div>
      <div class="mt-4 text-xl font-bold text-slate-100" x-text="$store.game.lightbox.name"></div>
      <div class="mt-1 text-xs text-slate-500">Bấm bất kỳ đâu để đóng</div>
    </div>
  </template>

  <!-- ===== Modal Điểm Danh (30 ngày) ===== -->
  <template x-if="$store.game.dailyModal">
    <div class="fixed inset-0 z-[75] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.dailyModal=false">
      <div class="panel rounded-2xl w-[860px] max-w-full max-h-[90vh] flex flex-col border border-amber-500/30 shadow-2xl" @click.stop>
        <!-- Header -->
        <div class="flex items-center justify-between px-5 pt-4 pb-3 border-b border-slate-800 shrink-0">
          <div class="flex items-center gap-2.5">
            <div class="font-bold text-lg text-amber-300">📅 Điểm Danh</div>
            <span class="px-2 py-0.5 rounded-full bg-ink3 border border-amber-500/20 text-amber-200 text-[11px]">🔥 Chuỗi <b x-text="$store.game.loginStreak"></b> ngày</span>
          </div>
          <button @click="$store.game.dailyModal=false" class="text-slate-500 hover:text-rose-400 text-lg">✕</button>
        </div>
        <!-- Lưới 30 ngày -->
        <div class="px-5 py-4 overflow-y-auto">
          <div class="grid grid-cols-7 gap-2.5">
            <template x-for="(r, i) in $store.game.LOGIN_REWARDS" :key="r.day">
              <div class="relative rounded-xl border flex flex-col items-center text-center h-[150px] p-3 transition"
                   :class="(i === $store.game.loginNextIndex && $store.game.canClaimDaily)
                     ? 'border-jade bg-jade/10 ring-2 ring-jade/50 animate-pulse'
                     : (r.milestone ? 'border-amber-400/60 bg-amber-500/10' : 'border-slate-800 bg-ink3/40')">
                <div class="flex-1 flex flex-col items-center justify-center font-bold leading-none">
                  <template x-if="!r.milestone">
                    <div class="flex flex-col items-center gap-1">
                      <span class="w-14 h-14 inline-flex items-center justify-center" x-html="$store.game.ico(r.bac ? 'bac' : 'honThach', r.bac ? '🟡' : '🔴')"></span>
                      <span class="text-xl" :class="r.bac ? 'text-gold' : 'text-rose-200'" x-text="r.bac ? $store.game.fmt(r.bac) : r.honThach"></span>
                    </div>
                  </template>
                  <template x-if="r.milestone">
                    <div class="flex flex-col items-center gap-1.5">
                      <div class="flex items-center gap-1.5"><span class="w-9 h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('honThach','🔴')"></span><span class="text-base text-rose-200" x-text="r.honThach"></span></div>
                      <div class="flex items-center gap-1.5"><span class="w-9 h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('nguyenBao','🔷')"></span><span class="text-base text-cyan" x-text="r.nguyenBao"></span></div>
                    </div>
                  </template>
                </div>
                <div class="text-xs text-slate-500 leading-none mt-1">Ngày <span x-text="r.day"></span></div>
                <template x-if="i < $store.game.loginNextIndex || (i === $store.game.loginNextIndex && !$store.game.canClaimDaily)">
                  <div class="absolute inset-0 rounded-xl bg-black/70 flex items-center justify-center text-emerald-400 text-4xl font-bold">✓</div>
                </template>
              </div>
            </template>
          </div>
        </div>
        <!-- Nút nhận -->
        <div class="px-5 pb-4 pt-3 border-t border-slate-800 shrink-0">
          <button @click="$store.game.claimDaily()" :disabled="!$store.game.canClaimDaily"
            class="w-full py-3.5 rounded-xl font-bold text-base transition"
            :class="$store.game.canClaimDaily ? 'bg-jade text-ink hover:bg-jade/90' : 'bg-slate-800 text-slate-600 cursor-not-allowed'"
            x-text="$store.game.canClaimDaily ? 'Điểm Danh Nhận Thưởng' : 'Đã điểm danh hôm nay'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== BẢNG DEV / ADMIN (offline) — mở bằng F9 ===== -->
  <template x-if="$store.game.devPanel">
    <div class="fixed inset-0 z-[90] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.devPanel=false">
      <div class="panel rounded-xl w-[460px] max-w-full max-h-[88vh] overflow-y-auto p-5 border border-amber-500/40 shadow-2xl" @click.stop>
        <div class="flex justify-between items-center mb-3">
          <div class="font-bold text-amber-300">🛠️ Bảng Dev / Admin <span class="text-[10px] text-slate-500 font-normal">(F9 để bật/tắt)</span></div>
          <button @click="$store.game.devPanel=false" class="text-slate-500 hover:text-rose-400">✕</button>
        </div>

        <!-- Tổng quan -->
        <div class="grid grid-cols-2 gap-1 text-xs text-slate-400 mb-4 bg-ink3/60 rounded-lg p-2.5">
          <div>Tên: <b class="text-slate-200" x-text="$store.game.state.player.name || '—'"></b></div>
          <div>Thân phận: <b class="text-slate-200" x-text="$store.game.className"></b></div>
          <div>Chiến Lv: <b class="text-jade" x-text="$store.game.combatLevel"></b></div>
          <div>Tổng Lv: <b class="text-jade" x-text="$store.game.totalLevel"></b></div>
        </div>

        <!-- Tiền tệ -->
        <div class="lbl mb-1.5">Tiền tệ</div>
        <div class="space-y-1.5 mb-4 text-sm">
          <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Bạc</span><span class="flex-1 text-gold" x-text="$store.game.fmt($store.game.state.currencies.bac)"></span>
            <button @click="$store.game.devAddCurrency('bac',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button>
            <button @click="$store.game.devAddCurrency('bac',100000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100k</button></div>
          <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Hồn Thạch</span><span class="flex-1" x-text="$store.game.fmt($store.game.state.currencies.honThach)"></span>
            <button @click="$store.game.devAddCurrency('honThach',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button>
            <button @click="$store.game.devAddCurrency('honThach',100000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100k</button></div>
          <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Nguyên Bảo</span><span class="flex-1" x-text="$store.game.fmt($store.game.state.currencies.nguyenBao)"></span>
            <button @click="$store.game.devAddCurrency('nguyenBao',100)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100</button>
            <button @click="$store.game.devAddCurrency('nguyenBao',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button></div>
        </div>

        <!-- Cấp độ -->
        <div class="lbl mb-1.5">Cấp độ</div>
        <div class="flex items-center gap-2 mb-2 text-sm">
          <span class="text-slate-300">Đặt MỌI kỹ năng + Tứ Trụ + Chiến Đấu về Lv</span>
          <input type="number" min="1" max="100" x-model.number="$store.game.devLvInput" class="w-16 px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100">
          <button @click="$store.game.devSetAllLevel($store.game.devLvInput)" class="px-3 py-1 rounded bg-jade/80 hover:bg-jade text-ink text-xs font-medium">Áp</button>
        </div>
        <div class="grid grid-cols-2 gap-1 mb-4 text-[11px]">
          <template x-for="sid in Object.keys($store.game.SKILLS)" :key="sid">
            <div class="flex items-center justify-between bg-ink3 rounded px-2 py-1">
              <span class="truncate" x-text="$store.game.SKILLS[sid].name + ' · Lv' + $store.game.skillLevel(sid)"></span>
              <button @click="$store.game.devAddSkillXp(sid,1000)" class="text-jade shrink-0 ml-1">+1k</button>
            </div>
          </template>
          <div class="flex items-center justify-between bg-ink3 rounded px-2 py-1">
            <span class="truncate" x-text="'Chiến Đấu · Lv' + $store.game.combatLevel"></span>
            <button @click="$store.game.devAddSkillXp('chienDau',1000)" class="text-jade shrink-0 ml-1">+1k</button>
          </div>
        </div>

        <!-- Vật phẩm -->
        <div class="lbl mb-1.5">Vật phẩm</div>
        <div class="flex items-center gap-2 mb-4">
          <select x-model="$store.game.devItemSel" class="flex-1 min-w-0 px-2 py-1 rounded bg-ink3 border border-slate-700 text-sm text-slate-100">
            <option :value="null">— chọn vật phẩm —</option>
            <template x-for="id in Object.keys($store.game.ITEMS)" :key="id">
              <option :value="id" x-text="$store.game.ITEMS[id].name"></option>
            </template>
          </select>
          <button @click="$store.game.devAddItem($store.game.devItemSel,10)" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-xs shrink-0">+10</button>
          <button @click="$store.game.devAddItem($store.game.devItemSel,99)" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-xs shrink-0">+99</button>
        </div>
        <div class="flex flex-wrap items-center gap-2 mb-4">
          <button @click="$store.game.devGiveAll()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">📦 Nhận TOÀN BỘ vật phẩm (test)</button>
          <button @click="$store.game.devGiveAllEggs()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🥚 Nhận toàn bộ Trứng + Tinh Thể (xem art)</button>
          <button @click="$store.game.devGiveSampleGear()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">🎁 Tặng toàn bộ trang bị (test)</button>
          <button @click="$store.game.devGiveStones()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">💠 Tặng đá cường hóa + 100k Hồn Thạch</button>
        </div>

        <!-- Quản lý Save -->
        <div class="lbl mb-1.5">Quản lý Save</div>
        <div class="flex flex-wrap gap-2">
          <button @click="$store.game.devExport()" class="px-3 py-1.5 rounded bg-ink3 border border-slate-700 hover:border-jade text-sm">⬇ Xuất save</button>
          <label class="px-3 py-1.5 rounded bg-ink3 border border-slate-700 hover:border-jade text-sm cursor-pointer">⬆ Nhập save
            <input type="file" accept="application/json" class="hidden" @change="$store.game.devImport($event)">
          </label>
          <button @click="$store.game.devPanel=false; $store.game.resetGame()" class="px-3 py-1.5 rounded bg-rose-900/40 border border-rose-700/50 text-rose-300 text-sm">Reset toàn bộ</button>
        </div>
        <div class="text-[10px] text-slate-600 mt-3">⚠️ Công cụ dev — chỉ để test/cân bằng bản offline. Lên online sẽ có hệ quản lý người chơi riêng (server).</div>
      </div>
    </div>
  </template>

</body>
</html>
