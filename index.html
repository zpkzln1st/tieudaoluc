                      </div>
                    </template>
                    <template x-if="!$store.game.luongThucItem">
                      <div class="flex flex-col items-center"><span class="text-2xl leading-none">+</span><span class="text-[11px] mt-1">Món Ăn</span></div>
                    </template>
                  </button>
                  <!-- Ô Đan -->
                  <button @click="$store.game.openDanPicker()" class="rounded-lg border p-2 text-center transition min-h-[96px] flex flex-col items-center justify-center"
                    :class="$store.game.danItem ? $store.game.QUALITY[$store.game.danItem.quality].border+' hover:border-jade' : 'border-dashed border-slate-700 text-slate-500 hover:border-jade hover:text-jade'">
                    <template x-if="$store.game.danItem">
                      <div>
                        <div class="w-12 h-12 mx-auto rounded-md flex items-center justify-center" :class="$store.game.QUALITY[$store.game.danItem.quality].bg" x-html="$store.game.ico($store.game.danItem.id, $store.game.danItem.icon)"></div>
                        <div class="text-[11px] mt-1 leading-tight" :class="$store.game.QUALITY[$store.game.danItem.quality].text" x-text="$store.game.danItem.name"></div>
                        <div class="text-[10px] text-slate-400" x-text="$store.game.danEffText($store.game.danItem)+' · ×'+$store.game.danCount"></div>
                      </div>
                    </template>
                    <template x-if="!$store.game.danItem">
                      <div class="flex flex-col items-center"><span class="text-xl leading-none fserif">丹</span><span class="text-[11px] mt-1">Đan</span></div>
                    </template>
                  </button>
                </div>
                <div class="text-[10px] text-slate-500 mt-2 text-center leading-snug">Tự dùng khi Sinh Lực / Nội Lực dưới <b class="text-amber-300">25%</b>.</div>
              </section>

              <!-- Túi -->
              <section class="panel rounded-lg p-3">
                <div class="text-jade font-bold text-sm mb-2 flex items-center gap-1.5"><span x-html="$store.game.svg('bag','w-4 h-4')"></span>Túi Chiến Lợi Phẩm</div>
                <div class="text-xs space-y-1">
                  <div class="flex justify-between"><span class="text-slate-400">Bạc</span><b class="text-gold" x-text="$store.game.fmt($store.game.combatPending.bac)"></b></div>
                  <template x-for="(n,it) in $store.game.combatPending.items" :key="it"><div class="flex justify-between"><span class="text-slate-400" x-text="$store.game.ITEMS[it]?$store.game.ITEMS[it].name:it"></span><b x-text="'×'+n"></b></div></template>
                  <template x-if="$store.game.combatPendingEmpty"><div class="text-slate-600 text-[11px]">— trống —</div></template>
                </div>
                <button @click="$store.game.collectLoot()" :disabled="$store.game.combatPendingEmpty" class="w-full mt-2 px-3 py-1.5 rounded-lg text-sm bg-jade/80 hover:bg-jade text-ink font-medium disabled:opacity-40 inline-flex items-center justify-center gap-1.5"><span x-html="$store.game.svg('collect','w-4 h-4')"></span>Thu Hoạch</button>
                <div class="text-[10px] text-slate-600 mt-1.5">Gục → mất 40% túi. Dừng/đổi → tự nhập kho.</div>
              </section>

              <!-- Tiến Độ -->
              <section class="panel rounded-lg p-3">
                <div class="lbl mb-2 text-center">Tiến Độ Chiến Đấu</div>
                <div class="flex items-center gap-2 mb-2"><span class="text-jade shrink-0" x-html="$store.game.svg('sword','w-5 h-5')"></span><span class="flex-1 text-sm font-medium">Chiến Đấu</span><span class="text-xs text-jade" x-text="'Lv '+$store.game.combatLevel"></span></div>
                <div class="h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-jade" :style="`width:${$store.game.combatProg.frac*100}%`"></div></div>
                <div class="text-[11px] text-slate-500 mt-1" x-text="$store.game.fmt($store.game.combatProg.need - $store.game.combatProg.into) + ' EXP · ' + Math.round($store.game.combatProg.frac*100) + '%'"></div>
                <div class="mt-2 space-y-1 text-xs pt-1 border-t border-slate-800">
                  <div class="flex justify-between"><span class="text-slate-400 flex items-center gap-1.5"><span x-html="$store.game.svg('sword','w-3.5 h-3.5')"></span>Đã Trảm</span><span x-text="$store.game.fmt($store.game.combatGathered)"></span></div>
                  <div class="flex justify-between"><span class="text-slate-400 flex items-center gap-1.5"><span x-html="$store.game.svg('clock','w-3.5 h-3.5')"></span>Thời Gian</span><span x-text="$store.game.combatTimeLabel"></span></div>
                </div>
              </section>
            </div>
          </div>

          <!-- POPUP: Chọn Lương Thực (lắp vào Ô Lương Thực) -->
          <template x-if="$store.game.foodPicker">
            <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeFoodPicker()">
              <div class="panel rounded-xl w-[24rem] max-w-[94vw] max-h-[80vh] flex flex-col overflow-hidden shadow-2xl" @click.stop>
                <div class="px-5 pt-4 pb-3 border-b border-slate-800 flex items-center justify-between">
                  <div class="text-jade font-bold flex items-center gap-2"><span x-html="$store.game.svg('heart','w-5 h-5')"></span>Chọn Món Ăn</div>
                  <button @click="$store.game.closeFoodPicker()" class="w-7 h-7 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
                </div>
                <div class="p-3 overflow-y-auto space-y-2">
                  <template x-if="$store.game.combatFoodList.length===0">
                    <div class="text-sm text-slate-500 text-center py-6 leading-relaxed">Túi chưa có món ăn. Nấu ở <b class="text-slate-300">Phanh Nhâm</b> hoặc mua ở <b class="text-slate-300">Phường Thị</b>.</div>
                  </template>
                  <template x-for="f in $store.game.combatFoodList" :key="f.id">
                    <button @click="$store.game.equipFood(f.id)" class="w-full flex items-center gap-3 p-2 rounded-lg border bg-ink3/50 hover:border-jade transition text-left"
                      :class="$store.game.state.combat.luongThuc===f.id ? 'border-jade ring-1 ring-jade/40' : 'border-slate-800'">
                      <div class="w-12 h-12 rounded-md flex items-center justify-center shrink-0" :class="$store.game.QUALITY[f.quality].bg" x-html="$store.game.ico(f.id, f.icon)"></div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium" :class="$store.game.QUALITY[f.quality].text" x-text="f.name"></div>
                        <div class="text-[11px] text-slate-400">Hồi <b class="text-rose-300" x-text="'+'+f.heal"></b> Sinh Lực · còn <b x-text="'×'+f.count"></b></div>
                      </div>
                    </button>
                  </template>
                  <template x-if="$store.game.luongThucItem">
                    <button @click="$store.game.equipFood(null)" class="w-full text-xs text-slate-500 hover:text-rose-300 py-2 transition">Gỡ món đang lắp</button>
                  </template>
                </div>
              </div>
            </div>
          </template>

          <!-- POPUP: Chọn Đan (lắp vào Ô Đan) -->
          <template x-if="$store.game.danPicker">
            <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeDanPicker()">
              <div class="panel rounded-xl w-[24rem] max-w-[94vw] max-h-[80vh] flex flex-col overflow-hidden shadow-2xl" @click.stop>
                <div class="px-5 pt-4 pb-3 border-b border-slate-800 flex items-center justify-between">
                  <div class="text-jade font-bold flex items-center gap-2"><span class="fserif text-lg leading-none">丹</span>Chọn Đan</div>
                  <button @click="$store.game.closeDanPicker()" class="w-7 h-7 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
                </div>
                <div class="p-3 overflow-y-auto space-y-2">
                  <template x-if="$store.game.combatDanList.length===0">
                    <div class="text-sm text-slate-500 text-center py-6 leading-relaxed">Túi chưa có đan. Luyện ở <b class="text-slate-300">Luyện Đan</b> hoặc mua ở <b class="text-slate-300">Phường Thị</b>.</div>
                  </template>
                  <template x-for="d in $store.game.combatDanList" :key="d.id">
                    <button @click="$store.game.equipDan(d.id)" class="w-full flex items-center gap-3 p-2 rounded-lg border bg-ink3/50 hover:border-jade transition text-left"
                      :class="$store.game.state.combat.dan===d.id ? 'border-jade ring-1 ring-jade/40' : 'border-slate-800'">
                      <div class="w-12 h-12 rounded-md flex items-center justify-center shrink-0" :class="$store.game.QUALITY[d.quality].bg" x-html="$store.game.ico(d.id, d.icon)"></div>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium" :class="$store.game.QUALITY[d.quality].text" x-text="d.name"></div>
                        <div class="text-[11px] text-slate-400"><span x-text="$store.game.danEffText(d)"></span> · còn <b x-text="'×'+d.count"></b></div>
                      </div>
                    </button>
                  </template>
                  <template x-if="$store.game.danItem">
                    <button @click="$store.game.equipDan(null)" class="w-full text-xs text-slate-500 hover:text-rose-300 py-2 transition">Gỡ đan đang lắp</button>
                  </template>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- ===== VIEW: MERCHANT (Phường Thị — Mua/Bán) ===== -->
      <template x-if="$store.game.view==='merchant'">
        <div class="space-y-3">

          <!-- Header (kiểu Yêu Vương) -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <!-- Banner art nền (gen tay → images/ui/shop_banner.webp|png); thiếu file -> ẩn, dùng gradient fallback -->
            <img src="images/ui/shop_banner.webp" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/shop_banner.png'}else{this.style.display='none'}">
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 36%,rgba(11,14,22,.5) 66%,rgba(11,14,22,.2) 100%)"></div>
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(251,191,36,.16), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6 flex items-center gap-4">
              <div class="w-16 h-16 rounded-lg bg-ink3 border border-amber-500/30 flex items-center justify-center text-4xl shrink-0 overflow-hidden" x-html="$store.game.ico($store.game.MERCHANT.id, $store.game.MERCHANT.icon)"></div>
              <div class="flex-1 min-w-0">
                <div class="text-[26px] gold-text leading-none fserif">Thương Điếm</div>
                <div class="text-[12.5px] text-slate-300 leading-snug mt-1.5 max-w-xl italic" x-text="'“'+$store.game.MERCHANT.quote+'”'"></div>
              </div>
            </div>
          </div>

          <!-- Master-detail: rail dọc trái + nội dung phải -->
          <div class="grid lg:grid-cols-[240px_1fr] gap-3 items-start">

            <!-- RAIL (cố định khi cuộn: sticky dính đỉnh #mainPane) -->
            <div class="space-y-2 lg:sticky lg:top-0 lg:self-start lg:z-10">
              <template x-for="t in [{id:'avatar',name:'Ảnh Đại Diện',sub:'Dung mạo nhân vật',seal:'容',col:'#22d3ee',ic:'👤'},{id:'cover',name:'Ảnh Bìa',sub:'Nền trang Hồ Sơ',seal:'幀',col:'#fbbf24',ic:'🖼️'},{id:'item',name:'Vật Phẩm',sub:'Liệu · Thức ăn · Mồi câu',seal:'物',col:'#34d399',ic:'🎣'}]" :key="t.id">
                <button @click="$store.game.setMerchantTab(t.id)" class="w-full text-left rounded-lg p-2.5 flex items-center gap-2.5 border transition" :style="$store.game.merchantTab===t.id ? 'border-color:'+t.col+'aa;background:linear-gradient(135deg,'+t.col+'22,transparent)' : 'border-color:#1e293b;background:#0f1521'">
                  <div class="w-11 h-11 rounded-lg shrink-0 flex items-center justify-center overflow-hidden" :style="'background:radial-gradient(circle,'+t.col+'33,#05070d);border:1px solid '+t.col+'55'" x-data="{ok:true}">
                    <img x-show="ok" :src="`images/ui/shop_${t.id}.webp`" class="w-full h-full object-cover" @error="if($el.src.endsWith('.webp')){$el.src=$el.src.replace('.webp','.png')}else{ok=false}" alt="">
                    <span x-show="!ok" class="text-xl" x-text="t.ic"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="text-[13px] font-semibold truncate" :style="'color:'+($store.game.merchantTab===t.id?t.col:'#cbd5e1')" x-text="t.name"></div>
                    <div class="text-[10.5px] text-slate-500 truncate" x-text="t.sub"></div>
                  </div>
                  <span class="text-lg fserif shrink-0" :style="'color:'+t.col+'66'" x-text="t.seal"></span>
                </button>
              </template>
            </div>

            <!-- DETAIL -->
            <div>
              <!-- ẢNH ĐẠI DIỆN -->
              <template x-if="$store.game.merchantTab==='avatar'">
                <div class="panel rounded-xl p-4">
                  <div class="text-jade font-bold fserif mb-3">Ảnh Đại Diện</div>
                  <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 gap-3">
                    <template x-for="av in $store.game.AVATARS" :key="'shop-av-'+av.id">
                      <button x-data="{ok:false}" x-show="ok" @click="$store.game.buyAvatar(av.id)" :disabled="$store.game.ownsAvatar(av.id)" class="rounded-xl overflow-hidden bg-ink3/60 border border-slate-800 text-left group">
                        <div class="aspect-square overflow-hidden bg-ink3">
                          <img :src="`images/avatars/${av.id}.webp`" class="w-full h-full object-cover object-center" @load="ok=true" x-init="$nextTick(() => { if ($el.complete && $el.naturalWidth > 0) ok = true })">
                        </div>
                        <div class="p-2">
                          <div class="text-[12px] font-medium truncate text-slate-200" x-text="av.name"></div>
                          <template x-if="$store.game.ownsAvatar(av.id)">
                            <div class="mt-1.5 text-center py-1 text-[11px] rounded bg-slate-800 text-jade font-medium">Đã sở hữu</div>
                          </template>
                          <template x-if="!$store.game.ownsAvatar(av.id)">
                            <div class="flex items-center justify-between mt-1.5">
                              <span class="text-[11px] text-rose-300 font-semibold flex items-center gap-1"><span class="w-3.5 h-3.5 inline-flex shrink-0" x-html="$store.game.ico('honThach','🔴')"></span><span x-text="$store.game.fmt($store.game.AVATAR_PRICE)"></span></span>
                              <span class="px-2.5 py-1 text-[11px] rounded font-semibold transition" :class="($store.game.state.currencies.honThach||0)>=$store.game.AVATAR_PRICE ? 'bg-jade/85 group-hover:bg-jade text-ink' : 'bg-slate-800 text-slate-600'">Mua</span>
                            </div>
                          </template>
                        </div>
                      </button>
                    </template>
                  </div>
                </div>
              </template>

              <!-- ẢNH BÌA -->
              <template x-if="$store.game.merchantTab==='cover'">
                <div class="panel rounded-xl p-4">
                  <div class="text-jade font-bold fserif mb-3">Ảnh Bìa</div>
                  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <template x-for="cv in $store.game.COVERS" :key="'shop-cv-'+cv.id">
                      <button x-data="{ok:false}" x-show="ok" @click="$store.game.buyCover(cv.id)" :disabled="$store.game.ownsCover(cv.id)" class="rounded-xl overflow-hidden bg-ink3/60 border border-slate-800 text-left group">
                        <div class="aspect-[16/9] overflow-hidden bg-black/40 relative">
                          <img :src="`images/avatars/${cv.id}.webp`" class="w-full h-full object-cover" @load="ok=true" x-init="$nextTick(() => { if ($el.complete && $el.naturalWidth > 0) ok = true })">
                          <template x-if="$store.game.ownsCover(cv.id)"><div class="absolute top-1.5 right-1.5 text-[10px] px-1.5 py-0.5 rounded bg-jade/90 text-ink font-bold">✓ Đã có</div></template>
                        </div>
                        <div class="p-2.5 flex items-center justify-between gap-2">
                          <div class="text-[12.5px] font-medium truncate text-slate-200" x-text="cv.name"></div>
                          <template x-if="$store.game.ownsCover(cv.id)"><span class="text-[11px] text-jade font-medium shrink-0">Đã sở hữu</span></template>
                          <template x-if="!$store.game.ownsCover(cv.id)"><span class="px-3 py-1 text-[11px] rounded font-semibold shrink-0 flex items-center gap-1 transition" :class="($store.game.state.currencies.honThach||0)>=$store.game.COVER_PRICE ? 'bg-jade/85 group-hover:bg-jade text-ink' : 'bg-slate-800 text-slate-600'"><span class="w-3.5 h-3.5 inline-flex shrink-0" x-html="$store.game.ico('honThach','🔴')"></span><span x-text="$store.game.fmt($store.game.COVER_PRICE)"></span></span></template>
                        </div>
                      </button>
                    </template>
                  </div>
                </div>
              </template>

              <!-- VẬT PHẨM -->
              <template x-if="$store.game.merchantTab==='item'">
                <div class="panel rounded-xl p-4 space-y-5">
                  <template x-for="grp in [{label:'Nguyên Liệu Cơ Bản · Bậc 1',ids:$store.game.SHOP_MAT,bait:false},{label:'Thức Ăn · Bậc 1',ids:$store.game.SHOP_FOOD,bait:false},{label:'Mồi Câu · 7 Bậc',ids:$store.game.SHOP_BAIT,bait:true}]" :key="grp.label">
                    <div>
                      <div class="lbl mb-2 text-slate-400" x-text="grp.label"></div>
                      <div class="space-y-2">
                        <template x-for="id in grp.ids" :key="'shop-it-'+id">
                          <div class="flex items-center gap-3 p-2.5 rounded bg-ink3/50 border border-slate-800" x-data="{ get it(){ return $store.game.ITEMS[id] } }">
                            <div class="w-11 h-11 rounded bg-ink flex items-center justify-center text-xl shrink-0 overflow-hidden" x-html="$store.game.ico(id, it.icon)"></div>
                            <div class="flex-1 min-w-0">
                              <div class="flex items-center gap-2">
                                <span class="text-[13px] font-medium" :class="$store.game.QUALITY[it.quality].text" x-text="it.name"></span>
                                <template x-if="grp.bait"><span class="text-[10px] px-1.5 py-0.5 rounded shrink-0 border bg-ink/40" :class="$store.game.QUALITY[it.quality].text+' '+$store.game.QUALITY[it.quality].border" x-text="$store.game.QUALITY[it.quality].name"></span></template>
                              </div>
                              <template x-if="it.heal"><div class="text-[10px] text-emerald-400 mt-0.5" x-text="'+'+$store.game.fmt(it.heal)+' Sinh Lực'"></div></template>
                              <template x-if="grp.bait"><div class="text-[10.5px] text-slate-500 leading-snug mt-0.5" x-text="it.desc"></div></template>
                            </div>
                            <div class="shrink-0 flex items-center gap-3">
                              <div class="text-[13.5px] text-gold font-semibold flex items-center gap-1.5"><span class="w-5 h-5 inline-flex shrink-0" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt($store.game.vatPhamPrice(id))"></span></div>
                              <button @click="$store.game.buyVatPham(id)" :disabled="($store.game.state.currencies.bac||0) < $store.game.vatPhamPrice(id)" class="px-4 py-1.5 text-[12px] rounded font-semibold transition" :class="($store.game.state.currencies.bac||0) >= $store.game.vatPhamPrice(id) ? 'bg-jade/85 hover:bg-jade text-ink' : 'bg-slate-800 text-slate-600 cursor-not-allowed'">Mua</button>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: LINH THÚ (pet — P1 nở + P2 mang cộng stat) ===== -->
      <template x-if="$store.game.view==='pets'">
        <div class="space-y-3">
          <!-- Header -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <img src="images/ui/pets_banner.webp" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:right 22%" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/pets_banner.png'}else{this.style.display='none'}">
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 36%,rgba(11,14,22,.5) 66%,rgba(11,14,22,.2) 100%)"></div>
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(52,211,153,.15), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6">
              <div class="flex items-center gap-2.5">
                <span class="w-8 h-8 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('pets','🐾')"></span>
                <div class="text-[28px] gold-text leading-none fserif">Linh Thú</div>
              </div>
              <div class="text-[13px] text-slate-300/90 leading-snug mt-2 max-w-xl fserif">Thu phục yêu thú sơn dã, ấp noãn dưỡng thành — một con linh thú kề vai, đường giang hồ bớt phần đơn độc.</div>

          </div>

          <template x-if="!$store.game.activePetObj">
            <div class="panel rounded-2xl px-6 py-8 text-center">
              <div class="lbl text-slate-500 mb-1">Linh Thú Kề Bên</div>
              <div class="text-[14px] fserif text-slate-300">Chưa có linh thú kề bên.</div>

            </div>
          </template>
          <template x-if="$store.game.activePetObj">
            <div x-data="{ get p(){ return $store.game.activePetObj }, get q(){ return $store.game.petQ($store.game.activePetObj) }, get qh(){ return $store.game.petQHex($store.game.activePetObj) }, get el(){ return $store.game.petElColor($store.game.activePetObj) } }"
                 class="relative panel rounded-2xl overflow-hidden" :style="'border-color:'+qh+'55;background:linear-gradient(150deg,'+qh+'12,#0f1521 62%)'">
              <div class="absolute inset-0 pointer-events-none" :style="'box-shadow:inset 0 0 60px '+qh+'22'"></div>
              <div class="relative grid md:grid-cols-[260px_1fr] gap-4 p-4">
