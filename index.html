                          <template x-for="n in (scMaxOf(h.id)+1)" :key="n">
                            <button @click.stop="setSc(h.id, n-1)" class="w-6 h-6 rounded-md text-[11px] font-bold border transition" :class="scSel[h.id]===(n-1) ? 'border-rose-400 text-rose-200 bg-rose-500/15' : 'border-slate-700 text-slate-500 hover:border-slate-500'" x-text="n-1"></button>
                          </template>
                        </div>
                        <div class="text-[9.5px] text-rose-300/70 mt-1 leading-snug" x-show="scSel[h.id]>0" x-text="scModsList(scSel[h.id]).join(' · ')"></div>
                        <div class="text-[9.5px] text-slate-600 mt-1" x-show="scMaxOf(h.id)===0">Đăng Tiên (thắng) để mở bậc khó hơn.</div>
                      </div>
                      <button @click.stop="startRun(h)" class="mt-1 text-center text-[13px] py-2 rounded-xl bg-gradient-to-r from-jade to-cyan text-ink font-bold hover:brightness-110 transition">Nhập Mộng ⟶</button>
                    </div>
                  </div>
                </template>
              </div>
              <div class="text-center mt-4"><button @click="phase='lobby'" class="text-[12px] text-slate-500 hover:text-slate-300">‹ Về sảnh</button></div>
            </div>
          </template>

          <!-- BẢN ĐỒ MỘNG -->
          <template x-if="phase==='map'">
            <div>
              <div class="panel rounded-xl p-2.5 mb-3 flex items-center gap-3 flex-wrap">
                <span class="dtm-portwrap w-11 h-14 rounded-md flex items-center justify-center fserif text-2xl shrink-0" :style="'color:'+heColor(run.hero.he)+';border:1px solid '+heColor(run.hero.he)+'55'"><span x-text="run.hero.han"></span><img :src="heroImg(run.hero.id)" class="dtm-port" alt="" onerror="this.style.display='none'"></span>
                <div class="min-w-[150px] flex-1">
                  <div class="flex items-center justify-between text-[11px]"><span class="fserif" :style="'color:'+heColor(run.hero.he)" x-text="run.hero.name"></span><span class="text-slate-400" x-text="run.hp+' / '+run.maxHp+' HP'"></span></div>
                  <div class="h-3 rounded-full bg-ink3 overflow-hidden border border-slate-700/60 mt-0.5"><div class="bar bg-gradient-to-r from-jade to-emerald-400" :style="'width:'+(100*run.hp/run.maxHp)+'%'"></div></div>
                </div>
                <div class="flex gap-1.5 items-center">
                  <template x-for="r in run.relics" :key="r.id"><span class="relic dtm-portwrap" :title="r.name+' — '+r.desc"><span x-text="r.han"></span><img :src="relicImg(r.id)" class="dtm-port" alt="" onerror="this.style.display='none'"></span></template>
                  <template x-if="!run.relics.length"><span class="text-[10px] text-slate-600 italic">chưa có di vật</span></template>
                </div>
                <button @click="openDeck=true" class="text-[11px] px-2.5 py-1 rounded bg-ink3 border border-slate-600 text-slate-300 hover:border-cyan" x-text="'Bộ Bài ('+run.deck.length+')'"></button>
              </div>
              <div class="text-center text-[12px] text-slate-500 mb-2">Tầng <b class="text-gold" x-text="mapTier+1"></b>/<span x-text="map.length"></span> — leo dần tới Mộng Chủ</div>
              <div class="panel rounded-2xl p-4 pt-3">
                <div class="dtm-ladder">
                  <!-- Mộng Chủ áp đỉnh (tầng cao nhất = mapView[0]) -->
                  <template x-if="mapView.length">
                    <div class="dtm-bossban" :class="mapView[0].state"
                         @click="mapView[0].state==='pick' && pickNode(mapView[0].nodes[0])">
                      <img :src="bossBannerImg()" alt="" onerror="this.style.display='none'">
                      <div class="scrim"></div>
                      <div class="ctr"><div class="big fserif">魔 Mộng Chủ</div><div class="sub" x-text="mapView[0].state==='pick'?('BẤM QUYẾT CHIẾN · TẦNG '+map.length):('CHỦ TỂ MỘNG CẢNH · TẦNG '+map.length)"></div></div>
                    </div>
                  </template>
                  <!-- các tầng dưới (cao -> thấp), connector nối tuyến -->
                  <template x-for="(row,ri) in mapView.slice(1)" :key="ri">
                    <div class="w-full flex flex-col items-center">
                      <div class="dtm-conn" :class="row.state!=='locked'?'lit':''"></div>
                      <div class="dtm-trow">
                        <span class="dtm-tband" x-text="'Tầng '+(map.length-1-ri)"></span>
                        <template x-for="(nd,ci) in row.nodes" :key="ci">
                          <div class="nodeT" :class="row.state" :style="'--nc:'+nodeColor(nd.type)">
                            <div class="glyph" :style="nodeGlyphStyle(nd,row.state)" @click="row.state==='pick' && pickNode(nd)" x-text="nodeHan(nd.type)"></div>
                            <span class="nlbl" :style="'color:'+(row.state==='pick'?nodeColor(nd.type):'#64748b')" x-text="nodeLabel(nd.type)"></span>
                          </div>
                        </template>
                        <span x-show="row.state==='pick'" class="dtm-cur">◂ đang ở đây</span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
              <div class="text-center mt-3"><button @click="quitRun()" class="text-[11px] text-slate-600 hover:text-rose-400">Tỉnh giấc (bỏ mộng — không phạt thân thật)</button></div>
            </div>
          </template>

          <!-- ĐẤU -->
          <template x-if="phase==='battle'">
            <div>
              <div class="flex gap-2.5 justify-center mb-2.5 flex-wrap items-stretch">
                <template x-for="(e,ei) in enemies" :key="ei">
                  <div class="panel rounded-2xl p-3 relative transition" :class="(e.hit?'shake ':'')+(e.hp<=0?'opacity-40 ':'cursor-pointer ')"
                       :style="'flex:1 1 0;min-width:152px;max-width:330px;'+(ei===tgtIdx()&&e.hp>0?'border-color:#f5b942;box-shadow:0 0 18px -5px #f5b942':'border-color:'+heColor(e.he)+'44')"
                       @click="e.hp>0&&(targetIdx=ei)">
                    <div x-show="ei===tgtIdx()&&e.hp>0" class="absolute -top-2 left-1/2 -translate-x-1/2 text-[9px] fserif text-gold px-1.5 rounded bg-ink2 border border-gold/40 whitespace-nowrap">⌖ Mục tiêu</div>
                    <div class="flex items-center gap-2.5">
                      <div class="dtm-portwrap w-24 h-28 rounded-lg shrink-0 flex items-center justify-center fserif text-5xl" :style="'color:'+heColor(e.he)+';background:radial-gradient(ellipse at 50% 35%,'+heColor(e.he)+'33,transparent 72%);border:1px solid '+heColor(e.he)+'55'">
                        <span x-text="e.han"></span>
                        <img :src="enemyImg(e)" class="dtm-port" alt="" onerror="this.style.display='none'">
                        <template x-if="e.burst"><img :src="vfxImg(e.burst)" class="dtm-burst" alt=""></template>
                        <template x-if="e.atkfx"><img :src="atkFxImg(e.atkfx)" class="dtm-slashfx" alt=""></template>
                        <template x-for="f in e.floats" :key="f.id"><span class="dmgfloat text-rose-300 text-lg" style="top:24%;left:28%" x-text="f.v"></span></template>
                      </div>
                      <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-1 flex-wrap">
                          <div class="fserif text-[13px] leading-tight" :style="'color:'+heColor(e.he)" x-text="e.name"></div>
                          <span x-show="e.elite" class="pill text-amber-300 border-amber-500/50 bg-amber-500/10">Tinh Anh</span>
                        </div>
                        <div class="mt-1 h-4 rounded-full bg-ink3 overflow-hidden relative border border-slate-700/60">
                          <div class="bar bg-gradient-to-r from-rose-700 to-rose-500" :style="'width:'+(100*Math.max(0,e.hp)/e.maxHp)+'%'"></div>
                          <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white" x-text="Math.max(0,e.hp)+'/'+e.maxHp"></div>
                        </div>
                        <div class="flex items-center gap-1 mt-1 flex-wrap">
                          <span class="pill fserif" :style="intentStyle(e)" x-text="e.hp>0?intentText(e):'Đã bại'"></span>
                          <span x-show="peekOn()&&e.hp>0" class="pill" style="font-size:9px;color:#94a3b8;border-color:#33415588;background:#33415522" x-text="'Kế: '+peekText(e)"></span>
                          <span x-show="e.block>0" class="pill text-sky-300 border-sky-600/40 bg-sky-900/40"><img :src="statusIcon('hothe')" class="dtm-sti" alt="" onerror="this.style.display='none'"><span x-text="'Hộ '+e.block"></span></span>
                          <span x-show="e.poison>0" class="pill text-emerald-300 border-emerald-600/40 bg-emerald-900/40"><img :src="statusIcon('doc')" class="dtm-sti" alt="" onerror="this.style.display='none'"><span x-text="'Độc '+e.poison"></span></span>
                          <span x-show="e.weak>0" class="pill text-violet-300 border-violet-600/40 bg-violet-900/30"><img :src="statusIcon('suyyeu')" class="dtm-sti" alt="" onerror="this.style.display='none'"><span x-text="'Suy Yếu '+e.weak"></span></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>

              <div class="panel rounded-2xl p-3 mb-2 border border-jade/30" :class="playerHit?'shake':''">
                <div class="flex items-center gap-3">
                  <span class="dtm-portwrap w-20 h-24 rounded-md flex items-center justify-center fserif text-4xl shrink-0" :style="'color:'+heColor(run.hero.he)+';border:1px solid '+heColor(run.hero.he)+'55'">
                    <span x-text="run.hero.han"></span>
                    <img :src="heroImg(run.hero.id)" class="dtm-port" alt="" onerror="this.style.display='none'">
                    <template x-for="f in playerFloats" :key="f.id"><span class="dmgfloat text-rose-400 text-xl" style="top:20%;left:18%" x-text="f.v"></span></template>
                  </span>
                  <div class="flex-1">
                    <div class="flex items-center justify-between text-[11px] mb-1">
                      <span class="text-slate-300 fserif" x-text="run.hero.name"></span>
                      <span class="text-slate-400" x-text="run.hp+' / '+run.maxHp+' HP'"></span>
                    </div>
                    <div class="h-4 rounded-full bg-ink3 overflow-hidden relative border border-slate-700/60">
                      <div class="bar bg-gradient-to-r from-jade to-emerald-400" :style="'width:'+(100*Math.max(0,run.hp)/run.maxHp)+'%'"></div>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1.5 flex-wrap min-h-[18px]">
                      <span x-show="player.block>0" class="pill text-sky-200 border-sky-500/50 bg-sky-900/40"><img :src="statusIcon('hothe')" class="dtm-sti" alt="" onerror="this.style.display='none'"><span x-text="'Hộ Thể '+player.block"></span></span>
                      <span x-show="player.str>0" class="pill text-amber-300 border-amber-500/50 bg-amber-500/10"><img :src="statusIcon('luc')" class="dtm-sti" alt="" onerror="this.style.display='none'"><span x-text="'Lực +'+player.str"></span></span>
                      <span x-show="player.dodge" class="pill text-cyan border-cyan/40 bg-cyan/10"><img :src="statusIcon('ne')" class="dtm-sti" alt="" onerror="this.style.display='none'">Né đòn kế</span>
                      <span x-show="player.block<=0&&player.str<=0&&!player.dodge" class="text-[10px] text-slate-600 italic">— chưa có trạng thái —</span>
                    </div>
                  </div>
                  <div class="flex flex-col items-center shrink-0">
                    <div class="flex gap-1"><template x-for="i in maxKhi" :key="i"><span class="khi-pip" :class="i<=khi?'on':''"></span></template></div>
                    <div class="text-[10px] text-cyan mt-1" x-text="'Khí '+khi+'/'+maxKhi"></div>
                  </div>
                  <button @click="endTurn()" class="px-4 py-2 rounded-lg bg-ink3 border border-slate-600 hover:border-gold text-slate-200 text-[12.5px] font-bold transition shrink-0">Kết Lượt ⟳</button>
                </div>
                <div class="flex gap-1 mt-2" x-show="run.relics.length">
                  <template x-for="r in run.relics" :key="r.id"><span class="relic dtm-portwrap" style="width:26px;height:26px;font-size:13px" :title="r.name+' — '+r.desc"><span x-text="r.han"></span><img :src="relicImg(r.id)" class="dtm-port" alt="" onerror="this.style.display='none'"></span></template>
                </div>
              </div>

              <div class="flex gap-2 justify-center flex-wrap min-h-[256px] items-end pt-6 pb-1 transform-gpu">
                <template x-for="(c,i) in hand" :key="c.uid">
                  <div class="card" :class="khi>=c.cost?'playable':'unplayable'" :style="'--c:'+heColor(c.he)+';--r:'+rarColor(c.rar)" @click="playCard(i)">
                    <div class="cost" x-text="c.cost"></div><div class="rar" :title="rarName(c.rar)"></div>
                    <div class="card-art"><span class="card-han" x-text="c.han"></span><img :src="cardImg(c.id)" class="dtm-art" alt="" onerror="this.style.display='none'"><template x-if="c.rar==='tuyet'"><img class="dtm-tuyetglow" src="images/dtm/vfx/card_glow_tuyet.webp" alt="" onerror="this.remove()"></template><template x-if="sigilImg(c.he)"><img :src="sigilImg(c.he)" class="dtm-sigil" alt="" onerror="this.style.display='none'"></template></div>
                    <div class="card-info"><div class="ctitle" x-text="c.name"></div><div class="ctype" x-text="typeLabel(c)+(c.aoe?' · Toàn thể':(c.sect?' · '+c.sect:''))"></div><div class="cdesc" x-text="c.desc"></div></div>
                  </div>
                </template>
                <template x-if="!hand.length"><div class="text-slate-600 text-sm self-center">Hết bài — Kết Lượt.</div></template>
              </div>
              <div class="flex justify-between text-[10px] text-slate-500 mt-1 px-1"><span x-text="'Rút '+drawPile.length+' · Bỏ '+discard.length+(enemies.length>1?' · '+aliveCount()+' địch còn lại':'')"></span><span class="text-slate-600 italic" x-text="log"></span></div>
            </div>
          </template>

          <!-- THƯỞNG -->
          <template x-if="phase==='reward'">
            <div class="panel rounded-2xl border border-gold/40 p-6 text-center">
              <div class="fserif text-2xl gold-text mb-1">Vượt ải — Lĩnh Ngộ một chiêu</div>
              <div class="text-[12px] text-slate-500 mb-1" x-text="'+'+rewardGold+' Mộng Ngân'"></div>
              <div class="text-[11px] text-slate-500 mb-5">Thêm 1 thẻ vào bộ bài (hoặc bỏ qua).</div>
              <div class="flex gap-4 justify-center flex-wrap mb-4">
                <template x-for="(c,i) in rewardCards" :key="i">
                  <div class="card playable" :style="'--c:'+heColor(c.he)+';--r:'+rarColor(c.rar)" @click="pickReward(c)">
                    <div class="cost" x-text="c.cost"></div><div class="rar" :title="rarName(c.rar)"></div>
                    <div class="card-art"><span class="card-han" x-text="c.han"></span><img :src="cardImg(c.id)" class="dtm-art" alt="" onerror="this.style.display='none'"><template x-if="c.rar==='tuyet'"><img class="dtm-tuyetglow" src="images/dtm/vfx/card_glow_tuyet.webp" alt="" onerror="this.remove()"></template><template x-if="sigilImg(c.he)"><img :src="sigilImg(c.he)" class="dtm-sigil" alt="" onerror="this.style.display='none'"></template></div>
                    <div class="card-info"><div class="ctitle" x-text="c.name"></div><div class="ctype" x-text="typeLabel(c)"></div><div class="cdesc" x-text="c.desc"></div></div>
                  </div>
                </template>
              </div>
              <div class="flex items-center justify-center gap-2.5 flex-wrap">
                <button x-show="rerollLeft>0" @click="reroll()" class="px-5 py-1.5 rounded-lg border border-cyan/50 text-cyan text-[12px] hover:bg-cyan/10 transition" x-text="'Đổi Lựa Chọn ('+rerollLeft+')'"></button>
                <button @click="afterNode()" class="px-6 py-1.5 rounded-lg bg-ink3 border border-slate-600 text-slate-400 text-[12px] hover:border-slate-400">Bỏ qua</button>
              </div>
            </div>
          </template>

          <!-- SỰ KIỆN -->
          <template x-if="phase==='event'">
            <div class="panel rounded-2xl border border-violet-500/40 p-6 max-w-xl mx-auto">
              <div class="fserif text-xl text-violet-300 mb-1" x-text="event.title"></div>
              <p class="text-[12.5px] text-slate-300 italic leading-relaxed mb-4" x-text="event.text"></p>
              <div class="space-y-2">
                <template x-for="(o,i) in event.opts" :key="i">
                  <button @click="resolveEvent(o)" class="w-full text-left px-4 py-2.5 rounded-lg bg-ink3/70 border border-slate-700 hover:border-violet-400 text-slate-200 text-[12.5px] transition" x-text="o.label"></button>
                </template>
              </div>
            </div>
          </template>

          <!-- MỘNG THỊ -->
          <template x-if="phase==='shop'">
            <div class="panel rounded-2xl border border-gold/40 p-6">
              <div class="flex items-center justify-between mb-4"><div class="fserif text-xl gold-text">Mộng Thị</div><div class="text-[12px] text-slate-400">Mộng Ngân <b class="text-violet-300" x-text="runNgan"></b></div></div>
              <div class="grid sm:grid-cols-3 gap-3 mb-4">
                <template x-for="(s,i) in shopItems" :key="i">
                  <div class="panel rounded-xl p-3 text-center border" :style="'border-color:'+heColor(s.card.he)+'44'">
                    <div class="flex justify-center mb-2"><div class="card" style="width:118px;height:188px;cursor:default" :style="'--c:'+heColor(s.card.he)+';--r:'+rarColor(s.card.rar)">
                      <div class="cost" x-text="s.card.cost"></div><div class="rar" :title="rarName(s.card.rar)"></div>
                      <div class="card-art"><span class="card-han" style="font-size:34px" x-text="s.card.han"></span><img :src="cardImg(s.card.id)" class="dtm-art" alt="" onerror="this.style.display='none'"><template x-if="s.card.rar==='tuyet'"><img class="dtm-tuyetglow" src="images/dtm/vfx/card_glow_tuyet.webp" alt="" onerror="this.remove()"></template><template x-if="sigilImg(s.card.he)"><img :src="sigilImg(s.card.he)" class="dtm-sigil" alt="" onerror="this.style.display='none'"></template></div>
                      <div class="card-info"><div class="ctitle" x-text="s.card.name"></div><div class="ctype" x-text="typeLabel(s.card)"></div><div class="cdesc" x-text="s.card.desc"></div></div>
                    </div></div>
                    <button @click="buyShop(i)" :disabled="runNgan<s.price||s.sold" class="px-4 py-1 rounded-lg text-[12px] font-bold transition" :class="(runNgan>=s.price&&!s.sold)?'bg-gold/80 text-ink hover:brightness-110':'bg-slate-800 text-slate-500 border border-slate-700'" x-text="s.sold?'Đã mua':(s.price+' Mộng Ngân')"></button>
                  </div>
                </template>
              </div>
              <div class="flex items-center justify-center gap-3 flex-wrap">
                <button x-show="rerollLeft>0" @click="reroll()" class="px-4 py-1.5 rounded-lg border border-cyan/50 text-cyan text-[12px] hover:bg-cyan/10 transition" x-text="'Đổi Hàng ('+rerollLeft+')'"></button>
                <button @click="buyHeal()" :disabled="runNgan<40||run.hp>=run.maxHp" class="px-4 py-1.5 rounded-lg text-[12px]" :class="(runNgan>=40&&run.hp<run.maxHp)?'bg-jade/70 text-ink font-bold':'bg-slate-800 text-slate-500 border border-slate-700'">Dưỡng thương +18 HP (40)</button>
                <button @click="afterNode()" class="px-6 py-1.5 rounded-lg bg-ink3 border border-slate-600 text-slate-300 text-[12px] hover:border-slate-400">Rời Mộng Thị</button>
              </div>
            </div>
          </template>

          <!-- NGHỈ -->
          <template x-if="phase==='rest'">
            <div class="panel rounded-2xl border border-emerald-500/40 p-7 max-w-md mx-auto text-center">
              <div class="fserif text-xl text-emerald-300 mb-1">Tĩnh Thất</div>
              <p class="text-[12px] text-slate-400 mb-5">Một khắc an tĩnh trong mộng cảnh.</p>
              <div class="flex gap-3 justify-center flex-wrap">
                <button @click="restHeal()" class="px-5 py-2.5 rounded-xl bg-emerald-700/70 text-white font-bold text-[12.5px] hover:brightness-110">Điều Tức <span class="text-emerald-200" x-text="'(+'+Math.round(run.maxHp*restPct())+' HP)'"></span></button>
                <button @click="restLearn()" class="px-5 py-2.5 rounded-xl bg-cyan-700/70 text-white font-bold text-[12.5px] hover:brightness-110">Tham Ngộ (+1 thẻ ngẫu nhiên)</button>
              </div>
            </div>
          </template>

          <!-- THẮNG / THUA -->
          <template x-if="phase==='win'">
            <div class="dtm-endbanner win">
              <div class="ebg-fb"></div>
              <img class="ebg" src="images/dtm/bg/win_dang_tien.webp" alt="" onerror="this.remove()">
              <span class="ewm" style="color:#f5b942">登仙</span>
              <img class="emoment" src="images/dtm/vfx/dang_tien_burst.webp" alt="" onerror="this.remove()">
              <div class="escrim"></div>
              <div class="econtent">
                <div class="dtm-endtitle win">Đăng Tiên!</div>
                <p class="text-slate-100 mt-3 mb-1 text-[13.5px] max-w-md mx-auto leading-relaxed">Vượt mộng cảnh, tàn niệm cao thủ đã phục. Lĩnh ngộ theo ngươi tỉnh giấc.</p>
                <div class="text-[12.5px] mt-3 mb-6 leading-relaxed">
                  <span class="text-amber-200">Lĩnh ngộ mang về: <b x-text="'+'+_bankGain+' Mộng Ngân'"></b></span>
                  <template x-if="_newScUnlocked>0"><span class="text-rose-300"> · Mở Sát Cảnh <b x-text="_newScUnlocked"></b></span></template>
                  <template x-if="_newUnlocks.length"><div class="text-violet-300 mt-1" x-text="'Lĩnh ngộ chiêu mới: '+_newUnlocks.map(id=>cardName(id)).join(', ')"></div></template>
                </div>
                <div class="flex gap-3 justify-center flex-wrap">
                  <button @click="phase='hero'" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-jade to-cyan text-ink font-bold hover:brightness-110">Nhập Mộng Lần Nữa</button>
                  <button @click="phase='lobby'" class="px-6 py-2.5 rounded-xl bg-ink3/80 border border-slate-500 text-slate-100 font-bold hover:border-gold">Về Sảnh</button>
                </div>
              </div>
            </div>
          </template>

                  <div class="w-9 h-9 rounded bg-ink flex items-center justify-center text-xl shrink-0"

                    <div class="text-xs font-medium text-slate-200 truncate" x-text="$store.game.ITEMS[$store.game.mLinhThach.itemId].name"></div>

                    :class="opt.owned>0 ? 'bg-ink border-slate-700 hover:border-jade/50' : 'bg-ink/40 border-slate-800 opacity-50 cursor-not-allowed'">
                    <span class="w-7 h-7 rounded bg-ink3 flex items-center justify-center text-base shrink-0" x-html="$store.game.ico(opt.itemId, $store.game.ITEMS[opt.itemId].icon)"></span>

                      <span class="block text-xs text-slate-200 truncate" x-text="$store.game.ITEMS[opt.itemId].name"></span>

          </template>

        <template x-if="$store.game.modalAction.inputs">

            <div class="lbl mb-1">Nguyên Liệu</div>

          </button>
        </div>
      </div>

  <!-- ===== Modal Trang Bị (kiểu IdleMMO) ===== -->
  <template x-if="$store.game.equipModal">

                      <template x-for="c in g.gearCompare(rec).filter(c=>c.next>0)" :key="c.key">

                  </div>

                  <div class="relative w-12 h-12 rounded-lg border overflow-hidden bg-gradient-to-br flex items-center justify-center" :style="g.itemHaloHex(it) ? ('box-shadow:0 0 15px -2px '+g.itemHaloHex(it)) : ''" :class="g.itemQuality(it).border + ' ' + g.itemQuality(it).grad"><template x-if="g.itemHaloHex(it)"><i class="halo2" :style="g.haloStyle(it)"</i></template><span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(it.id, it.icon)"></span><template x-if="it.plus>0"><span class="absolute top-0 right-0 text-[8px] text-amber-300 bg-ink/80 rounded-bl px-0.5" x-text="'+'+it.plus"></span></template></div>

                    </template>
                    <template x-if="g.toolEffText(it)"><div class="flex items-center gap-1.5 text-[11px] text-emerald-300 max-w-[260px]"><span class="text-emerald-400/80" x-html="g.svg('zap','w-3.5 h-3.5')"></span><span x-text="g.toolEffText(it)"></span></div></template>

                </div>
                <button @click="g.doEquip(it.uid); g.closeEquip()" :disabled="!g.canEquip(it)" class="shrink-0 px-3.5 py-2 text-[11px] rounded-lg bg-ink2 border border-slate-700 hover:border-jade/50 text-slate-200 disabled:opacity-40 disabled:cursor-not-allowed" x-text="g.canEquip(it)?'Trang Bị':('Cần Lv '+g.equipReqOf(it))"></button>
