                    <div class="grid sm:grid-cols-2 gap-1.5">
                      <div class="flex items-start gap-2.5 px-2 py-1.5 rounded-lg bg-ink3/60 border border-slate-700/60">
                        <div class="relative w-11 h-11 rounded-lg overflow-hidden shrink-0 bg-ink2 border border-slate-600/50">
                          <span class="absolute inset-0 flex items-center justify-center text-slate-500 opacity-30"><svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8V6l7-3z"/><path d="M9 11l2 2 4-4"/></svg></span>
                          <div class="absolute inset-0" x-html="$store.game.petSkillArt(p,'passive')"></div>
                        </div>
                        <div class="min-w-0 pt-0.5"><div class="text-[11.5px] text-slate-200 font-medium"><span x-text="$store.game.petPassiveOf(p).name"></span> <span class="text-[9px] text-slate-500 font-normal">· bị động</span></div><div class="text-[10px] text-slate-500 leading-snug" x-text="$store.game.petPassiveOf(p).desc"></div></div>
                      </div>
                      <div class="flex items-start gap-2.5 px-2 py-1.5 rounded-lg" :style="'background:'+qh+'10;border:1px solid '+qh+'33'">
                        <div class="relative w-11 h-11 rounded-lg overflow-hidden shrink-0 bg-ink2" :style="'border:1px solid '+qh+'40'">
                          <span class="absolute inset-0 flex items-center justify-center opacity-30" :style="'color:'+qh"><svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4.5 13H11l-1 9 8.5-11H12l1-9z"/></svg></span>
                          <div class="absolute inset-0" x-html="$store.game.petSkillArt(p,'active')"></div>
                          <div class="absolute inset-0 pointer-events-none" :style="'box-shadow:inset 0 0 14px '+qh+'22'"></div>
                        </div>
                        <div class="min-w-0 pt-0.5"><div class="text-[11.5px] font-medium" :class="q.text"><span x-text="$store.game.petActiveOf(p).name"></span> <span class="text-[9px] text-slate-500 font-normal" x-text="'· chủ động · mỗi '+$store.game.petActiveOf(p).cd+' hiệp'"></span></div><div class="text-[10px] text-slate-500 leading-snug" x-text="$store.game.petActiveOf(p).desc"></div><div class="text-[9.5px] text-rose-300/90 mt-0.5">Sát thương ~<span x-text="Math.round($store.game.petActiveOf(p).mult*100)"></span>% Công · ≈<b x-text="$store.game.fmt($store.game.petActiveDmg(p))"></b></div></div>
                      </div>
                      <!-- Bị động Thức Tỉnh (P7) — chỉ khi thức tỉnh; lưới 2×2: hàng 2 = awk + 1 ô trống chờ kĩ năng thứ 4 -->
                      <template x-if="$store.game.petAwkPassiveOf(p)">
                        <div class="flex items-start gap-2.5 px-2 py-1.5 rounded-lg bg-amber-900/10 border border-amber-700/30" x-data="{ get aw(){ return $store.game.petAwkPassiveOf(p)||{} } }">
                          <div class="relative w-11 h-11 rounded-lg overflow-hidden shrink-0 bg-ink2 border border-amber-700/40 flex items-center justify-center" style="color:#fbbf24">
                            <span class="opacity-40"><svg viewBox="0 0 24 24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.5 6.6 6.8.4-5.2 4.4 1.7 6.6L12 17.4 6.2 21l1.7-6.6-5.2-4.4 6.8-.4L12 2.5z"/></svg></span>
                            <div class="absolute inset-0" x-html="$store.game.awkArtTag(aw.id)"></div>
                          </div>
                          <div class="min-w-0 pt-0.5"><div class="text-[11.5px] font-medium text-amber-200"><span x-text="aw.name"></span> <span class="text-[9px] text-slate-500 font-normal">· bị động Thức Tỉnh</span></div><div class="text-[10px] text-slate-500 leading-snug" x-text="aw.desc"></div></div>
                        </div>
                      </template>
                      <!-- Ô trống đặt chỗ kĩ năng thứ 4 (hiện khi đã thức tỉnh để lấp đầy lưới 2×2; cơ chế mở sau) -->
                      <template x-if="$store.game.petAwkPassiveOf(p)">
                        <div class="flex items-center justify-center gap-1.5 px-2 py-1.5 rounded-lg border border-dashed border-slate-700/60 text-slate-600">
                          <svg viewBox="0 0 24 24" class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                          <span class="text-[10.5px]">Kĩ năng thứ 4 · chưa mở</span>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- NGỰ THÚ mastery: cấp + tu vi + slot Săn Mồi -->
          <div class="panel rounded-xl p-4 relative overflow-hidden">
            <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(120% 100% at 0% 0%, rgba(20,184,166,.10), transparent 55%)"></div>
            <div class="relative flex items-center gap-4 flex-wrap">
              <div class="relative w-16 h-16 shrink-0">
                <!-- slot art Ngự Thú: images/skills/nguThu.webp|png -> chưa có thì hiện ngôi sao jade fallback -->
                <div class="absolute inset-0 rounded-xl bg-ink2 border border-jade/40 flex items-center justify-center overflow-hidden" style="box-shadow:inset 0 0 24px rgba(20,184,166,.18)">
                  <svg viewBox="0 0 24 24" class="w-8 h-8 text-jade/80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2 4 4.5.6-3.3 3.1.8 4.5L12 17l-4.8 2.3.8-4.5L4.7 11.6 9.2 11 12 3z"/></svg>
                  <img src="images/skills/nguThu.webp" class="absolute inset-0 w-full h-full object-cover" alt="" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                </div>
                <span class="absolute -bottom-1.5 -right-1.5 min-w-[1.75rem] h-7 px-1 rounded-full bg-jade text-ink text-[13px] font-bold flex items-center justify-center border-2 border-ink2 z-10" x-text="$store.game.nguThuLvV"></span>
              </div>
              <div class="flex-1 min-w-[220px]" x-data="{ get pr(){ return $store.game.nguThuProg } }">
                <div class="flex items-baseline gap-2"><span class="text-[17px] fserif text-jade">Ngự Thú</span><span class="lbl">thuần dưỡng linh thú</span></div>
                <div class="mt-1.5">
                  <div class="flex items-center justify-between text-[10px] mb-1"><span class="text-slate-400" x-text="'Cấp '+$store.game.nguThuLvV+' · tu vi'"></span><span class="text-slate-500" x-text="$store.game.fmt(pr.into)+' / '+$store.game.fmt(pr.need)"></span></div>
                  <div class="h-2 rounded-full bg-ink overflow-hidden"><div class="h-full rounded-full transition-all" :style="'width:'+(pr.frac*100)+'%;background:linear-gradient(90deg,#0d9488,#22d3ee)'"></div></div>
                </div>
              </div>
              <button @click="$store.game.openHuntTrack()" class="group text-center px-4 py-2 rounded-xl bg-ink2/60 border border-slate-700/60 shrink-0 hover:border-jade/50 hover:bg-ink2 transition cursor-pointer" title="Xem tiến độ Lịch Luyện">
                <div class="lbl mb-1 flex items-center justify-center gap-1">Slot Săn Mồi <svg viewBox="0 0 24 24" class="w-2.5 h-2.5 text-slate-600 group-hover:text-jade transition" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
                <div class="flex items-baseline justify-center gap-0.5 leading-none">
                  <b class="text-[19px] text-jade tabular-nums" x-text="$store.game.huntSlotsUsedV"></b>
                  <span class="text-[13px] text-slate-500 tabular-nums" x-text="'/ '+$store.game.huntSlotsV"></span>
                  <span class="text-[10px] text-slate-500 ml-1">đang săn</span>
                </div>
                <div class="mx-auto mt-1.5 h-1.5 w-24 rounded-full bg-slate-800 overflow-hidden">
                  <div class="h-full rounded-full bg-jade transition-all" :style="`width:${$store.game.huntSlotsV ? Math.round($store.game.huntSlotsUsedV / $store.game.huntSlotsV * 100) : 0}%;box-shadow:0 0 6px #14b8a6`"></div>
                </div>
                <div class="text-[10px] text-slate-500 mt-1">mở thêm ở Lv <span class="text-slate-400" x-text="$store.game.nextSlotLv"></span></div>
              </button>
            </div>
          </div>

          <div class="lg:grid lg:grid-cols-[1fr_320px] gap-3 items-start space-y-3 lg:space-y-0">
            <!-- TRÁI: Linh Thú Của Ta -->
            <div class="panel rounded-xl p-2.5 sm:p-4 min-w-0">
              <div class="flex items-baseline justify-between mb-3">
                <div class="text-jade font-bold fserif">Linh Thú Của Ta <span class="text-slate-500 text-[12px] font-normal" x-text="'· ' + $store.game.petList.length + ' thú đang dưỡng'"></span></div>
                <span class="text-[11px] text-slate-600 hidden sm:block">Dắt 1 con kề bên — phần còn lại an dưỡng</span>
              </div>
              <template x-if="$store.game.petList.length===0">
                <div class="text-center text-slate-600 text-[12.5px] py-10">Chuồng thú còn trống.<br><span class="text-[11px]">Hạ Yêu Vương đoạt noãn, ấp nở con đầu tiên.</span></div>
              </template>
              <div class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-3">
                <template x-for="p in $store.game.petList" :key="p.id">
                  <div class="rounded-xl overflow-hidden h-full flex flex-col cursor-pointer transition hover:brightness-110" :class="(p.equipped?'ring-1 ring-jade ':'')+$store.game.petQ(p).border" x-data="{ get q(){ return $store.game.petQ(p) }, get qh(){ return $store.game.petQHex(p) }, get el(){ return $store.game.petElColor(p) }, get s(){ return $store.game.petStat(p) } }" :style="'background:linear-gradient(160deg,'+qh+'0e,#0f1521 70%)'+(p.equipped?';box-shadow:inset 0 0 26px '+qh+'1f':'')" @click="$store.game.openPetDetail(p.id)">
                    <div class="relative aspect-square bg-ink2 flex items-center justify-center text-5xl">
                      <span x-text="$store.game.petEmoji(p)"></span>
                      <div class="absolute inset-0" x-html="$store.game.petArtTag(p)"></div>
                      <div class="absolute inset-0 pointer-events-none" :style="'box-shadow:inset 0 0 28px '+qh+'1c'"></div>
                      <span class="absolute top-1.5 left-1.5 text-[9px] px-1.5 py-0.5 rounded border font-bold" :class="q.text+' '+q.border" style="background:rgba(0,0,0,.5)" x-text="q.name"></span>
                      <span class="absolute top-1.5 right-1.5 text-[9px] px-1.5 py-0.5 rounded bg-black/55 text-slate-200" x-text="'Lv '+p.level"></span>
                      <span class="absolute bottom-1.5 right-1.5 w-2 h-2 rounded-full" :style="'background:'+el+';box-shadow:0 0 6px '+el" :title="$store.game.petHeName(p)"></span>
                      <template x-if="p.equipped"><span class="absolute bottom-1.5 left-1.5 flex items-center gap-1 text-[9px] px-1.5 py-0.5 rounded font-bold text-ink bg-jade"><svg viewBox="0 0 24 24" class="w-2.5 h-2.5" fill="currentColor"><path d="M5 3h14v18l-7-4-7 4z"/></svg>Tại Trận</span></template>
                      <template x-if="!p.equipped && p.state==='hunt'"><span class="absolute bottom-1.5 left-1.5 text-[9px] px-1.5 py-0.5 rounded font-bold text-ink bg-amber-400">Săn Mồi</span></template>
                      <template x-if="!p.equipped && p.state==='rest'"><span class="absolute bottom-1.5 left-1.5 text-[9px] px-1.5 py-0.5 rounded font-bold text-slate-100 bg-slate-600/85">Dưỡng Sức</span></template>
                    </div>
                    <div class="p-2 flex-1 flex flex-col gap-1">
                      <div class="text-[13px] font-bold fserif truncate" :class="q.text" x-text="$store.game.petName(p)"></div>
                      <div class="text-[9.5px] -mt-0.5" :style="'color:'+el+'cc'"><span x-text="$store.game.petHeName(p)"></span> · <span class="text-slate-500" x-text="$store.game.petRole(p)"></span></div>
                      <div class="flex flex-wrap gap-x-2 gap-y-0.5">
                        <template x-for="(v,k) in s" :key="k"><span class="text-[10px] text-slate-400"><span x-text="$store.game.statLabelShort(k)"></span> <b class="text-slate-200" x-text="$store.game.fmt(v)"></b></span></template>
                      </div>
                      <div class="flex items-center gap-1" x-show="p.opts.length" x-data="{ tip:false, tx:0, ty:0 }">
                        <span class="text-[9px] px-1.5 py-0.5 rounded-full border cursor-help" :class="q.text+' '+q.border" :style="'background:'+qh+'14'"
                              @mouseenter="let r=$el.getBoundingClientRect(); tx=r.left+r.width/2; ty=r.top; tip=true" @mouseleave="tip=false"
                              x-text="p.opts.length+' dị bẩm'"></span>
                        <span class="text-[9px] text-slate-500">· 2 tuyệt kĩ</span>
                        <template x-if="tip">
                          <div class="fixed z-50 -translate-x-1/2 -translate-y-full pointer-events-none" :style="'left:'+tx+'px; top:'+(ty-8)+'px'">
                            <div class="rounded-lg border bg-ink2/95 backdrop-blur px-2.5 py-1.5 shadow-xl shadow-black/60 whitespace-nowrap" :style="'border-color:'+qh+'66'">
                              <div class="lbl mb-1" :style="'color:'+qh">Dị Bẩm</div>
                              <div class="space-y-0.5">
                                <template x-for="o in p.opts" :key="o.id"><div class="text-[10.5px] text-slate-200 flex items-center gap-1.5"><span class="w-1 h-1 rounded-full shrink-0" :style="'background:'+qh"></span><span x-text="$store.game.petOptLabel(o)"></span></div></template>
                              </div>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- PHẢI: Lò Ấp Noãn -->
            <div class="panel rounded-xl p-4 lg:sticky lg:top-4">
              <div class="text-jade font-bold fserif">Lò Ấp Noãn</div>
              <div class="text-[11px] text-slate-500 mb-3 fserif italic">Ủ noãn yêu thú, ngày đêm chờ ngày phá vỏ.</div>

              <!-- Lò: đang ấp / đã nở -->
              <template x-if="$store.game.hatchery">
                <div class="mb-3 rounded-xl border p-3" :class="$store.game.hatchReady ? 'border-jade/50 bg-jade/5' : 'border-amber-700/40 bg-amber-900/10'">
                  <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-lg bg-ink2 flex items-center justify-center text-3xl shrink-0 relative overflow-hidden">
                      <span :class="$store.game.hatchReady ? '' : 'opacity-70'" x-text="$store.game.hatchEmoji()"></span>
                      <div class="absolute inset-0" :class="$store.game.hatchReady ? '' : 'opacity-70'" x-html="$store.game.hatchArtTag()"></div>
                      <div class="absolute inset-0 pointer-events-none" :style="$store.game.hatchReady ? 'box-shadow:inset 0 0 22px rgba(20,184,166,.45)' : 'box-shadow:inset 0 0 18px rgba(245,158,11,.3)'"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-baseline gap-1.5 flex-wrap">
                        <span class="text-[13.5px] font-bold fserif text-slate-200" x-text="$store.game.hatchSpeciesName()"></span>
                        <span class="text-[9.5px] px-1.5 py-0.5 rounded bg-black/45 border border-white/10 font-bold" :class="$store.game.hatchEggTierColor()" x-text="$store.game.hatchEggTierName()"></span>
                      </div>
                      <div class="text-[10.5px] mt-0.5 leading-snug" :class="$store.game.hatchReady ? 'text-jade' : 'text-slate-500 italic'" x-text="$store.game.hatchReady ? 'Noãn đã rạn vỏ — khai noãn, để chân thân lộ diện.' : 'Chân thân còn giấu trong vỏ noãn…'"></div>
                    </div>
                  </div>
                  <template x-if="!$store.game.hatchReady">
                    <div class="mt-2.5">
                      <div class="h-1.5 rounded-full bg-ink overflow-hidden"><div class="h-full bg-amber-500/85 transition-all duration-700" :style="'width:'+$store.game.hatchPct+'%'"></div></div>
                      <div class="mt-2 flex items-center justify-between gap-2">
                        <span class="text-[12px] text-amber-300 font-mono" x-text="$store.game.hatchTimeLeft"></span>
                        <button @click="$store.game.skipIncubate()" :disabled="!$store.game.canAffordHatchSkip" class="px-3 py-1.5 rounded font-semibold bg-rose-800/70 hover:bg-rose-700 text-slate-100 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1.5 text-[11.5px]">Thúc Nở <span class="text-[9.5px]" :class="$store.game.canAffordHatchSkip ? 'text-rose-200/85' : 'text-rose-300'" x-text="$store.game.fmt($store.game.hatchSkipCost)+' Hồn Thạch'"></span></button>
                      </div>
                    </div>
                  </template>
                  <template x-if="$store.game.hatchReady">
                    <button @click="$store.game.collectHatch()" class="w-full mt-2.5 py-2 text-[12.5px] rounded font-bold bg-jade/90 hover:bg-jade text-ink">Khai Noãn</button>
                  </template>
                </div>
              </template>
              <template x-if="!$store.game.hatchery">
                <div class="mb-3 rounded-xl border border-dashed border-slate-700/70 text-center text-slate-600 text-[12px] py-4">Lò ấp còn nguội — đặt một quả noãn vào, nhóm lửa chờ ngày phá vỏ.</div>
              </template>

              <!-- Danh sách trứng trong túi -->
              <template x-if="$store.game.eggsInInventory.length===0">
                <div class="text-center text-slate-600 text-[12px] py-6">Tay trắng chưa một quả noãn. Hạ Yêu Vương nơi hoang dã để đoạt lấy.</div>
              </template>
              <div class="space-y-2">
                <template x-for="e in $store.game.eggsInInventory" :key="e.id">
                  <div class="flex items-center gap-3 p-2.5 rounded bg-ink3/50 border border-slate-800">
                    <div class="w-11 h-11 rounded bg-ink flex items-center justify-center text-xl shrink-0 overflow-hidden" x-html="$store.game.ico(e.id, e.item.icon)"></div>
                    <div class="flex-1 min-w-0">
                      <div class="text-[13px] font-medium truncate" :class="($store.game.QUALITY[e.item.quality]||{}).text" x-text="e.item.name + ' ×' + e.qty"></div>
                      <div class="text-[10px] text-slate-500" x-text="'Ủ ' + $store.game.hatchDurLabel(e.item.quality) + ' · nở thú cùng dòng, chân thân tùy duyên'"></div>
                    </div>
                    <button @click="$store.game.startIncubate(e.id)" :disabled="!!$store.game.hatchery" class="px-3.5 py-1.5 text-[12px] rounded bg-amber-600/85 hover:bg-amber-500 text-ink font-semibold shrink-0 disabled:opacity-40 disabled:cursor-not-allowed" x-text="$store.game.hatchery ? 'Lò Đang Bận' : 'Đặt Ấp'"></button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== POPUP: Lịch Luyện (theo dõi tiến độ săn mồi) ===== -->
      <template x-if="$store.game.huntTrackOpen">
        <div class="fixed inset-0 z-[60] flex items-center justify-center p-3 sm:p-4" style="background:rgba(2,6,12,.8)" @click.self="$store.game.closeHuntTrack()">
          <div class="panel rounded-2xl w-full max-w-2xl min-h-[420px] max-h-[85vh] flex flex-col overflow-hidden shadow-2xl" @click.stop style="border-color:#14b8a655">
            <!-- HEADER -->
            <div class="relative shrink-0 p-4" style="background:linear-gradient(150deg,#14b8a614,#0f1521 64%)">
              <div class="absolute inset-0 pointer-events-none" style="box-shadow:inset 0 0 60px #14b8a61f"></div>
              <button @click="$store.game.closeHuntTrack()" class="absolute top-2.5 right-2.5 w-7 h-7 rounded-lg bg-ink3/80 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-rose-400 flex items-center justify-center text-sm" aria-label="Đóng">✕</button>
              <div class="relative flex items-center gap-3 pr-8">
                <div class="relative w-12 h-12 rounded-xl bg-ink2 border border-jade/40 flex items-center justify-center shrink-0 overflow-hidden" style="box-shadow:inset 0 0 18px #14b8a62e">
                  <svg viewBox="0 0 24 24" class="w-6 h-6 text-jade/80" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2 4 4.5.6-3.3 3.1.8 4.5L12 17l-4.8 2.3.8-4.5L4.7 11.6 9.2 11 12 3z"/></svg>
                  <img src="images/skills/nguThu.webp" class="absolute inset-0 w-full h-full object-cover" alt="" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                </div>
                <div class="min-w-0">
                  <div class="lbl text-slate-500" x-text="'Ngự Thú · Cấp '+$store.game.nguThuLvV"></div>
                  <div class="text-[22px] fserif font-bold text-jade leading-tight">Lịch Luyện</div>
                </div>
                <div class="ml-auto text-right">
                  <div class="lbl mb-1">Đang Luyện</div>
                  <div class="text-[14px]"><b class="text-jade" x-text="$store.game.huntSlotsUsedV"></b><span class="text-slate-500" x-text="'/'+$store.game.huntSlotsV"></span></div>
                </div>
              </div>
            </div>
            <!-- BODY -->
            <div class="flex-1 min-h-0 p-3.5 space-y-2.5 overflow-y-auto">
              <template x-if="$store.game.huntTrackList.length===0">
                <div class="text-center text-slate-600 text-[12.5px] py-10">Chưa có Linh Thú đang luyện.<br><span class="text-[11px]">Mở một con chưa xuất chiến → bấm <b class="text-amber-300">Lịch Luyện</b> để phái săn.</span></div>
              </template>
              <template x-for="h in $store.game.huntTrackList" :key="h.pet.id">

                      <div class="flex items-center gap-2"><span class="text-amber-400 shrink-0">✦</span><span class="text-slate-300">Khai mở <b class="text-jade">1 Dị Bẩm</b> mới</span></div>

                        <span class="w-9 h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(o.loc.id, o.loc.icon)"></span>

                          <div class="text-[10px] text-slate-500 truncate" x-text="'Loot: '+o.lootNames.join(' · ')"></div>
                        </div>
                        <template x-if="o.ok"><svg viewBox="0 0 24 24" class="w-4 h-4 text-slate-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></template>
                        <template x-if="!o.ok"><svg viewBox="0 0 24 24" class="w-4 h-4 text-slate-600 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 018 0v3"/></svg></template>
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>

              <template x-if="$store.game.petDetailMode==='view'">
                <div class="flex flex-wrap items-center gap-2 w-full">
                  <button @click="$store.game.petDetailMode='fuse'" :disabled="$store.game.fuseDonors.length===0 || $store.game.petBusyV(p)" class="px-3 py-2 rounded-lg text-[12px] font-semibold text-violet-300 border border-violet-700/50 hover:bg-violet-500/10 disabled:opacity-40 disabled:cursor-not-allowed">Dung Hợp</button>
                  <button @click="$store.game.petDetailMode='release'" :disabled="$store.game.petBusyV(p)" class="px-3 py-2 rounded-lg text-[12px] font-semibold text-slate-300 border border-slate-700 hover:border-rose-500 hover:text-rose-300 disabled:opacity-40 disabled:cursor-not-allowed" :title="$store.game.petBusyV(p)?'Thu về trước đã':''">Phóng Sanh</button>
                  <template x-if="!p.evolved && !$store.game.petBusyV(p)"><button @click="$store.game.petDetailMode='awaken'" class="px-3 py-2 rounded-lg text-[12px] font-semibold text-amber-300 border border-amber-700/50 hover:bg-amber-500/10">✦ Thức Tỉnh</button></template>
                  <template x-if="p.state==='hunt' || p.state==='rest'"><button @click="$store.game.recallHunt(p.id)" class="px-3 py-2 rounded-lg text-[12px] font-semibold text-amber-300 border border-amber-700/50 hover:bg-amber-500/10">Ngừng Săn</button></template>
                  <button @click="p.equipped ? $store.game.unequipActivePet() : $store.game.equipPet(p.id)" class="ml-auto px-4 py-2 rounded-lg text-[12.5px] font-semibold transition" :class="p.equipped?'text-jade border border-jade/45 hover:bg-jade/10':'bg-jade/85 hover:bg-jade text-ink'" x-text="p.equipped?'Thu Hồi':'Xuất Trận'"></button>
                </div>
              </template>
              <template x-if="$store.game.petDetailMode==='fuse'">
                <div class="flex items-center gap-2 w-full">
                  <button @click="$store.game.petDetailMode='view'; $store.game.fuseSel=[]" class="mr-auto px-4 py-2 rounded-lg text-[12px] font-semibold text-slate-300 border border-slate-700 hover:border-slate-500">← Quay lại</button>
                  <button @click="$store.game.petDetailMode='fuseConfirm'" :disabled="$store.game.fuseSel.length===0" class="px-4 py-2 rounded-lg text-[12px] font-semibold bg-violet-600/85 hover:bg-violet-500 text-white disabled:opacity-40 disabled:cursor-not-allowed" x-text="'Dung Hợp ('+$store.game.fuseSel.length+')'"></button>
                </div>
              </template>
              <template x-if="$store.game.petDetailMode==='fuseConfirm'">
                <div class="flex items-center gap-2 w-full">
                  <button @click="$store.game.petDetailMode='fuse'" class="mr-auto px-4 py-2 rounded-lg text-[12px] font-semibold text-slate-300 border border-slate-700 hover:border-slate-500">← Chọn lại</button>
                  <button @click="$store.game.doFuseMany()" class="px-4 py-2 rounded-lg text-[12px] font-semibold bg-violet-600/85 hover:bg-violet-500 text-white">Xác Nhận Dung Hợp</button>
                </div>
              </template>
              <template x-if="$store.game.petDetailMode==='release'">
                <div class="flex items-center gap-2 w-full">
                  <button @click="$store.game.petDetailMode='view'" class="mr-auto px-4 py-2 rounded-lg text-[12px] font-semibold text-slate-300 border border-slate-700 hover:border-slate-500">← Quay lại</button>
                  <button @click="$store.game.doRelease()" class="px-4 py-2 rounded-lg text-[12px] font-semibold bg-rose-700/80 hover:bg-rose-600 text-slate-100">Xác Nhận Phóng Sanh</button>

                </div>
              </template>
              <template x-if="$store.game.petDetailMode==='huntPick'">
                <div class="flex items-center gap-2 w-full">
                  <button @click="$store.game.petDetailMode='view'" class="mr-auto px-4 py-2 rounded-lg text-[12px] font-semibold text-slate-300 border border-slate-700 hover:border-slate-500">← Quay lại</button>
                </div>
              </template>
            </div>
          </div>
        </div>

      <!-- ===== VIEW: PHI CÁP ĐÀI (Thông Báo — feed chung với chuông) ===== -->
      <template x-if="$store.game.view==='phiCapDai'">
        <div class="space-y-3">

              <template x-for="t in $store.game.NOTIF_TYPES" :key="t.id">
                <button @click="$store.game.setNotifFilter(t.id)" class="w-44 shrink-0 lg:w-full text-left rounded-lg p-2.5 flex items-center gap-2.5 border transition" :style="$store.game.notifFilter===t.id ? 'border-color:'+t.col+'aa;background:linear-gradient(135deg,'+t.col+'22,transparent)' : 'border-color:#1e293b;background:#0f1521'">
                  <div class="w-9 h-9 rounded-lg shrink-0 flex items-center justify-center" :style="'background:'+t.col+'22;border:1px solid '+t.col+'55;color:'+t.col" x-html="$store.game.notifIcon(t, 'w-[18px] h-[18px]')"></div>

                  <template x-if="$store.game.notifUnread(t.id)===0"><span class="text-base fserif shrink-0" :style="'color:'+t.col+'55'" x-text="t.seal"></span></template>
                </button>
              </template>
            </div>
            <div class="panel rounded-xl overflow-hidden">
              <div class="flex items-center justify-between px-4 py-2.5 border-b border-slate-800">
                <div class="text-[12.5px] text-slate-300" x-text="$store.game.notifTypeMeta($store.game.notifFilter).label"></div>
                <div class="flex items-center gap-3">

                    <div class="w-10 h-10 rounded-lg shrink-0 flex items-center justify-center" :style="'background:'+t.col+'1c;border:1px solid '+t.col+'55;color:'+t.col" x-html="$store.game.notifIcon(t, 'w-5 h-5')"></div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] px-1.5 py-0.5 rounded shrink-0" :style="'color:'+t.col+';background:'+t.col+'14;border:1px solid '+t.col+'44'" x-text="t.label"></span>
                        <span class="text-[13.5px] font-semibold text-slate-100" x-text="n.title"></span>
                      </div>
                      <div class="text-[12px] text-slate-400 leading-snug mt-1" x-text="n.body"></div>
                      <div class="text-[10.5px] text-slate-600 mt-1.5" x-text="$store.game.notifAgo(n.ts)"></div>
                    </div>
                    <template x-if="!n.read"><span class="w-2 h-2 rounded-full shrink-0 mt-2" :style="'background:'+t.col"></span></template>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: TÀNG KINH CÁC (nguồn skill — Học/Mua võ học) ===== -->
      <template x-if="$store.game.view==='tangkinhcac'">
        <div class="space-y-3" x-data="{ hf:'all', onlyLocked:false, hfList:[['all','Tất cả'],['hoa','Hỏa'],['thuy','Thủy'],['moc','Mộc'],['kim','Kim'],['tho','Thổ'],['vatly','Vật lý'],['buff','Trợ']] }">

          <!-- Header -->
          <div class="panel rounded-lg p-4">
            <div class="flex items-start gap-3">
              <div class="w-14 h-14 rounded-lg bg-ink3 border border-amber-500/30 flex items-center justify-center shrink-0 overflow-hidden" x-html="$store.game.ico('tangkinhcac','📖')"></div>
              <div class="flex-1 min-w-0">
                <div class="text-jade font-bold text-lg" style="font-family:'Lora',serif">Tàng Kinh Các</div>
                <div class="text-[12px] text-slate-400 mt-0.5 leading-snug">Lĩnh hội võ học <b class="text-slate-300">Môn Phái</b> (trả <span class="inline-flex w-3.5 h-3.5 align-text-bottom" x-html="$store.game.ico('bac','🟡')"></span> <span class="text-gold">Bạc</span>) hoặc thỉnh <b class="text-amber-300">tuyệt học</b> bậc Cao (trả <span class="inline-flex w-3.5 h-3.5 align-text-bottom" x-html="$store.game.ico('nguyenBao','🔷')"></span> <span class="text-cyan">Nguyên Bảo</span>). Học xong mới lắp ở <b class="text-slate-300">Bài Võ</b>.</div>
              </div>
              <div class="text-right text-sm shrink-0 space-y-1">
                <div class="flex items-center justify-end gap-1 text-gold font-bold"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt($store.game.state.currencies.bac)"></span></div>
                <div class="flex items-center justify-end gap-1 text-cyan font-bold"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('nguyenBao','🔷')"></span><span x-text="$store.game.fmt($store.game.state.currencies.nguyenBao)"></span></div>
              </div>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <div class="flex-1 h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-jade transition-all" :style="`width:${$store.game.tangKinhTotalCount?Math.round($store.game.tangKinhOwnedCount/$store.game.tangKinhTotalCount*100):0}%`"></div></div>
              <span class="text-[11px] text-slate-400 shrink-0">Đã thông <b class="text-jade" x-text="$store.game.tangKinhOwnedCount"></b>/<span x-text="$store.game.tangKinhTotalCount"></span> võ học</span>
            </div>
          </div>

          <!-- Lọc -->
          <div class="panel rounded-lg p-2.5 flex items-center gap-1.5 flex-wrap">
            <template x-for="f in hfList" :key="f[0]"><button @click="hf=f[0]" class="px-2.5 py-1 rounded text-xs border transition" :class="hf===f[0]?'border-jade text-jade bg-jade/10':'border-slate-700 text-slate-400 hover:border-slate-500'" x-text="f[1]"></button></template>
            <div class="w-px self-stretch bg-slate-700/80 mx-1"></div>
            <button @click="onlyLocked=!onlyLocked" class="px-2.5 py-1 rounded text-xs border transition" :class="onlyLocked?'border-amber-400 text-amber-300 bg-amber-500/10':'border-slate-700 text-slate-400 hover:border-slate-500'" x-text="onlyLocked?'✓ Chỉ chưa học':'Chỉ chưa học'"></button>
          </div>

          <!-- Mục theo Môn Phái -->
          <template x-for="sec in $store.game.tangKinhSections.filter(s=> hf==='all' || s.he===hf)" :key="sec.he">
            <section class="panel rounded-lg p-3" x-show="sec.items.some(it=> !onlyLocked || !$store.game.itemOwned(it))">
              <!-- header môn phái (chữ Hán thư pháp + crest art tuỳ chọn) -->
              <div class="flex items-center gap-3 mb-3 pb-2.5 border-b border-slate-800">
                <div class="relative w-12 h-12 rounded-lg overflow-hidden flex items-center justify-center shrink-0 bg-gradient-to-br border" :class="$store.game.NGU_HANH[sec.he].grad+' '+$store.game.NGU_HANH[sec.he].ring">
                  <span class="text-[26px] leading-none font-bold opacity-90" style="font-family:'Lora',serif" :class="$store.game.heInfo(sec.he).text" x-text="sec.monPhai.han || (sec.he==='vatly'?'武':'符')"></span>
                  <img :src="'images/monphai/'+sec.he+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-baseline gap-1.5"><span class="font-bold text-[15px]" style="font-family:'Lora',serif" :class="$store.game.heInfo(sec.he).text" x-text="sec.monPhai.name"></span><span class="text-slate-600 text-sm" x-text="sec.monPhai.han"></span></div>
                  <div class="text-[11px] text-slate-500 leading-snug truncate" x-text="sec.monPhai.desc"></div>
                </div>
                <span class="text-[10px] px-1.5 py-0.5 rounded shrink-0" :class="$store.game.NGU_HANH[sec.he].badge" x-text="$store.game.heName(sec.he)"></span>
              </div>
              <!-- Phân loại trong môn phái: Tâm Pháp · Chiêu Thức · Bị Động; tile nhỏ -> bấm mở popup chi tiết -->
              <div class="space-y-3">
                <template x-for="grp in sec.groups" :key="grp.key">
                  <div x-show="grp.items.some(it=> !onlyLocked || !$store.game.itemOwned(it))">
                    <div class="flex items-center gap-1.5 mb-1.5">
                      <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                      <span class="text-[10px] uppercase tracking-wider text-slate-400 font-medium" x-text="grp.label"></span>
                      <span class="text-[10px] text-slate-600" x-text="'· '+grp.items.filter(it=> !onlyLocked || !$store.game.itemOwned(it)).length"></span>
                    </div>
                    <div class="grid gap-1.5" style="grid-template-columns:repeat(auto-fill,minmax(80px,1fr))">
                      <template x-for="it in grp.items.filter(it=> !onlyLocked || !$store.game.itemOwned(it))" :key="it.kind+'_'+it.id">
                        <button @click="$store.game.openTkDetail(it)" class="relative rounded-md overflow-hidden border text-left transition hover:brightness-110" :class="$store.game.itemMeta(it).borderCls + ' ' + ($store.game.itemOwned(it) ? '' : 'saturate-[.6]')">
                          <div class="relative w-full" style="aspect-ratio:1">
                            <div class="absolute inset-0 bg-gradient-to-br" :class="$store.game.NGU_HANH[sec.he].grad"></div>
                            <span class="absolute inset-0 flex items-center justify-center opacity-[.14] select-none" style="font-family:'Lora',serif;font-size:2.4rem;line-height:1" :class="$store.game.heInfo(sec.he).text" x-text="$store.game.itemMeta(it).han"></span>
                            <img :src="$store.game.itemImg(it)" class="absolute inset-0 w-full h-full object-cover" :class="$store.game.itemOwned(it)?'':'grayscale opacity-50'" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                            <template x-if="!$store.game.itemOwned(it)"><span class="absolute top-0.5 left-0.5 w-4 h-4 flex items-center justify-center rounded bg-ink/75 text-slate-200" x-html="$store.game.svg('lock','w-2.5 h-2.5')"></span></template>
                            <template x-if="$store.game.itemOwned(it)"><span class="absolute bottom-0.5 right-1 text-[11px] text-jade font-bold drop-shadow">✓</span></template>
                          </div>
                          <div class="px-1 py-0.5">
                            <div class="text-[9.5px] font-semibold leading-tight truncate" :class="$store.game.heInfo(sec.he).text" x-text="it.obj.name"></div>
                          </div>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </section>
          </template>
        </div>
      </template>

      <!-- ===== POPUP chi tiết võ học (Tàng Kinh Các) — bấm tile mở ===== -->
      <template x-if="$store.game.tkDetail">
        <div class="fixed inset-0 z-[60] flex items-center justify-center p-4" style="background:rgba(2,6,12,.8)" @click.self="$store.game.closeTkDetail()">
          <div class="panel rounded-xl w-[350px] max-w-full max-h-[92dvh] overflow-y-auto" @click.stop x-data="{ it: $store.game.tkDetail, m: $store.game.itemMeta($store.game.tkDetail) }">
            <div class="relative h-36 overflow-hidden bg-gradient-to-br" :class="$store.game.NGU_HANH[m.he].grad">
              <span class="absolute inset-0 flex items-center justify-center opacity-20 select-none" style="font-family:'Lora',serif;font-size:5rem;line-height:1" :class="$store.game.heInfo(m.he).text" x-text="m.han"></span>
              <img :src="$store.game.itemImg(it)" class="absolute inset-0 w-full h-full object-cover" :class="$store.game.itemOwned(it)?'':'grayscale opacity-60'" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
              <div class="absolute inset-0 bg-gradient-to-t from-ink via-ink/25 to-transparent"></div>
              <button @click="$store.game.closeTkDetail()" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-ink/70 border border-slate-600 text-slate-300 hover:text-rose-400 z-10">✕</button>
              <div class="absolute bottom-0 inset-x-0 p-3">
                <div class="text-lg font-bold text-white" style="font-family:'Lora',serif;text-shadow:0 2px 8px rgba(0,0,0,.95)" x-text="it.obj.name"></div>
                <div class="flex gap-1.5 mt-1">
                  <span class="text-[10px] px-1.5 py-0.5 rounded" :class="m.badgeCls" x-text="m.badgeText"></span>
                  <span class="text-[10px] px-1.5 py-0.5 rounded" :class="$store.game.NGU_HANH[m.he].badge" x-text="$store.game.heName(m.he)"></span>
                </div>
              </div>
            </div>
            <div class="p-4">
              <div class="lbl mb-1.5">Chỉ số</div>
              <div class="rounded-lg border border-slate-800 bg-ink3/40 divide-y divide-slate-800/70 mb-3">
                <template x-for="r in $store.game.tkRows(it)" :key="r.k+r.v">
                  <div class="flex items-center justify-between gap-3 px-3 py-1.5">
                    <span class="text-[11px] text-slate-500 shrink-0" x-text="r.k"></span>
                    <span class="text-[12.5px] font-semibold text-right" :class="r.hl?'text-rose-300':'text-slate-200'" x-text="r.v"></span>
                  </div>
                </template>
              </div>
              <template x-if="$store.game.tkFlavor">
                <div class="text-[12px] text-slate-400 italic leading-relaxed mb-4" x-text="'“'+$store.game.tkFlavor+'”'"></div>
              </template>
              <template x-if="$store.game.itemOwned(it)">
                <div class="w-full py-2.5 rounded-lg text-center text-sm font-bold bg-jade/15 border border-jade/40 text-jade">✓ Đã sở hữu</div>
              </template>
              <template x-if="!$store.game.itemOwned(it)">
                <button @click="$store.game.learnItem(it)" :disabled="!$store.game.canAffordCost($store.game.itemCost(it))" class="w-full py-2.5 rounded-lg text-sm font-bold transition border flex items-center justify-center gap-1.5" :class="!$store.game.canAffordCost($store.game.itemCost(it))?'bg-slate-800/60 border-slate-700 text-slate-500 cursor-not-allowed':($store.game.skillSource($store.game.itemCost(it))==='mua'?'bg-cyan/20 border-cyan/60 text-cyan hover:bg-cyan/30':'bg-amber-500/20 border-amber-400/60 text-amber-200 hover:bg-amber-500/30')">
                  <span x-text="$store.game.skillSource($store.game.itemCost(it))==='mua'?'Mua':'Học'"></span>
                  <span class="w-4 h-4 inline-flex items-center justify-center" x-html="$store.game.costIcon($store.game.itemCost(it))"></span>
                  <span x-text="$store.game.costAmt($store.game.itemCost(it))"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: VẠN VẬT PHỔ (Collection) ===== -->
      <template x-if="$store.game.view==='collection'">
        <div class="space-y-3" x-data="{ get g(){ return $store.game } }">
          <!-- Header banner (đồng bộ kiểu các màn: ảnh nền + gradient + icon art) -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <img src="images/ui/collection_banner.webp" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/collection_banner.png'}else{this.style.display='none'}">
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 36%,rgba(11,14,22,.5) 66%,rgba(11,14,22,.2) 100%)"></div>
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(245,191,36,.16), transparent 66%)"></div>
            <div class="absolute inset-y-0 left-0 w-1 bg-gradient-to-b from-gold to-amber-500/30"></div>
            <div class="relative w-full p-5 md:p-6 flex items-center gap-4">
              <div class="w-16 h-16 rounded-lg bg-ink3 border border-amber-500/30 flex items-center justify-center text-amber-300 shrink-0 overflow-hidden">
                <img src="images/ui/collection_icon.webp" alt="" class="w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/collection_icon.png'}else{this.style.display='none';this.nextElementSibling.style.display='flex'}">
                <span class="hidden w-full h-full items-center justify-center" x-html="g.svg('book','w-8 h-8')"></span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-[26px] gold-text leading-none fserif">Vạn Vật Phổ</div>
                <div class="text-[12.5px] text-slate-300 mt-1.5 italic max-w-md" style="font-family:'Lora',serif">"Thu lục vạn vật thiên hạ — tích đủ thành thục, một phần huyền cơ nhập thể."</div>
                <div class="flex items-center gap-2 mt-2.5 flex-wrap">
                  <span class="px-2.5 py-1 rounded-md bg-ink3/80 backdrop-blur-sm border border-slate-700 text-[11px]">Thu lục <b class="text-jade" x-text="g.codexTotalDone"></b>/<span x-text="g.codexTotalAll"></span> · <b class="text-jade" x-text="g.codexTotalAll?Math.round(g.codexTotalDone/g.codexTotalAll*100)+'%':'0%'"></b></span>
                  <span class="px-2.5 py-1 rounded-md bg-amber-900/25 backdrop-blur-sm border border-amber-700/40 text-[11px] text-amber-200">Phổ Lực: <b x-text="g.codexPhoLucText()"></b></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Tabs -->
          <div class="panel rounded-lg p-2 flex items-center gap-1.5 flex-wrap">
            <template x-for="c in g.codexCats" :key="c.key">
              <button @click="g.codexTab=c.key; g.codexDetail=null" class="px-3 py-1.5 rounded text-xs font-medium flex items-center gap-1.5 transition" :class="g.codexTab===c.key ? 'bg-jade text-ink' : 'bg-ink3 text-slate-400 hover:text-slate-200'">
                <span x-text="c.name"></span>
                <span class="text-[10px] px-1.5 rounded-full" :class="g.codexTab===c.key?'bg-ink/20 text-ink':'bg-ink2 text-slate-500'" x-text="g.codexCatDoneN(c)+'/'+c.entries.length"></span>
              </button>
            </template>
          </div>

          <!-- Set reward banner -->
          <div class="rounded-lg border-2 p-3 flex items-center gap-3" :class="g.codexCatDoneN(g.codexCat)>=g.codexCat.entries.length ? 'border-amber-400/70 bg-amber-950/20' : 'border-slate-700/70 bg-ink2/50'">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0" :class="g.codexCatDoneN(g.codexCat)>=g.codexCat.entries.length ? 'bg-amber-500/20 text-amber-300' : 'bg-ink3 text-slate-500'" x-html="g.codexCatDoneN(g.codexCat)>=g.codexCat.entries.length ? g.svg('star','w-5 h-5') : g.svg('lock','w-5 h-5')"></div>
            <div class="flex-1 min-w-0">
              <div class="text-[10px] uppercase tracking-wider text-slate-500">Thưởng trọn bộ</div>
              <div class="text-[13.5px] font-semibold" :class="g.codexCatDoneN(g.codexCat)>=g.codexCat.entries.length?'text-amber-200':'text-slate-300'" x-text="g.codexCat.setLabel"></div>
              <div class="text-[10px] text-slate-500 mt-0.5">Mỗi mục đạt <b class="text-slate-400" x-text="g.fmt(g.codexCat.threshold)+' '+g.codexCat.unit"></b> là thu lục đủ (<span x-text="g.codexCat.per.label"></span>).</div>
            </div>
            <div class="text-right shrink-0">
              <div class="text-[11px] text-slate-400" x-text="g.codexCatDoneN(g.codexCat)+'/'+g.codexCat.entries.length"></div>
              <div class="w-28 h-1.5 rounded-full bg-slate-800 overflow-hidden mt-1"><div class="h-full bg-gradient-to-r from-jade to-amber-400" :style="`width:${g.codexCatDoneN(g.codexCat)/g.codexCat.entries.length*100}%`"></div></div>
            </div>
          </div>

          <!-- Grid — chia nhóm trong phổ cho đỡ loạn (gear theo ô · vật phẩm theo loại · quái theo affinity · pet theo hệ · bí cảnh theo cảnh giới) -->
          <div class="panel rounded-lg p-3 space-y-4">
            <template x-for="grp in g.codexCat.groups" :key="grp.label">
              <div>
                <div class="flex items-center gap-1.5 mb-2">
                  <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                  <span class="text-[11px] uppercase tracking-wider text-slate-400 font-medium" x-text="grp.label"></span>
                  <span class="text-[10px] text-slate-600" x-text="'· '+g.codexGroupDone(g.codexCat,grp)+'/'+grp.entries.length"></span>
                </div>
                <div class="grid gap-2.5" style="grid-template-columns:repeat(auto-fill,minmax(112px,1fr))">
                  <template x-for="e in grp.entries" :key="e.id">
                <button @click="g.codexOpen(e)" class="relative rounded-lg overflow-hidden border-2 text-left transition hover:brightness-110"
                  :class="g.codexEntryState(g.codexCat,e)==='done' ? (e.quality ? g.QUALITY[e.quality].border : (e.he ? g.NGU_HANH[e.he].ring : 'border-amber-500/50')) : 'border-slate-700/50'">
                  <div class="relative w-full" style="aspect-ratio:1">
                    <div class="absolute inset-0 bg-gradient-to-br" :class="g.codexEntryState(g.codexCat,e)==='done' ? (e.quality ? g.QUALITY[e.quality].grad : (e.he ? g.NGU_HANH[e.he].grad : 'from-amber-900/20 to-ink')) : 'from-slate-800/40 to-ink'"></div>
                    <!-- Art 1 lớp (tự fallback emoji). Chưa thu lục đủ -> XÁM; đủ -> màu. -->
                    <span class="absolute inset-0 flex items-center justify-center transition" :class="g.codexEntryState(g.codexCat,e)==='done' ? '' : 'grayscale opacity-70'" x-html="g.codexArtTag(g.codexCat,e)"></span>
                    <template x-if="g.codexEntryState(g.codexCat,e)==='locked'">
                      <div class="absolute inset-0 bg-ink/70 flex items-center justify-center text-slate-500" x-html="g.svg('lock','w-6 h-6')"></div>
                    </template>
                    <span class="absolute bottom-0 inset-x-0 bg-ink/85 px-1.5 py-1">
                      <span class="block text-[11px] font-semibold truncate leading-tight" :class="g.codexEntryState(g.codexCat,e)==='done' ? (e.quality?g.QUALITY[e.quality].text:'text-slate-100') : (g.codexEntryState(g.codexCat,e)==='locked'?'text-slate-600':'text-slate-300')" x-text="g.codexEntryState(g.codexCat,e)==='locked' ? '???' : e.name"></span>
                      <template x-if="g.codexEntryState(g.codexCat,e)==='done'"><span class="block text-[9px] leading-tight text-amber-300/90" x-text="g.codexCat.per.label"></span></template>
                      <template x-if="g.codexEntryState(g.codexCat,e)==='prog'"><span class="block text-[9px] leading-tight text-slate-400 tabular-nums" x-text="g.fmt(g.codexCnt(g.codexCat.key,e.id))+' / '+g.fmt(g.codexCat.threshold)"></span></template>
                      <template x-if="g.codexEntryState(g.codexCat,e)==='locked'"><span class="block text-[9px] leading-tight text-slate-700">Chưa gặp</span></template>
                    </span>
                  </div>
                </button>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <!-- Detail popup -->
          <template x-if="g.codexDetail">
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(2,6,12,.8)" @click.self="g.closeCodex()">
              <div class="panel relative rounded-2xl w-full max-w-sm overflow-hidden border border-slate-700" @click.stop
                   x-data="{ get e(){ return $store.game.codexDetail }, get cat(){ return $store.game.codexCat }, get st(){ return $store.game.codexEntryState($store.game.codexCat, $store.game.codexDetail) } }">
                <button @click="$store.game.closeCodex()" class="absolute top-2.5 right-2.5 z-10 w-8 h-8 rounded-full bg-ink/70 border border-slate-600 text-slate-300 hover:text-rose-400">✕</button>
                <div class="relative aspect-square flex items-center justify-center" :class="st==='done'?'':'grayscale opacity-70'">
                  <div class="absolute inset-0 bg-gradient-to-br" :class="st==='done'?(e.quality?$store.game.QUALITY[e.quality].grad:(e.he?$store.game.NGU_HANH[e.he].grad:'from-amber-900/20 to-ink')):'from-slate-800/40 to-ink'"></div>
                  <span class="absolute inset-0 flex items-center justify-center" x-html="$store.game.codexArtTag(cat,e)"></span>
                  <template x-if="st==='locked'"><div class="absolute inset-0 bg-ink/60 flex items-center justify-center text-slate-500" x-html="$store.game.svg('lock','w-12 h-12')"></div></template>
                </div>
                <div class="p-4">
                  <div class="flex items-center gap-2 flex-wrap mb-1.5">
                    <span class="text-lg fserif font-bold" :class="st==='locked'?'text-slate-400':(e.quality?$store.game.QUALITY[e.quality].text:'text-slate-100')" x-text="st==='locked'?'??? — Chưa gặp':e.name"></span>
                    <span x-show="st!=='locked' && e.sub" class="text-[10px] px-1.5 py-0.5 rounded bg-ink3 border border-slate-700 text-slate-300" x-text="e.sub"></span>
                  </div>
                  <div class="text-[11px] text-slate-500 mb-3" x-text="st==='locked' ? 'Tìm gặp để bắt đầu thu lục.' : ('Nơi tìm: '+e.where)"></div>
                  <div class="rounded-lg px-3 py-2 mb-2 bg-ink3/60 border border-slate-700">
                    <div class="flex items-center justify-between text-[11px] mb-1">
                      <span class="text-slate-400" x-text="'Tiến độ ('+cat.unit+')'"></span>
                      <span class="font-mono" :class="st==='done'?'text-jade':'text-slate-300'" x-text="$store.game.fmt($store.game.codexCnt(cat.key,e.id))+' / '+$store.game.fmt(cat.threshold)"></span>
                    </div>
                    <div class="h-1.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-gradient-to-r from-jade to-amber-400" :style="`width:${$store.game.codexEntryPct(cat,e)}%`"></div></div>
                  </div>
                  <div class="rounded-lg px-3 py-2 flex items-center justify-between" :class="st==='done'?'bg-amber-900/20 border border-amber-700/40':'bg-ink3/40 border border-slate-700'">
                    <span class="text-[11px] text-slate-400" x-text="st==='done'?'Phổ Lực (đã nhập thể)':'Phổ Lực khi thu lục đủ'"></span>
                    <span class="text-[13px] font-bold" :class="st==='done'?'text-amber-300':'text-slate-500'" x-text="cat.per.label"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- ===== VIEW: INVENTORY ===== -->
      <template x-if="$store.game.view==='inventory'">
        <section class="panel rounded-lg p-4">
          <div class="lbl mb-3">Hành Lý</div>
          <template x-if="$store.game.inventoryByType.length === 0">
            <div class="text-sm text-slate-600 py-6 text-center">Túi trống. Hãy đi thu thập!</div>
          </template>
          <template x-for="grp in $store.game.inventoryByType" :key="grp.type">
            <div class="mb-4">
              <div class="text-xs text-jade mb-2" x-text="grp.label"></div>
              <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(72px,1fr))">
                <template x-for="it in grp.items" :key="it.uid || it.id">
                  <button @click="$store.game.openItemModal(it.uid || it.id)" class="group flex flex-col items-center gap-1 text-center" :title="it.name+' — bấm xem chi tiết'">
                    <div class="relative w-full aspect-square rounded flex items-center justify-center ring-1 transition group-hover:ring-2 group-hover:brightness-110" :class="$store.game.itemQuality(it).bg + ' ' + $store.game.itemQuality(it).ring">
                      <template x-if="$store.game.itemHaloHex(it)"><i class="halo2" :style="$store.game.haloStyle(it)"</i></template>
                      <span class="absolute inset-0 rounded overflow-hidden flex items-center justify-center text-3xl" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.55))" x-html="$store.game.ico(it.id, it.icon)"></span>
                      <template x-if="it.qty"><span class="absolute bottom-0.5 right-1 text-[10px] font-bold text-slate-200" x-text="$store.game.fmt(it.qty)"></span></template>
                      <template x-if="it.plus>0"><span class="absolute top-0.5 right-0.5 text-[9px] font-bold text-amber-300 bg-ink/85 rounded px-0.5 leading-none" x-text="'+'+it.plus"></span></template>
                    </div>
                    <span class="text-[10px] leading-tight line-clamp-2 w-full min-h-[24px] opacity-80 group-hover:opacity-100" :class="$store.game.itemQuality(it).text" x-text="it.name"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>
        </section>
      </template>

      <!-- ===== POPUP: Chi tiết vật phẩm (bấm item ở Hành Lý) ===== -->
      <template x-if="$store.game.itemModal && $store.game.itemModalObj">
        <div class="fixed inset-0 z-[55] flex items-center justify-center p-4" style="background:rgba(2,6,12,.74)" @click.self="$store.game.closeItemModal()">
          <div class="panel rounded-xl border-2 w-full max-w-sm overflow-hidden" :class="$store.game.itemQuality($store.game.itemModalObj).border" @click.stop x-data="{ get m(){ return $store.game.itemModalObj } }">
            <template x-if="m">
              <div>
                <!-- Banner art -->
                <div class="relative h-44 flex items-center justify-center bg-gradient-to-br" :class="$store.game.itemQuality(m).grad">
                  <div class="absolute inset-0 bg-gradient-to-t from-ink to-transparent opacity-40"></div>
                  <button @click="$store.game.closeItemModal()" class="absolute top-2 right-2 w-8 h-8 rounded-full bg-ink/70 border border-slate-600 hover:border-rose-500 text-slate-300 hover:text-rose-400 z-10">✕</button>
                  <div class="relative w-28 h-28 rounded-xl border-2 flex items-center justify-center bg-ink/40 cursor-zoom-in hover:ring-2 hover:ring-amber-300/50 transition" :class="$store.game.itemQuality(m).border" style="box-shadow:0 0 24px rgba(0,0,0,.45)" @click="$store.game.openLightbox(m.id, m.icon, m.name)" title="Bấm để phóng to">
                    <span class="w-24 h-24 flex items-center justify-center text-5xl" style="filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))" x-html="$store.game.ico(m.id, m.icon)"></span>
                  </div>
                </div>
                <!-- Info -->
                <div class="p-4">
                  <div class="flex items-center gap-2 flex-wrap mb-1.5">
                    <span class="text-lg font-bold" style="font-family:'Lora',serif" :class="$store.game.itemQuality(m).text" x-text="m.name"></span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded uppercase tracking-wide font-bold border bg-ink/40" :class="$store.game.itemQuality(m).text+' '+$store.game.itemQuality(m).border" x-text="$store.game.itemQuality(m).name"></span>
                  </div>
                  <div class="text-[11px] text-slate-500 mb-2.5">Loại: <span class="text-slate-300" x-text="$store.game.itemTypeLabel(m.type)"></span></div>
                  <div class="text-[12px] text-slate-300 leading-snug mb-3" x-text="$store.game.itemDescOf(m)"></div>
                  <!-- Trang bị: slot + chỉ số (instance roll) -->
                  <template x-if="m.equip">
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/60 px-3 py-2.5 mb-3">
                      <div class="text-[10px] uppercase tracking-wide text-slate-500 mb-1.5 flex items-center justify-between"><span>Trang bị · <span class="text-slate-300" x-text="$store.game.equipSlotLabel(m.equip.slot)"></span></span><template x-if="m.plus>0"><span class="text-amber-300 font-bold" x-text="'+'+m.plus"></span></template></div>
                      <template x-if="m.reqLevel > 1">
                        <div class="text-[11px] mb-2" :class="$store.game.canEquip(m)?'text-slate-400':'text-rose-400'">⚔ Yêu cầu mang: <b x-text="$store.game.equipReqText(m)"></b><span x-show="!$store.game.canEquip(m)" x-text="' (bạn: Lv '+$store.game.equipCurLevel(m)+')'"></span></div>
                      </template>
                      <!-- THUỘC TÍNH: list dọc, tên + giá trị TÔ MÀU theo bậc roll (min→max) -->
                      <template x-if="Object.keys(m.stats||{}).length">
                        <div class="flex items-center gap-2 mb-0.5"><span class="text-[10px] tracking-[0.18em] text-jade/80" style="font-family:'Lora',serif">THUỘC TÍNH</span><div class="flex-1 h-px bg-gradient-to-r from-jade/25 to-transparent"></div></div>
                      </template>
                      <div class="divide-y divide-slate-800/50">
                        <template x-for="(v,k) in (m.stats||{})" :key="k">
                          <div class="flex items-center gap-3 py-1.5" :style="'color:'+$store.game.gearLineColor(m,k)">
                            <span class="text-[12.5px] flex-1" style="font-family:'Lora',serif" x-text="$store.game.statLabel(k)"></span>
                            <span class="text-[13.5px] font-bold tabular-nums" x-text="$store.game.gearVal(k,v)"></span>
                          </div>
                        </template>
                        <template x-if="$store.game.toolEffText(m)"><div class="flex items-center gap-3 py-1.5 text-emerald-300"><span class="text-[12.5px] flex-1" x-text="$store.game.toolEffText(m)"></span></div></template>
                      </div>
                      <template x-if="!Object.keys(m.stats||{}).length && !$store.game.toolEffText(m)"><div class="text-[11px] text-slate-500 py-1">Không tăng chỉ số.</div></template>
                    </div>
                  </template>
                  <!-- Đồ Phổ: Lĩnh Ngộ -> mở rèn ở Rèn Đúc -->
                  <template x-if="m.type==='doPho'">
                    <div class="rounded-lg bg-ink3/50 border px-3 py-2.5 mb-3" :class="$store.game.QUALITY[m.quality].border">
                      <div class="text-[11.5px] text-slate-300 mb-1.5 leading-snug">Lĩnh ngộ để mở rèn <b :class="$store.game.QUALITY[m.quality].text" x-text="($store.game.ITEMS[m.gearId]||{}).name"></b> ở <b class="text-jade">Rèn Đúc</b> — <b class="text-amber-300">mỗi lượt chỉ rèn 1 món</b>, hết lượt phải lĩnh ngộ cuộn khác.</div>
                      <div class="text-[11px] text-slate-400 mb-2">Lượt rèn hiện có: <b class="text-emerald-300" x-text="$store.game.doPhoChargeOf(m.id)"></b></div>
                      <button @click="$store.game.learnDoPho(m.id)" :disabled="(m.qty||0)<1" class="w-full py-2 rounded-lg text-[12px] font-bold bg-amber-600/85 hover:bg-amber-500 text-ink transition disabled:opacity-40 disabled:cursor-not-allowed">📜 Lĩnh Ngộ (+1 lượt rèn)</button>
                    </div>
                  </template>
                  <!-- Số lượng + giá -->
                  <div class="grid grid-cols-2 gap-2 mb-3">
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/50 px-3 py-2"><div class="text-[9px] uppercase tracking-wide text-slate-500">Số lượng</div><div class="text-base font-bold text-slate-100" x-text="$store.game.fmt(m.qty)"></div></div>
                    <div class="rounded-lg bg-ink3/50 border border-slate-700/50 px-3 py-2"><div class="text-[9px] uppercase tracking-wide text-slate-500">Giá bán / cái</div><div class="text-base font-bold text-gold flex items-center gap-1"><span class="w-4 h-4 inline-flex shrink-0" x-html="$store.game.ico('bac','🟡')"></span><span x-text="$store.game.fmt(m.value||0)"></span></div></div>
                  </div>
                  <!-- Bán nhanh -->
                  <template x-if="(m.value||0) > 0 && m.isGear">
                    <button @click="$store.game.sellFromModal(1)" class="w-full py-2 rounded-lg text-[12px] font-bold bg-gold/80 hover:bg-gold text-ink transition" x-text="'Bán (+'+$store.game.fmt(m.value||0)+' Bạc)'"></button>
                  </template>
                  <template x-if="(m.value||0) > 0 && !m.isGear">
                    <div class="flex gap-2">
                      <button @click="$store.game.sellFromModal(1)" class="flex-1 py-2 rounded-lg text-[12px] font-bold bg-ink3 border border-slate-700 hover:border-gold text-slate-200 transition">Bán 1</button>
                      <button @click="$store.game.sellFromModal(m.qty)" class="flex-1 py-2 rounded-lg text-[12px] font-bold bg-gold/80 hover:bg-gold text-ink transition" x-text="'Bán hết (+'+$store.game.fmt((m.value||0)*m.qty)+' Bạc)'"></button>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: MAP (bản đồ hành trình kiểu xianxia) ===== -->
      <template x-if="$store.game.view==='map'">
        <div class="space-y-3">
          <!-- Banner Khinh Công — NẰM RIÊNG, ngoài khung bản đồ (không thể che landmark) -->
          <template x-if="$store.game.isTraveling">
            <div class="panel rounded-lg px-4 py-3 flex items-center gap-3">
              <span class="text-sm text-jade whitespace-nowrap shrink-0">Khinh Công → <b x-text="$store.game.travelToObj ? $store.game.travelToObj.name : ''"></b></span>
              <div class="flex-1 min-w-0 h-2.5 rounded-full bg-slate-700 overflow-hidden"><div class="h-full bg-jade transition-all" :style="`width:${$store.game.travelProgressPct}%`"></div></div>
              <span class="text-sm text-slate-300 font-mono whitespace-nowrap shrink-0" x-text="'còn ' + $store.game.fmtTime($store.game.travelRemainSec)"></span>
              <button @click="$store.game.cancelTravel()" class="shrink-0 text-sm px-4 py-1.5 rounded-lg bg-ink3 border border-slate-700 text-slate-300 hover:text-rose-400 hover:border-rose-500">Huỷ</button>
            </div>
          </template>
          <!-- MOBILE: danh sách vùng theo tầng cảnh giới (desktop dùng bản đồ tọa độ bên dưới) -->
          <div class="lg:hidden space-y-3">
            <div class="panel rounded-lg px-3 py-2.5 flex items-center gap-2">
              <span class="text-amber-200/50">❖</span>
              <span class="text-sm font-semibold tracking-[0.2em] text-amber-100/90" style="font-family:serif">BẢN ĐỒ</span>
              <span class="ml-auto text-[11px] text-slate-400">Chiến Đấu Lv <span class="text-amber-200" x-text="$store.game.combatLevel"></span></span>
            </div>
            <template x-for="t in $store.game.REALM_TIERS" :key="t.id">
              <section class="panel rounded-lg p-3">
                <div class="flex items-center gap-2 mb-2.5 pb-2 border-b border-slate-800">
                  <span class="w-8 h-8 rounded-lg flex items-center justify-center bg-ink2 ring-1" :class="$store.game.isCurrentTier(t)?'ring-jade/50':'ring-slate-700'" x-html="$store.game.ico(t.id, t.icon)"></span>
                  <div class="flex-1 min-w-0"><div class="text-[13px] font-bold" :class="t.text" style="font-family:serif" x-text="t.name"></div><div class="text-[10px] text-slate-500" x-text="t.range"></div></div>
                  <span class="text-[10px] text-slate-500" x-text="$store.game.locsInTier(t).length + ' vùng'"></span>
                </div>
                <div class="space-y-1.5">
                  <template x-for="loc in $store.game.locsInTier(t)" :key="loc.id">
                    <button @click="$store.game.openLocation(loc.id)" class="w-full flex items-center gap-3 p-2.5 rounded-lg border text-left transition" :class="($store.game.isCurrentLocation(loc)?'border-jade/60 bg-jade/10':'border-slate-800 bg-ink3/40 hover:border-slate-600') + ($store.game.locUnlocked(loc)?'':' opacity-60')">
                      <span class="w-12 h-12 rounded-lg shrink-0 flex items-center justify-center text-2xl bg-ink2 border" :class="($store.game.isCurrentLocation(loc)?'border-jade/50':'border-slate-700') + ($store.game.locUnlocked(loc)?'':' grayscale')" x-html="$store.game.ico(loc.id, loc.icon)"></span>
                      <div class="flex-1 min-w-0">
                        <div class="text-[14px] font-semibold truncate" :class="$store.game.locUnlocked(loc)?'text-amber-50':'text-slate-400'" style="font-family:serif" x-text="loc.name"></div>
                        <div class="text-[11px] mt-0.5">
                          <template x-if="$store.game.isCurrentLocation(loc)"><span class="text-jade">● Đang ở đây</span></template>
                          <template x-if="!$store.game.isCurrentLocation(loc) && $store.game.locUnlocked(loc)"><span class="text-emerald-400">Sẵn sàng — chạm để đến</span></template>
                          <template x-if="!$store.game.locUnlocked(loc)"><span class="text-slate-500" x-text="'🔒 Cần Chiến Đấu Lv '+ loc.reqLevel"></span></template>
                        </div>
                      </div>
                      <span class="shrink-0 text-[10px] font-bold px-2 py-0.5 rounded bg-black/50 border" :class="$store.game.locTier(loc).text + ' ' + $store.game.locTier(loc).border" x-text="'Lv ' + loc.reqLevel"></span>
                    </button>
                  </template>
                </div>
              </section>
            </template>
          </div>

          <section class="panel rounded-xl p-2 sm:p-3 hidden lg:block">
          <!-- Khung viền vàng -->
          <div class="rounded-xl p-[2px] bg-gradient-to-br from-amber-600/50 via-amber-200/20 to-amber-700/50 shadow-[0_0_30px_rgba(0,0,0,0.45)]">
            <div class="relative w-full rounded-[10px]"
                 style="aspect-ratio:3/2; min-height:640px; background-color:#0a0e16;
                   background-image:url('images/ui/worldmap.webp'),
                     radial-gradient(ellipse at 30% 28%, rgba(45,212,191,0.10), transparent 55%),
                     radial-gradient(ellipse at 78% 72%, rgba(99,102,241,0.12), transparent 55%);
                   background-size:cover; background-position:center; background-repeat:no-repeat;">

              <!-- Header -->
              <div class="absolute top-0 inset-x-0 h-11 flex items-center px-4 rounded-t-[10px] bg-gradient-to-b from-black/70 to-transparent z-30">
                <span class="text-amber-200/40">❖</span>
                <span class="ml-2 text-base font-semibold tracking-[0.25em] text-amber-100/90" style="font-family:serif">BẢN ĐỒ</span>
                <span class="ml-auto text-[11px] text-slate-400">Chiến Đấu Lv <span class="text-amber-200" x-text="$store.game.combatLevel"></span></span>
              </div>


              <!-- Đường linh khí (cong, chấm sáng, chảy) -->
              <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                <template x-for="(s,i) in $store.game.mapSegments" :key="i">
                  <path :d="s.d" fill="none" stroke-linecap="round" vector-effect="non-scaling-stroke"
                    stroke-width="1.6" stroke-dasharray="0.1 3.2"
                    :stroke="s.reached ? 'rgba(165,243,252,0.95)' : 'rgba(148,163,184,0.38)'"
                    :style="s.reached ? 'filter:drop-shadow(0 0 2.5px rgba(103,232,249,0.9))' : ''">
                    <animate attributeName="stroke-dashoffset" from="0" to="-6.6" dur="1.6s" repeatCount="indefinite"/>
                  </path>
                </template>
              </svg>

              <!-- Panel Tầng Cảnh Giới -->
              <aside class="absolute left-2 top-12 w-28 sm:w-32 rounded-lg bg-black/45 backdrop-blur-sm border border-amber-500/20 p-2 z-30">
                <div class="text-[11px] font-semibold tracking-wider text-amber-100/80 text-center mb-2" style="font-family:serif">TẦNG CẢNH GIỚI</div>
                <div class="space-y-1">
                  <template x-for="t in $store.game.REALM_TIERS" :key="t.id">
                    <div class="flex flex-col items-center text-center py-1.5 rounded-md transition"
                         :class="$store.game.isCurrentTier(t) ? 'bg-white/10 ring-1 ring-amber-300/50' : 'opacity-75'">
                      <div class="w-8 h-8 flex items-center justify-center text-xl" x-html="$store.game.ico(t.id, t.icon)"></div>
                      <div class="text-xs font-semibold mt-0.5" :class="t.text" x-text="t.name"></div>
                      <div class="text-[9px] text-slate-400" x-text="t.range"></div>
                    </div>
                  </template>
                </div>
              </aside>

              <!-- Landmark: đảo neo đúng tâm toạ độ, tên + Lv treo chính giữa dưới đảo -->
              <template x-for="loc in $store.game.LOCATIONS" :key="loc.id">
                <div class="absolute -translate-x-1/2 -translate-y-1/2 group z-10"
                     :style="`left:${loc.mapX}%; top:${loc.mapY}%`">
                  <!-- Đảo (chính giữa điểm neo) -->
                  <div class="relative w-24 h-24 lg:w-[7.5rem] lg:h-[7.5rem] cursor-pointer" @click="$store.game.openLocation(loc.id)">
                    <div class="w-full h-full flex items-center justify-center text-5xl transition-transform duration-200 group-hover:scale-110 drop-shadow-[0_8px_12px_rgba(0,0,0,0.7)]"
                      :class="$store.game.locUnlocked(loc) ? '' : 'grayscale opacity-45'"
                      x-html="$store.game.ico(loc.id, loc.icon)"></div>
                    <template x-if="!$store.game.locUnlocked(loc)">
                      <span class="absolute inset-0 flex items-center justify-center text-2xl opacity-90 pointer-events-none">🔒</span>
                    </template>
                    <template x-if="$store.game.isCurrentLocation(loc)">
                      <span class="absolute inset-2 rounded-full ring-2 ring-jade/70 animate-pulse pointer-events-none"></span>
                    </template>
                    <template x-if="$store.game.isTraveling && $store.game.travelToId===loc.id">
                      <span class="absolute inset-2 rounded-full ring-2 ring-amber-300/80 animate-pulse pointer-events-none"></span>
                    </template>

                    <!-- Tên + Lv: căn chính giữa ngay dưới đảo -->
                    <div class="absolute top-full left-1/2 -translate-x-1/2 mt-0.5 flex flex-col items-center pointer-events-none">
                      <div class="relative px-3 py-0.5 rounded bg-gradient-to-b from-[#1b2740] to-[#0e1626] border border-amber-400/40 shadow-md">
                        <span class="text-[11px] font-semibold tracking-wide whitespace-nowrap"
                          :class="$store.game.locUnlocked(loc) ? 'text-amber-50' : 'text-slate-400'"
                          style="font-family:serif" x-text="loc.name"></span>
                        <span class="absolute -left-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45 bg-amber-300/90 border border-amber-100/50"></span>
                        <span class="absolute -right-1 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rotate-45 bg-amber-300/90 border border-amber-100/50"></span>
                      </div>
                      <div class="mt-1 text-[9px] font-bold px-2 py-0.5 rounded bg-black/70 border whitespace-nowrap"
                        :class="$store.game.locTier(loc).text + ' ' + $store.game.locTier(loc).border"
                        x-text="'Lv '+loc.reqLevel"></div>
                    </div>

                    <!-- Hover info (trên đảo) -->
                    <div class="absolute left-1/2 -translate-x-1/2 bottom-full mb-1 w-44 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none z-40">
                      <div class="bg-black/90 backdrop-blur border border-amber-400/30 rounded-lg p-2 text-center shadow-xl">
                        <div class="text-xs font-semibold text-amber-50" x-text="loc.name"></div>
                        <div class="text-[10px] text-slate-400 mt-0.5 leading-snug" x-text="loc.desc"></div>
                        <div class="text-[10px] mt-1" :class="$store.game.locUnlocked(loc) ? 'text-emerald-300' : 'text-rose-300'"
                          x-text="$store.game.locUnlocked(loc) ? '✓ Đã thông' : ('🔒 Cần Chiến Đấu Lv '+loc.reqLevel)"></div>
                      </div>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Chú thích đáy -->
              <div class="absolute bottom-0 inset-x-0 h-10 flex items-center justify-center gap-3 sm:gap-5 px-3 rounded-b-[10px] bg-gradient-to-t from-black/75 to-transparent text-[10px] sm:text-[11px] text-slate-300 z-30">
                <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_6px_2px_rgba(52,211,153,0.55)]"></span>Đã mở</span>
                <span class="flex items-center gap-1 text-slate-400">🔒 Chưa đạt cấp</span>
                <span class="hidden md:flex items-center gap-2 text-slate-500"><span class="text-amber-300/40">◆</span>Chạm địa điểm để xem chi tiết<span class="text-amber-300/40">◆</span></span>
              </div>

            </div>
          </div>
        </section>
        </div>
      </template>

      <!-- ===== VIEW: YÊU VƯƠNG (World Boss) — VÂY SÁT THEO LƯỢT, master-detail ===== -->
      <template x-if="$store.game.view==='worldboss'">
        <div class="space-y-3" x-data="{ get g(){ return $store.game },
             TH:{ bachHo:{c:'#e2e8f0',g:'226,232,240',d:'#475569'}, huyenQuy:{c:'#2dd4bf',g:'45,212,191',d:'#134e4a'}, huyetLang:{c:'#fb7185',g:'244,63,94',d:'#7f1d2e'}, cuHung:{c:'#fb923c',g:'251,146,60',d:'#7c2d12'}, docGiao:{c:'#34d399',g:'16,185,129',d:'#0c5345'}, loiBang:{c:'#818cf8',g:'129,140,248',d:'#312e81'}, hoaLan:{c:'#fbbf24',g:'245,158,11',d:'#7a4310'}, hoYeu:{c:'#e879f9',g:'232,121,249',d:'#701a75'}, bangPhuong:{c:'#5cb8f0',g:'56,189,248',d:'#0c4a6e'}, thienMa:{c:'#a78bfa',g:'139,92,246',d:'#4c1d95'} },
             SEAL:{ bachHo:'白虎', huyenQuy:'玄龜', huyetLang:'血狼', cuHung:'巨熊', docGiao:'毒蛟', loiBang:'雷鵬', hoaLan:'火麟', hoYeu:'狐媚', bangPhuong:'冰凰', thienMa:'天魔' },
             th(b){ return this.TH[b.wb.eggBase]||this.TH.huyetLang }, seal(b){ return this.SEAL[b.wb.eggBase]||'妖王' } }">

          <!-- ===== Header ===== -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <!-- Banner art nền (gen tay → images/ui/yv_banner.png); thiếu file -> ẩn, dùng nền CSS fallback -->
            <img src="images/ui/yv_banner.webp" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/yv_banner.png'}else{this.style.display='none'}">
            <!-- Lớp phủ TỐI trái→phải: giữ tiêu đề + mô tả luôn đọc rõ trên art -->
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.85) 34%,rgba(11,14,22,.55) 64%,rgba(11,14,22,.22) 100%)"></div>
            <!-- Glow đỏ tinh tế bên phải (giữ chất Yêu Vương) -->
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(244,63,94,.18), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6">
              <div class="text-[28px] gold-text leading-none fserif">Vây Sát Yêu Vương</div>
