              <div class="text-[13px] text-slate-300/90 leading-snug mt-2 max-w-2xl fserif">Hung thú thượng cổ nuốt tinh hoa nhật nguyệt mà hoá <b class="text-rose-300">Yêu Vương</b>, uy áp nghiêng trời — mỗi phen giáng thế là yêu khí ngút mây, sinh linh khiếp rạp. Kẻ gan dám vây sát mới đoạt nổi <b class="text-amber-300">linh bảo</b> trong truyền thuyết, một trận lưu danh thiên hạ.</div>
            </div>
          </div>

          <!-- ===== Master-detail ===== -->
          <div class="grid lg:grid-cols-[248px_1fr] gap-3 items-start">

            <!-- RAIL: danh sách 5 Yêu Vương (mobile: cuộn ngang) -->
            <div class="flex gap-2 overflow-x-auto pb-1 lg:block lg:space-y-2 lg:overflow-visible">
              <template x-for="b in g.yeuVuongList" :key="b.id">
                <button @click="g.selectBoss(b.id)" class="w-52 shrink-0 lg:w-full text-left rounded-lg p-2 flex items-center gap-2.5 border transition" :style="b.id===g.bossSel ? 'border-color:'+th(b).c+'aa;background:linear-gradient(135deg,'+th(b).d+'33,transparent)' : 'border-color:#1e293b;background:#0f1521'">
                  <div class="w-11 h-11 rounded-lg overflow-hidden shrink-0 flex items-center justify-center" :class="g.bossLocked(b.id)?'grayscale opacity-60':''" :style="'background:radial-gradient(circle,'+th(b).d+'55,#05070d);border:1px solid '+th(b).c+'55'" x-html="g.ico(b.id,b.icon)"></div>
                  <div class="min-w-0 flex-1">
                    <div class="text-[12.5px] font-semibold truncate" :style="'color:'+(b.id===g.bossSel?th(b).c:'#cbd5e1')" x-text="b.name"></div>
                    <div class="flex items-center gap-1.5 text-[10px]">
                      <span class="text-slate-600" x-text="'Lv'+b.reqLevel"></span>
                      <span :style="'color:'+(g.bossStateOf(b.id)==='alive'?'#34d399':g.bossStateOf(b.id)==='fighting'?'#fbbf24':g.bossStateOf(b.id)==='locked'?'#475569':'#94a3b8')" x-text="'● '+(g.bossStateOf(b.id)==='alive'?'Đang sống':g.bossStateOf(b.id)==='fighting'?'Giao chiến':g.bossStateOf(b.id)==='locked'?'Chưa đủ cấp':g.bossCdLive(b.id))"></span>
                    </div>
                  </div>
                  <span class="text-base fserif shrink-0" :style="'color:'+th(b).c+'66'" x-text="seal(b)"></span>
                </button>
              </template>
            </div>

            <!-- DETAIL: trang Yêu Vương đang chọn -->
            <div x-data="{ get b(){ return g.bossSelObj } }">

              <!-- Hero band -->
              <div class="relative rounded-xl overflow-hidden mb-3" :style="'border:1px solid '+th(b).c+'55;background:linear-gradient(135deg,'+th(b).d+'33,#0a0e16 64%);box-shadow:0 0 30px -12px rgba('+th(b).g+',.7)'">
                <div class="absolute left-0 top-0 bottom-0 w-1/2 pointer-events-none" :style="'background:radial-gradient(ellipse at 16% 45%, rgba('+th(b).g+',.20), transparent 66%)'"></div>
                <div class="relative flex flex-col sm:flex-row gap-4 p-4">
                  <div class="shrink-0 relative">
                    <div class="absolute -left-1.5 top-2 z-10 w-6 rounded-md flex flex-col items-center py-1.5 gap-0.5" :style="'background:linear-gradient(180deg,'+th(b).d+',#0a0e16);border:1px solid '+th(b).c+'66'">
                      <template x-for="ch in seal(b).split('')" :key="ch"><span class="text-[12px] leading-none" :style="'color:'+th(b).c" x-text="ch"></span></template>
                    </div>
                    <div class="w-32 h-32 rounded-xl overflow-hidden flex items-center justify-center" :class="g.bossLocked(b.id)?'grayscale opacity-60':''" :style="'background:radial-gradient(circle,'+th(b).d+'66,#05070d);border:2px solid '+th(b).c+'66;font-size:52px'" x-html="g.ico(b.id,b.icon)"></div>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-2xl fserif" :style="'color:'+th(b).c" x-text="b.name"></span>
                      <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-300" x-text="'Lv '+b.reqLevel"></span>
                      <template x-if="!g.bossLocked(b.id)"><span class="text-[10px] px-1.5 py-0.5 rounded" :style="'background:rgba('+th(b).g+',.15);border:1px solid '+th(b).c+'55'"><span class="text-slate-400">Ngũ Hành: </span><span :class="g.heInfo(g.bossHe(b.id)).text" x-text="g.heName(g.bossHe(b.id))"></span></span></template>
                    </div>
                    <div class="text-[11px] text-slate-500 mt-0.5" x-text="b.id==='yvThienMa'?'Boss Tối Thượng · Ma Giới Chí Tôn':b.affinity"></div>
                    <div class="text-[11.5px] text-slate-400 italic mt-1.5 leading-snug line-clamp-2 min-h-[32px]" x-text="'“'+b.lore+'”'"></div>
                    <div class="grid grid-cols-4 gap-1.5 mt-2.5 max-w-md">
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Khí Huyết</div><div class="text-[13px] font-bold mt-0.5 text-rose-300" x-text="g.fmt(b.hp)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Công</div><div class="text-[13px] font-bold mt-0.5 text-amber-300" x-text="g.fmt(b.atk)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Thủ</div><div class="text-[13px] font-bold mt-0.5 text-sky-300" x-text="g.fmt(b.def)"></div></div>
                      <div class="rounded-lg bg-black/30 border border-slate-800 px-2 py-1.5 text-center"><div class="lbl">Tốc</div><div class="text-[13px] font-bold mt-0.5 text-emerald-300" x-text="b.spd"></div></div>
                    </div>
                    <!-- Tuyệt kĩ boss — thẻ chi tiết (slot art vuông: images/skills/<bossId>.webp|png, chưa có -> ấn 殺) -->
                    <div class="mt-2.5 flex items-start gap-3 px-3 py-2.5 rounded-xl" :style="'background:'+th(b).c+'12;border:1px solid '+th(b).c+'33'">
                      <div class="relative w-14 h-14 rounded-lg shrink-0 overflow-hidden flex items-center justify-center" :style="'background:radial-gradient(circle,'+th(b).c+'22,#05070d);border:1px solid '+th(b).c+'55'">
                        <span class="fserif leading-none text-[26px]" :style="'color:'+th(b).c">殺</span>
                        <img :src="'images/skills/'+b.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" alt="" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                      </div>
                      <div class="min-w-0 flex-1">
                        <div class="text-[13px] font-semibold" :style="'color:'+th(b).c"><span x-text="b.skill.name"></span> <span class="text-[10px] text-slate-500 font-normal" x-text="'· tuyệt kĩ · mỗi '+b.skill.cd+' lượt'"></span></div>
                        <div class="text-[11px] text-slate-400 leading-snug mt-0.5" x-text="'“'+(b.skill.fl.charAt(0).toUpperCase()+b.skill.fl.slice(1))+'”'"></div>
                        <div class="flex flex-wrap gap-1 mt-1.5">
                          <span class="text-[9.5px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-300">Sát thương ~<b class="text-rose-300" x-text="Math.round(b.skill.mult*100)"></b>% Công · ≈<b class="text-rose-300" x-text="g.fmt(Math.round(b.atk*b.skill.mult))"></b></span>
                          <template x-if="b.skill.slow"><span class="text-[9.5px] px-1.5 py-0.5 rounded bg-sky-500/10 border border-sky-500/30 text-sky-300">Làm chậm — giảm tốc địch</span></template>
                        </div>
                      </div>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-1.5">Hồi sinh sau khi bị hạ: <b class="text-slate-300" x-text="b.wb.cdHours+' giờ'"></b></div>
                  </div>
                </div>
              </div>

              <!-- Combat/chiến báo FULL-WIDTH (rộng rãi); Bảo Vật + Lịch Sử xuống hàng 2 cột bên dưới -->
              <div class="space-y-3">

                <!-- Combat / trạng thái (full-width) -->
                <div class="space-y-3">

                  <!-- Trận LIVE -->
                  <template x-if="g.bossFight && g.bossFight.id===b.id">
                    <div class="panel rounded-xl p-4" :style="'border-color:'+th(b).c+'66'">
                      <div class="flex items-center justify-between mb-2">
                        <span class="text-[12px] fserif inline-flex items-center gap-1.5" :style="'color:'+th(b).c"><span x-html="g.svg('sword','w-4 h-4')"></span><span x-text="g.bossFight.done ? (g.bossFight.win?'Vây Sát Thành Công':(g.bossFight.timeout?'Bất Phân Thắng Bại':'Vây Sát Thất Bại')) : ('Đang Vây Sát · Lượt '+g.bossFight.turn)"></span></span>
                        <template x-if="g.bossFight.done"><button @click="g.closeBossFight()" class="text-[11px] text-slate-400 hover:text-slate-200 border border-slate-700 rounded px-2 py-0.5">Đóng</button></template>
                        <template x-if="!g.bossFight.done"><span class="text-[10px] text-slate-500">3 giây / đòn</span></template>
                      </div>
                      <div class="mb-1.5">
                        <div class="flex justify-between text-[10px] mb-0.5"><span :style="'color:'+th(b).c" x-text="b.name"></span><span class="text-slate-500">Khí Huyết</span></div>
                        <div class="relative h-[18px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                          <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossFightBHpPct+'%;background:linear-gradient(90deg,'+th(b).c+','+th(b).d+');transition:width .55s cubic-bezier(.4,0,.2,1)'"></div>
                          <span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white" style="text-shadow:0 1px 2px rgba(0,0,0,.9)" x-text="g.fmt(g.bossFight.bHp)+' / '+g.fmt(g.bossFight.bMax)"></span>
                        </div>
                      </div>
                      <div class="mb-3">
                        <div class="flex justify-between text-[10px] mb-0.5"><span class="text-jade">Ngươi · 逍</span><span class="text-slate-500">Sinh Lực</span></div>
                        <div class="relative h-[18px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                          <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossFightPHpPct+'%;background:linear-gradient(90deg,#14b8a6,#0d7c70);transition:width .55s cubic-bezier(.4,0,.2,1)'"></div>
                          <span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-white" style="text-shadow:0 1px 2px rgba(0,0,0,.9)" x-text="g.fmt(g.bossFight.pHp)+' / '+g.fmt(g.bossFight.pMax)"></span>
                        </div>
                      </div>
                      <div class="lbl mb-1">Chiến Báo</div>
                      <div class="rounded-lg bg-black/40 border border-slate-800 p-2.5 h-44 overflow-y-auto text-[12px] leading-snug space-y-0.5">
                        <template x-for="(ln,i) in g.bossFight.log" :key="i"><div :class="ln.c" x-html="ln.h"></div></template>
                      </div>
                      <template x-if="g.bossFight.done && g.bossFight.win && g.bossFight.reward">
                        <div class="mt-3 rounded-lg p-3" style="background:linear-gradient(135deg,rgba(245,185,66,.12),transparent);border:1px solid rgba(245,185,66,.4)">
                          <div class="text-[11px] text-amber-300 font-semibold mb-2">🎉 Chiến Lợi Phẩm</div>
                          <div class="flex items-center gap-2 flex-wrap text-[11px]">
                            <template x-for="(qty,id) in g.bossFight.reward.items" :key="id">
                              <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-lg bg-black/40 border border-slate-700"><span class="w-4 h-4 inline-flex items-center justify-center" x-html="g.ico(id,(g.ITEMS[id]||{}).icon)"></span><span :class="(g.itemQuality(id)||{}).text||'text-slate-200'" x-text="(g.ITEMS[id]||{}).name"></span><span class="text-slate-400" x-text="'×'+qty"></span></span>
                            </template>
                            <span class="px-2 py-1 rounded bg-black/40 border border-rose-500/40 text-rose-200" x-text="g.fmt(g.bossFight.reward.honThach)+' Hồn Thạch'"></span>
                            <span class="px-2 py-1 rounded bg-black/40 border border-amber-400/40 text-gold" x-text="g.fmt(g.bossFight.reward.bac)+' Bạc'"></span>
                            <span class="px-2 py-1 rounded bg-black/40 border border-emerald-500/40 text-emerald-200" x-text="'+'+g.fmt(g.bossFight.reward.exp)+' EXP'"></span>
                          </div>
                        </div>
                      </template>
                      <template x-if="g.bossFight.done && !g.bossFight.win">
                        <div class="mt-3 space-y-2">
                          <div class="text-[11px] text-center text-slate-400"><span x-text="g.bossFight.timeout ? 'Giằng co bất phân thắng bại —' : 'Ngươi gục ngã —'"></span> <b :style="'color:'+th(b).c" x-text="b.name"></b> chỉ còn <b class="text-rose-300" x-text="Math.round(g.bossFight.bHp/Math.max(1,g.bossFight.bMax)*100)+'%'"></b> khí huyết. <span class="text-amber-300" x-text="g.bossFight.timeout ? 'Vây sát tiếp để kết liễu!' : 'Dưỡng thương rồi quay lại kết liễu!'"></span></div>
                          <template x-if="g.isBossHealing()">
                            <div class="w-full py-2.5 rounded-lg bg-black/40 border border-slate-700 text-center text-slate-400 text-[13px] inline-flex items-center justify-center gap-1.5 flex-wrap"><span x-html="g.svg('heart','w-4 h-4')"></span>Đang dưỡng thương <b class="text-slate-200 font-mono" x-text="g.bossHealText()"></b></div>
                          </template>
                          <template x-if="!g.isBossHealing()">
                            <button @click="g.closeBossFight(); g.startBossFight(b.id)" class="w-full py-2.5 rounded-lg font-bold text-sm text-white transition hover:brightness-110" style="background:linear-gradient(180deg,#e11d48,#9f1239)"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('sword','w-4 h-4')"></span>Thử lại — Kết liễu</span></button>
                          </template>
                        </div>
                      </template>
                    </div>
                  </template>

                  <!-- KHÔNG đánh: trạng thái + hành động -->
                  <template x-if="!(g.bossFight && g.bossFight.id===b.id)">
                    <div class="space-y-3">
                      <!-- alive — GIÁNG THẾ: action panel GỌN (chân dung/Ngũ Hành/tuyệt kĩ đã ở Hero band trên) + khí thế glow TĨNH. KHÔNG lặp lại hồ sơ boss. -->
                      <template x-if="g.bossStateOf(b.id)==='alive'">
                        <div class="relative panel rounded-xl overflow-hidden" :style="'border-color:'+th(b).c+'66;box-shadow:0 0 26px -12px rgba('+th(b).g+',.55)'">
                          <div class="absolute inset-0 pointer-events-none" :style="'background:radial-gradient(ellipse at 12% 45%, rgba('+th(b).g+',.16), transparent 62%)'"></div>
                          <div class="relative p-4">
                            <div class="flex items-center gap-2 mb-1">
                              <span class="inline-flex shrink-0" :style="'color:'+th(b).c" x-html="g.svg('sword','w-[18px] h-[18px]')"></span>
                              <span class="text-[14px] fserif" :style="'color:'+th(b).c" x-text="g.bossHurt(b.id) ? 'Yêu Vương Trọng Thương' : 'Yêu Vương Đã Giáng Thế'"></span>
                            </div>
                            <div class="text-[11.5px] text-slate-300 leading-snug" x-text="g.bossHurt(b.id) ? 'Khí huyết hao mòn, sát cơ vẫn ngút — dồn một đòn kết liễu!' : 'Yêu khí cuồn cuộn chực nuốt chửng giang hồ — tham chiến vây sát ngay!'"></div>
                            <template x-if="g.bossHurt(b.id)">
                              <div class="mt-2.5">
                                <div class="flex justify-between text-[10px] mb-0.5"><span :style="'color:'+th(b).c">Khí Huyết còn lại</span><span class="text-slate-500" x-text="Math.round(g.bossHpPct(b.id))+'%'"></span></div>
                                <div class="relative h-[12px] rounded-full bg-slate-800 overflow-hidden border border-black/50">
                                  <div class="absolute inset-y-0 left-0 rounded-full" :style="'width:'+g.bossHpPct(b.id)+'%;background:linear-gradient(90deg,'+th(b).c+','+th(b).d+')'"></div>
                                </div>
                              </div>
                            </template>
                            <div class="mt-3">
                              <template x-if="g.isBossHealing()">
                                <div class="w-full py-2.5 rounded-lg bg-black/40 border border-slate-700 text-center text-slate-400 text-[12.5px] inline-flex items-center justify-center gap-1.5"><span x-html="g.svg('heart','w-4 h-4')"></span>Đang dưỡng thương <b class="text-slate-200 font-mono" x-text="g.bossHealText()"></b></div>
                              </template>
                              <template x-if="!g.isBossHealing()">
                                <button @click="g.startBossFight(b.id)" class="w-full py-2.5 rounded-lg font-bold text-white text-sm transition hover:brightness-110" style="background:linear-gradient(180deg,#e11d48,#9f1239);box-shadow:0 4px 18px -5px rgba(225,29,72,.7)"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('sword','w-4 h-4')"></span><span x-text="g.bossHurt(b.id)?'Kết Liễu — Vây Sát':'Tham Chiến — Vây Sát'"></span></span></button>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>
                      <!-- reviving -->
                      <template x-if="g.bossStateOf(b.id)==='reviving'">
                        <div class="panel rounded-xl p-4 min-h-[168px] flex flex-col justify-center" :style="'border-color:'+th(b).c+'40'">
                          <div class="flex items-center gap-3 mb-3">
                            <div class="w-14 h-14 rounded-full flex items-center justify-center shrink-0" :style="'border:2px solid '+th(b).c+'55;box-shadow:inset 0 0 16px rgba('+th(b).g+',.3),0 0 18px -6px rgba('+th(b).g+',.6)'"><span class="text-[11px] fserif" :style="'color:'+th(b).c" x-text="seal(b)"></span></div>
                            <div><div class="lbl">Đang hồi sinh — giáng thế sau</div><div class="text-xl font-bold text-slate-100 font-mono" x-text="g.bossCdLive(b.id)"></div></div>
                          </div>
                          <template x-if="g.bossQueued(b.id)">
                            <button @click="g.toggleBossQueue(b.id)" class="w-full py-3 rounded-lg text-center text-sm font-semibold transition hover:brightness-110" :style="'background:rgba('+th(b).g+',.12);border:1px solid '+th(b).c+'55;color:'+th(b).c">✓ Đã vào hàng đợi <span class="text-slate-500 text-[11px] font-normal">· bấm để rời</span></button>
                          </template>
                          <template x-if="!g.bossQueued(b.id)">
                            <button @click="g.toggleBossQueue(b.id)" class="w-full py-3 rounded-lg font-bold text-sm transition hover:brightness-110" :style="'background:linear-gradient(180deg,rgba('+th(b).g+',.85),rgba('+th(b).g+',.5));color:#0a0e16'"><span class="inline-flex items-center gap-1.5"><span x-html="g.svg('clock','w-4 h-4')"></span>Vào Hàng Đợi</span></button>
                          </template>
                        </div>
                      </template>
                      <!-- locked -->
                      <template x-if="g.bossStateOf(b.id)==='locked'">
                        <div class="panel rounded-xl p-5 text-center text-slate-500 min-h-[168px] flex flex-col justify-center">
                          <div class="w-10 h-10 mx-auto mb-2 text-slate-600" x-html="g.svg('lock','w-10 h-10')"></div>
                          <div class="text-sm">Cần <b class="text-slate-300" x-text="'Chiến Đấu Lv '+b.reqLevel"></b> để khiêu chiến.</div>
                          <div class="text-[11px] mt-1">Hiện tại: Lv <span x-text="g.combatLevel"></span></div>
                        </div>
                      </template>
                    </div>
                  </template>

                </div>

                <!-- Bảo Vật + Lịch Sử: 2 cột bên dưới combat -->
                <div class="grid lg:grid-cols-[1.35fr_1fr] gap-3 items-start">

                  <!-- Bảo Vật -->
                  <div class="panel rounded-xl p-3.5">
                    <div class="flex items-center gap-2 mb-2.5"><span class="lbl">Bảo Vật · Drop khi hạ gục</span></div>
                    <div class="grid grid-cols-4 gap-2.5">
                      <!-- Tinh Thể -->
                      <div class="relative aspect-square rounded-lg bg-black/50 border border-amber-500/45 flex flex-col items-center justify-center gap-1 cursor-zoom-in" style="box-shadow:inset 0 0 12px rgba(245,158,11,.18)" @click="g.openLightbox('tinhTheYeuVuong','🔮','Tinh Thể Yêu Vương')">
                        <span class="absolute -top-1 -right-1 text-[9px] font-bold px-1 rounded bg-amber-500 text-ink" x-text="'×'+b.wb.tinhThe"></span>
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('tinhTheYeuVuong','🔮')"></span>
                        <span class="text-[15px] font-bold leading-none text-amber-300">10%</span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Tinh Thể</span>
                      </div>
                      <!-- Trứng × 3 phẩm (viền + màu % theo PHẨM CHẤT: Phàm=Lương/blue, Linh=Tinh/emerald, Thần=Tuyệt/rose) -->
                      <template x-for="t in [{s:'pham',l:'Phàm',ch:'5%'},{s:'linh',l:'Linh',ch:'1%'},{s:'than',l:'Thần',ch:'0.02%'}]" :key="t.s">
                        <div class="aspect-square rounded-lg bg-black/50 border flex flex-col items-center justify-center gap-1 cursor-zoom-in" :class="g.itemQuality('egg_'+b.wb.eggBase+'_'+t.s).border" @click="g.openLightbox('egg_'+b.wb.eggBase+'_'+t.s,'🥚','Trứng '+t.l+' Phẩm')">
                          <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('egg_'+b.wb.eggBase+'_'+t.s,'🥚')"></span>
                          <span class="text-[15px] font-bold leading-none" :class="g.itemQuality('egg_'+b.wb.eggBase+'_'+t.s).text" x-text="t.ch"></span>
                          <span class="text-[9px] uppercase tracking-wider leading-none text-slate-500" x-text="t.l"></span>
                        </div>
                      </template>
                      <!-- Hồn Thạch -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-rose-600/40 flex flex-col items-center justify-center gap-1 cursor-zoom-in" @click="g.openLightbox('honThach','🔴','Hồn Thạch')">
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('honThach','🔴')"></span>
                        <span class="text-[15px] font-bold leading-none text-rose-300" x-text="g.fmt(b.wb.honThach)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Hồn Thạch</span>
                      </div>
                      <!-- Bạc -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-amber-400/40 flex flex-col items-center justify-center gap-1 cursor-zoom-in" @click="g.openLightbox('bac','🟡','Ngân Lượng')">
                        <span class="w-12 h-12 inline-flex items-center justify-center" x-html="g.ico('bac','🟡')"></span>
                        <span class="text-[15px] font-bold leading-none text-gold" x-text="g.fmt(b.wb.bac)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">Bạc</span>
                      </div>
                      <!-- EXP -->
                      <div class="aspect-square rounded-lg bg-black/50 border border-emerald-500/30 flex flex-col items-center justify-center gap-1">
                        <span class="w-12 h-12 inline-flex items-center justify-center"><img src="images/ui/exp.webp" class="w-12 h-12 object-contain" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/exp.png'}else{this.replaceWith(Object.assign(document.createElement('span'),{textContent:'✦',style:'color:#6ee7b7;font-size:22px'}))}"></span>
                        <span class="text-[15px] font-bold leading-none text-emerald-300" x-text="g.fmt(b.exp)"></span>
                        <span class="text-[9px] uppercase tracking-wider text-slate-500 leading-none">EXP</span>
                      </div>
                    </div>
                  </div>

                  <!-- Lịch Sử · Giang Hồ Bảng -->
                  <div class="panel rounded-xl p-3.5">
                    <div class="flex items-center gap-2 mb-1.5"><span class="lbl">Lịch Sử · Giang Hồ Bảng</span><span class="text-[10px] text-slate-500 ml-auto">Đạo hữu cùng săn: <b class="text-jade" x-text="40+(b.reqLevel%37)"></b></span></div>
                    <div class="max-h-80 overflow-y-auto pr-1">
                      <template x-for="r in g.bossLog(b.id)" :key="r.uid">
                        <div class="flex items-start gap-2 py-1.5" :class="r.rare?'px-2 -mx-1 rounded-md':''" :style="r.rare?'background:linear-gradient(90deg,rgba(245,185,66,.10),transparent)':''">
                          <span class="w-1.5 h-1.5 rounded-full mt-1.5 shrink-0" :style="'background:'+(r.win?(r.rare?'#fcd34d':'#34d399'):'#fb7185')"></span>
                          <div class="text-[11.5px] leading-snug text-slate-400"><b :class="r.me?'text-jade':'text-slate-300'" x-text="r.me?'Ngươi':r.who"></b> <span class="text-slate-600" x-text="'· '+r.ago"></span><br><span x-html="r.txt"></span></div>
                        </div>
                      </template>
                      <template x-if="!g.bossLog(b.id).length"><div class="text-[11px] text-slate-600 text-center py-4">Chưa có chiến tích nào với Yêu Vương này.</div></template>
                    </div>
                  </div>

                </div>
              </div>

            </div>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: BÍ CẢNH (Dungeon idle) ===== -->
      <template x-if="$store.game.view==='dungeon'">
        <div class="space-y-3" x-data="{ get g(){ return $store.game } }">

          <!-- Header -->
          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">
            <img src="images/ui/dungeon_banner.webp" alt="" class="absolute inset-0 w-full h-full object-cover" style="object-position:center right" onerror="if(this.src.endsWith('.webp')){this.src='images/ui/dungeon_banner.png'}else{this.style.display='none'}">
            <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0b0e16 0%,rgba(11,14,22,.86) 40%,rgba(11,14,22,.5) 100%)"></div>
            <div class="absolute right-0 -top-6 -bottom-6 w-2/5 pointer-events-none hidden md:block" style="background:radial-gradient(ellipse at 78% 50%, rgba(45,212,191,.16), transparent 66%)"></div>
            <div class="relative w-full p-5 md:p-6">
              <div class="text-[28px] gold-text leading-none fserif">Bí Cảnh Tầm Bảo</div>
              <div class="text-[13px] text-slate-300 leading-snug mt-2 max-w-2xl">Treo khám phá <b class="text-amber-300">9 bí cảnh</b>, đoạt <b class="text-amber-300">Đồ Phổ</b> rèn trang bị bậc cao + nguyên liệu hiếm, đá cường hóa, Hồn Thạch, EXP. <b class="text-slate-200">Rời màn vẫn chạy.</b></div>
            </div>
          </div>

          <!-- Master-detail -->
          <div class="grid lg:grid-cols-[248px_1fr] gap-3 items-start">

            <!-- RAIL: 9 phó bản (mobile: cuộn ngang để không đẩy chi tiết xuống) -->
            <div class="flex gap-2 overflow-x-auto pb-1 lg:block lg:space-y-2 lg:overflow-visible">
              <template x-for="d in g.dungeonList" :key="d.id">
                <button @click="g.selectDungeon(d.id)" class="relative w-52 shrink-0 lg:w-full h-[60px] rounded-lg overflow-hidden border text-left transition group" :style="d.id===g.dungeonSel ? 'border-color:'+d.color+'cc;box-shadow:0 0 16px -5px '+d.color+'cc' : 'border-color:#1e293b'">
                  <img :src="'images/dungeons/'+d.id+'.webp'" alt="" class="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-105" :class="g.dungeonLocked(d.id)?'grayscale opacity-30':(d.id===g.dungeonSel?'opacity-70':'opacity-45 group-hover:opacity-65')" onerror="this.style.display='none'">
                  <div class="absolute inset-0" style="background:linear-gradient(90deg,#0a0e16 2%,rgba(10,14,22,.74) 48%,rgba(10,14,22,.22) 100%)"></div>
                  <div class="relative h-full flex items-center gap-2 px-2.5">
                    <div class="min-w-0 flex-1">
                      <div class="text-[13px] font-semibold truncate fserif" :style="'color:'+(d.id===g.dungeonSel?d.color:'#e8edf4')" x-text="d.name"></div>
                      <div class="flex items-center gap-1.5 text-[10px] mt-0.5">
                        <span class="text-slate-300/80" x-text="'Lv'+d.reqLevel"></span>
                        <span class="text-slate-600">·</span>
                        <template x-if="g.dungeonLocked(d.id)"><span class="text-slate-400">Chưa đủ cấp</span></template>
                        <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunningHere(d.id)"><span class="text-amber-300" x-text="'⏳ còn '+g.fmtTime(g.dungeonTimeLeft())"></span></template>
                        <template x-if="!g.dungeonLocked(d.id) && !g.dungeonRunningHere(d.id)"><span class="text-emerald-400">● Sẵn sàng</span></template>
                      </div>
                    </div>
                    <span class="text-[26px] fserif shrink-0 leading-none drop-shadow" :style="'color:'+d.color+(d.id===g.dungeonSel?'':'aa')" x-text="d.seal"></span>
                  </div>
                </button>
              </template>
            </div>

            <!-- DETAIL: phó bản đang chọn -->
            <div x-data="{ get d(){ return g.dungeonSelObj } }">
              <template x-if="d">
                <div class="space-y-3">

                  <!-- Hero band -->
                  <div class="relative rounded-xl overflow-hidden" style="min-height:150px" :style="'border:1px solid '+d.color+'55;box-shadow:0 0 30px -12px '+d.color+'aa;background:linear-gradient(135deg,'+d.color+'22,#0a0e16 70%)'">
                    <img :src="'images/dungeons/'+d.id+'.webp'" alt="" class="absolute inset-0 w-full h-full object-cover" :class="g.dungeonLocked(d.id)?'grayscale opacity-40':'opacity-80'" onerror="this.style.display='none'">
                    <div class="absolute inset-0 pointer-events-none" style="background:linear-gradient(90deg,#0a0e16 0%,rgba(10,14,22,.66) 52%,transparent 100%)"></div>
                    <div class="relative p-4">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-2xl fserif" :style="'color:'+d.color" x-text="d.name"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-300" x-text="'Lv '+d.reqLevel"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-black/40 border border-slate-700 text-slate-400" x-text="d.realm"></span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded" :style="'background:'+d.color+'22;border:1px solid '+d.color+'55;color:'+d.color" x-text="'⚠ '+d.hazardName"></span>
                      </div>
                      <div class="text-[11.5px] text-slate-300 italic mt-2 leading-snug max-w-xl" x-text="'“'+d.lore+'”'"></div>
                      <div class="flex items-center gap-1.5 mt-3 flex-wrap">
                        <span class="text-[10px] text-slate-500" x-text="(d.tangs||[]).length + ' tầng:'"></span>
                        <template x-for="(t,i) in (d.tangs||[])" :key="i">
                          <span class="text-[10px] px-2 py-0.5 rounded-full bg-black/40 border border-slate-700 text-slate-400"><b :style="'color:'+d.color" x-text="(i+1)+'·'"></b> <span x-text="t==='hazard' ? d.hazardName : g.tangLabel(t)"></span></span>
                        </template>
                      </div>
                    </div>
                  </div>

                  <!-- Vào phó bản -->
                  <div class="panel rounded-xl p-3.5">
                    <!-- locked -->
                    <template x-if="g.dungeonLocked(d.id)">
                      <div class="text-center text-slate-500 py-2">
                        <div class="w-9 h-9 mx-auto mb-2 text-slate-600" x-html="g.svg('lock','w-9 h-9')"></div>
                        <div class="text-sm">Cần <b class="text-slate-300" x-text="'Chiến Đấu Lv '+d.reqLevel"></b> để tiến vào.</div>
                        <div class="text-[11px] mt-1">Hiện tại: Lv <span x-text="g.combatLevel"></span></div>
                      </div>
                    </template>
                    <!-- đang chạy phó bản NÀY -->
                    <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunningHere(d.id)">
                      <div>
                        <div class="flex items-center justify-between mb-1.5"><span class="text-[12px] fserif" :style="'color:'+d.color" x-text="'Đang khám phá · '+(g.dungeonRunMode==='treo'?'Treo Luyện':'Chạy Nhanh')"></span><span class="text-[12px] font-mono text-slate-300" x-text="'còn '+g.fmtTime(g.dungeonTimeLeft())"></span></div>
                        <div class="h-3 rounded-full bg-slate-800 overflow-hidden border border-black/50"><div class="h-full rounded-full transition-all" :style="'width:'+g.dungeonRunPct+'%;background:linear-gradient(90deg,'+d.color+','+d.color+'88)'"></div></div>
                        <div class="text-[10px] text-slate-500 mt-2 text-center">Tự dồn chiến lợi phẩm khi xong — cứ rời màn.</div>
                      </div>
                    </template>
                    <!-- đang chạy phó bản KHÁC -->
                    <template x-if="!g.dungeonLocked(d.id) && g.dungeonRunning && !g.dungeonRunningHere(d.id)">
                      <div class="text-center text-slate-400 py-2 text-[12px]">Đang khám phá Bí Cảnh khác (<b class="text-slate-300" x-text="(g.DUNGEON_BY_ID[g.dungeonRunId]||{}).name"></b>) — chờ xong đã.</div>
                    </template>
                    <!-- rảnh: chọn chế độ -->
                    <template x-if="!g.dungeonLocked(d.id) && !g.dungeonRunning">
                      <div>
                        <div class="flex items-center justify-between mb-2.5">
                          <span class="lbl">Chọn chế độ thâm nhập</span>
                          <span class="text-[11px] text-slate-400 inline-flex items-center gap-2">Phí:
                            <span class="inline-flex items-center gap-1 text-gold"><span class="w-3.5 h-3.5 inline-flex" x-html="g.ico('bac','🟡')"></span><b x-text="g.fmt(d.cost.bac||0)"></b></span>
                            <template x-if="d.cost.honThach"><span class="inline-flex items-center gap-1 text-rose-300"><span class="w-3.5 h-3.5 inline-flex" x-html="g.ico('honThach','🔴')"></span><b x-text="g.fmt(d.cost.honThach)"></b></span></template>
                          </span>
                        </div>
                        <div class="grid grid-cols-2 gap-2.5">
                          <button @click="g.startDungeonRun(d.id,'nhanh')" :disabled="!g.canAffordDungeon(d.id)" class="rounded-lg px-3 py-2 border text-left transition hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed" :style="'border-color:'+d.color+'55;background:linear-gradient(135deg,'+d.color+'18,transparent)'">
                            <div class="flex items-center justify-between gap-1 leading-none">
                              <span class="text-[13px] font-bold inline-flex items-center gap-1.5" :style="'color:'+d.color"><span class="w-3.5 h-3.5 inline-flex" x-html="g.svg('zap','w-3.5 h-3.5')"></span>Chạy Nhanh</span>
                              <span class="inline-flex gap-0.5 text-[11px] leading-none shrink-0" :style="'color:'+d.color" title="Mức thưởng"><span>◆</span><span class="opacity-20">◆</span><span class="opacity-20">◆</span></span>
                            </div>
                            <div class="text-[11px] text-slate-400 font-mono mt-1.5 leading-none" x-text="g.fmtTime(g.dungeonDurSec(d.id,'nhanh'))"></div>
                          </button>
                          <button @click="g.startDungeonRun(d.id,'treo')" :disabled="!g.canAffordDungeon(d.id)" class="rounded-lg px-3 py-2 border text-left transition hover:brightness-110 disabled:opacity-40 disabled:cursor-not-allowed" :style="'border-color:'+d.color+'aa;background:linear-gradient(135deg,'+d.color+'2e,transparent)'">
                            <div class="flex items-center justify-between gap-1 leading-none">
                              <span class="text-[13px] font-bold inline-flex items-center gap-1.5" :style="'color:'+d.color"><span class="w-3.5 h-3.5 inline-flex" x-html="g.svg('clock','w-3.5 h-3.5')"></span>Treo Luyện</span>
                              <span class="inline-flex gap-0.5 text-[11px] leading-none shrink-0" :style="'color:'+d.color" title="Mức thưởng"><span>◆</span><span>◆</span><span>◆</span></span>
                            </div>
                            <div class="text-[11px] text-slate-400 font-mono mt-1.5 leading-none" x-text="g.fmtTime(g.dungeonDurSec(d.id,'treo'))"></div>
                          </button>
                        </div>
                        <template x-if="!g.canAffordDungeon(d.id)"><div class="text-[10px] text-rose-400 mt-2 text-center">Không đủ phí vào.</div></template>
                      </div>
                    </template>
                  </div>

                  <!-- Bảo Vật + Lịch Sử -->
                  <div class="grid lg:grid-cols-[1.4fr_1fr] gap-3 items-start">
                    <!-- Bảo Vật -->
                    <div class="panel rounded-xl p-3.5">
                      <div class="flex items-center gap-2 mb-2.5"><span class="lbl">Bảo Vật · Chiến lợi phẩm</span></div>
                      <div class="grid grid-cols-4 gap-2.5">
                        <template x-if="d.loot.doPho">
                          <div @click="g.openDungeonPool(d.id)" class="relative aspect-square rounded-lg bg-black/50 border border-amber-500/45 flex flex-col items-center justify-center gap-0.5 cursor-pointer hover:border-amber-400 transition" style="box-shadow:inset 0 0 12px rgba(245,158,11,.18)" title="Bấm xem danh mục Đồ Phổ">

                    <span class="w-7 h-7 rounded-lg flex items-center justify-center fserif text-[16px]" style="color:#f5b942;border:1px solid rgba(245,185,66,.4);background:rgba(245,185,66,.1)">祖</span>

                            <span class="absolute inset-0 flex items-center justify-center text-5xl opacity-50" x-text="p.emoji"></span>
                          </template>
                          <template x-if="!p.locked && !p.empty">
                            <img :src="'images/tongmon/mats/'+p.mat+'.webp'" class="absolute inset-0 w-full h-full object-cover" alt="" onerror="this.remove()">

                          <template x-if="p.ripe"><span class="absolute top-1.5 right-1.5 text-[8px] px-1.5 py-0.5 rounded-full bg-emerald-500 text-ink font-bold shadow">Chín</span></template>

                        <!-- TEXT (ngoài khung art) -->
                        <div class="px-2 py-1.5 border-t flex-1 flex flex-col justify-center min-h-0" :class="p.ripe ? 'bg-emerald-500/[.08] border-emerald-500/20' : 'bg-ink2/60 border-slate-800'">

                          <template x-if="!p.locked && p.empty"><div class="text-[10.5px] text-slate-500 text-center fserif">Gieo trồng</div></template>
                          <template x-if="!p.locked && !p.empty">

                              <div class="text-[11px] text-slate-100 truncate fserif leading-tight" x-text="p.name"></div>

                                <div class="mt-1.5 flex items-center gap-1.5">
                                  <div class="flex-1 h-1.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full rounded-full" :style="'width:'+p.pct+'%;background:#34d399;box-shadow:0 0 5px #34d39988'"></div></div>
                                  <span class="text-[9px] text-slate-400 whitespace-nowrap" x-text="g.tmDuocLeftText(p.left)"></span>

                              </template>
                              <template x-if="p.ripe">
                                <button @click.stop="g.tmHarvest(p.idx)" class="mt-1.5 w-full py-1 rounded-md text-[11px] font-bold bg-emerald-500/90 hover:bg-emerald-400 text-ink transition" x-text="'Thu Hoạch ×'+p.qty"></button>
                              </template>
                            </div>
                          </template>
                        </div>
                      </div>
                    </template>
                  </div>
                  <template x-if="!g.tmDuocPlotCount"><div class="text-center text-[12px] text-slate-600 italic fserif py-8">Chưa có luống — nâng Dược Viên để mở đất trồng.</div></template>

                <!-- FOOTER -->
                <div class="shrink-0 px-4 py-3 border-t border-slate-800" style="background:rgba(15,21,33,.55)">

                <template x-if="g.tmDuocSowIdx>=0">

                      <div class="flex items-center justify-between px-4 py-2.5 border-b border-slate-800 shrink-0" style="background:linear-gradient(90deg,rgba(16,185,129,.1),transparent)">

                        <button @click="g.tmDuocSowIdx=-1" class="text-slate-500 hover:text-rose-400 text-lg leading-none">✕</button>
                      </div>
                      <div class="flex-1 overflow-y-auto p-3">
                        <div class="space-y-2">
                          <template x-for="s in g.tmDuocSowable()" :key="s.id">

                                <img :src="'images/tongmon/mats/'+s.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" alt="" onerror="this.remove()">
                              </span>
                              <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                  <span class="text-[13px] text-slate-100 fserif truncate" x-text="s.name"></span>

                                <div class="flex items-center gap-3 mt-1.5 text-[10.5px] text-slate-400">

                                  <span class="inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block"></span>thu <b class="text-emerald-300" x-text="'×'+s.qty"></b></span>
                                  <span class="ml-auto text-slate-500">Kho <b class="text-slate-300" x-text="s.have"></b></span>
                                </div>
                              </div>
                            </button>
                          </template>
                        </div>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- MODAL CHI TIẾT ĐỆ TỬ -->
          <template x-if="g.tmSelDisciple">

                <!-- TITLE BAR -->
                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 px-5 py-3 border-b border-slate-800/70 shrink-0">
                  <span class="gold-text fserif text-[22px] leading-none" x-text="d.name"></span>
                  <span class="lbl" x-text="d.originLabel"></span>
                  <span class="text-[10px] px-2 py-0.5 rounded-full border" :style="'color:'+g.tmApt(d).color+';border-color:'+g.tmApt(d).color+'66;background:'+g.tmApt(d).color+'14'" x-text="g.tmApt(d).name"></span>
                  <span class="text-[12px]" :style="'color:'+g.tmHe(d).color" x-text="'Ngũ hành '+g.tmHe(d).name+' '+g.tmHe(d).han"></span>
                  <template x-if="g.lvhTitleOf(d.uid)"><span class="text-[10.5px] px-2 py-0.5 rounded-full fserif font-bold inline-flex items-center gap-1" :style="'color:#0b0f17;background:'+g.lvhTitleOf(d.uid).color"><span class="fserif">魁</span><span x-text="g.lvhTitleOf(d.uid).name"></span></span></template>
                  <button @click="g.closeDisciple()" class="ml-auto text-slate-500 hover:text-rose-400 text-xl leading-none">✕</button>
                </div>
                <!-- BODY (1 màn, không cuộn) -->
                <div class="p-4 flex-1 flex flex-col gap-3 min-h-0 overflow-y-auto">
                  <!-- ROW A: trang bị (dồn trái) + Chỉ Số Tổng -->
                  <div class="flex flex-col sm:flex-row gap-4" x-data="{ get cs(){ return g.tmStats(d) } }">
                    <div class="shrink-0">
                      <div class="flex items-center justify-between mb-1.5"><div class="lbl">Trang Bị Đệ Tử</div>
                        <button @click="g.openGiftPicker()" class="text-[11px] px-2.5 py-1 rounded bg-jade/15 border border-jade/40 text-jade hover:bg-jade/25">Ban Gia Bảo</button></div>
                      <div class="flex flex-col items-center sm:flex-row sm:items-start gap-2.5">
                        <div class="relative rounded-xl overflow-hidden border bg-ink2 shrink-0 group" :class="g.tmFace(d)?'cursor-zoom-in':''" @click="g.tmFace(d) && g.openFaceFull(g.tmFace(d))" :style="'width:138px;height:184px;border-color:'+g.tmApt(d).color+'55;box-shadow:'+g.tmSubGlow(d)">
                          <template x-if="d.apt==='thien'"><div class="halo2" :style="'--c:'+g.tmApt(d).color+';border-radius:12px'"></div></template>
                          <div class="absolute inset-0 flex items-center justify-center fserif text-[3.6rem]" :style="'color:'+g.tmHe(d).color+'2e'" x-text="d.han"></div>
                          <template x-if="g.tmFace(d)"><img :src="g.tmFace(d)" alt="" class="absolute inset-0 w-full h-full object-cover object-top" onerror="this.remove()"></template>
                          <template x-if="g.tmFace(d)"><span class="absolute top-1.5 right-1.5 w-6 h-6 rounded-md bg-ink/70 border border-slate-600 text-slate-200 text-[11px] flex items-center justify-center pointer-events-none opacity-70 group-hover:opacity-100 transition">⛶</span></template>
                          <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink via-ink/70 to-transparent pt-7 pb-1.5 px-2 text-center">
                            <div class="text-[12.5px] fserif truncate" :style="'color:'+g.tmApt(d).color" x-text="d.name"></div>
                            <div class="text-[10.5px] text-amber-300 fserif" x-text="'Thực Lực '+g.fmt(cs.chienLuc)"></div>
                          </div>
                        </div>
                        <div class="grid grid-cols-4 gap-1.5 w-full max-w-[280px] sm:w-[196px] sm:max-w-none">
                          <template x-for="slot in ['mu','giap','dai','gang','vuKhi','trangSuc','nhan','giay','toaKy','canCau','cuoc','riu']" :key="slot">
                            <button @click="(d.gear && d.gear[slot]) ? g.openTmGear(d.gear[slot]) : g.openGiftPicker(slot)" class="relative rounded-lg w-full aspect-square overflow-hidden transition" :class="(d.gear && d.gear[slot]) ? ('bg-ink2 border-2 ' + g.itemQuality(d.gear[slot]).border) : 'bg-ink3 border border-dashed border-slate-700 hover:border-jade/50'" :title="(d.gear && d.gear[slot]) ? (g.ITEMS[d.gear[slot].gearId]||{}).name : g.slotName(slot)">
                              <template x-if="d.gear && d.gear[slot]"><span class="absolute inset-0 inline-flex items-center justify-center" x-html="g.ico(d.gear[slot].gearId,(g.ITEMS[d.gear[slot].gearId]||{}).icon)"></span></template>
                              <template x-if="!(d.gear && d.gear[slot])"><span class="absolute inset-0 flex items-center justify-center text-slate-600 text-base">＋</span></template>
                              <template x-if="!(d.gear && d.gear[slot])"><span class="absolute bottom-0 inset-x-0 text-center text-[7px] leading-tight py-0.5 text-slate-600" x-text="g.slotName(slot)"></span></template>
                            </button>
                          </template>
                        </div>
                      </div>
                    </div>
                    <!-- CHỈ SỐ TỔNG (side-only) -->
                    <div class="flex-1 min-w-0 rounded-xl bg-ink3/40 border border-slate-800 p-3">
                      <div class="flex items-center justify-between mb-2">
                        <div class="lbl">Chỉ Số Tổng <span class="normal-case tracking-normal text-slate-600">· side-only</span></div>
                        <div class="flex items-center gap-2 px-2.5 py-1 rounded bg-amber-500/10 border border-amber-500/30"><span class="text-[11.5px] text-amber-200">Thực Lực</span><b class="text-amber-300 fserif text-[15px]" x-text="g.fmt(cs.chienLuc)"></b></div>
                      </div>
                      <div class="grid grid-cols-1 sm:grid-cols-3 gap-x-4 gap-y-1">
                        <div>
                          <div class="text-[9.5px] uppercase tracking-wider text-rose-300/80 font-medium mb-1 flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-rose-400"></span>Tấn Công</div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Công Kích</span><span class="text-[11.5px] text-slate-100" x-text="g.fmt(cs.atk)"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Tốc Độ</span><span class="text-[11.5px] text-slate-100" x-text="g.fmt(cs.spd)"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Bạo Kích</span><span class="text-[11.5px] text-amber-300" x-text="Math.round(cs.crit*100)+'%'"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Bạo Sát</span><span class="text-[11.5px] text-amber-300" x-text="'×'+cs.critDmg.toFixed(2)"></span></div>
                        </div>
                        <div>
                          <div class="text-[9.5px] uppercase tracking-wider text-sky-300/80 font-medium mb-1 flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-sky-400"></span>Phòng Thủ</div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Phòng Ngự</span><span class="text-[11.5px] text-slate-100" x-text="g.fmt(cs.def)"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Sinh Lực</span><span class="text-[11.5px] text-slate-100" x-text="g.fmt(cs.maxHP)"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Né Tránh</span><span class="text-[11.5px] text-sky-300" x-text="Math.round(cs.dodge*100)+'%'"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Hồi Máu</span><span class="text-[11.5px] text-jade" x-text="Math.round(cs.regenPct*100)+'%/hiệp'"></span></div>
                        </div>
                        <div>
                          <div class="text-[9.5px] uppercase tracking-wider text-jade/80 font-medium mb-1 flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-jade"></span>Nội Công · Ngũ Hành</div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Nội Lực</span><span class="text-[11.5px] text-slate-100" x-text="g.fmt(cs.maxNL)"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Hồi Nội</span><span class="text-[11.5px] text-slate-100" x-text="'+'+cs.nlRegen+'/đòn'"></span></div>
                          <div class="flex justify-between py-0.5"><span class="text-[11px] text-slate-400">Cộng Hưởng</span><span class="text-[11.5px] font-bold" :style="'color:'+g.tmHe(d).color" x-text="g.tmHe(d).name+' +'+Math.round(cs.heBonus*100)+'%'"></span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <!-- ROW B: Tu Vi strip -->
                  <div class="rounded-lg bg-ink3/40 border border-slate-800 px-3 py-2 shrink-0">
                    <div class="flex items-center gap-2 flex-wrap text-[11px]">
                      <span class="lbl mr-1">Tu Vi</span>
                      <span><span class="text-slate-500">Cảnh Giới</span> <b class="fserif" :style="'color:'+g.tmRealmColor(d)" x-text="g.tmRealmFull(d)"></b></span><span class="text-slate-700">·</span>
                      <span><span class="text-slate-500">Trần</span> <b class="fserif text-slate-200" x-text="g.tmCapName(d)"></b></span><span class="text-slate-700">·</span>
                      <span><span class="text-slate-500">Tốc Tu</span> <b class="fserif text-cyan" x-text="'×'+g.tmSpeedMul(d).toFixed(2)"></b></span>
                      <span class="flex-1 min-w-[90px] flex items-center gap-2"><span class="flex-1 h-1.5 rounded-full bg-slate-800 overflow-hidden"><span class="block h-full rounded-full" :style="'width:'+g.tmProgPct(d)+'%;background:'+g.tmRealmColor(d)+';box-shadow:0 0 5px '+g.tmRealmColor(d)+'88'"></span></span><span class="text-[10px]" :style="'color:'+g.tmRealmColor(d)" x-text="g.tmProgPct(d)+'%'"></span></span>
                    </div>
                    <template x-if="g.tmTuViVal(d)">
                      <div class="mt-1.5 pt-1.5 border-t border-slate-800/70 flex items-center justify-between gap-2 text-[11px]" x-data="{ get v(){ return g.tmTuViVal(d) } }">
                        <span class="text-slate-500">Tu Vi</span>
                        <span class="inline-flex items-baseline gap-1.5">
                          <template x-if="v.text"><b class="fserif text-[12.5px]" :style="'color:'+v.color" x-text="v.text"></b></template>
                          <template x-if="!v.text"><span class="fserif tabular-nums"><b class="text-[13.5px]" :style="'color:'+v.color" x-text="g.fmt(v.cur)"></b><span class="text-slate-600"> / </span><span class="text-slate-400" x-text="g.fmt(v.max)"></span></span></template>
                          <template x-if="v.suffix"><span class="text-[9.5px] px-1.5 py-0.5 rounded-full" :style="'color:'+v.color+';background:'+v.color+'1a;border:1px solid '+v.color+'44'" x-text="v.suffix"></span></template>
                        </span>
                      </div>
                    </template>
                  </div>
                  <!-- LỊCH LUYỆN (phái đi kiếm nguyên liệu) -->
                  <div class="rounded-lg bg-ink3/40 border border-slate-800 px-3 py-2 shrink-0 flex items-center justify-between gap-2 flex-wrap">
                    <div class="text-[11.5px] min-w-0">
                      <span class="lbl mr-1">Lịch Luyện</span>
                      <template x-if="g.tmLichLuyenInfo(d)"><span class="text-cyan">Đang đi · còn <b x-text="g.tmLichLuyenCdText(d)"></b></span></template>
                      <template x-if="!g.tmLichLuyenInfo(d)"><span class="text-slate-500">Phái đi kiếm nguyên liệu (<span x-text="g.tmLichLuyenH"></span>h) — tạm ngưng tu</span></template>

                  <!-- GIẢNG ĐẠO ĐƯỜNG (thính giảng -> nâng trần tư chất) -->

                      <template x-if="!g.tmGiangInfo(d) && g.tmCanGiang(d)"><span class="text-slate-500">Nâng trần tư chất · <span x-text="g.tmGiangH"></span>h/bậc · đã +<b class="text-amber-300/90" x-text="g.tmGiangBonus(d)"></b>/<span x-text="g.tmGiangMax()"></span></span></template>
                      <template x-if="!g.tmGiangInfo(d) && !g.tmCanGiang(d)"><span class="text-slate-600 italic" x-text="g.tmGiangReason(d)||'Không khả dụng'"></span></template>

                    <template x-if="g.tmGiangInfo(d)"><span class="shrink-0 text-[11.5px] text-amber-300/80 fserif">Đang thính giảng…</span></template>

      <!-- ===== VIEW: ĐĂNG TIÊN MỘNG (game thẻ bài, cách ly) ===== -->
      <style>
        .dtm-root .bar{ height:100%; border-radius:9999px; transition:width .35s ease; }
        .dtm-root .glowstatic{ box-shadow:0 0 0 1px var(--c,#f5b942)55, 0 0 26px -8px var(--c,#f5b942); }
        .dtm-root .card{ width:146px; height:234px; border-radius:12px; position:relative; cursor:pointer; flex:0 0 auto; background:linear-gradient(180deg,#0f1726,#0a0f1b); border:1px solid var(--c); overflow:hidden; box-shadow:0 0 0 1px #00000088, 0 6px 16px -8px #000, inset 0 0 20px -15px var(--c); transition:transform .14s, box-shadow .14s; }
        .dtm-root .card:hover.playable{ transform:translateY(-16px); box-shadow:0 0 0 1px var(--c), 0 0 22px -3px var(--c), 0 16px 28px -10px #000; z-index:5; }
        .dtm-root .card.unplayable{ filter:grayscale(.55) brightness(.6); cursor:not-allowed; }
        /* Kiểu A: khung phẩm chất (inset) + 4 góc ốp (background-gradient, 0 thêm DOM) */
        .dtm-root .card::after{ content:''; position:absolute; inset:4px; border-radius:8px; z-index:3; pointer-events:none; box-shadow:inset 0 0 0 1px var(--r), inset 0 0 13px -8px var(--r); }
        .dtm-root .card::before{ content:''; position:absolute; inset:6px; z-index:4; pointer-events:none; border-radius:7px; opacity:.85;
          background:                                                /* chỉ ốp 2 góc DƯỚI -> chừa góc trên cho cost (trái) + viên phẩm chất (phải) */
            linear-gradient(var(--r),var(--r)) left bottom/11px 2px no-repeat, linear-gradient(var(--r),var(--r)) left bottom/2px 11px no-repeat,
            linear-gradient(var(--r),var(--r)) right bottom/11px 2px no-repeat, linear-gradient(var(--r),var(--r)) right bottom/2px 11px no-repeat; }
        /* Hero card: hover = CẢ KHUNG glow + scale nhẹ (ảnh đi theo khung, KHÔNG tự phóng riêng) */
        .dtm-root .dtm-herocard{ transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
        .dtm-root .dtm-herocard:hover{ transform:translateY(-6px); box-shadow:0 0 0 1px var(--hc,#64748b), 0 0 32px -7px var(--hc,#64748b), 0 22px 38px -16px #000; z-index:3; }
        .dtm-root .card-art{ position:absolute; inset:0; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; background:radial-gradient(ellipse at 50% 32%, color-mix(in srgb,var(--c) 40%,transparent), transparent 70%); }
        .dtm-root .card-art::after{ content:''; position:absolute; inset:0; z-index:2; pointer-events:none; background:radial-gradient(120% 80% at 50% 6%, transparent 50%, rgba(7,11,20,.5) 100%), linear-gradient(180deg, rgba(7,11,20,.16) 0%, transparent 24%, transparent 52%, rgba(8,12,20,.58) 76%, rgba(7,11,20,.95) 100%); }
        .dtm-root .card-han{ font-family:'Lora',serif; font-size:57px; color:var(--c); filter:drop-shadow(0 2px 6px #000); }
        .dtm-root .card-info{ position:absolute; left:0; right:0; bottom:0; z-index:5; padding:7px 8px 9px; text-align:center; background:linear-gradient(180deg, transparent 0%, rgba(6,9,16,.55) 22%, rgba(5,8,14,.88) 52%, rgba(4,7,12,.97) 100%); }
        .dtm-root .card-info::before{ content:''; display:block; height:2px; width:44px; margin:1px auto 5px; border-radius:9999px; background:linear-gradient(90deg,transparent,var(--c),transparent); }
        .dtm-root .cost{ position:absolute; top:6px; left:6px; width:25px; height:25px; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-family:'Lora',serif; font-weight:800; font-size:13.5px; color:#06202a; background:linear-gradient(180deg,#67e8f9,#0891b2); box-shadow:0 0 8px -1px #22d3ee, 0 1px 3px #000; z-index:6; }
        .dtm-root .cost::after{ content:'氣'; position:absolute; left:50%; top:calc(100% + 1px); transform:translateX(-50%); font-family:'Lora',serif; font-size:10px; font-weight:700; line-height:1; color:#7dd3fc; text-shadow:0 1px 2px #000, 0 0 3px #000; pointer-events:none; }
        .dtm-root .rar{ position:absolute; top:8px; right:8px; width:10px; height:10px; transform:rotate(45deg); border-radius:2px; background:var(--r); box-shadow:0 0 8px -1px var(--r), 0 0 0 1px rgba(0,0,0,.45); z-index:6; }   /* viên phẩm chất = kim cương góc phải trên (màu theo bậc) */
        .dtm-root .ctitle{ font-family:'Lora',serif; font-weight:700; font-size:13.5px; text-align:center; line-height:1.22; padding:0; color:#fff; text-shadow:0 1px 4px #000, 0 0 3px #000; min-height:34px; display:flex; flex-direction:column; justify-content:center; }
        .dtm-root .ctype{ text-align:center; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--c); opacity:.95; margin-top:3.5px; line-height:1.35; text-shadow:0 1px 3px #000; }
        .dtm-root .cdesc{ font-size:10.5px; line-height:1.38; color:#eef3fa; padding:0 1px; margin-top:3.5px; min-height:30px; display:flex; flex-direction:column; justify-content:center; text-align:center; text-shadow:0 1px 3px #000; }
        .dtm-root .khi-pip{ width:15px; height:15px; border-radius:9999px; border:1px solid #155e75; }

        .dtm-root .dtm-bossban .ctr{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2; }

        .dtm-root .dtm-bossban.pick{ cursor:pointer; box-shadow:0 0 36px -6px #fb7185, inset 0 0 0 1px #fb7185; }
        .dtm-root .dtm-bossban.locked{ filter:grayscale(.45) brightness(.62); }
        .dtm-root .dtm-bossban::after{ content:''; position:absolute; left:9%; right:9%; bottom:7px; height:2px; background:linear-gradient(90deg,transparent,#fb7185,transparent); z-index:3; }
        .dtm-root .dtm-conn{ width:2px; height:18px; background:linear-gradient(#33415588,#33415522); }
        .dtm-root .dtm-conn.lit{ background:linear-gradient(#f5b942,#a78bfa); box-shadow:0 0 8px -1px #f5b94288; }

        .dtm-root .dtm-tband{ font-size:10px; color:#64748b; font-family:'Lora',serif; position:absolute; left:4px; }
        .dtm-root .dtm-cur{ position:absolute; right:4px; font-size:10px; color:#f5b942; font-family:'Lora',serif; white-space:nowrap; }
        .dtm-root .nodeT{ display:flex; flex-direction:column; align-items:center; gap:4px; }
        .dtm-root .nodeT .glyph{ width:56px; height:56px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-family:'Lora',serif; font-size:25px; border:1.5px solid; transition:transform .14s; }

        .dtm-root .shake{ animation:dtmShk .26s; } @keyframes dtmShk{ 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 85%{transform:translateX(-3px)} }
