                      <span class="text-[9px] px-1.5 py-0.5 rounded font-medium shrink-0" :class="g.tierStyle(c.tier).badge" x-text="g.tierStyle(c.tier).label"></span>
                      <span class="text-[13px] font-medium truncate" :class="g.heInfo(he).text" x-text="c.name"></span>
                      <span class="text-[10px] text-slate-500 ml-auto shrink-0" x-text="'ST ×'+c.mult+' · '+c.nl+' NL'"></span>
                    </div>
                    <div class="text-[11px] text-slate-400 leading-snug" x-text="c.short"></div>
                    <div class="flex flex-wrap gap-1 mt-1.5">
                      <template x-for="tag in g.chieuTags(c)" :key="tag"><span class="text-[9px] px-1.5 py-0.5 rounded bg-ink text-slate-300" x-text="tag"></span></template>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div>
            <div class="lbl mb-2" x-text="'Bị Động Hệ ' + g.heName(he)"></div>
            <div class="space-y-2">
              <template x-for="p in g.heBiDong(he)" :key="p.id">
                <div class="flex gap-2.5 rounded-lg bg-ink2/60 border border-slate-800 p-2.5">
                  <div class="w-12 h-12 shrink-0 rounded-md overflow-hidden flex items-center justify-center border border-violet-500/40 bg-ink">
                    <img :src="'images/bidong/'+p.id+'.webp'" class="w-full h-full object-cover" alt="" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="text-[13px] font-medium text-violet-300" x-text="p.name"></div>
                    <div class="text-[11px] text-slate-400 leading-snug mt-0.5" x-text="p.desc"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
          <div class="rounded-lg bg-ink3/40 border border-slate-800 p-2.5">
            <div class="text-[10px] uppercase tracking-wider text-slate-500 mb-1">Học tại</div>
            <div class="text-[12px]" :class="g.heInfo(he).text" x-text="g.monPhaiOf(he).name"></div>
            <div class="text-[11px] text-slate-400 leading-snug mt-0.5" x-text="g.monPhaiOf(he).desc"></div>
          </div>
          <div class="text-[10px] text-slate-600 leading-snug">Khởi tu: sẵn nội công + 1 chiêu Sơ + 1 Bị Động cùng hệ. Còn lại học sau ở Tàng Kinh Các.</div>
        </div>
        <!-- footer -->
        <div class="p-3 border-t border-slate-800 bg-ink2/50 shrink-0">
          <button @click="g.pickTpFromDetail()" class="w-full py-2.5 rounded-lg font-bold text-sm transition" :class="g.draftTamPhapOn(tp.id) ? 'bg-jade/20 text-jade border border-jade/40' : 'bg-jade text-ink hover:bg-jade/90'" x-text="g.draftTamPhapOn(tp.id) ? '✓ Đã chọn nội công này' : 'Chọn nội công này'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Cường Hóa (Lò Cường Hóa) ===== -->
  <template x-if="$store.game.enhanceModal">
    <div class="fixed inset-0 z-[55] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.closeEnhance()">
      <div class="panel rounded-2xl w-[600px] max-w-[95vw] border border-amber-500/30 overflow-hidden shadow-2xl" @click.stop
           x-data="{ get g(){ return $store.game }, get id(){ return $store.game.enhanceId() } }">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-slate-800 bg-ink2/60">
          <span class="flex items-center gap-2 text-base font-semibold text-slate-100"><span class="text-amber-400" x-html="g.svg('zap','w-5 h-5')"></span>Lò Cường Hóa</span>
          <button @click="g.closeEnhance()" class="text-slate-500 hover:text-rose-400 text-lg" aria-label="Đóng">✕</button>
        </div>
        <template x-if="!id"><div class="p-10 text-center text-slate-500">Slot này chưa có trang bị.</div></template>
        <template x-if="id">
          <div class="p-5" x-data="{ get g(){ return $store.game }, get id(){ return $store.game.enhanceId() }, get info(){ return $store.game.enhanceInfo($store.game.enhanceId()) } }">
            <!-- Hero: item (ô VUÔNG + vòng trận pháp) + định danh + tiến cấp -->
            <div class="flex items-center gap-5 mb-5">
              <div class="relative w-[110px] h-[110px] shrink-0 flex items-center justify-center">
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full pointer-events-none text-amber-300" fill="none" stroke="currentColor" style="filter:drop-shadow(0 0 2.5px rgba(245,185,66,.55))">
                  <rect x="5" y="5" width="90" height="90" rx="15" stroke-width="0.6" opacity=".22"/>
                  <rect x="5" y="5" width="90" height="90" rx="15" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="0.4 6" opacity=".95">
                    <animate attributeName="stroke-dashoffset" from="0" to="6.4" dur="1.2s" repeatCount="indefinite"/>
                  </rect>
                </svg>
                <div class="relative w-[82px] h-[82px] rounded-lg border-2 bg-gradient-to-br overflow-hidden flex items-center justify-center cursor-zoom-in hover:ring-2 hover:ring-amber-300/50 transition" :class="g.itemQuality(id).border+' '+g.itemQuality(id).grad" @click="g.openLightbox(id.id, id.icon, id.name)" title="Bấm để phóng to">
                  <span class="w-full h-full inline-flex items-center justify-center" x-html="g.ico(id.id, id.icon)"></span>
                  <template x-if="g.itemPlus(id)>0"><span class="absolute bottom-0 right-0 text-[11px] font-bold text-amber-300 bg-ink/85 px-1.5 rounded-tl" x-text="'+'+g.itemPlus(id)"></span></template>
                </div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-lg font-semibold truncate" :class="g.itemQuality(id).text" x-text="id.name + (g.itemPlus(id)>0 ? ' +'+g.itemPlus(id) : '')"></div>
                <span class="inline-block mt-1.5 text-[11px] px-2 py-0.5 rounded border" :class="g.itemQuality(id).bg+' '+g.itemQuality(id).text+' '+g.itemQuality(id).border" x-text="g.qualityName(id) + (id.itemLv ? ' · Lv'+id.itemLv : '')"></span>
                <template x-if="!g.enhanceMaxed(id)">
                  <div class="flex items-center gap-3 mt-3">
                    <span class="text-[26px] font-bold leading-none text-slate-400" x-text="'+'+g.itemPlus(id)"></span>
                    <span class="text-amber-400" x-html="g.svg('chevR','w-6 h-6')"></span>
                    <span class="text-[40px] font-extrabold leading-none text-amber-300" x-text="'+'+(g.itemPlus(id)+1)"></span>
                  </div>
                </template>
                <template x-if="g.enhanceMaxed(id)">
                  <div class="mt-3 text-amber-300 font-semibold" x-text="'Đã đạt cường hóa tối đa (+'+g.MAX_PLUS+')'"></div>
                </template>
              </div>
            </div>

            <!-- Thông báo kết quả (ngoài guard maxed → cú chốt +15 vẫn báo) -->
            <template x-if="g.enhanceMsg && g.enhanceMsg.ok"><div class="text-center text-emerald-400 font-medium mb-3" x-text="'✓ Thành công! Đạt +'+g.enhanceMsg.plus"></div></template>
            <template x-if="g.enhanceMsg && !g.enhanceMsg.ok"><div class="text-center text-rose-400 font-medium mb-3">✗ Thất bại, nguyên liệu tiêu hao.</div></template>

            <template x-if="!g.enhanceMaxed(id)">
              <div>
                <!-- 2 cột: Chỉ số tăng | Nguyên liệu -->
                <div class="grid grid-cols-2 gap-3.5 mb-4">
                  <div class="rounded-xl bg-ink3/50 border border-slate-800 p-4">
                    <div class="text-[11px] uppercase tracking-wider text-amber-300/70 mb-2.5 font-medium">Chỉ số tăng</div>
                    <div class="space-y-2.5">
                      <template x-for="p in g.enhancePreview(id)" :key="p.key">
                        <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-400"><span class="text-slate-500" x-html="g.svg(p.icon,'w-4 h-4')"></span><span x-text="p.label"></span></span><span class="tabular-nums"><span class="text-slate-400" x-text="p.cur"></span><span class="text-slate-600 mx-1">→</span><span class="text-emerald-400 font-semibold" x-text="p.next"></span><span class="text-emerald-500/70 text-[11px] ml-1" x-text="'+'+(p.next-p.cur)"></span></span></div>
                      </template>
                      <template x-if="!g.enhancePreview(id).length"><div class="text-[12px] text-slate-500 italic py-1">Trang bị này không có chỉ số nền để cường hóa.</div></template>
                    </div>
                  </div>
                  <div class="rounded-xl bg-ink3/50 border border-slate-800 p-4">
                    <div class="text-[11px] uppercase tracking-wider text-amber-300/70 mb-2.5 font-medium">Nguyên liệu</div>
                    <div class="space-y-2.5">
                      <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox(info.stoneId, (g.ITEMS[info.stoneId]||{}).icon, info.stoneName)" title="Bấm để phóng to" x-html="g.ico(info.stoneId, (g.ITEMS[info.stoneId]||{}).icon)"></span><span class="truncate font-medium" :class="g.itemQuality(info.stoneId).text" x-text="info.stoneName"></span></span><span class="tabular-nums shrink-0" :class="info.stoneOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.stoneHave)+' / '+info.stoneQty"></span></div>
                      <div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox('honThach','💠','Hồn Thạch')" title="Bấm để phóng to" x-html="g.ico('honThach','💠')"></span><span class="truncate font-medium text-rose-300">Hồn Thạch</span></span><span class="tabular-nums shrink-0" :class="info.honOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.honHave)+' / '+g.fmt(info.honThach)"></span></div>
                      <template x-if="info.crystalQty>0"><div class="flex items-center justify-between text-[13px]"><span class="inline-flex items-center gap-2 text-slate-300 min-w-0"><span class="w-5 h-5 inline-flex items-center justify-center shrink-0 cursor-zoom-in rounded hover:ring-1 hover:ring-amber-300/50 transition" @click="g.openLightbox(info.crystalId, (g.ITEMS[info.crystalId]||{}).icon, info.crystalName)" title="Bấm để phóng to" x-html="g.ico(info.crystalId, (g.ITEMS[info.crystalId]||{}).icon)"></span><span class="truncate font-medium" :class="g.itemQuality(info.crystalId).text" x-text="info.crystalName"></span></span><span class="tabular-nums shrink-0" :class="info.crystalOk?'text-slate-200':'text-rose-400'" x-text="g.fmt(info.crystalHave)+' / '+info.crystalQty"></span></div></template>
                    </div>
                  </div>
                </div>

                <!-- Tỉ lệ thành công (thanh) -->
                <div class="rounded-xl bg-ink3/40 border border-slate-800 px-4 py-3.5 mb-4">
                  <div class="flex items-center justify-between mb-2"><span class="text-[13px] text-slate-300">Tỉ lệ thành công</span><span class="text-lg font-bold" :class="info.ratePct>=80?'text-emerald-400':(info.ratePct>=50?'text-amber-300':'text-rose-400')" x-text="info.ratePct+'%'"></span></div>
                  <div class="h-2.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full rounded-full" :class="info.ratePct>=80?'bg-emerald-500':(info.ratePct>=50?'bg-amber-500':'bg-rose-500')" :style="'width:'+info.ratePct+'%'"></div></div>
                  <div class="text-[11px] text-slate-500 mt-2 text-center">Thất bại: mất nguyên liệu, <span class="text-slate-400">KHÔNG tụt cấp</span>.</div>
                </div>

                <button @click="g.doEnhance()" :disabled="!g.enhanceCan(id)" class="w-full py-3 rounded-xl font-semibold text-base transition inline-flex items-center justify-center gap-2" :class="g.enhanceCan(id) ? 'bg-amber-500 hover:bg-amber-400 text-ink' : 'bg-slate-800 text-slate-600 cursor-not-allowed'"><span x-html="g.svg('zap','w-5 h-5')"></span>Cường Hóa</button>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- (Modal kết quả Vây Sát cũ ĐÃ GỠ — cơ chế theo lượt hiện kết quả + chiến lợi phẩm ngay trong panel combat ở view worldboss) -->

  <!-- (Báo cáo nhàn rỗi đã gộp vào "Vùng thông báo" giữa-dưới ở cuối file — đồng bộ 1 vị trí) -->

  <!-- ===== Modal sửa Tiểu Sử (≤250 ký tự) ===== -->
  <template x-if="$store.game.bioModal">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeBioEdit()">
      <div class="panel rounded-2xl w-[30rem] max-w-[94vw] overflow-hidden shadow-2xl" @click.stop>
        <div class="px-6 pt-5 pb-3 border-b border-slate-800 flex items-center justify-between">
          <div class="text-lg font-bold flex items-center gap-2 fserif"><span class="text-jade" x-html="$store.game.svg('scroll','w-5 h-5')"></span>Tiểu Sử</div>
          <button @click="$store.game.closeBioEdit()" class="w-8 h-8 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
        </div>
        <div class="px-6 py-5">
          <textarea x-model="$store.game.bioDraft" maxlength="250" rows="5" placeholder="Viết đôi dòng về nhân vật của ngươi…" class="w-full rounded-lg bg-ink3 border border-slate-700 focus:border-jade outline-none p-3 text-sm text-slate-200 resize-none leading-snug"></textarea>
          <div class="flex items-center justify-between mt-2">
            <span class="text-[11px] text-slate-500">Tối đa 250 ký tự</span>
            <span class="text-[11px] tabular-nums" :class="($store.game.bioDraft||'').length>=250?'text-amber-300':'text-slate-400'" x-text="(($store.game.bioDraft||'').length)+' / 250'"></span>
          </div>
          <div class="flex gap-2 mt-4">
            <button @click="$store.game.closeBioEdit()" class="flex-1 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-slate-500 text-slate-300 transition">Huỷ</button>
            <button @click="$store.game.saveBio()" class="flex-1 py-2 rounded-lg bg-jade/85 hover:bg-jade text-ink font-medium transition">Lưu</button>
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal xác nhận Reset (thay confirm() trình duyệt) ===== -->
  <template x-if="$store.game.confirmReset">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.confirmReset=false">
      <div class="panel rounded-xl p-6 w-80 max-w-full text-center shadow-2xl border border-rose-500/40" @click.stop>
        <div class="text-3xl mb-2">⚠️</div>
        <div class="font-bold text-lg text-rose-300">Xoá Tiến Trình?</div>
        <div class="text-sm text-slate-400 mt-2 leading-snug">Xoá sạch nhân vật, cấp độ, vật phẩm — chơi lại từ đầu (đặt lại tên &amp; giới tính). Không thể hoàn tác.</div>
        <div class="flex gap-2 mt-5">
          <button @click="$store.game.confirmReset=false" class="flex-1 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-slate-500 text-slate-300 transition">Huỷ</button>
          <button @click="$store.game.doReset()" class="flex-1 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-white font-medium transition">Xoá &amp; Chơi lại</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== HỒI TRÌNH (offline) — thiệp "Phi Cáp Truyền Thư" giữa màn (Mẫu A) ===== -->
  <template x-if="$store.game && $store.game.offlineReport">
    <div class="fixed inset-0 z-[81] flex items-center justify-center p-4" style="background:rgba(0,0,0,.55);backdrop-filter:blur(2px)" @click="$store.game.dismissOffline()">
      <div class="panel rounded-2xl overflow-hidden border border-jade/40" style="width:340px;max-width:92vw;box-shadow:0 14px 50px rgba(0,0,0,.6),0 0 34px rgba(20,184,166,.10)" @click.stop>
        <div style="height:2px;background:linear-gradient(90deg,transparent,rgba(245,185,66,.85) 22%,#fff4d6 50%,rgba(245,185,66,.85) 78%,transparent)"></div>
        <div class="flex items-center gap-2.5" style="padding:14px 20px 10px">
          <span class="flex items-center justify-center text-jade shrink-0" style="width:32px;height:32px;border-radius:9px;background:#070908;border:1px solid rgba(148,163,184,.28)"><span class="inline-flex" style="width:18px;height:18px" x-html="$store.game.svg('scroll','w-full h-full')"></span></span>
          <div class="min-w-0">
            <div class="gold-text fserif leading-tight" style="font-size:15px">Phi Cáp Truyền Thư</div>
            <div class="text-slate-500 leading-tight" style="font-size:11px">Một cánh bồ câu mang tin về…</div>
          </div>
        </div>
        <div style="padding:0 20px 8px">
          <div class="flex items-baseline justify-between" style="border-radius:12px;padding:8px 12px;background:rgba(20,184,166,.06);border:1px solid rgba(20,184,166,.18)">
            <span class="uppercase text-slate-500" style="font-size:10px;letter-spacing:.12em">Ngươi vắng giang hồ</span>
            <span class="fserif text-jade leading-none" style="font-size:17px" x-text="$store.game.offlineAwayText"></span>
          </div>
        </div>
        <div class="text-slate-400 italic leading-snug" style="padding:6px 20px 4px;font-size:12px">
          Hành trạng: <span class="text-slate-200 not-italic fserif" x-text="$store.game.offlineActText"></span>
        </div>
        <div style="padding:6px 20px">
          <template x-for="(gn,i) in $store.game.offlineGains" :key="i">
            <div class="flex items-center justify-between" style="padding:6px 0" :style="i>0 ? 'border-top:1px solid rgba(148,163,184,.12)' : ''">
              <span class="text-slate-300" style="font-size:13px" x-text="gn.label"></span>
              <span class="fserif" style="font-size:14px" :class="gn.cls" x-text="gn.amount"></span>
            </div>
          </template>
        </div>
        <template x-if="$store.game.offlineReport.capped">
          <div class="flex items-center gap-1.5 text-amber-300" style="padding:0 20px 4px;font-size:11px">
            <span class="rounded-full bg-amber-400 inline-block shrink-0" style="width:6px;height:6px"></span>
            Đã chạm trần nhàn rỗi — vào luyện tiếp kẻo phí.
          </div>
        </template>
        <div style="padding:14px 20px">
          <button @click="$store.game.dismissOffline()" class="w-full fserif text-jade transition hover:brightness-110" style="padding:8px 0;border-radius:8px;font-size:13px;background:rgba(20,184,166,.14);border:1px solid rgba(20,184,166,.42)">Tiếp Tục Hành Trình</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Vùng thông báo — mọi thông báo về CÙNG vị trí giữa-dưới; canh giữa bằng flex (không transform) nên chỉ mờ dần, không trượt ngang ===== -->
  <div class="fixed bottom-6 inset-x-0 z-[80] flex flex-col items-center gap-2 px-4 pointer-events-none">
    <!-- (Báo cáo Hồi Trình đã tách ra overlay riêng "Phi Cáp Truyền Thư" bên dưới) -->
    <!-- Thông báo nhanh (tự ẩn sau 2.5s) -->
    <div x-show="$store.game.toast" x-transition.opacity x-cloak
         class="px-5 py-3 rounded-xl bg-black/90 border border-jade/40 text-sm text-slate-100 shadow-2xl"
         x-text="$store.game.toast"></div>
  </div>

  <!-- ===== Modal Cài Đặt ===== -->
  <template x-if="$store.game.settingsModal">
    <div class="fixed inset-0 z-[70] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.closeSettings()">
      <div class="panel rounded-2xl w-[26rem] max-w-[94vw] overflow-hidden shadow-2xl" @click.stop>
        <div class="px-6 pt-5 pb-4 border-b border-slate-800 flex items-center justify-between">
          <div class="text-lg font-bold flex items-center gap-2" style="font-family:'Lora',serif"><span>⚙️</span> Cài Đặt</div>
          <button @click="$store.game.closeSettings()" class="w-8 h-8 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center transition">✕</button>
        </div>
        <div class="px-6 py-5 space-y-5">
          <!-- Nhân vật -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Nhân Vật</div>
            <div class="flex items-center justify-between text-sm"><span class="text-slate-400">Danh hiệu</span><span class="font-medium" x-text="$store.game.state.player.name"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Giới tính</span><span class="font-medium" x-text="$store.game.genderLabel"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Tổng cấp</span><span class="font-medium text-jade" x-text="$store.game.totalLevel"></span></div>
            <div class="flex items-center justify-between text-sm mt-1"><span class="text-slate-400">Giới hạn nhàn rỗi</span><span class="font-medium" x-text="($store.game.state.settings?.idleCapHours || 8) + ' giờ'"></span></div>
          </div>
          <!-- Tài khoản / Cloud -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Tài Khoản</div>
            <template x-if="$store.game.isLoggedIn">
              <div>
                <div class="flex items-center justify-between gap-2">
                  <div class="min-w-0">
                    <div class="text-sm text-jade font-medium truncate" x-text="$store.game.authUserEmail"></div>
                    <div class="text-[11px] text-slate-500" x-text="$store.game.cloudLastSyncText"></div>
                  </div>
                  <button @click="$store.game.doSignOut()" class="shrink-0 px-3 py-1.5 rounded-lg bg-ink3 border border-slate-700 hover:border-rose-500/60 text-slate-300 hover:text-rose-300 text-sm transition">Đăng xuất</button>
                </div>
                <button @click="$store.game.cloudSyncNow()" :disabled="$store.game.cloudSyncing"
                  class="w-full mt-2 px-3 py-2 rounded-lg bg-cyan/15 border border-cyan/40 text-cyan hover:bg-cyan/25 text-sm font-medium transition disabled:opacity-50 disabled:cursor-wait"
                  x-text="$store.game.cloudSyncing ? 'Đang đồng bộ…' : 'Đồng bộ ngay'"></button>
                <template x-if="$store.game.cloudErr"><div class="text-[11px] text-rose-400 mt-1.5 flex items-center gap-1">⚠ <span x-text="$store.game.cloudErr"></span></div></template>
              </div>
            </template>
            <template x-if="!$store.game.isLoggedIn">
              <div>
                <button @click="$store.game.closeSettings(); $store.game.openAuth()" class="w-full px-3 py-2.5 rounded-lg bg-jade/15 border border-jade/40 text-jade hover:bg-jade/25 text-sm font-medium transition">Đăng nhập / Đăng ký</button>
                <div class="text-[11px] text-slate-500 mt-1.5">Tạo tài khoản để sao lưu cloud, chơi tiếp ở máy khác.</div>
              </div>
            </template>
          </div>
          <!-- Lưu trữ -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Lưu Trữ</div>
            <div class="grid grid-cols-2 gap-2">
              <button @click="$store.game.devExport()" class="px-3 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-jade text-sm text-slate-200 transition">⬇ Xuất bản lưu</button>
              <label class="px-3 py-2 rounded-lg bg-ink3 border border-slate-700 hover:border-jade text-sm text-slate-200 cursor-pointer text-center transition">⬆ Nhập bản lưu
                <input type="file" accept="application/json" class="hidden" @change="$store.game.devImport($event)">
              </label>
            </div>
            <div class="text-[11px] text-slate-500 mt-1.5">Xuất file .json để sao lưu / chuyển máy.</div>
          </div>
          <!-- Nguy hiểm -->
          <div>
            <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Khu Vực Nguy Hiểm</div>
            <button @click="$store.game.closeSettings(); $store.game.resetGame()" class="w-full px-3 py-2.5 rounded-lg bg-rose-900/30 border border-rose-700/50 text-rose-300 hover:bg-rose-900/50 text-sm transition">Khôi phục gốc — xoá toàn bộ tiến trình</button>
          </div>
          <div class="text-[10px] text-slate-600 text-center pt-1">Phím <b class="text-slate-500">F9</b>: bảng Dev/Admin (offline).</div>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Tài Khoản (Đăng nhập / Đăng ký — Supabase) ===== -->
  <template x-if="$store.game.authOpen">
    <div class="fixed inset-0 z-[78] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.closeAuth()">
      <div class="panel rounded-xl w-[360px] max-w-full p-5 border border-jade/40 shadow-2xl" @click.stop x-init="$nextTick(() => $refs.authEmail && $refs.authEmail.focus())">
        <div class="flex items-center justify-between mb-3">
          <div class="font-bold text-jade flex items-center gap-2" style="font-family:'Lora',serif"><span>☁</span> Tài Khoản</div>
          <button @click="$store.game.closeAuth()" class="w-7 h-7 rounded-full bg-black/30 hover:bg-rose-500/20 text-slate-400 hover:text-rose-300 flex items-center justify-center text-sm transition">✕</button>
        </div>
        <!-- Tabs Đăng nhập / Đăng ký -->
        <div class="flex gap-1 p-1 rounded-lg bg-ink3 mb-3">
          <button @click="$store.game.setAuthMode('login')" class="flex-1 py-1.5 rounded-md text-sm font-medium transition" :class="$store.game.authMode==='login' ? 'bg-jade text-ink' : 'text-slate-400 hover:text-slate-200'">Đăng nhập</button>
          <button @click="$store.game.setAuthMode('register')" class="flex-1 py-1.5 rounded-md text-sm font-medium transition" :class="$store.game.authMode==='register' ? 'bg-jade text-ink' : 'text-slate-400 hover:text-slate-200'">Đăng ký</button>
        </div>
        <input type="email" x-ref="authEmail" x-model="$store.game.authEmail" @keydown.enter="$store.game.doAuth()" @keydown.escape="$store.game.closeAuth()" placeholder="Email" autocomplete="username"
          class="w-full px-3 py-2 rounded bg-ink3 border border-slate-700 focus:border-jade outline-none text-slate-100 text-sm mb-2">
        <input type="password" x-model="$store.game.authPass" @keydown.enter="$store.game.doAuth()" @keydown.escape="$store.game.closeAuth()" :placeholder="$store.game.authMode==='register' ? 'Mật khẩu (≥6 ký tự)' : 'Mật khẩu'" autocomplete="current-password"
          class="w-full px-3 py-2 rounded bg-ink3 border border-slate-700 focus:border-jade outline-none text-slate-100 text-sm mb-2">
        <template x-if="$store.game.authErr"><div class="text-[11px] text-rose-400 mb-2 flex items-center gap-1">⚠ <span x-text="$store.game.authErr"></span></div></template>
        <template x-if="$store.game.authMsg"><div class="text-[11px] text-jade mb-2 flex items-center gap-1">✓ <span x-text="$store.game.authMsg"></span></div></template>
        <button @click="$store.game.doAuth()" :disabled="$store.game.authBusy"
          class="w-full py-2.5 rounded-lg font-bold text-sm transition"
          :class="$store.game.authBusy ? 'bg-slate-700 text-slate-500 cursor-wait' : 'bg-jade text-ink hover:bg-jade/90'"
          x-text="$store.game.authBusy ? 'Đang xử lý…' : ($store.game.authMode==='register' ? 'Tạo tài khoản' : 'Đăng nhập')"></button>
        <div class="text-[10px] text-slate-600 text-center mt-2.5">Cloud chỉ để sao lưu — không bắt buộc.</div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Xung Đột Tiến Trình (cloud ↔ máy này) — bắt buộc chọn ===== -->
  <template x-if="$store.game.cloudConflict">
    <div class="fixed inset-0 z-[79] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
      <div class="panel rounded-xl w-[460px] max-w-full p-5 border border-amber-500/40 shadow-2xl" @click.stop>
        <div class="font-bold text-amber-300 flex items-center gap-2 mb-1" style="font-family:'Lora',serif"><span>⚠</span> Hai bản tiến trình khác nhau</div>
        <div class="text-[12px] text-slate-400 mb-3">Chọn bản muốn giữ — bản còn lại sẽ bị ghi đè.</div>
        <div class="grid grid-cols-2 gap-3">
          <div class="rounded-lg border border-cyan/40 bg-cyan/5 p-3">
            <div class="text-[11px] uppercase tracking-wide text-cyan mb-1">Bản Cloud</div>
            <div class="text-sm text-slate-200 truncate" x-text="$store.game.cloudConflict.cloud.name || 'Chưa tạo nhân vật'"></div>
            <div class="text-[12px] text-slate-400 mt-0.5">Lv chiến đấu <b class="text-jade" x-text="$store.game.cloudConflict.cloud.combatLv"></b></div>
            <div class="text-[11px] text-slate-500 mt-0.5" x-text="$store.game.saveTimeText($store.game.cloudConflict.cloud.lastSave)"></div>
          </div>
          <div class="rounded-lg border border-jade/40 bg-jade/5 p-3">
            <div class="text-[11px] uppercase tracking-wide text-jade mb-1">Bản máy này</div>
            <div class="text-sm text-slate-200 truncate" x-text="$store.game.cloudConflict.local.name || 'Chưa tạo nhân vật'"></div>
            <div class="text-[12px] text-slate-400 mt-0.5">Lv chiến đấu <b class="text-jade" x-text="$store.game.cloudConflict.local.combatLv"></b></div>
            <div class="text-[11px] text-slate-500 mt-0.5" x-text="$store.game.saveTimeText($store.game.cloudConflict.local.lastSave)"></div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-4">
          <button @click="$store.game.useCloudSave()" class="px-3 py-2.5 rounded-lg bg-cyan/15 border border-cyan/40 text-cyan hover:bg-cyan/25 text-sm font-bold transition">Dùng bản Cloud</button>
          <button @click="$store.game.useLocalSave()" class="px-3 py-2.5 rounded-lg bg-jade/15 border border-jade/40 text-jade hover:bg-jade/25 text-sm font-bold transition">Giữ bản máy này</button>
        </div>
        <div class="text-[10px] text-slate-600 text-center mt-2.5">Chọn "Dùng bản Cloud" sẽ tải lại trang.</div>
      </div>
    </div>
  </template>

  <!-- ===== Lightbox: xem ảnh phóng to (bấm icon trong modal) ===== -->
  <template x-if="$store.game.lightbox">
    <div class="fixed inset-0 z-[80] flex flex-col items-center justify-center bg-black/85 backdrop-blur-sm p-6 cursor-zoom-out" @click="$store.game.closeLightbox()">
      <div class="w-[70vmin] h-[70vmin] max-w-[520px] max-h-[520px] flex items-center justify-center" style="font-size:160px" x-html="$store.game.ico($store.game.lightbox.id, $store.game.lightbox.emoji)"></div>
      <div class="mt-4 text-xl font-bold text-slate-100" x-text="$store.game.lightbox.name"></div>
      <div class="mt-1 text-xs text-slate-500">Bấm bất kỳ đâu để đóng</div>
    </div>
  </template>

  <!-- ===== Modal Hiệu Ứng (tổng hợp bonus đang áp lên nhân vật) ===== -->
  <template x-if="$store.game.hieuUngOpen">
    <div class="fixed inset-0 z-[75] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click.self="$store.game.closeHieuUng()">
      <div class="panel rounded-2xl w-[480px] max-w-full max-h-[88vh] flex flex-col overflow-hidden border border-cyan/30 shadow-2xl" x-data="{ get fx(){ return $store.game.hieuUngEffects } }">
        <div class="flex items-center justify-between px-5 py-3 border-b border-slate-800 shrink-0" style="background:linear-gradient(90deg,rgba(34,211,238,.1),transparent)">
          <div class="flex items-center gap-2.5"><span class="w-7 h-7 rounded-lg flex items-center justify-center fserif text-[15px]" style="color:#22d3ee;border:1px solid rgba(34,211,238,.4);background:rgba(34,211,238,.1)">效</span><div class="fserif text-[17px] text-cyan leading-none">Hiệu Ứng</div></div>
          <button @click="$store.game.closeHieuUng()" class="text-slate-500 hover:text-rose-400 text-xl leading-none">✕</button>
        </div>
        <div class="p-4 overflow-y-auto space-y-3.5">
          <!-- Sổ Tổng Lực: gộp bonus theo chỉ số (cộng dồn lên chiến đấu) -->
          <template x-if="fx.summary.length">
            <div>
              <div class="lbl mb-1.5">Sổ Tổng Lực <span class="normal-case tracking-normal text-slate-600">· gộp theo chỉ số</span></div>
              <div class="space-y-1.5">
                <template x-for="r in fx.summary" :key="r.label">
                  <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-ink2/50 border border-slate-800">
                    <span class="text-[12px] text-slate-300 shrink-0" x-text="r.label"></span>
                    <span class="fserif text-[14px] text-emerald-300 shrink-0" x-text="r.text"></span>
                    <span class="ml-auto flex items-center gap-1.5 shrink-0">
                      <template x-for="s in r.sources" :key="s.seal"><span class="fserif text-[12.5px] leading-none" :style="'color:'+s.color" x-text="s.seal"></span></template>
                    </span>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <!-- Thẻ chi tiết theo nguồn (kiểu Khắc Lệnh Vàng) -->
          <template x-if="fx.active.length">
            <div>
              <div class="lbl mb-1.5">Đang Hoạt Động <span class="normal-case tracking-normal text-slate-600">· tạm thời</span></div>
              <div class="space-y-2">
                <template x-for="(e,i) in fx.active" :key="'a'+i">
                  <div class="rounded-xl bg-ink2/50 border border-slate-800 px-3.5 py-2" :style="'--dhc:'+e.color">
                    <div class="flex items-center gap-1.5 mb-2">
                      <span class="flex-1 h-px" :style="'background:linear-gradient(90deg,transparent,'+e.color+'b3)'"></span>
                      <span class="text-[7px] leading-none" :style="'color:'+e.color">◆</span>
                      <span class="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center fserif text-[15px]" :style="'color:'+e.color+';background:'+e.color+'18;border:1px solid '+e.color+'45'" x-text="e.seal"></span>
                      <span class="dh-txt text-[13.5px] whitespace-nowrap px-0.5" x-text="e.name"></span>
                      <span class="text-[7px] leading-none" :style="'color:'+e.color">◆</span>
                      <span class="flex-1 h-px" :style="'background:linear-gradient(270deg,transparent,'+e.color+'b3)'"></span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-1.5"><template x-for="ln in e.lines" :key="ln"><span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/12 text-emerald-300 border border-emerald-500/25" x-text="ln"></span></template></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <template x-if="fx.passive.length">
            <div>
              <div class="lbl mb-1.5">Thường Trực <span class="normal-case tracking-normal text-slate-600">· luôn áp</span></div>
              <div class="space-y-2">
                <template x-for="(e,i) in fx.passive" :key="'p'+i">
                  <div class="rounded-xl bg-ink2/50 border border-slate-800 px-3.5 py-2" :style="'--dhc:'+e.color">
                    <div class="flex items-center gap-1.5 mb-2">
                      <span class="flex-1 h-px" :style="'background:linear-gradient(90deg,transparent,'+e.color+'b3)'"></span>
                      <span class="text-[7px] leading-none" :style="'color:'+e.color">◆</span>
                      <span class="w-8 h-8 rounded-lg shrink-0 flex items-center justify-center fserif text-[15px]" :style="'color:'+e.color+';background:'+e.color+'18;border:1px solid '+e.color+'45'" x-text="e.seal"></span>
                      <span class="dh-txt text-[13.5px] whitespace-nowrap px-0.5" x-text="e.name"></span>
                      <span class="text-[7px] leading-none" :style="'color:'+e.color">◆</span>
                      <span class="flex-1 h-px" :style="'background:linear-gradient(270deg,transparent,'+e.color+'b3)'"></span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-1.5"><template x-for="ln in e.lines" :key="ln"><span class="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/12 text-emerald-300 border border-emerald-500/25" x-text="ln"></span></template></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <template x-if="!fx.summary.length && !fx.active.length && !fx.passive.length">
            <div class="text-center text-slate-500 italic py-10 text-[12.5px] fserif">Chưa có hiệu ứng nào đang áp.<br><span class="text-[11px] text-slate-600">Lắp Linh Thạch · dắt Linh Thú · đeo Danh Hiệu · học Nghề · hoàn thiện Vạn Vật Phổ để nhận bonus.</span></div>
          </template>
        </div>
        <div class="px-5 py-2.5 border-t border-slate-800 text-[10px] text-slate-600 italic text-center shrink-0" style="background:rgba(15,21,33,.5)">Tổng hợp mọi hiệu ứng/bonus đang tác động lên nhân vật.</div>
      </div>
    </div>
  </template>

  <!-- ===== Modal Điểm Danh (30 ngày) ===== -->
  <template x-if="$store.game.dailyModal">
    <div class="fixed inset-0 z-[75] flex items-center justify-center bg-black/75 backdrop-blur-sm p-2 sm:p-4" @click="$store.game.dailyModal=false">
      <div class="panel rounded-2xl w-[860px] max-w-full max-h-[90dvh] flex flex-col border border-amber-500/30 shadow-2xl" @click.stop>
        <!-- Header -->
        <div class="flex items-center justify-between px-3 sm:px-5 pt-4 pb-3 border-b border-slate-800 shrink-0">
          <div class="flex items-center gap-2.5">
            <div class="font-bold text-lg text-amber-300">📅 Điểm Danh</div>
            <span class="px-2 py-0.5 rounded-full bg-ink3 border border-amber-500/20 text-amber-200 text-[11px]">🔥 Chuỗi <b x-text="$store.game.loginStreak"></b> ngày</span>
          </div>
          <button @click="$store.game.dailyModal=false" class="text-slate-500 hover:text-rose-400 text-lg">✕</button>
        </div>
        <!-- Lưới 30 ngày -->
        <div class="px-2 py-3 sm:px-5 sm:py-4 overflow-y-auto">
          <div class="grid grid-cols-7 gap-1 sm:gap-2.5">
            <template x-for="(r, i) in $store.game.LOGIN_REWARDS" :key="r.day">
              <div class="relative rounded-xl border flex flex-col items-center text-center h-[116px] p-1 sm:h-[150px] sm:p-3 transition"
                   :class="(i === $store.game.loginNextIndex && $store.game.canClaimDaily)
                     ? 'border-jade bg-jade/10 ring-2 ring-jade/50 animate-pulse'
                     : (r.milestone ? 'border-amber-400/60 bg-amber-500/10' : 'border-slate-800 bg-ink3/40')">
                <div class="flex-1 flex flex-col items-center justify-center font-bold leading-none">
                  <template x-if="!r.milestone">
                    <div class="flex flex-col items-center gap-0.5 sm:gap-1">
                      <span class="w-8 h-8 sm:w-14 sm:h-14 inline-flex items-center justify-center" x-html="$store.game.ico(r.bac ? 'bac' : 'honThach', r.bac ? '🟡' : '🔴')"></span>
                      <span class="text-sm sm:text-xl" :class="r.bac ? 'text-gold' : 'text-rose-200'" x-text="r.bac ? $store.game.fmt(r.bac) : r.honThach"></span>
                    </div>
                  </template>
                  <template x-if="r.milestone">
                    <div class="flex flex-col items-center gap-1 sm:gap-1.5">
                      <div class="flex flex-col sm:flex-row items-center gap-0 sm:gap-1.5 leading-none"><span class="w-6 h-6 sm:w-9 sm:h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('honThach','🔴')"></span><span class="text-[11px] sm:text-base text-rose-200" x-text="r.honThach"></span></div>
                      <div class="flex flex-col sm:flex-row items-center gap-0 sm:gap-1.5 leading-none"><span class="w-6 h-6 sm:w-9 sm:h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('nguyenBao','🔷')"></span><span class="text-[11px] sm:text-base text-cyan" x-text="r.nguyenBao"></span></div>
                    </div>
                  </template>
                </div>
                <div class="text-[9px] sm:text-xs text-slate-500 leading-none mt-0.5 sm:mt-1">Ngày <span x-text="r.day"></span></div>
                <template x-if="i < $store.game.loginNextIndex || (i === $store.game.loginNextIndex && !$store.game.canClaimDaily)">
                  <div class="absolute inset-0 rounded-xl bg-black/70 flex items-center justify-center text-emerald-400 text-2xl sm:text-4xl font-bold">✓</div>
                </template>
              </div>
            </template>
          </div>
        </div>
        <!-- Nút nhận -->
        <div class="px-3 sm:px-5 pb-4 pt-3 border-t border-slate-800 shrink-0">
          <button @click="$store.game.claimDaily()" :disabled="!$store.game.canClaimDaily"
            class="w-full py-3.5 rounded-xl font-bold text-base transition"
            :class="$store.game.canClaimDaily ? 'bg-jade text-ink hover:bg-jade/90' : 'bg-slate-800 text-slate-600 cursor-not-allowed'"
            x-text="$store.game.canClaimDaily ? 'Điểm Danh Nhận Thưởng' : 'Đã điểm danh hôm nay'"></button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== ĐĂNG NHẬP BẢNG DEV (F9) — phải đúng mật khẩu mới mở ===== -->
  <template x-if="$store.game.devLoginOpen">
    <div class="fixed inset-0 z-[91] flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" @click="$store.game.closeDevLogin()">
      <div class="panel rounded-xl w-[340px] max-w-full p-5 border border-amber-500/40 shadow-2xl" @click.stop x-init="$nextTick(() => $refs.devpw && $refs.devpw.focus())">
        <div class="flex items-center gap-2 mb-1"><span class="text-amber-300 text-lg">🔒</span><div class="font-bold text-amber-300">Bảng Dev / Admin</div></div>
        <div class="text-[11px] text-slate-500 mb-3">Nhập mật khẩu để mở công cụ quản trị.</div>
        <input type="password" x-ref="devpw" x-model="$store.game.devPass" @keydown.enter="$store.game.devLogin()" @keydown.escape="$store.game.closeDevLogin()" placeholder="Mật khẩu" autocomplete="off"
          class="w-full px-3 py-2 rounded bg-ink3 border border-slate-700 focus:border-amber-500 outline-none text-slate-100 text-sm mb-2">
        <template x-if="$store.game.devLoginErr"><div class="text-[11px] text-rose-400 mb-2 flex items-center gap-1">⚠ <span x-text="$store.game.devLoginErr"></span></div></template>
        <div class="flex gap-2">
          <button @click="$store.game.devLogin()" class="flex-1 py-2 rounded bg-amber-500/85 hover:bg-amber-500 text-ink text-sm font-bold transition">Đăng Nhập</button>
          <button @click="$store.game.closeDevLogin()" class="px-3 py-2 rounded bg-ink3 border border-slate-700 text-slate-400 hover:text-slate-200 text-sm">Huỷ</button>
        </div>
      </div>
    </div>
  </template>

  <!-- ===== BẢNG DEV / ADMIN (offline) — F9; CHỈ hiện + dùng được khi đã đăng nhập ===== -->
  <template x-if="$store.game.devPanel && $store.game.devAuthed">
    <div class="fixed inset-0 z-[90] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4" @click="$store.game.devPanel=false">
      <div class="panel rounded-xl w-[520px] max-w-full h-[600px] max-h-[88vh] flex flex-col overflow-hidden p-5 border border-amber-500/40 shadow-2xl" @click.stop>
        <!-- Header -->
        <div class="flex justify-between items-center mb-3 shrink-0">
          <div class="font-bold text-amber-300 flex items-center gap-2">🛠️ Bảng Dev / Admin <span class="text-[10px] text-emerald-400 font-normal inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>đã đăng nhập</span></div>
          <div class="flex items-center gap-2">
            <button @click="$store.game.devLogout()" class="text-[11px] text-slate-400 hover:text-rose-400 border border-slate-700 rounded px-2 py-0.5">Đăng xuất</button>
            <button @click="$store.game.devPanel=false" class="text-slate-500 hover:text-rose-400 text-lg leading-none">✕</button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-1 mb-3.5 bg-ink3/40 rounded-lg p-1 shrink-0">
          <template x-for="tb in [{k:'char',l:'Nhân Vật'},{k:'item',l:'Vật Phẩm'},{k:'pet',l:'Linh Thú'},{k:'tongmon',l:'Tông Môn'},{k:'sys',l:'Hệ Thống'}]" :key="tb.k">
            <button @click="$store.game.setDevTab(tb.k)" class="flex-1 px-2 py-1.5 rounded text-[12px] font-medium transition border" :class="$store.game.devTab===tb.k ? 'bg-amber-500/20 text-amber-200 border-amber-500/40' : 'text-slate-400 hover:text-slate-200 border-transparent'" x-text="tb.l"></button>
          </template>
        </div>

        <!-- Vùng nội dung cuộn — khung panel CỐ ĐỊNH, mọi tab cùng kích thước (nội dung dài thì cuộn trong đây) -->
        <div class="flex-1 min-h-0 overflow-y-auto -mr-2 pr-2">
        <!-- ===== TAB: NHÂN VẬT (tổng quan + tiền tệ + cấp độ) ===== -->
        <div x-show="$store.game.devTab==='char'">
          <div class="grid grid-cols-2 gap-1 text-xs text-slate-400 mb-4 bg-ink3/60 rounded-lg p-2.5">
            <div>Tên: <b class="text-slate-200" x-text="$store.game.state.player.name || '—'"></b></div>
            <div>Thân phận: <b class="text-slate-200" x-text="$store.game.className"></b></div>
            <div>Chiến Đấu Lv: <b class="text-jade" x-text="$store.game.combatLevel"></b></div>
            <div>Tổng Lv: <b class="text-jade" x-text="$store.game.totalLevel"></b></div>
          </div>

          <div class="lbl mb-1.5">Tiền tệ</div>
          <div class="space-y-1.5 mb-4 text-sm">
            <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Bạc</span><span class="flex-1 text-gold" x-text="$store.game.fmt($store.game.state.currencies.bac)"></span>
              <button @click="$store.game.devAddCurrency('bac',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button>
              <button @click="$store.game.devAddCurrency('bac',100000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100k</button></div>
            <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Hồn Thạch</span><span class="flex-1" x-text="$store.game.fmt($store.game.state.currencies.honThach)"></span>
              <button @click="$store.game.devAddCurrency('honThach',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button>
              <button @click="$store.game.devAddCurrency('honThach',100000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100k</button></div>
            <div class="flex items-center gap-2"><span class="w-24 text-slate-300">Nguyên Bảo</span><span class="flex-1" x-text="$store.game.fmt($store.game.state.currencies.nguyenBao)"></span>
              <button @click="$store.game.devAddCurrency('nguyenBao',100)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+100</button>
              <button @click="$store.game.devAddCurrency('nguyenBao',1000)" class="px-2 py-0.5 rounded bg-ink3 border border-slate-700 text-xs">+1k</button></div>
          </div>

          <div class="lbl mb-1.5">Cấp độ</div>
          <div class="flex items-center gap-2 mb-2 text-sm">
            <span class="text-slate-300">Đặt MỌI kỹ năng + Tứ Trụ + Chiến Đấu về Lv</span>
            <input type="number" min="1" max="100" x-model.number="$store.game.devLvInput" class="w-16 px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100">
            <button @click="$store.game.devSetAllLevel($store.game.devLvInput)" class="px-3 py-1 rounded bg-jade/80 hover:bg-jade text-ink text-xs font-medium">Áp</button>
          </div>
          <div class="grid grid-cols-2 gap-1 text-[11px]">
            <template x-for="sid in Object.keys($store.game.SKILLS)" :key="sid">
              <div class="flex items-center justify-between bg-ink3 rounded px-2 py-1">
                <span class="truncate" x-text="$store.game.SKILLS[sid].name + ' · Lv' + $store.game.skillLevel(sid)"></span>
                <button @click="$store.game.devAddSkillXp(sid,1000)" class="text-jade shrink-0 ml-1">+1k</button>
              </div>
            </template>
            <div class="flex items-center justify-between bg-ink3 rounded px-2 py-1">
              <span class="truncate" x-text="'Chiến Đấu · Lv' + $store.game.combatLevel"></span>
              <button @click="$store.game.devAddSkillXp('chienDau',1000)" class="text-jade shrink-0 ml-1">+1k</button>
            </div>
          </div>

          <div class="lbl mb-1.5 mt-4">Mở Khoá / Test</div>
          <div class="flex flex-wrap items-center gap-2">
            <button @click="$store.game.devUnlockAllVoHoc()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🥋 Mở khoá toàn bộ võ học</button>
            <button @click="$store.game.devLearnAllNghe()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🛠️ Học tất cả Nghề</button>
            <button @click="$store.game.devUnlockAllTitles()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">🏷️ Mở khoá toàn bộ Danh Hiệu</button>
            <button @click="$store.game.devCompleteCodex()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">📖 Hoàn tất Vạn Vật Phổ</button>
            <button @click="$store.game.devClearSuyYeu()" class="px-3 py-1 rounded bg-rose-900/40 border border-rose-700/50 text-rose-300 text-xs">❤️ Gỡ Suy Yếu (hồi đầy HP)</button>
            <button @click="$store.game.devBossReadyAll()" class="px-3 py-1 rounded bg-fuchsia-900/40 border border-fuchsia-700/50 text-fuchsia-200 text-xs">👹 Mọi Yêu Vương sẵn sàng</button>
          </div>
        </div>

        <!-- ===== TAB: VẬT PHẨM ===== -->
        <div x-show="$store.game.devTab==='item'">
          <div class="lbl mb-1.5">Cấp vật phẩm</div>
          <div class="flex items-center gap-2 mb-4">
            <select x-model="$store.game.devItemSel" class="flex-1 min-w-0 px-2 py-1 rounded bg-ink3 border border-slate-700 text-sm text-slate-100">
              <option :value="null">— chọn vật phẩm —</option>
              <template x-for="id in Object.keys($store.game.ITEMS)" :key="id">
                <option :value="id" x-text="$store.game.ITEMS[id].name"></option>
              </template>
            </select>
            <button @click="$store.game.devAddItem($store.game.devItemSel,10)" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-xs shrink-0">+10</button>
            <button @click="$store.game.devAddItem($store.game.devItemSel,99)" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-xs shrink-0">+99</button>
          </div>
          <div class="lbl mb-1.5">Phát nhanh</div>
          <div class="flex flex-wrap items-center gap-2">
            <button @click="$store.game.devGiveAll()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">📦 Nhận TOÀN BỘ vật phẩm (test)</button>
            <button @click="$store.game.devGiveAllEggs()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🥚 Nhận toàn bộ Trứng + Tinh Thể (xem art)</button>
            <button @click="$store.game.devGiveSampleGear()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">🎁 Tặng toàn bộ trang bị (test)</button>
            <button @click="$store.game.devGiveKimQuang()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">✨ Tặng Bộ Kim Quang (7 món)</button>
            <button @click="$store.game.devGiveStones()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">💠 Tặng đá cường hóa + 100k Hồn Thạch</button>
          </div>
          <div class="lbl mb-1.5 mt-4">Bí Cảnh & Đồ Phổ</div>
          <div class="flex flex-wrap items-center gap-2">
            <select x-model="$store.game.devDungeonSel" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100 text-xs">
              <template x-for="d in $store.game.DUNGEONS" :key="d.id"><option :value="d.id" x-text="d.name + ' (Lv' + d.reqLevel + ')'"></option></template>
            </select>
            <select x-model="$store.game.devDungeonMode" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100 text-xs">
              <option value="nhanh">Chạy Nhanh</option><option value="treo">Treo Luyện</option>
            </select>
            <button @click="$store.game.devGrantDungeon(5)" class="px-3 py-1 rounded bg-cyan-900/40 border border-cyan-700/50 text-cyan-200 text-xs">⚔️ Chạy ×5 (loot + rơi bí kíp)</button>
            <button @click="$store.game.devGiveDoPho(5)" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">📜 +5 lượt rèn mọi Đồ Phổ</button>
          </div>
        </div>

        <!-- ===== TAB: LINH THÚ ===== -->
        <div x-show="$store.game.devTab==='pet'">
          <div class="lbl mb-1.5">Tạo Linh Thú</div>
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <select x-model="$store.game.devPetBase" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-sm text-slate-100">
              <template x-for="b in Object.keys($store.game.PET_SPECIES)" :key="b"><option :value="b" x-text="$store.game.PET_SPECIES[b].name"></option></template>
            </select>
            <select x-model="$store.game.devPetQuality" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-sm text-slate-100">
              <template x-for="q in Object.keys($store.game.PET_QUALITY)" :key="q"><option :value="q" x-text="($store.game.QUALITY[q]||{}).name"></option></template>
            </select>
            <input type="number" min="1" max="99" x-model.number="$store.game.devPetLv" class="w-16 px-2 py-1 rounded bg-ink3 border border-slate-700 text-sm text-slate-100" title="Cấp">
            <button @click="$store.game.devCreatePet()" class="px-3 py-1 rounded bg-jade/80 hover:bg-jade text-ink text-xs font-medium">Tạo Linh Thú</button>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button @click="$store.game.devGiveEachSpecies()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🐾 1 con mỗi loài (theo phẩm/cấp đã chọn)</button>
            <button @click="$store.game.devSetPetLevel($store.game.devPetLv)" class="px-3 py-1 rounded bg-ink3 border border-slate-700 text-xs">Đặt mọi pet về cấp đã chọn</button>
            <button @click="$store.game.devAwakenActive()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">✦ Thức Tỉnh con đang dắt (xem _awk)</button>
            <button @click="$store.game.devGivePetMats()" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🌀 99 Linh Phách + Tinh Thể</button>
            <button @click="$store.game.devClearPets()" class="px-3 py-1 rounded bg-rose-900/40 border border-rose-700/50 text-rose-300 text-xs">Xoá hết Linh Thú</button>
          </div>
        </div>

        <!-- ===== TAB: TÔNG MÔN ===== -->
        <div x-show="$store.game.devTab==='tongmon'">
          <template x-if="!$store.game.tm"><div class="text-[12px] text-slate-500 italic">Chưa khởi tạo Tông Môn.</div></template>
          <template x-if="$store.game.tm">
            <div>
              <div class="lbl mb-1.5">Tài nguyên & Công trình</div>
              <div class="flex flex-wrap items-center gap-2 mb-3">
                <button @click="$store.game.devTmGiveMats(99)" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">🌿 +99 mỗi nguyên liệu</button>
                <button @click="$store.game.devTmGivePills(20)" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">💊 +20 mỗi loại đan</button>
                <button @click="$store.game.devTmGiveResources()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">💰 +Cống Hiến/Điểm/Tiền + Khí Vận</button>
              </div>
              <div class="flex items-center gap-2 mb-4 text-sm">
                <span class="text-slate-300">Mọi công trình → Bậc</span>
                <input type="number" min="0" max="20" x-model.number="$store.game.devTmBuildLv" class="w-16 px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100">
                <button @click="$store.game.devTmSetBuildings($store.game.devTmBuildLv)" class="px-3 py-1 rounded bg-jade/80 hover:bg-jade text-ink text-xs font-medium">Áp</button>
              </div>
              <div class="lbl mb-1.5">Đệ tử <span class="text-slate-600 normal-case tracking-normal" x-text="'· '+$store.game.tm.disciples.length+' người'"></span></div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <button @click="$store.game.devTmAddDisciples(3)" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">+3 đệ tử ngẫu nhiên</button>
                <button @click="$store.game.devTmBreakReadyAll()" class="px-3 py-1 rounded bg-violet-900/40 border border-violet-700/50 text-violet-200 text-xs">→ Bình Cảnh (test đột phá)</button>
                <button @click="$store.game.devTmFinishTimers()" class="px-3 py-1 rounded bg-cyan-900/40 border border-cyan-700/50 text-cyan-200 text-xs">⏩ Hoàn tất Lịch Luyện/Lò/Vườn</button>
              </div>
              <div class="flex items-center gap-2 mb-4 text-sm">
                <span class="text-slate-300 shrink-0">Mọi đệ tử →</span>
                <select x-model.number="$store.game.devTmRealm" class="flex-1 min-w-0 px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100 text-xs">
                  <template x-for="(r,i) in $store.game.tmRealmGuide" :key="i"><option :value="i" x-text="r.name"></option></template>
                </select>
                <button @click="$store.game.devTmRealmAll($store.game.devTmRealm)" class="px-3 py-1 rounded bg-jade/80 hover:bg-jade text-ink text-xs font-medium shrink-0">Áp</button>
              </div>
              <div class="lbl mb-1.5">Nổ sự kiện giang hồ</div>
              <div class="flex items-center gap-2 mb-4">
                <select x-model="$store.game.devTmEventSel" class="flex-1 min-w-0 px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100 text-xs">
                  <option value="">— chọn sự kiện —</option>
                  <template x-for="ev in $store.game.devTmEvents" :key="ev.id"><option :value="ev.id" x-text="ev.id+' · '+ev.title+(ev.kind==='auto'?' (auto)':'')"></option></template>
                </select>
                <button @click="$store.game.devTmFireEvent()" class="px-3 py-1 rounded bg-amber-500/85 hover:bg-amber-500 text-ink text-xs font-bold shrink-0">Nổ</button>
              </div>
              <div class="lbl mb-1.5">Bí Kíp <span class="text-slate-600 normal-case tracking-normal">(BK1-5)</span></div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <select x-model="$store.game.devBkTier" class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-slate-100 text-xs">
                  <option value="all">Mọi bậc</option><option value="sơ">Sơ</option><option value="trung">Trung</option><option value="cao">Cao</option><option value="tuyệt">Tuyệt</option>
                </select>
                <button @click="$store.game.devTmGiveBiKip($store.game.devBkTier,5)" class="px-3 py-1 rounded bg-indigo-900/40 border border-indigo-600/50 text-indigo-200 text-xs">📘 +5 mỗi bí kíp (bậc chọn)</button>
                <button @click="$store.game.devTmRollBkAuction()" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">🔄 Làm mới phiên Đấu Giá</button>
              </div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <button @click="$store.game.devTmTeachBiKip('random')" class="px-3 py-1 rounded bg-indigo-900/40 border border-indigo-600/50 text-indigo-200 text-xs">🥋 Gán bí kíp ngẫu nhiên (đệ tử)</button>
                <button @click="$store.game.devTmTeachBiKip('full')" class="px-3 py-1 rounded bg-indigo-900/40 border border-indigo-600/50 text-indigo-200 text-xs">🥋 Lấp đầy ô võ học</button>
              </div>
              <div class="flex flex-wrap items-center gap-2 mb-4">
                <span class="text-[11px] text-slate-400 self-center">Hợp Nhất:</span>
                <button @click="$store.game.devTmMergeBk('sơ')" class="px-3 py-1 rounded bg-fuchsia-900/40 border border-fuchsia-700/50 text-fuchsia-200 text-xs">Sơ→Trung</button>
                <button @click="$store.game.devTmMergeBk('trung')" class="px-3 py-1 rounded bg-fuchsia-900/40 border border-fuchsia-700/50 text-fuchsia-200 text-xs">Trung→Cao</button>
                <button @click="$store.game.devTmMergeBk('cao')" class="px-3 py-1 rounded bg-fuchsia-900/40 border border-fuchsia-700/50 text-fuchsia-200 text-xs">Cao→Tuyệt</button>
              </div>
              <div class="lbl mb-1.5">Drama / Xã Hội</div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <span class="text-[11px] text-slate-400 self-center">Tâm Ma:</span>
                <button @click="$store.game.devTmSetTamMa(3)" class="px-3 py-1 rounded bg-violet-900/40 border border-violet-700/50 text-violet-200 text-xs">→ bậc 3 (Kiếp chọn)</button>
                <button @click="$store.game.devTmSetTamMa(5)" class="px-3 py-1 rounded bg-rose-900/40 border border-rose-700/50 text-rose-200 text-xs">→ bậc 5 (đỉnh)</button>
                <button @click="$store.game.devTmSetTamMa(0)" class="px-3 py-1 rounded bg-emerald-900/40 border border-emerald-600/50 text-emerald-200 text-xs">→ 0 (an)</button>
              </div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <button @click="$store.game.devTmStageThienKiep(8)" class="px-3 py-1 rounded bg-amber-900/40 border border-amber-700/50 text-amber-200 text-xs">⚡ Dựng cảnh Thiên Kiếp (Thiên Tư realm 8)</button>
                <button @click="$store.game.devResetDanhSiOffers()" class="px-3 py-1 rounded bg-cyan-900/40 border border-cyan-700/50 text-cyan-200 text-xs">↺ Reset lời mời Danh Sĩ</button>
              </div>
              <div class="flex flex-wrap items-center gap-2">
                <button @click="$store.game.devTmSeedDiplomacy(119,4)" class="px-3 py-1 rounded bg-sky-900/40 border border-sky-700/50 text-sky-200 text-xs">🤝 Gieo bang giao (cận Kết Minh)</button>
                <button @click="$store.game.devTmClearCooldowns()" class="px-3 py-1 rounded bg-ink3 border border-slate-700 text-slate-300 text-xs">Reset CD (Luận Võ/Đãi Khách/Đấu Giá)</button>
                <button @click="$store.game.devTmClearDrama()" class="px-3 py-1 rounded bg-rose-900/40 border border-rose-700/50 text-rose-300 text-xs">Gột sạch cờ/tâm ma/phản đồ</button>
              </div>
            </div>
          </template>
        </div>

        <!-- ===== TAB: HỆ THỐNG (save + reset) ===== -->
        <div x-show="$store.game.devTab==='sys'">
          <div class="lbl mb-1.5">Quản lý Save</div>
          <div class="flex flex-wrap gap-2 mb-3">
            <button @click="$store.game.devExport()" class="px-3 py-1.5 rounded bg-ink3 border border-slate-700 hover:border-jade text-sm">⬇ Xuất save</button>
            <label class="px-3 py-1.5 rounded bg-ink3 border border-slate-700 hover:border-jade text-sm cursor-pointer">⬆ Nhập save
              <input type="file" accept="application/json" class="hidden" @change="$store.game.devImport($event)">
            </label>
            <button @click="$store.game.devPanel=false; $store.game.resetGame()" class="px-3 py-1.5 rounded bg-rose-900/40 border border-rose-700/50 text-rose-300 text-sm">Reset toàn bộ</button>
          </div>
          <div class="lbl mb-1.5">Tua đồng hồ <span class="text-slate-600 normal-case tracking-normal" x-text="'· lệch ' + $store.game.devNowOffsetDays + ' ngày'"></span></div>
          <div class="flex flex-wrap items-center gap-2 mb-2">
            <button @click="$store.game.devNowOffsetAdd(1)" class="px-3 py-1 rounded bg-indigo-900/40 border border-indigo-600/50 text-indigo-200 text-xs">+1 ngày</button>
