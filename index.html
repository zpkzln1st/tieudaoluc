<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiêu Dao Lục</title>

  <!-- Font wordmark logo: Lora (đậm 700, có đủ dấu tiếng Việt — gồm dấu nặng "Lục") -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      ink: '#070b14', ink2: '#0f1521', ink3: '#141b2a',
      jade: '#14b8a6', cyan: '#22d3ee', gold: '#f5b942',
    } } } };
  </script>
  <style>
    /* ===== DANH HIỆU — plaque Kiểu B (Long Văn) · glow tĩnh dịu · Ánh Kim Quét (phẩm cao) ===== */
    .dh-q-pham{--dhc:#cbd5e1} .dh-q-luong{--dhc:#34d399} .dh-q-tinh{--dhc:#60a5fa} .dh-q-tuyet{--dhc:#a78bfa}
    .dh-q-truyen{--dhc:#e879f9} .dh-q-than{--dhc:#fb923c} .dh-q-coban{--dhc:#fbbf24}
    .dh{ display:inline-flex; align-items:center; gap:.55rem; padding:.14rem .2rem; position:relative; }
    .dh .dh-li{ width:24px; height:1px; background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--dhc) 80%,transparent)); box-shadow:0 0 4px color-mix(in srgb,var(--dhc) 42%,transparent); position:relative; }
    .dh .dh-li.r{ background:linear-gradient(270deg,transparent,color-mix(in srgb,var(--dhc) 80%,transparent)); }
    .dh .dh-li::after{ content:'◆'; position:absolute; top:-.6em; color:var(--dhc); font-size:.5em; opacity:.9; filter:drop-shadow(0 0 3px color-mix(in srgb,var(--dhc) 55%,transparent)); right:-2px; }
    .dh .dh-li.r::after{ left:-2px; right:auto; }
    .dh-txt{ font-family:'Lora',serif; font-weight:700; letter-spacing:.015em;
      background:linear-gradient(180deg, color-mix(in srgb,#fff 60%,var(--dhc)) 6%, var(--dhc) 52%, color-mix(in srgb,var(--dhc) 84%,#000) 100%);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter:drop-shadow(0 0 3px color-mix(in srgb,var(--dhc) 68%,transparent)) drop-shadow(0 0 8px color-mix(in srgb,var(--dhc) 38%,transparent)); }
    .dh-high::before{ content:''; position:absolute; inset:-55% -12%; z-index:0; background:radial-gradient(ellipse at center, color-mix(in srgb,var(--dhc) 16%,transparent), transparent 72%); pointer-events:none; }
    .dh-high > *{ position:relative; z-index:1; }
    @keyframes dhSweep{ from{ background-position:160% 0, 0 0 } to{ background-position:-60% 0, 0 0 } }
    .dh-high .dh-txt{
      background:linear-gradient(105deg, transparent 38%, rgba(255,255,255,.8) 50%, transparent 62%), linear-gradient(180deg, color-mix(in srgb,#fff 60%,var(--dhc)) 6%, var(--dhc) 52%, color-mix(in srgb,var(--dhc) 84%,#000) 100%);
      background-size:220% 100%, 100% 100%; background-position:160% 0, 0 0; background-repeat:no-repeat; -webkit-background-clip:text; background-clip:text;
      filter:drop-shadow(0 0 3px color-mix(in srgb,var(--dhc) 72%,transparent)) drop-shadow(0 0 10px color-mix(in srgb,var(--dhc) 46%,transparent)) drop-shadow(0 0 20px color-mix(in srgb,var(--dhc) 24%,transparent));
      animation:dhSweep 3.4s linear infinite; }
    @media (prefers-reduced-motion: reduce){ .dh-high .dh-txt{ animation:none } }

    /* ===== Hào quang chạy viền (phẩm Sử Thi+ / item thuộc Bộ Trang) — conic comet 2 vệt, MƯỢT qua góc bo (không dash → không seam, không hụt góc) ===== */
    @keyframes haloSpin{ to{ transform:rotate(360deg); } }
    .halo2{ position:absolute; inset:0; border-radius:inherit; pointer-events:none; z-index:3; overflow:hidden; padding:var(--hpad,1.1px);
      -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude;
      filter:drop-shadow(0 0 .85px rgba(0,0,0,.7)) drop-shadow(0 0 var(--hglow,4px) var(--c)); }
    .halo2::before{ content:''; position:absolute; inset:-45%;
      background:conic-gradient(from 0deg,
        color-mix(in srgb,var(--c) 14%,transparent) 0deg,
        var(--c) 12deg, #ffffff 20deg, var(--c) 28deg,
        color-mix(in srgb,var(--c) 14%,transparent) 42deg,
        color-mix(in srgb,var(--c) 14%,transparent) 180deg,
        var(--c) 192deg, #ffffff 200deg, var(--c) 208deg,
        color-mix(in srgb,var(--c) 14%,transparent) 222deg,
        color-mix(in srgb,var(--c) 14%,transparent) 360deg);
      animation:haloSpin 8.4s linear infinite; }
    @media (prefers-reduced-motion:reduce){ .halo2::before{ animation:none; } }

    /* ===== Bộ Trang "Bạch Kim" — tên item shimmer bạch kim (set → itemQuality().text='q-set') ===== */
    @keyframes qsetSweep{ from{ background-position:165% 0, 0 0 } to{ background-position:-65% 0, 0 0 } }
    .q-set{ background-image:
        linear-gradient(105deg, transparent 36%, #ffffff 50%, transparent 64%),
        linear-gradient(170deg, #ffffff 0%, #dbe7f2 42%, #8aa0bb 100%);
      background-size:220% 100%, 100% 100%; background-repeat:no-repeat;
      -webkit-background-clip:text; background-clip:text; color:transparent;
      filter:drop-shadow(0 0 3px rgba(200,222,248,.5)); animation:qsetSweep 3.4s linear infinite; }
    @media (prefers-reduced-motion:reduce){ .q-set{ animation:none; } }

    /* ===== Linh Thú overview — Phù Du (bồng bềnh nhẹ, glow tĩnh, không xoay) ===== */
    @keyframes petFloat{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-6px) } }
    @keyframes petFloatGround{ 0%,100%{ opacity:.9 } 50%{ opacity:.55 } }
    .pet-float{ animation:petFloat 3.6s ease-in-out infinite; will-change:transform; }
    .pet-float-ground{ animation:petFloatGround 3.6s ease-in-out infinite; }
    @media (prefers-reduced-motion:reduce){ .pet-float,.pet-float-ground{ animation:none } }

    /* Cỡ gốc 110% cho màn lớn (27"); thu nhỏ trên laptop/mobile để bớt cuộn + vừa khung */
    html { font-size: 110%; }
    @media (max-width: 1500px) { html { font-size: 100%; } }
    @media (max-width: 640px)  { html { font-size: 90%; } }
    /* Sidebar dạng drawer trên mobile (<768px): trượt từ trái; desktop (md+) giữ tĩnh */
    @media (max-width: 767px) {
      .nav-drawer { transform: translateX(-100%); transition: transform .2s ease; }
    }
    /* Khung kéo chỉnh ảnh (avatar/bìa): chặn trình duyệt cuộn trang khi kéo bằng cảm ứng */
    .frame-drag { touch-action: none; }
    /* Mobile: dùng dvh (chiều cao thấy được thật) để thanh trình duyệt không che mất đáy nội dung */
    .app-h { height: 100vh; height: 100dvh; }
    /* Chặn cuộn/đẩy ngang toàn trang: số tiền lớn ở header không làm vỡ layout các màn khác */
    html, body { overflow-x: hidden; }
    /* Dải cuộn ngang gọn (vd nhóm tiền tệ header) — ẩn thanh cuộn */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { background:#070b14; }
    .panel { background:#0f1521; border:1px solid #1e293b; }
    /* Banner "sự kiện chờ" Tông Môn — glow TĨNH (pulse dịu, tắt theo reduced-motion) */
    .tm-evt-glow { --gc:#a78bfa66; animation:tmEvtPulse 3.6s ease-in-out infinite; }
    @keyframes tmEvtPulse { 0%,100%{ box-shadow:0 0 0 1px var(--gc), 0 0 13px -3px var(--gc); } 50%{ box-shadow:0 0 0 1px var(--gc), 0 0 22px -1px var(--gc); } }
    @media (prefers-reduced-motion:reduce){ .tm-evt-glow{ animation:none; box-shadow:0 0 0 1px var(--gc); } }
    /* Tooltip tùy biến (nền tối) cho cờ/biệt hiệu đệ tử */
    .tmtip{ position:relative; }
    .tmtip .tmtipbox{ position:absolute; left:0; bottom:calc(100% + 8px); width:240px; z-index:90; opacity:0; pointer-events:none; transition:opacity .14s, transform .14s; transform:translateY(-4px); }
    .tmtip:hover .tmtipbox{ opacity:1; transform:translateY(0); }
    .tmtipbox::before{ content:''; position:absolute; left:18px; bottom:-5px; transform:rotate(45deg); width:10px; height:10px; background:#0f1521; border-right:1px solid; border-bottom:1px solid; border-color:inherit; }
    /* biến thể mở SANG TRÁI (ô bên phải khung) — tránh tràn mép phải bị cắt */
    .tmtip .tmtipbox.tmtipbox-r{ left:auto; right:0; }
    .tmtipbox.tmtipbox-r::before{ left:auto; right:18px; }
    /* Công trình Tông Môn: mobile = cuộn ngang mượt (vuốt) · >=sm = lưới */
    .tm-bld-row{ display:flex; gap:.5rem; overflow-x:auto; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; padding-bottom:.3rem; }
    .tm-bld-row::-webkit-scrollbar{ height:4px; }
    .tm-bld-row > .tm-bld{ flex:0 0 156px; scroll-snap-align:start; }
    @media (min-width:640px){ .tm-bld-row{ display:grid; grid-template-columns:repeat(3,1fr); overflow:visible; padding-bottom:0; } .tm-bld-row > .tm-bld{ flex:none; } }
    @media (min-width:1024px){ .tm-bld-row{ grid-template-columns:repeat(4,1fr); } }
    .lbl { font-size:.65rem; text-transform:uppercase; letter-spacing:.15em; color:#64748b; }
    .fserif { font-family:'Lora',serif; font-weight:700; }
    .gold-text { font-weight:900; background:linear-gradient(180deg,#fff6d6 0%,#f4d27a 38%,#e0a83e 66%,#bd821f 100%); -webkit-background-clip:text; background-clip:text; color:transparent; filter:drop-shadow(0 1px 1px rgba(0,0,0,.55)) drop-shadow(0 0 4px rgba(245,185,66,.3)); }
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(100,116,139,.45);border-radius:9999px}
    ::-webkit-scrollbar-thumb:hover,::-webkit-scrollbar-thumb:active{background:rgba(100,116,139,.45)}
    ::-webkit-scrollbar-corner{background:transparent}
    *{scrollbar-width:thin;scrollbar-color:rgba(100,116,139,.5) transparent}
    [x-cloak]{display:none!important}
    b.dmg{color:#fdba74;font-weight:700} b.dmgc{color:#fb923c;font-weight:800} b.dmgr{color:#fda4af;font-weight:700}
    /* Thanh kéo ngưỡng tự ăn — custom theo tông jade (track đổ màu qua inline style) */
    .eat-range{-webkit-appearance:none;appearance:none;height:7px;border-radius:9999px;outline:none;cursor:pointer}
    .eat-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#7af0e0,#14b8a6 70%);border:2px solid #0b0f17;box-shadow:0 0 0 1px rgba(20,184,166,.45),0 0 7px rgba(20,184,166,.5);transition:transform .12s ease}
    .eat-range::-webkit-slider-thumb:hover{transform:scale(1.13)}
    .eat-range::-webkit-slider-thumb:active{transform:scale(1.04)}
    .eat-range::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:#14b8a6;border:2px solid #0b0f17;box-shadow:0 0 7px rgba(20,184,166,.5);cursor:pointer}
    .eat-range::-moz-range-track{height:7px;border-radius:9999px;background:transparent}
    /* Ticker Tin Giang Hồ — cuộn ngang chậm, mềm; dừng khi rê chuột; mờ dần 2 mép */
    .jh-tickwrap{ -webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent); mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent); }
    @keyframes jhscroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .jh-tick{ animation: jhscroll 80s linear infinite; }
    .jh-tickwrap:hover .jh-tick{ animation-play-state:paused; }
  </style>

  <script type="module" src="./src/main.js"></script>
</head>

<body class="text-slate-200 antialiased app-h flex flex-col overflow-hidden" x-data x-cloak>

  <!-- ============ TOP BAR ============ -->
  <header class="panel sticky top-0 z-30 flex items-center gap-2 sm:gap-4 px-2 sm:px-4 h-14">
    <button @click="$store.game.navOpen = !$store.game.navOpen" class="md:hidden w-9 h-9 -ml-1 rounded-lg flex items-center justify-center text-slate-300 hover:text-jade hover:bg-ink3 transition shrink-0" title="Menu">
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="flex items-center gap-2.5">
      <!-- Logo emblem (ảnh; thiếu file -> ô 逍 tạm) -->
      <div class="w-12 h-12 shrink-0 flex items-center justify-center">
        <img src="images/ui/logo-emblem.webp" alt="Tiêu Dao Lục"
          class="w-full h-full object-contain drop-shadow-[0_0_7px_rgba(34,211,238,0.45)]"
          onerror="if(this.src.endsWith('.webp')){this.src='images/ui/logo-emblem.png'}else{this.style.display='none';this.nextElementSibling.style.display='flex'}">
        <div class="hidden w-12 h-12 rounded-lg bg-gradient-to-br from-jade to-cyan items-center justify-center font-bold text-ink text-xl">逍</div>
      </div>
      <!-- Wordmark serif gradient vàng -->
      <span class="gold-text text-[1.65rem] tracking-wide leading-none select-none pb-1 hidden sm:inline" style="font-family:'Lora',serif; font-weight:700">Tiêu Dao Lục</span>
    </div>
    <template x-if="$store.game.hasActivity">
      <div @click="$store.game.goToActivity()" title="Mở màn hoạt động đang làm" class="hidden md:flex items-center gap-2 px-3 py-1 rounded-full bg-ink3 border border-slate-700 text-sm cursor-pointer hover:border-jade/60 transition">
        <span class="w-7 h-7 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico($store.game.actIconId, $store.game.actIcon)"></span>
        <span class="text-jade font-medium" x-text="$store.game.actName"></span>
        <template x-if="!$store.game.actIsTravel && !$store.game.actIsDungeon"><span class="text-slate-400" x-text="'+' + $store.game.act.sessionCount"></span></template>
        <template x-if="$store.game.actIsTravel"><span class="text-slate-400 font-mono" x-text="$store.game.fmtTime($store.game.travelRemainSec)"></span></template>
        <template x-if="$store.game.actIsDungeon"><span class="text-slate-400 font-mono" x-text="$store.game.fmtTime($store.game.dungeonTimeLeft())"></span></template>
        <div class="w-16 h-1.5 rounded-full bg-slate-700 overflow-hidden">
          <div class="h-full bg-gold" :style="`width:${$store.game.actProgressPct}%`"></div>
        </div>
      </div>
    </template>
    <template x-if="!$store.game.hasActivity">
      <span class="hidden md:inline text-sm text-slate-500">— Nhàn rỗi —</span>
    </template>
    <div class="ml-auto flex items-center gap-1.5 sm:gap-3 text-sm min-w-0">
      <!-- Nhóm tiền tệ: dải cuộn ngang an toàn (số lớn không đẩy vỡ layout); số rút gọn (1,2Tr) cho gọn -->
      <div class="flex items-center gap-1.5 sm:gap-3 min-w-0 overflow-x-auto no-scrollbar">
        <span class="flex items-center gap-1 shrink-0 text-rose-300 font-medium" :title="'Hồn Thạch: '+$store.game.fmt($store.game.state.currencies.honThach)"><span class="w-6 h-6 sm:w-[2.1rem] sm:h-[2.1rem] inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('honThach', '🔴')"></span><span x-text="$store.game.fmtC($store.game.state.currencies.honThach)"></span></span>
        <span class="flex items-center gap-1 shrink-0 text-amber-300 font-medium" :title="'Nguyên Bảo: '+$store.game.fmt($store.game.state.currencies.nguyenBao)"><span class="w-6 h-6 sm:w-[2.1rem] sm:h-[2.1rem] inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('nguyenBao', '🔷')"></span><span x-text="$store.game.fmtC($store.game.state.currencies.nguyenBao)"></span></span>
        <span class="flex items-center gap-1 shrink-0 text-slate-200 font-medium" :title="'Bạc: '+$store.game.fmt($store.game.state.currencies.bac)"><span class="w-6 h-6 sm:w-[2.1rem] sm:h-[2.1rem] inline-flex items-center justify-center shrink-0" x-html="$store.game.ico('bac', '🟡')"></span><span x-text="$store.game.fmtC($store.game.state.currencies.bac)"></span></span>
      </div>
      <!-- Chuông Thông Báo -->
      <div class="relative shrink-0" @click.outside="$store.game.closeBell()">
        <button @click="$store.game.toggleBell()" class="relative w-9 h-9 rounded-lg flex items-center justify-center hover:bg-ink3 transition" :class="$store.game.bellOpen?'bg-ink3 text-jade':'text-slate-300'" title="Thông báo">
          <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5"><path d="M18 8A6 6 0 1 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 0 1-3.4 0" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          <template x-if="$store.game.notifBadge"><span class="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center" x-text="$store.game.notifBadge"></span></template>
        </button>
        <template x-if="$store.game.bellOpen">
          <div class="fixed left-2 right-2 top-14 sm:absolute sm:left-auto sm:right-0 sm:top-[46px] sm:w-[360px] panel rounded-xl z-50 overflow-hidden" style="box-shadow:0 18px 50px -12px rgba(0,0,0,.7)">
            <div class="flex items-center justify-between px-3.5 py-2.5 border-b border-slate-800">
              <div class="fserif font-bold text-slate-100 text-sm">Thông Báo</div>
              <button @click="$store.game.notifMarkRead('all')" class="text-[11px] text-jade hover:text-jade/80">Đánh dấu đã đọc</button>
            </div>
            <div class="max-h-[340px] overflow-y-auto divide-y divide-slate-800/60">
              <template x-if="$store.game.notifications.length===0"><div class="px-4 py-10 text-center text-slate-600 text-[12px]">Hòm thư trống — chưa có thư cáp.</div></template>
              <template x-for="n in $store.game.notifRecent(6)" :key="n.id">
                <div class="flex gap-3 px-3.5 py-3" :class="n.read?'opacity-60':''" x-data="{ t: $store.game.notifTypeMeta(n.type) }">
                  <div class="w-9 h-9 rounded-lg shrink-0 flex items-center justify-center" :style="'background:'+t.col+'1f;border:1px solid '+t.col+'55;color:'+t.col" x-html="$store.game.notifIcon(t, 'w-[18px] h-[18px]')"></div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5">
                      <span class="text-[9px] px-1.5 py-0.5 rounded shrink-0" :style="'color:'+t.col+';background:'+t.col+'14;border:1px solid '+t.col+'44'" x-text="t.label"></span>
                      <span class="text-[12.5px] font-semibold text-slate-100 truncate" x-text="n.title"></span>
                    </div>
                    <div class="text-[11px] text-slate-400 leading-snug mt-0.5 line-clamp-2" x-text="n.body"></div>
                    <div class="text-[10px] text-slate-600 mt-0.5" x-text="$store.game.notifAgo(n.ts)"></div>
                  </div>
                  <template x-if="!n.read"><span class="w-2 h-2 rounded-full shrink-0 mt-1.5" :style="'background:'+t.col"></span></template>
                </div>
              </template>
            </div>
            <button @click="$store.game.openPhiCapDai()" class="w-full px-3.5 py-2.5 border-t border-slate-800 text-center text-[12px] text-jade hover:bg-ink3/50 transition font-medium">Xem tất cả ở Phi Cáp Đài →</button>
          </div>
        </template>
      </div>
    </div>
  </header>

  <!-- ============ TẠO NHÂN VẬT (overlay) — giang hồ tự do: Tên + Giới tính ============ -->
  <template x-if="$store.game.needsCreation">
    <div class="fixed inset-0 z-[60] bg-ink overflow-auto">
      <div class="max-w-[1500px] mx-auto p-6 min-h-full flex flex-col justify-center">
        <div class="text-center mb-6">
          <div class="text-4xl gold-text" style="font-family:'Lora',serif; font-weight:700">Khai Tịch Giang Hồ</div>
          <div class="text-sm text-slate-400 mt-1">Một thân tự do, rong ruổi tứ phương — võ học do chính ngươi chọn.</div>
        </div>

        <!-- Danh hiệu -->
        <div class="panel rounded-lg p-4 mb-4">
          <div class="lbl mb-2">Danh Hiệu</div>
          <input x-model="$store.game.draftName" maxlength="16" placeholder="Nhập tên nhân vật (≥ 2 ký tự)..."
            class="w-full px-3 py-2 rounded bg-ink3 border border-slate-700 focus:border-jade outline-none text-slate-100">
        </div>

        <!-- Giới tính -->
        <div class="panel rounded-lg p-4 mb-4">
          <div class="lbl mb-3">Giới Tính</div>
          <div class="grid grid-cols-2 gap-3">
            <template x-for="g in [{id:'nam',name:'Nam',char:'男',color:'from-sky-500 to-cyan-600'},{id:'nu',name:'Nữ',char:'女',color:'from-rose-400 to-fuchsia-500'}]" :key="g.id">
              <button @click="$store.game.pickGender(g.id)"
                class="relative rounded-xl border-2 overflow-hidden flex flex-col transition"
                :class="$store.game.draftGender===g.id ? 'border-jade' : 'border-slate-700 hover:border-slate-500'">
                <div class="w-full aspect-video bg-gradient-to-br flex items-center justify-center text-white text-6xl font-bold" :class="g.color" style="font-family:'Lora',serif" x-data="{ok:true}">
                  <img :src="`images/avatars/${g.id}.webp`" alt="" class="w-full h-full object-cover object-center" x-show="ok" @load="ok=true" @error="ok=false">
                  <span x-show="!ok" x-text="g.char"></span>
                </div>
                <div class="py-3 text-center text-xl font-bold" :class="$store.game.draftGender===g.id?'bg-jade/15 text-jade':'bg-ink3 text-slate-200'" x-text="g.name"></div>
              </button>
            </template>
          </div>
          <div class="text-[11px] text-slate-500 mt-3 text-center">Dung mạo đổi sau ở Hồ Sơ. Không chọn môn phái — võ học tự ngươi chọn.</div>
        </div>

        <!-- Tâm Pháp khởi tu -->
        <div class="panel rounded-lg p-4 mb-4">
          <div class="flex items-baseline justify-between mb-1">
            <div class="lbl">Tâm Pháp Khởi Tu</div>
            <div class="text-[11px] text-slate-500">Chọn 1 nội công nhập môn</div>
          </div>
          <div class="text-[11px] text-slate-400 mb-3 leading-snug">Định <b class="text-jade">hệ ngũ hành khởi đầu</b> — tặng kèm nội công + 1 chiêu Sơ + 1 bị động cùng hệ. Hệ khác &amp; đổi Tâm Pháp học sau ở <b class="text-slate-300">Tàng Kinh Các</b>.</div>
          <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
            <template x-for="t in $store.game.TAM_PHAP_POOL" :key="t.id">
              <button @click="$store.game.openTpDetail(t.id)" :title="'Xem chi tiết ' + t.name" class="relative rounded-xl border-2 overflow-hidden flex flex-col transition text-left" :class="$store.game.draftTamPhapOn(t.id) ? 'border-jade ring-2 ring-jade/30' : 'border-slate-700 hover:border-slate-500'">
                <div class="relative w-full aspect-square">
                  <div class="absolute inset-0 bg-gradient-to-br" :class="$store.game.NGU_HANH[t.he].grad"></div>
                  <span class="absolute inset-0 flex items-center justify-center opacity-[.14] select-none" style="font-family:'Lora',serif;font-size:4.5rem;line-height:1" :class="$store.game.heInfo(t.he).text" x-text="$store.game.NGU_HANH[t.he].han"></span>
                  <img :src="'images/tamphap/'+t.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                  <span class="absolute top-1.5 left-1.5 text-[10px] px-1.5 py-0.5 rounded" :class="$store.game.NGU_HANH[t.he].badge" x-text="$store.game.heName(t.he)"></span>
                  <template x-if="$store.game.draftTamPhapOn(t.id)"><span class="absolute top-1.5 right-1.5 w-5 h-5 bg-jade text-ink rounded-full flex items-center justify-center text-[11px] font-bold shadow">✓</span></template>
                </div>
                <div class="p-2.5 flex-1 flex flex-col" :class="$store.game.draftTamPhapOn(t.id)?'bg-jade/10':'bg-ink3'">
                  <div class="font-bold text-[13px]" style="font-family:'Lora',serif" :class="$store.game.heInfo(t.he).text" x-text="t.name"></div>
                  <div class="text-[10.5px] text-slate-400 leading-snug mt-1" x-text="t.short"></div>
                  <div class="text-[10px] mt-auto pt-1.5" :class="$store.game.draftTamPhapOn(t.id)?'text-jade font-medium':'text-jade/70'" x-text="$store.game.draftTamPhapOn(t.id) ? '✓ Đã chọn · Xem chi tiết »' : 'Xem chi tiết »'"></div>
                </div>
              </button>
            </template>
          </div>
        </div>

        <!-- Xác nhận -->
        <div class="py-2">
          <button @click="$store.game.createCharacter()" :disabled="!$store.game.canCreate"
            class="w-full py-3 rounded-lg font-bold transition"
            :class="$store.game.canCreate ? 'bg-jade text-ink hover:bg-jade/90' : 'bg-slate-800 text-slate-600 cursor-not-allowed'">
            Vào Giang Hồ
          </button>
          <div class="text-center text-[11px] text-slate-600 mt-2">Cần danh hiệu (≥ 2 ký tự), giới tính &amp; Tâm Pháp.</div>
        </div>
      </div>
    </div>
  </template>

  <!-- ============ BODY ============ -->
  <div class="flex gap-3 p-3 max-w-[1400px] mx-auto w-full flex-1 min-h-0 overflow-hidden">

    <!-- Nền mờ khi mở drawer (mobile) -->
    <div x-show="$store.game.navOpen" x-transition.opacity @click="$store.game.navOpen=false" class="fixed inset-0 top-14 z-30 bg-black/55 md:hidden" x-cloak></div>
    <!-- SIDEBAR TRÁI (cố định ở desktop, drawer trượt ở mobile) -->
    <aside class="nav-drawer fixed md:static top-14 bottom-0 left-0 z-40 w-64 md:w-56 shrink-0 text-sm overflow-y-auto min-h-0 px-3 md:px-0 pt-3 md:pt-0 pb-4 bg-ink md:bg-transparent border-r border-slate-800 md:border-0"
      :class="$store.game.navOpen ? 'shadow-2xl' : ''" :style="$store.game.navOpen ? 'transform:translateX(0)' : ''">
      <!-- Player card: nền ảnh + avatar (thiếu ảnh -> nền tối + 道) -->
      <div class="relative rounded-xl overflow-hidden border border-slate-700 mb-3 shadow-lg"
           style="background-color:#0f1521; background-image:linear-gradient(105deg, rgba(7,11,20,0.93) 0%, rgba(7,11,20,0.62) 55%, rgba(7,11,20,0.35) 100%), url('images/ui/card-bg.webp'); background-size:cover; background-position:center;">
        <div class="p-3">
          <div class="flex items-center gap-2.5">
            <div class="relative w-16 h-16 rounded-lg overflow-hidden bg-ink3 shrink-0 ring-1 ring-white/15" :style="$store.game.faceStyle"></div>
            <div class="flex-1 min-w-0">
              <div class="text-sm font-semibold truncate" style="font-family:'Lora',serif" x-text="$store.game.state.player.name"></div>
              <template x-if="$store.game.equippedTitleObj">
                <div class="my-0.5 truncate" x-data="{ get t(){ return $store.game.equippedTitleObj } }">
                  <span class="dh max-w-full min-w-0" :class="$store.game.titleQClass(t.q)" style="gap:.35rem"><span class="dh-txt truncate" style="font-size:11px" x-text="t.name"></span></span>
                </div>
              </template>
              <div class="text-[10px] text-slate-300/90" x-text="'Tổng Lv ' + $store.game.totalLevel"></div>
            </div>
          </div>
          <div class="flex justify-around mt-2.5 select-none">
            <!-- Icon line tối giản (currentColor: slate → jade khi hover). Chuông Thông Báo đã ở top bar + Phi Cáp Đài -> bỏ ở đây. -->
            <button @click="$store.game.showToast('Phi Cáp · nhắn tin — sắp ra mắt')" title="Trò chuyện" class="w-8 h-8 rounded-lg hover:bg-white/10 text-slate-400 hover:text-jade flex items-center justify-center transition">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button @click="$store.game.showToast('Tìm kiếm — sắp ra mắt')" title="Tìm kiếm" class="w-8 h-8 rounded-lg hover:bg-white/10 text-slate-400 hover:text-jade flex items-center justify-center transition">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button @click="$store.game.showToast('Bằng Hữu — sắp ra mắt')" title="Bằng hữu" class="w-8 h-8 rounded-lg hover:bg-white/10 text-slate-400 hover:text-jade flex items-center justify-center transition">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </button>
            <button @click="$store.game.openSettings()" title="Cài đặt" class="w-8 h-8 rounded-lg hover:bg-white/10 text-slate-400 hover:text-jade flex items-center justify-center transition">
              <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Nav groups -->
      <div class="panel rounded-lg p-3">
        <template x-for="group in $store.game.NAV" :key="group.title">
          <div class="mb-3">
            <button @click="$store.game.toggleGroup(group.title)"
              class="w-full flex items-center justify-between lbl mb-1.5 hover:text-slate-300">
              <span x-text="group.title"></span>
              <span x-text="$store.game.groupsOpen[group.title] ? '▾' : '▸'"></span>
            </button>
            <div x-show="$store.game.groupsOpen[group.title]" class="space-y-1">
              <template x-if="group.skills">
                <div class="space-y-1">
                  <template x-for="sid in Object.keys($store.game.SKILLS)" :key="sid">
                    <button @click="$store.game.navToSkill(sid)"
                      class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-left hover:bg-ink3 transition"
                      :class="($store.game.view==='skill' && $store.game.selectedSkill===sid) ? 'bg-ink3 ring-1 ring-jade/40' : ''">
                      <span class="w-[2.1rem] h-[2.1rem] inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(sid, $store.game.SKILLS[sid].icon)"></span>
                      <span class="flex-1" x-text="$store.game.SKILLS[sid].name"></span>
                      <span class="text-xs px-1 rounded bg-ink text-jade shrink-0" x-text="'Lv'+$store.game.skillLevel(sid)"></span>
                    </button>
                  </template>
                </div>
              </template>
              <template x-if="!group.skills">
                <div class="space-y-1">
                  <template x-for="it in group.items" :key="it.view">
                    <button @click="$store.game.navTo(it.view)"
                      class="w-full flex items-center gap-2 px-2 py-1.5 rounded text-left hover:bg-ink3 transition"
                      :class="$store.game.navItemActive(it) ? 'bg-ink3 ring-1 ring-jade/40' : ''">
                      <span class="w-[2.1rem] h-[2.1rem] inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(it.view, it.icon)"></span>
                      <span class="flex-1" x-text="it.name"></span>
                      <template x-if="it.view==='nhiemVu' && $store.game.hasClaimableQuest"><span class="w-2 h-2 rounded-full bg-rose-500 shrink-0" title="Có nhiệm vụ nhận được"></span></template>
                      <template x-if="it.soon"><span class="text-[9px] text-slate-600">sắp</span></template>
                    </button>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </aside>

    <!-- CỘT GIỮA -->
    <main id="mainPane" class="flex-1 min-w-0 min-h-0 overflow-y-auto overflow-x-hidden space-y-3 pb-4">

      <!-- ===== ACTIVITY WIDGET (full-width) — ĐÃ TẮT: chỉ dùng thẻ thu gọn ở Hồ Sơ + pill trên top bar. (đổi 'false' -> điều kiện view để bật lại) ===== -->
      <template x-if="false">
      <section class="panel rounded-lg p-4">
        <template x-if="$store.game.hasActivity">
          <div>
            <div class="flex items-center gap-3 mb-3">
              <div class="w-12 h-12 rounded-lg bg-ink3 flex items-center justify-center text-2xl" x-html="$store.game.ico($store.game.actIconId, $store.game.actIcon)"></div>
              <div class="flex-1 min-w-0">
                <div class="font-semibold truncate" x-text="$store.game.actName + ' — ' + $store.game.actSub"></div>
                <div class="text-xs text-slate-400" x-text="$store.game.actExpPerSec + ' EXP/s'"></div>
              </div>
              <div class="flex items-center gap-1.5">
                <span class="px-2 py-1 rounded bg-ink3 border border-slate-700 text-xs font-mono" x-text="$store.game.fmtClock($store.game.actRemaining)"></span>
                <button @click="$store.game.refreshActivity()" title="Làm mới" class="w-7 h-7 rounded bg-ink3 border border-slate-700 hover:border-jade text-slate-400 hover:text-jade">↻</button>
                <button @click="$store.game.stop()" title="Dừng" class="w-7 h-7 rounded bg-ink3 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-rose-400">✕</button>
              </div>
            </div>
            <div class="h-3 rounded-full bg-slate-800 overflow-hidden mb-2">
              <div class="h-full bg-gradient-to-r from-jade to-cyan" :style="`width:${$store.game.actProgressPct}%`"></div>
            </div>
            <div class="flex flex-wrap items-center gap-x-5 gap-y-1 text-xs text-slate-400">
              <span>Thu được: <b class="text-jade" x-text="'+' + $store.game.act.sessionCount"></b></span>
              <template x-if="!$store.game.actCapped && !$store.game.actStalled">
                <span>Vật kế tiếp trong <b class="text-slate-200" x-text="$store.game.actNextInSec + 's'"></b></span>
              </template>
              <span>Còn lại: <b x-text="$store.game.fmtClock($store.game.actRemaining)"></b></span>
            </div>
            <template x-if="$store.game.actStalled">
              <div class="mt-2 text-xs px-3 py-2 rounded bg-rose-900/30 border border-rose-700/40 text-rose-300">❌ Hết nguyên liệu — thu thập thêm rồi tiếp tục.</div>
            </template>
            <template x-if="$store.game.actCapped">
              <div class="mt-2 text-xs px-3 py-2 rounded bg-amber-900/30 border border-amber-700/40 text-amber-300">⚠️ Đạt giới hạn nhàn rỗi (8h). Nhận thưởng & bắt đầu lại.</div>
            </template>
          </div>
        </template>
        <template x-if="!$store.game.hasActivity">
          <div class="text-center text-slate-500 py-3 text-sm">— Nhàn rỗi — Chọn kỹ năng và bắt đầu tu luyện.</div>
        </template>
      </section>
      </template>

      <!-- ===== VIEW: PROFILE (bám sát IdleMMO) ===== -->
      <template x-if="$store.game.view==='profile'">
        <div class="space-y-3">
          <!-- Tabs -->
          <div class="flex gap-5 text-sm border-b border-slate-800">
            <button @click="$store.game.setProfileTab('profile')" class="pb-2 -mb-px border-b-2" :class="$store.game.profileTab==='profile' ? 'border-jade text-jade' : 'border-transparent text-slate-400'">Hồ Sơ</button>
            <button @click="$store.game.setProfileTab('skins')" class="pb-2 -mb-px border-b-2" :class="$store.game.profileTab==='skins' ? 'border-jade text-jade' : 'border-transparent text-slate-400'">Dung Mạo</button>
            <button @click="$store.game.setProfileTab('nghe')" class="pb-2 -mb-px border-b-2" :class="$store.game.profileTab==='nghe' ? 'border-jade text-jade' : 'border-transparent text-slate-400'">Nghề</button>
            <button @click="$store.game.setProfileTab('titles')" class="pb-2 -mb-px border-b-2" :class="$store.game.profileTab==='titles' ? 'border-jade text-jade' : 'border-transparent text-slate-400'">Danh Hiệu</button>
            <button @click="$store.game.setProfileTab('badges')" class="pb-2 -mb-px border-b-2" :class="$store.game.profileTab==='badges' ? 'border-jade text-jade' : 'border-transparent text-slate-400'">Huy Hiệu</button>
          </div>

          <!-- Banner: CHỈ kéo/chỉnh khung khi ở tab Dung Mạo (skins); các tab khác chỉ hiển thị -->
          <div id="coverBox" class="group relative h-[307px] rounded-lg overflow-hidden border border-slate-800 bg-ink2 select-none"
               :class="$store.game.profileTab==='skins' ? 'frame-drag cursor-move' : ''"
               :style="$store.game.coverStyle"
               @pointerdown="$store.game.profileTab==='skins' && $store.game.adjStart('cover',$event)" @wheel="$store.game.profileTab==='skins' && ($event.preventDefault(), $store.game.adjWheel('cover',$event))"
               :title="$store.game.profileTab==='skins' ? 'Kéo để di chuyển · lăn chuột để phóng to' : ''">
            <!-- Scrim trái-đáy: nổi chữ -->
            <div class="absolute inset-0 bg-gradient-to-tr from-black/85 via-black/25 to-transparent pointer-events-none"></div>
            <!-- Tên + cấp (góc trái dưới, tích hợp) -->
            <div class="absolute left-5 bottom-4 z-10 pointer-events-none">
              <!-- Danh Hiệu + Tên: căn giữa nhau (title dài/ngắn vẫn cân, badges giữ căn trái) -->
              <div class="inline-flex flex-col items-center">
                <template x-if="$store.game.equippedTitleObj">
                  <div class="mb-1.5" x-data="{ get t(){ return $store.game.equippedTitleObj } }">
                    <span class="dh" :class="$store.game.titleQClass(t.q) + ($store.game.titleHigh(t.q) ? ' dh-high' : '')"><span class="dh-li"></span><span class="dh-txt" x-text="t.name"></span><span class="dh-li r"></span></span>
                  </div>
                </template>
                <div class="flex items-center gap-2">
                  <span class="text-3xl gold-text" style="font-family:'Lora',serif; font-weight:700; filter:drop-shadow(0 2px 5px rgba(0,0,0,.85)) drop-shadow(0 0 5px rgba(245,185,66,.28))" x-text="$store.game.state.player.name"></span>
                </div>
              </div>
              <div class="flex items-center gap-2 mt-2.5 flex-wrap">
                <span class="px-2.5 py-1 rounded-md bg-black/45 backdrop-blur-sm border border-white/10 text-[11px] text-slate-200">Chiến Đấu <b class="text-jade" x-text="$store.game.combatLevel"></b></span>
                <span class="px-2.5 py-1 rounded-md bg-black/45 backdrop-blur-sm border border-white/10 text-[11px] text-slate-200">Tổng Cấp <b class="text-jade" x-text="$store.game.totalLevel"></b></span>
              </div>
            </div>
            <!-- Điều khiển khung: chỉ ở tab Dung Mạo -->
            <div x-show="$store.game.profileTab==='skins'" class="absolute bottom-3 right-3 z-10 flex items-center gap-2" @pointerdown.stop>
              <span class="hidden sm:inline text-[10px] text-white/75 bg-black/45 backdrop-blur rounded px-2 py-1 pointer-events-none">Kéo để di chuyển · lăn chuột phóng to</span>
              <button @click="$store.game.resetAdj('cover')" title="Đặt lại khung" class="w-7 h-7 rounded-full bg-black/55 backdrop-blur text-white/85 hover:text-jade flex items-center justify-center text-sm leading-none">↺</button>
            </div>
          </div>

          <!-- 2 cột (chỉ hiện ở tab Hồ Sơ) -->
          <template x-if="$store.game.profileTab==='profile'">
          <div class="flex flex-col lg:flex-row gap-3">

            <!-- TRÁI (cố định hẹp) -->
            <div class="lg:w-80 shrink-0 space-y-3">
              <!-- Hoạt động hiện tại (thu gọn — kiểu IMMO) -->
              <section class="panel rounded-lg p-3">
                <template x-if="$store.game.hasActivity">
                  <div>
                    <!-- Khinh Công (đếm ngược đi đường) -->
                    <template x-if="$store.game.actIsTravel">
                      <div>
                        <div class="flex items-center gap-2.5 mb-2">
                          <div class="w-10 h-10 rounded-lg bg-ink3 flex items-center justify-center text-xl shrink-0">🏃</div>
                          <div class="flex-1 min-w-0">
                            <div class="text-sm font-semibold truncate text-jade">Khinh Công</div>
                            <div class="text-[11px] text-slate-400 truncate" x-text="$store.game.actSub"></div>
                          </div>
                          <button @click="$store.game.cancelTravel()" title="Huỷ" class="w-6 h-6 rounded bg-ink3 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-rose-400 text-xs">✕</button>
                        </div>
                        <div class="h-2 rounded-full bg-slate-800 overflow-hidden mb-1.5"><div class="h-full bg-gradient-to-r from-jade to-cyan transition-all" :style="`width:${$store.game.actProgressPct}%`"></div></div>
                        <div class="flex items-center justify-between text-[11px] text-slate-400"><span>Đang di chuyển…</span><span class="font-mono" x-text="'còn ' + $store.game.fmtTime($store.game.travelRemainSec)"></span></div>
                      </div>
                    </template>
                    <!-- Gather / Combat -->
                    <template x-if="!$store.game.actIsTravel">
                      <div>
                        <div class="flex items-center gap-2.5 mb-2">

            </section>

          </div>
        </div>
      </template>

                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-[10px] px-1.5 py-0.5 rounded bg-jade/15 text-jade shrink-0">Bước <span x-text="$store.game.state.quests.tutorial.index + 1"></span>/<span x-text="$store.game.TUTORIAL_QUESTS.length"></span></span>
                      <span class="font-semibold" x-text="$store.game.tutQuest.name"></span>
                    </div>
                    <div class="text-[11px] text-slate-400 mt-0.5" x-text="$store.game.tutQuest.desc"></div>
                    <div class="relative mt-2.5 h-5 rounded-full bg-slate-800 overflow-hidden">
                      <div class="h-full bg-gradient-to-r from-jade to-cyan transition-all" :style="`width:${$store.game.tutProgress / $store.game.tutQuest.count * 100}%`"></div>
                      <div class="absolute inset-0 flex items-center justify-center text-[11px] font-semibold text-white/90"><span x-text="$store.game.tutProgress"></span> / <span x-text="$store.game.tutQuest.count"></span></div>
                    </div>
                    <div class="flex items-center justify-between mt-3 gap-2">
                      <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] text-slate-500">Thưởng</span>
                        <template x-for="c in $store.game.rewardChips($store.game.tutQuest.reward)" :key="c.id">
                          <span class="inline-flex items-center gap-1.5 pl-1 pr-2.5 py-1 rounded-lg bg-ink3 border border-slate-700/60"><span class="w-6 h-6 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(c.id, c.emoji)"></span><span class="text-sm font-semibold" :class="c.cls" x-text="$store.game.fmt(c.amt)"></span></span>

                      </div>
                      <button @click="$store.game.claimTutorial()" :disabled="!$store.game.tutDone"
                        class="shrink-0 px-4 py-1.5 rounded-lg text-sm font-bold transition"
                        :class="$store.game.tutDone ? 'bg-jade text-ink hover:bg-jade/90 shadow-[0_0_12px_rgba(20,184,166,0.4)]' : 'bg-slate-800 text-slate-600 cursor-not-allowed'"
                        x-text="$store.game.tutDone ? 'Nhận thưởng' : 'Đang làm…'"></button>
                    </div>
                  </div>
                </div>
              </template>
              <template x-if="$store.game.tutAllDone">

                <button @click="$store.game.setQuestTab(t.kind)"
                  class="relative flex-1 px-3 py-3 text-sm font-bold flex items-center justify-center gap-1.5 transition"
                  :class="$store.game.questTab===t.kind ? t.active : 'text-slate-500 hover:text-slate-300'">
                  <span class="inline-flex shrink-0" x-html="$store.game.svg(t.icon,'w-[18px] h-[18px]')"></span><span x-text="t.label"></span>
                  <template x-if="$store.game.periodClaimable(t.kind) > 0">
                    <span class="ml-0.5 min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold inline-flex items-center justify-center" x-text="$store.game.periodClaimable(t.kind)"></span>

                  <span x-show="$store.game.questTab===t.kind" class="absolute bottom-0 inset-x-0 h-0.5" :class="t.bar"></span>
                </button>
              </template>
            </div>
            <div class="px-4 py-2 text-[10px] text-slate-500 bg-ink3/20 border-b border-slate-800/60 flex items-center gap-1.5 flex-wrap">

              <span class="text-slate-700">·</span>
              <span>còn <b class="text-slate-300" x-text="$store.game.resetCountdown($store.game.questTab)"></b></span>
            </div>
            <!-- Danh sách nhiệm vụ của tab đang chọn — 2 cột cho đỡ trống, thẻ đồng bộ cỡ với Tân Thủ -->
            <div class="p-3 grid sm:grid-cols-2 gap-2.5 items-start">
              <template x-for="(entry, i) in $store.game.qList" :key="$store.game.questTab + '_' + entry.id">
                <div class="rounded-lg border p-3 transition"
                     :class="entry.claimed ? 'border-slate-800 bg-ink3/30 opacity-70' : ($store.game.qDone(entry) ? 'border-jade/50 bg-jade/5' : 'border-slate-800 bg-ink3/50')">
                  <div class="flex items-center gap-3">
                    <div class="w-14 h-14 rounded-xl bg-ink3 ring-1 ring-slate-700 flex items-center justify-center text-2xl shrink-0" x-html="$store.game.ico($store.game.qDef(entry).target, $store.game.questEmoji($store.game.qDef(entry)))"></div>
                    <div class="flex-1 min-w-0">
                      <div class="font-medium text-sm truncate" x-text="$store.game.qDef(entry).name"></div>
                      <div class="relative mt-1.5 h-5 rounded-full bg-slate-800 overflow-hidden">
                        <div class="h-full transition-all" :class="$store.game.questTabMeta.fill" :style="`width:${$store.game.qProgress(entry) / $store.game.qDef(entry).count * 100}%`"></div>
                        <div class="absolute inset-0 flex items-center justify-center text-[11px] font-semibold text-white/90"><span x-text="$store.game.qProgress(entry)"></span> / <span x-text="$store.game.qDef(entry).count"></span></div>
                      </div>
                    </div>
                    <button @click="$store.game.qClaim(i)" :disabled="entry.claimed || !$store.game.qDone(entry)"
                      class="shrink-0 px-4 py-1.5 rounded-lg text-sm font-bold transition"
                      :class="entry.claimed ? 'bg-slate-800 text-emerald-400 cursor-default' : ($store.game.qDone(entry) ? 'bg-jade text-ink hover:bg-jade/90' : 'bg-slate-800 text-slate-600 cursor-not-allowed')"
                      x-text="entry.claimed ? '✓ Đã nhận' : ($store.game.qDone(entry) ? 'Nhận' : 'Đang làm…')"></button>
                  </div>
                  <div class="flex items-center gap-2 flex-wrap mt-2">
                    <span class="text-[10px] text-slate-500">Thưởng</span>
                    <template x-for="c in $store.game.rewardChips($store.game.qDef(entry).reward)" :key="c.id">
                      <span class="inline-flex items-center gap-1.5 pl-1 pr-2.5 py-1 rounded-lg bg-ink3 border border-slate-700/60"><span class="w-6 h-6 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(c.id, c.emoji)"></span><span class="text-sm font-semibold" :class="c.cls" x-text="$store.game.fmt(c.amt)"></span></span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="!$store.game.qList.length">
                <div class="text-sm text-slate-500 py-2">Chưa có nhiệm vụ.</div>
              </template>
            </div>
          </section>
        </div>
      </template>

      <!-- ===== VIEW: SKILL (bám sát IdleMMO) ===== -->
      <template x-if="$store.game.view==='skill'">
        <div class="flex flex-col lg:flex-row gap-3">
          <!-- TRÁI: NPC + hành động -->
          <div class="flex-1 min-w-0 space-y-3">
            <div class="panel rounded-lg p-4 flex items-center gap-4">
              <div class="w-24 h-24 rounded-lg bg-ink3 border border-slate-700 flex items-center justify-center text-5xl shrink-0" x-html="$store.game.ico($store.game.currentSkill.id, $store.game.currentSkill.icon)"></div>
              <div class="flex-1 min-w-0">
                <div class="lbl" x-text="$store.game.currentSkill.npc.name"></div>
                <div class="italic text-sm text-slate-300 mt-1" x-text="'“' + $store.game.currentSkill.npc.quote + '”'"></div>
                <button class="mt-2 px-3 py-1 text-xs rounded bg-ink3 border border-slate-700 hover:border-jade text-slate-300">Đàm Đạo</button>
              </div>

              <div class="panel rounded-lg p-3 border border-jade/30">
                <div class="flex items-center gap-2 mb-2">
                  <span class="inline-block w-1.5 h-1.5 rounded-full bg-jade animate-pulse shrink-0"></span>
                  <span class="lbl">Đang Luyện</span>
                  <span class="flex-1"></span>
                  <span class="text-[11px] text-slate-400" x-text="$store.game.actExpPerSec + ' EXP/s'"></span>
                  <button @click="$store.game.refreshActivity()" title="Làm mới" class="w-6 h-6 rounded bg-ink3 border border-slate-700 hover:border-jade text-slate-400 hover:text-jade text-xs">↻</button>
                  <button @click="$store.game.stop()" title="Dừng" class="w-6 h-6 rounded bg-ink3 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-rose-400 text-xs">✕</button>
                </div>
                <div class="flex items-center gap-2.5">
                  <span class="w-9 h-9 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico($store.game.actIconId, $store.game.actIcon)"></span>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between text-sm mb-1"><span class="font-medium truncate" x-text="$store.game.actName"></span><span class="text-jade text-xs shrink-0" x-text="'Thu được +' + $store.game.act.sessionCount"></span></div>
                    <div class="h-2.5 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-gradient-to-r from-jade to-cyan" :style="`width:${$store.game.actProgressPct}%`"></div></div>
                  </div>
                </div>
              </div>
            </template>
            <div class="panel rounded-lg p-3 space-y-2">

                <div class="flex items-center justify-between px-1 pb-1.5 mb-0.5 border-b border-slate-800 text-[11px]">
                  <span class="inline-flex items-center gap-1 text-jade"><span class="w-3.5 h-3.5 inline-flex" x-html="$store.game.svg('pin','w-3.5 h-3.5')"></span>Tài nguyên tại <b x-text="$store.game.currentLocationObj.name"></b></span>
                  <button @click="$store.game.navTo('map')" class="text-slate-500 hover:text-jade">đổi vùng ở Bản Đồ ›</button>
                </div>
              </template>
              <template x-if="$store.game.currentSkillIsGather && $store.game.currentSkillActions.length===0">
                <div class="text-[12px] text-slate-500 text-center py-6 leading-relaxed">Vùng <b class="text-slate-300" x-text="$store.game.currentLocationObj.name"></b> không có tài nguyên nghề này — đổi vùng ở <b class="text-jade">Bản Đồ</b>.</div>

                <div class="flex items-center gap-2 mb-2.5">
                  <span class="lbl">Loại trang bị</span>

                    <template x-for="c in $store.game.forgeCats" :key="c.k"><option :value="c.k" x-text="c.n"></option></template>
                  </select>
                </div>
              </template>
              <template x-if="$store.game.selectedSkill==='daTao' && $store.game.currentSkillActions.length===0">
                <div class="text-[12px] text-slate-500 text-center py-6">Không có món rèn nào thuộc loại này.</div>
              </template>

              <template x-if="$store.game.skillSubTabs">
                <div class="flex items-center gap-2 mb-2.5">
                  <span class="lbl">Phân loại</span>
                  <select x-model="$store.game.skillTab" class="ml-auto px-3 py-1.5 rounded-lg text-[12px] bg-ink2/60 border border-slate-800 text-slate-300 outline-none cursor-pointer focus:border-jade">
                    <template x-for="t in $store.game.skillSubTabs" :key="t.k"><option :value="t.k" x-text="t.n"></option></template>
                  </select>
                </div>
              </template>

                <button @click="$store.game.openAction($store.game.selectedSkill, action.id)"
                  class="w-full flex items-center gap-3 p-3 rounded bg-ink3/60 border border-slate-800 hover:border-jade/40 text-left transition">
                  <div class="w-14 h-14 rounded bg-ink flex items-center justify-center text-2xl shrink-0" x-html="$store.game.ico(action.itemId || $store.game.currentSkill.id, action.itemId ? $store.game.ITEMS[action.itemId].icon : $store.game.currentSkill.icon)"></div>

                      <div class="flex flex-wrap gap-1.5 mt-1.5">
                        <template x-for="inp in $store.game.actionInputs(action)" :key="inp.itemId">

                            <span class="w-4 h-4 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico(inp.itemId, $store.game.ITEMS[inp.itemId].icon)"></span><span class="text-slate-300" x-text="$store.game.ITEMS[inp.itemId].name"></span><span class="text-[9px] px-1 py-px rounded font-bold border" :class="inp.ok ? 'bg-jade/15 text-jade border-jade/30' : 'bg-amber-500/15 text-amber-300 border-amber-600/30'" x-text="inp.have + '/' + inp.need"></span>
                          </span>
                        </template>
                      </div>
                    </template>
                  </div>
                  <span class="text-slate-500 text-xl shrink-0">›</span>
                </button>
              </template>
            </div>

          <div class="lg:w-72 shrink-0 space-y-3">
            <section class="panel rounded-lg p-3" x-data="{ get nb(){ return $store.game.nearbyBotsList($store.game.selectedSkill) } }">
              <div class="lbl mb-2 text-center">Đồng Đạo Lân Cận</div>
              <template x-if="nb.count===0"><div class="text-[11px] text-slate-600 text-center py-1">Chốn này vắng người tu luyện.</div></template>
              <div class="flex items-center justify-center gap-1.5" x-show="nb.count>0">
                <template x-for="(av,idx) in nb.bots" :key="idx">
                  <div class="w-8 h-8 rounded-full overflow-hidden bg-gradient-to-br flex items-center justify-center text-[11px] text-white/90 shrink-0" :class="av.color" x-data="{ok:true}">
                    <img :src="'images/avatars/'+av.id+'.webp'" class="w-full h-full object-cover" x-show="ok" @load="ok=true" @error="ok=false" alt="">
                    <span x-show="!ok" x-text="av.char"></span>
                  </div>
                </template>
                <span class="ml-0.5 text-xs text-slate-400" x-show="nb.count > nb.bots.length" x-text="'+'+(nb.count - nb.bots.length)"></span>
              </div>
              <div class="text-[10px] text-slate-600 text-center mt-1.5" x-show="nb.count>0" x-text="nb.count+' người cùng luyện nghề này'"></div>
            </section>
            <section class="panel rounded-lg p-3">
              <div class="lbl mb-2 text-center">Tiến Độ Tu Luyện</div>
              <div class="flex items-center gap-2 mb-2">
                <span class="w-6 h-6 inline-flex items-center justify-center shrink-0" x-html="$store.game.ico($store.game.currentSkill.id, $store.game.currentSkill.icon)"></span>
                <span class="flex-1 text-sm font-medium" x-text="$store.game.currentSkill.name"></span>
                <span class="text-xs text-jade" x-text="'Lv ' + $store.game.skillLevel($store.game.selectedSkill)"></span>
              </div>
              <div class="h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-jade" :style="`width:${$store.game.skillProg($store.game.selectedSkill).frac*100}%`"></div></div>
              <div class="text-[11px] text-slate-500 mt-1" x-text="$store.game.fmt($store.game.skillProg($store.game.selectedSkill).need - $store.game.skillProg($store.game.selectedSkill).into) + ' EXP cần · ' + Math.round($store.game.skillProg($store.game.selectedSkill).frac*100) + '%'"></div>

              <div class="lbl mb-2">Thống Kê</div>
              <div class="space-y-1.5 text-sm">
                <div class="flex justify-between"><span class="text-slate-400">🔥 Đã Thu Hoạch</span><span x-text="$store.game.fmt($store.game.skillGathered($store.game.selectedSkill))"></span></div>
                <div class="flex justify-between"><span class="text-slate-400">⚡ Tổng Tu Vi</span><span x-text="$store.game.fmt($store.game.skillTotalXp($store.game.selectedSkill))"></span></div>
                <div class="flex justify-between"><span class="text-slate-400">⏱️ Thời Gian</span><span x-text="$store.game.skillTimeLabel($store.game.selectedSkill)"></span></div>
              </div>
            </section>
          </div>
        </div>
      </template>

      <!-- ===== VIEW: COMBAT (predictive kiểu IdleMMO) ===== -->

        <div class="space-y-3">

          <div class="relative panel rounded-xl overflow-hidden min-h-[208px] flex items-center">

                <!-- TÂM ĐIỂM: Tâm Pháp -->
                <div class="flex flex-col items-center pt-1.5 pb-0.5">
                  <button @click="$store.game.openBaiVo('tamphap')" class="relative transition hover:scale-[1.04]" title="Tâm Pháp (nội công nền)">
                    <div class="relative w-[128px] h-[128px] flex items-center justify-center">
                      <!-- Vòng trận pháp (SVG thuần, xoay nhẹ, tô màu theo hệ) -->
                      <div class="absolute inset-0 pointer-events-none" :class="$store.game.heInfo($store.game.tamPhapObj.he).text">
                        <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full" fill="none" stroke="currentColor" stroke-linecap="round" style="filter:drop-shadow(0 0 1.5px currentColor)">
                          <circle cx="50" cy="50" r="48.5" stroke-width="0.5" opacity=".28"/>
                          <circle cx="50" cy="50" r="35.5" stroke-width="0.5" opacity=".28"/>
                          <g opacity=".8"><circle cx="50" cy="50" r="46" stroke-width="2.5" stroke-dasharray="0.5 5.6"/><animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/></g>

                          <g font-family="'Noto Serif SC','Songti SC','SimSun',serif" font-weight="700" font-size="7.5" text-anchor="middle" dominant-baseline="central" stroke="none">
                            <text x="50" y="9" fill="#fdba74" :opacity="$store.game.tamPhapObj.he==='hoa'?'1':'.4'" :style="$store.game.tamPhapObj.he==='hoa'?'filter:drop-shadow(0 0 2.5px #fdba74)':''">火</text>
                            <text x="89" y="37.3" fill="#f59e0b" :opacity="$store.game.tamPhapObj.he==='tho'?'1':'.4'" :style="$store.game.tamPhapObj.he==='tho'?'filter:drop-shadow(0 0 2.5px #f59e0b)':''">土</text>
                            <text x="74.1" y="83.2" fill="#fde047" :opacity="$store.game.tamPhapObj.he==='kim'?'1':'.4'" :style="$store.game.tamPhapObj.he==='kim'?'filter:drop-shadow(0 0 2.5px #fde047)':''">金</text>
                            <text x="25.9" y="83.2" fill="#7dd3fc" :opacity="$store.game.tamPhapObj.he==='thuy'?'1':'.4'" :style="$store.game.tamPhapObj.he==='thuy'?'filter:drop-shadow(0 0 2.5px #7dd3fc)':''">水</text>
                            <text x="11" y="37.3" fill="#6ee7b7" :opacity="$store.game.tamPhapObj.he==='moc'?'1':'.4'" :style="$store.game.tamPhapObj.he==='moc'?'filter:drop-shadow(0 0 2.5px #6ee7b7)':''">木</text>
                          </g>
                        </svg>
                      </div>
                      <!-- Ảnh Tâm Pháp -->
                      <div class="relative w-[84px] h-[84px] rounded-full overflow-hidden border-2 border-amber-300/80" :style="'box-shadow:0 0 16px 1px rgba('+$store.game.NGU_HANH[$store.game.tamPhapObj.he].glowRgb+',.5), inset 0 0 14px rgba(0,0,0,.55)'">
                        <div class="absolute inset-0 bg-gradient-to-br" :class="$store.game.NGU_HANH[$store.game.tamPhapObj.he].grad"></div>
                        <span class="absolute inset-0 flex items-center justify-center opacity-40" :class="$store.game.heInfo($store.game.tamPhapObj.he).text" x-html="$store.game.svg($store.game.heInfo($store.game.tamPhapObj.he).ig,'w-9 h-9')"></span>
                        <img :src="'images/tamphap/'+$store.game.tamPhapObj.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                      </div>
                    </div>
                  </button>
                  <div class="mt-2 text-sm font-bold leading-tight" style="font-family:'Lora',serif" :class="$store.game.heInfo($store.game.tamPhapObj.he).text" x-text="$store.game.tamPhapObj.name"></div>
                  <div class="text-[11px] text-slate-400">Nội Công · <span :class="$store.game.heInfo($store.game.tamPhapObj.he).text" x-text="$store.game.heName($store.game.tamPhapObj.he)+' hệ'"></span></div>
                </div>

                <!-- nhánh: tâm điểm -> Bị Động / Bộ Pháp -->
                <svg viewBox="0 0 300 28" class="w-full h-[22px]" preserveAspectRatio="none"><defs><linearGradient id="bvFork1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbbf24" stop-opacity="0"/><stop offset="1" stop-color="#fcd34d" stop-opacity=".95"/></linearGradient></defs><g fill="none" stroke="url(#bvFork1)" stroke-width="1.5" stroke-linecap="round" style="filter:drop-shadow(0 0 2px rgba(251,191,36,.4))"><path d="M150 1 C 150 15, 106 12, 80 25"/><path d="M150 1 C 150 15, 194 12, 220 25"/></g><g fill="#fde68a" style="filter:drop-shadow(0 0 2px rgba(251,191,36,.7))"><circle cx="80" cy="25" r="1.7"/><circle cx="220" cy="25" r="1.7"/></g></svg>

                <!-- Bị Động | Bộ Pháp -->
                <div class="grid grid-cols-2 gap-2">
                  <button @click="$store.game.openBaiVo('bidong')" class="rounded-lg bg-ink3/40 border border-slate-800 p-2 hover:border-violet-400/50 transition">
                    <div class="text-[10px] text-center text-violet-300/80 mb-1.5 uppercase tracking-wide font-medium">Bị Động</div>
                    <div class="flex justify-center gap-1.5">
                      <template x-for="p in $store.game.equippedBiDongObjs" :key="p.id">
                        <div class="relative w-11 h-11 rounded-md overflow-hidden border-2" :class="$store.game.NGU_HANH[p.he].ring" :title="p.name+' — '+p.desc">

                          <span class="absolute inset-0 flex items-center justify-center opacity-50" :class="$store.game.heInfo(p.he).text" x-html="$store.game.svg($store.game.heInfo(p.he).ig,'w-5 h-5')"></span>
                          <img :src="'images/bidong/'+p.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                        </div>
                      </template>
                      <template x-for="n in Math.max(0,$store.game.maxBiDongSlots-$store.game.equippedBiDongObjs.length)" :key="'bde'+n">
                        <div class="w-11 h-11 rounded-md border-2 border-dashed border-slate-700 text-slate-600 flex items-center justify-center text-lg">+</div>
                      </template>
                    </div>
                  </button>
                  <button @click="$store.game.openBoPhap()" class="rounded-lg bg-ink3/40 border border-slate-800 p-2 hover:border-jade/50 transition">
                    <div class="text-[10px] text-center text-jade/80 mb-1.5 uppercase tracking-wide font-medium">Bộ Pháp</div>
                    <div class="flex justify-center gap-1.5">
                      <template x-for="b in $store.game.boPhapSelObjs" :key="b.id">
                        <div class="relative w-11 h-11 rounded-md overflow-hidden border border-jade/40" :title="b.name">
                          <div class="absolute inset-0 bg-gradient-to-br from-jade/20 to-ink"></div>
                          <span class="absolute inset-0 flex items-center justify-center text-jade/80" x-html="$store.game.svg(b.ig,'w-5 h-5')"></span>
                          <img :src="'images/bophap/'+b.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                        </div>
                      </template>
                    </div>
                  </button>
                </div>

                <!-- nhánh: Bị Động/Bộ Pháp -> Chiêu Thức -->
                <svg viewBox="0 0 300 28" class="w-full h-[22px]" preserveAspectRatio="none"><defs><linearGradient id="bvFork2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fbbf24" stop-opacity="0"/><stop offset="1" stop-color="#fcd34d" stop-opacity=".95"/></linearGradient></defs><g fill="none" stroke="url(#bvFork2)" stroke-width="1.5" stroke-linecap="round" style="filter:drop-shadow(0 0 2px rgba(251,191,36,.4))"><path d="M80 1 C 80 15, 130 12, 150 25"/><path d="M220 1 C 220 15, 170 12, 150 25"/></g><g fill="#fde68a" style="filter:drop-shadow(0 0 2px rgba(251,191,36,.7))"><circle cx="150" cy="25" r="1.7"/></g></svg>

                <!-- Chiêu Thức -->
                <div class="rounded-lg bg-ink3/40 border border-slate-800 p-2">
                  <div class="text-[10px] text-center text-amber-300/80 mb-1.5 uppercase tracking-wide font-medium">Chiêu Thức</div>
                  <div class="grid grid-cols-3 gap-1.5">
                    <template x-for="c in $store.game.equippedChieuObjs" :key="c.id">
                      <button @click="$store.game.openBaiVo('chieu')" class="relative rounded-md overflow-hidden border-2 transition" style="aspect-ratio:1" :class="$store.game.NGU_HANH[c.type].ring+' hover:border-jade'" :title="c.name">
                        <div class="absolute inset-0 bg-gradient-to-br" :class="$store.game.NGU_HANH[c.type].grad"></div>
                        <span class="absolute inset-0 flex items-center justify-center opacity-40" :class="$store.game.heInfo(c.type).text" x-html="$store.game.svg($store.game.heInfo(c.type).ig,'w-7 h-7')"></span>
                        <img :src="'images/chieu/'+c.id+'.webp'" class="absolute inset-0 w-full h-full object-cover" onerror="if(this.src.endsWith('.webp')){this.src=this.src.replace('.webp','.png')}else{this.remove()}">
                      </button>
                    </template>
                    <template x-for="n in Math.max(0,$store.game.maxChieuSlots-$store.game.equippedChieuObjs.length)" :key="'empty'+n">
                      <button @click="$store.game.openBaiVo('chieu')" class="rounded-md border-2 border-dashed border-slate-700 text-slate-600 hover:border-jade hover:text-jade flex items-center justify-center text-xl transition" style="aspect-ratio:1">+</button>
                    </template>
                  </div>
                </div>

                <!-- thanh chỉ số -->
                <div class="mt-2.5 rounded-lg bg-ink3/60 border border-slate-800 flex items-stretch divide-x divide-slate-800 text-center overflow-hidden">
                  <div class="flex-[1.4] min-w-0 px-1 py-1.5">
                    <div class="text-[9px] text-slate-500 leading-none">Công hưởng</div>
                    <div class="text-[12px] font-bold mt-0.5 whitespace-nowrap" :class="$store.game.heInfo($store.game.combatStats.heChinh).text" x-text="$store.game.heName($store.game.combatStats.heChinh)+' +'+Math.round($store.game.combatStats.heBonus*100)+'%'"></div>
                  </div>
                  <div class="flex-1 min-w-0 px-1 py-1.5"><div class="text-[9px] text-slate-500 leading-none">Công</div><div class="text-[13px] font-bold text-slate-100 mt-0.5" x-text="$store.game.combatStats.atk"></div></div>
                  <div class="flex-1 min-w-0 px-1 py-1.5"><div class="text-[9px] text-slate-500 leading-none">Thủ</div><div class="text-[13px] font-bold text-slate-100 mt-0.5" x-text="$store.game.combatStats.def"></div></div>
                  <div class="flex-1 min-w-0 px-1 py-1.5"><div class="text-[9px] text-slate-500 leading-none">Bạo</div><div class="text-[13px] font-bold text-slate-100 mt-0.5" x-text="Math.round($store.game.combatStats.crit*100)+'%'"></div></div>
                  <div class="flex-1 min-w-0 px-1 py-1.5"><div class="text-[9px] text-slate-500 leading-none">Né</div><div class="text-[13px] font-bold mt-0.5" :class="$store.game.combatStats.dodge>0?'text-sky-300':'text-slate-100'" x-text="Math.round($store.game.combatStats.dodge*100)+'%'"></div></div>
                </div>
                <div class="text-[10px] text-slate-500 text-center mt-1.5"><b class="text-slate-300" x-text="$store.game.maxComboSlots"></b> ô (1 Tâm Pháp + <b class="text-slate-300" x-text="$store.game.maxChieuSlots"></b> chiêu) · mở thêm <b class="text-jade" x-text="'Lv '+$store.game.nextSlotLevel"></b></div>
              </section>

              <!-- Yêu thú (bấm để mở Suy Tính) -->
              <section class="panel rounded-lg p-3 space-y-2">
                <div class="flex items-center justify-between">
                  <div class="lbl">Yêu Thú Lân Cận</div>
                  <div class="text-[10px] text-slate-500">Bấm để xem chi tiết</div>
                </div>
                <template x-for="eid in $store.game.currentLocationEnemies" :key="eid">
                  <div @click="$store.game.openCombatModal(eid)" class="rounded-lg border p-2.5 cursor-pointer transition flex items-center gap-2.5" :class="$store.game.combatSel===eid?'border-jade bg-jade/8':'border-slate-800 bg-ink3/60 hover:border-slate-600'">
                    <div class="w-11 h-11 rounded bg-ink flex items-center justify-center text-2xl shrink-0 overflow-hidden" x-html="$store.game.enemyArt(eid, $store.game.ENEMIES[eid].icon)"></div>
                    <div class="flex-1 min-w-0">
                      <div class="text-sm font-medium flex items-center gap-1.5 flex-wrap"><span x-text="$store.game.ENEMIES[eid].name"></span><span x-show="$store.game.ENEMIES[eid].isBoss" class="text-[9px] px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-300 font-bold border border-amber-500/40">★ BOSS</span><span class="text-[9px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-300" x-text="$store.game.ENEMIES[eid].affinity"></span></div>
                      <div class="text-[10px] font-medium leading-tight mt-0.5" :class="$store.game.combatVerdictCls(eid)"><span x-text="($store.game.combatFc[eid]||{}).lvl||'…'"></span> <span x-text="($store.game.combatFc[eid]||{}).verdict||''"></span></div>
                    </div>
                    <span class="shrink-0 text-slate-600" x-html="$store.game.svg('chevR','w-4 h-4')"></span>
                  </div>
                </template>
                <template x-if="!$store.game.currentLocationEnemies.length">
                  <div class="text-center py-6"><div class="flex justify-center mb-2 text-slate-600" x-html="$store.game.svg('map','w-8 h-8')"></div><div class="text-sm text-slate-400">Khu này chưa có yêu thú.</div><button @click="$store.game.navTo('map')" class="mt-3 inline-flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-xs bg-jade/80 hover:bg-jade text-ink font-medium"><span x-html="$store.game.svg('map','w-3.5 h-3.5')"></span>Mở Bản Đồ</button></div>
                </template>
              </section>
            </div>

            <!-- GIỮA: Chiến Báo (CỐ ĐỊNH, luôn hiện) — rộng & cao -->
            <div class="w-full xl:flex-1 min-w-0 space-y-3">
              <section class="panel rounded-lg p-3 border border-jade/25">
                <div class="flex items-center justify-between mb-2">
                  <div class="text-jade font-bold text-sm flex items-center gap-1.5">
                    <span x-html="$store.game.svg('sword','w-4 h-4')"></span>Chiến Báo
                    <template x-if="$store.game.actIsCombat"><span class="flex items-center gap-1.5 font-normal text-xs text-slate-400"><span class="inline-block w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></span>Đang đánh <span class="text-rose-300" x-text="$store.game.actName"></span></span></template>
                  </div>
                  <template x-if="$store.game.actIsCombat"><button @click="$store.game.stop()" title="Dừng giao chiến" class="w-6 h-6 rounded bg-ink3 border border-slate-700 hover:border-rose-500 text-slate-400 hover:text-rose-400 text-xs shrink-0">✕</button></template>
                </div>
                <!-- Vòng giao chiến (8s) — chỉ khi đang đánh -->
                <template x-if="$store.game.actIsCombat">
                  <div class="flex items-center gap-2 mb-2">
                    <span class="text-[11px] text-slate-400 shrink-0 w-14">Vòng kế</span>
                    <div class="flex-1 h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full bg-gradient-to-r from-jade to-cyan" :style="`width:${$store.game.cycleProgressPct}%`"></div></div>
                    <span class="text-[11px] font-mono text-slate-400 shrink-0 w-7 text-right" x-text="$store.game.cycleRemainSec+'s'"></span>
                  </div>
                </template>
                <div id="chienBaoBox" class="rounded-lg bg-ink/60 border border-slate-800 p-2.5" style="height:calc(100vh - 250px);min-height:360px;overflow-y:auto;font-size:12px;line-height:1.7">
                  <template x-if="!$store.game.chienBao.length"><div class="text-slate-600 text-center py-12 text-xs" x-text="$store.game.actIsCombat?'— Chờ vòng giao chiến đầu tiên… —':'— Chọn yêu thú, bấm Giao Chiến —'"></div></template>
                  <template x-for="(fb,i) in $store.game.chienBao" :key="fb.no">
                    <div class="pb-1.5 mb-1.5" :class="i>0?'border-t border-slate-800/80 pt-2':''">
                      <div class="flex items-center gap-2 mb-1 text-[10px] uppercase tracking-wide" :class="fb.won?'text-jade/70':'text-rose-400/90'">
                        <span class="font-bold flex items-center gap-1"><span x-html="$store.game.svg('sword','w-3 h-3')"></span><span x-text="'Vòng '+fb.no"></span></span>
                        <template x-if="fb.he"><span class="normal-case px-1.5 py-0.5 rounded font-semibold" :class="$store.game.heInfo(fb.he).badge" x-text="$store.game.heName(fb.he)"></span></template>
                        <span class="flex-1 border-t border-dashed border-slate-700/70"></span>
                        <span x-text="fb.won?'Thắng':'Bại'"></span>
                      </div>
                      <template x-for="(l,j) in fb.lines" :key="j"><div class="mb-0.5" :class="l.c" x-html="l.h"></div></template>
                    </div>
                  </template>
                </div>
                <template x-if="$store.game.actIsCombat"><div class="text-[11px] text-slate-400 mt-1.5">Đã hạ phiên này: <b class="text-jade" x-text="$store.game.act.sessionCount"></b></div></template>
              </section>
            </div>

            <!-- PHẢI: Trạng Thái (HP trên cùng) · Tiếp Tế · Túi · Tiến Độ -->
            <div class="w-full xl:w-72 shrink-0 space-y-3">
              <!-- Trạng Thái: Sinh Lực + Nội Lực (HP trên cùng) -->
              <section class="panel rounded-lg p-3">
                <div class="lbl mb-2 text-center">Trạng Thái</div>
                <div class="flex items-center gap-2">
                  <span class="text-rose-400 shrink-0 w-4 flex justify-center" title="Sinh Lực" x-html="$store.game.svg('heart','w-4 h-4')"></span>
                  <div class="flex-1 h-3 rounded-full bg-slate-900 overflow-hidden ring-1 ring-slate-700/60 relative"><div class="h-full transition-all duration-300" :class="$store.game.combatHpPct>30?'bg-gradient-to-r from-rose-600 via-red-500 to-rose-400':'bg-gradient-to-r from-rose-900 to-rose-700'" :style="`width:${$store.game.combatHpPct}%`"></div><div x-show="$store.game.luongThucItem || ($store.game.danItem && $store.game.danItem.heal)" class="absolute top-0 bottom-0 w-px bg-amber-300/80 pointer-events-none" style="left:25%" title="Tự dùng dưới 25%"></div></div>
                  <span class="text-xs font-mono text-slate-300 shrink-0 min-w-[5.5rem] text-right whitespace-nowrap" x-text="Math.round($store.game.combatSinhLuc)+' / '+$store.game.combatMaxHp"></span>
                </div>
                <div class="flex items-center gap-2 mt-1.5">
                  <span class="text-blue-400 shrink-0 w-4 flex justify-center" title="Nội Lực" x-html="$store.game.svg('zap','w-3.5 h-3.5')"></span>
                  <div class="flex-1 h-2 rounded-full bg-slate-900 overflow-hidden ring-1 ring-slate-700/60 relative"><div class="h-full bg-gradient-to-r from-blue-600 to-sky-400 transition-all duration-300" :style="`width:${$store.game.combatNoiLucPct}%`"></div><div x-show="$store.game.danItem && $store.game.danItem.healNL" class="absolute top-0 bottom-0 w-px bg-amber-300/80 pointer-events-none" style="left:25%" title="Tự dùng đan dưới 25%"></div></div>
                  <span class="text-xs font-mono text-slate-400 shrink-0 min-w-[5.5rem] text-right whitespace-nowrap" x-text="$store.game.combatNoiLucNow+' / '+$store.game.combatMaxNL"></span>
                </div>
              </section>

              <!-- Tiếp Tế: Ô Món Ăn + Ô Đan — hệ tự dùng khi tài nguyên < 25% (không nút, không slider) -->
              <section class="panel rounded-lg p-3">
                <div class="grid grid-cols-2 gap-2">
